<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Sawee Rxfill (VMI Edition)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
    .bg-gradient-main { background: linear-gradient(135deg, #0d9488 0%, #059669 100%); }

      }
      
      table.official-table { width: 100%; border-collapse: collapse; font-size: 11px !important; margin-bottom: 10px; page-break-inside: auto; border: 1.5px solid #000 !important; }
      table.official-table tr { page-break-inside: avoid; page-break-after: auto; }

      .print-header { text-align: center; margin-bottom: 15px; }

    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0d9488; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .tooltip-container:hover .tooltip-content { display: block; }

<body class="text-slate-800 flex flex-col min-h-screen">
  <div id="root" class="flex-grow"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyAnzXAEkH8Zz0Ur4lCQ00qa4UqYATTikAs",
      authDomain: "sawee-rxfill.firebaseapp.com",
      projectId: "sawee-rxfill",
      storageBucket: "sawee-rxfill.firebasestorage.app",
      messagingSenderId: "186506077335",
      appId: "1:186506077335:web:71c5f6f90bb26e767df5d2",
      measurementId: "G-XFL0L1L213"
    };

    const GAS_DRIVE_URL = "https://script.google.com/macros/s/AKfycbyEXNTj0se5egi1TrX_4Ew47HgfUNGc2fvjf00FpGtQYpi6toSZH-1QMnWLeQopJx-IPA/exec"; 

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const THAI_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
    const DEFAULT_DRUG_TYPES = { '1': 'ยา', '3': 'สมุนไพร', '6': 'วัคซีน', '25': 'ยาสำหรับโรคเรื้อรัง (NCDs)', '32': 'เวชภัณฑ์ทางการแพทย์' };

    const getFiscalInfo = (month, year) => {
      let fiscalYear = month >= 10 ? year + 1 + 543 : year + 543;
      let term = month >= 10 ? month - 9 : month + 3;
      return { fiscalYear, term };
    };

    const getYearMonthKey = (month, year) => {
       return `${year}-${String(month).padStart(2, '0')}`;
    };

    const sortDrugs = (a, b) => {
      const idA = String(a.drugId || a.drug_id || "");
      const idB = String(b.drugId || b.drug_id || "");
      const isDrugA = idA.length >= 5;
      const isDrugB = idB.length >= 5;
      if (isDrugA && !isDrugB) return -1;
      if (!isDrugA && isDrugB) return 1;
      return idA.localeCompare(idB);
    };

    const formatQty = (qty, packSize) => {
       if (!qty || qty <= 0) return '0';
       const p = Math.floor(qty / packSize);
       const r = qty % packSize;
       if (r === 0) return p.toString();
       if (p === 0) return `(${r})`;
       return `${p}(${r})`;
    };

    const executeBatchChunks = async (operations) => {
      const BATCH_SIZE = 450;
      for (let i = 0; i < operations.length; i += BATCH_SIZE) {
        const batch = db.batch();
        operations.slice(i, i + BATCH_SIZE).forEach(op => {
          if (op.type === 'set') batch.set(op.ref, op.data, { merge: true });
          if (op.type === 'update') batch.update(op.ref, op.data);
          if (op.type === 'delete') batch.delete(op.ref);
        });
        await batch.commit();
      }
    };

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);
      const bgColor = type === 'error' ? 'bg-red-500' : 'bg-emerald-500';
      return (
        <div className={`fixed top-6 right-6 ${bgColor} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center z-[250] animate-fade-in font-medium`}>
          <i className={`fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} mr-3 text-xl`}></i>
          {message}
        </div>
      );
    };

    const Modal = ({ title, children, onClose, isOpen, maxWidth }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[150] flex items-center justify-center px-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in py-10">
          <div className={`bg-white rounded-2xl shadow-2xl w-full ${maxWidth || 'max-w-2xl'} overflow-hidden flex flex-col max-h-full`}>
            <div className="p-5 border-b flex justify-between items-center bg-slate-50 shrink-0">
              <h3 className="text-xl font-bold text-slate-800">{title}</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-red-500 transition bg-white border border-slate-200 rounded-full w-8 h-8 flex items-center justify-center shadow-sm">
                <i className="fa-solid fa-xmark"></i>
              </button>
            </div>
            <div className="p-6 overflow-y-auto">{children}</div>
          </div>
        </div>
      );
    };

    const UniversalConfirmModal = ({ confirmDialog, setConfirmDialog }) => {
      if (!confirmDialog) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[200] px-4 animate-fade-in">
          <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
            <div className="flex items-center text-slate-800 mb-4">
              <i className={`fa-solid ${confirmDialog.icon || 'fa-circle-question'} text-3xl mr-3 ${confirmDialog.iconColor || 'text-indigo-500'}`}></i>
              <h3 className="text-xl font-bold">{confirmDialog.title}</h3>
            </div>
            <p className="text-slate-500 mb-6">{confirmDialog.message}</p>
            <div className="flex justify-end gap-3">
              <button onClick={() => setConfirmDialog(null)} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200">ยกเลิก</button>
              <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className={`px-4 py-2 text-white rounded-xl font-bold shadow-lg ${confirmDialog.confirmBtnClass || 'bg-indigo-600 hover:bg-indigo-700'}`}>
                {confirmDialog.confirmText || 'ยืนยัน'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const FullScreenSpinner = () => (
      <div className="fixed inset-0 z-[300] bg-slate-900/60 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in">
        <div className="loader mb-4 border-t-emerald-400 border-4 border-white/20 w-16 h-16"></div>
        <p className="text-white font-bold text-lg tracking-wider animate-pulse">กำลังประมวลผล กรุณารอสักครู่...</p>
      </div>
    );

    const LoginView = ({ ctx }) => {
      const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
      const [rememberMe, setRememberMe] = useState(true); const [showForgot, setShowForgot] = useState(false);
      const [forgotEmail, setForgotEmail] = useState('');

      const handleForgot = async () => {
        if(!forgotEmail) return ctx.showToast('กรุณากรอกอีเมล', 'error');
        try { await auth.sendPasswordResetEmail(forgotEmail); ctx.showToast('ส่งลิงก์ไปที่อีเมลแล้ว'); setShowForgot(false); } catch(e) { ctx.showToast(e.message, 'error'); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100 w-full">
          <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-slate-100">
            <div className="flex flex-col items-center mb-8">
              <div className="bg-gradient-main p-4 rounded-2xl text-white mb-4 shadow-lg"><i className="fa-solid fa-truck-medical text-3xl"></i></div>
              <h1 className="text-3xl font-extrabold text-slate-800">Sawee Rxfill</h1>
              <p className="text-slate-500 text-sm mt-1">ระบบเติมยาและเวชภัณฑ์ VMI</p>
            </div>
            <div className="space-y-5">
              <input type="email" autoComplete="email" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
              <input type="password" autoComplete="current-password" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && ctx.handleLogin(email, password, rememberMe)} />
              <label className="flex items-center text-sm text-slate-600 cursor-pointer"><input type="checkbox" className="mr-2 w-4 h-4 text-emerald-600 rounded" checked={rememberMe} onChange={e => setRememberMe(e.target.checked)} />จดจำการเข้าสู่ระบบ</label>
              <button onClick={() => ctx.handleLogin(email, password, rememberMe)} className="w-full bg-gradient-main text-white rounded-xl p-4 font-bold hover:opacity-90 shadow-lg">เข้าสู่ระบบ</button>
            </div>
            <div className="mt-6 flex justify-between text-sm">
              <button onClick={() => ctx.setCurrentView('register')} className="text-emerald-600 font-semibold hover:underline">ลงทะเบียนผู้ใช้ใหม่</button>
              <button onClick={() => setShowForgot(true)} className="text-slate-500 font-semibold hover:underline">ลืมรหัสผ่าน?</button>
            </div>
          </div>
          {showForgot && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 px-4">
              <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                <h3 className="text-xl font-bold text-slate-800 mb-2">รีเซ็ตรหัสผ่าน</h3>
                <input type="email" className="w-full border p-3 mb-4 rounded-lg outline-none" placeholder="อีเมล" value={forgotEmail} onChange={e => setForgotEmail(e.target.value)} />
                <div className="flex justify-end gap-3">
                  <button onClick={() => setShowForgot(false)} className="px-4 py-2 bg-slate-100 rounded-lg">ยกเลิก</button>
                  <button onClick={handleForgot} className="px-4 py-2 bg-emerald-600 text-white rounded-lg">ส่งลิงก์</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

const RegisterView = ({ ctx }) => {
      const [formData, setFormData] = useState({ email: '', password: '', name: '', position: '', hospitalId: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [hospList, setHospList] = useState([]);
      const [isLoadingHosp, setIsLoadingHosp] = useState(true);

      // ⭐️ [NOTE สำหรับแก้ปัญหารายชื่อ รพ.สต. ถาวร]
      // 1. ระบบจะดึงข้อมูลทันทีที่โหลดหน้าลงทะเบียน (แม้ยังไม่ Login)
      // 2. หากรายชื่อยังไม่ขึ้น แปลว่าฐานข้อมูล Firestore บล็อกการดึงข้อมูลก่อน Login 
      // 3. วิธีแก้ที่ Firebase: ไปที่เมนู Firestore Database -> Rules -> เพิ่มบรรทัดนี้:
      //    match /master_hospitals/{document} { allow read: if true; }
      useEffect(() => {
        const fetchHospitals = async () => {
          try {
             const snap = await db.collection('master_hospitals').get();
             const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
             setHospList(list);
          } catch (err) {
             console.error("Fetch hospitals error:", err);
             ctx.showToast('ไม่สามารถดึงรายชื่อ รพ.สต. ได้ (โปรดเช็คสิทธิ์ Firebase Rules)', 'error');
          } finally {
             setIsLoadingHosp(false);
          }
        };
        fetchHospitals();
      }, []);

      const handleRegister = async () => {
        if(!formData.hospitalId || !formData.name.trim() || !formData.position.trim()) return ctx.showToast('กรุณากรอกข้อมูลให้ครบ', 'error');
        setIsSubmitting(true);
        try {
          const userCredential = await auth.createUserWithEmailAndPassword(formData.email, formData.password);
          await db.collection('users').doc(userCredential.user.uid).set({ 
              name: formData.name, 
              position: formData.position, 
              hospital_id: formData.hospitalId, 
              role: 'hospital', 
              created_at: firebase.firestore.FieldValue.serverTimestamp() 
          });
          ctx.showToast('ลงทะเบียนสำเร็จ กรุณาล็อกอิน');
          ctx.setCurrentView('login');
        } catch (error) { 
          let errorMsg = error.message;
          if (error.code === 'auth/email-already-in-use') errorMsg = 'อีเมลนี้มีในระบบแล้ว';
          else if (error.code === 'auth/weak-password') errorMsg = 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';
          ctx.showToast('ลงทะเบียนไม่สำเร็จ: ' + errorMsg, 'error'); 
        } finally { 
          setIsSubmitting(false); 
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100 w-full">
          <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">
            <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">ลงทะเบียนเข้าใช้งาน</h2>
            <div className="space-y-4">
              <input type="text" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="คำนำหน้า ชื่อ-นามสกุล (เต็ม)" onChange={e => setFormData({...formData, name: e.target.value})} />
              <input type="text" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="ตำแหน่ง (บังคับ)" onChange={e => setFormData({...formData, position: e.target.value})} />
              
              <select className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" onChange={e => setFormData({...formData, hospitalId: e.target.value})} disabled={isLoadingHosp}>
                <option value="">{isLoadingHosp ? 'กำลังโหลดรายชื่อ รพ.สต...' : '-- เลือก รพ.สต. ที่สังกัด --'}</option>
                {hospList.map(h => <option key={h.hospital_id} value={h.hospital_id}>{h.hospital_name}</option>)}
              </select>

              <input type="email" autoComplete="email" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="อีเมล (ใช้ล็อกอิน)" onChange={e => setFormData({...formData, email: e.target.value})} />
              <input type="password" autoComplete="new-password" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="รหัสผ่าน" onChange={e => setFormData({...formData, password: e.target.value})} />
              <button onClick={handleRegister} disabled={isSubmitting || isLoadingHosp} className="w-full bg-gradient-main text-white rounded-xl p-4 font-bold shadow-lg mt-4 disabled:opacity-50">{isSubmitting ? 'กำลังบันทึก...' : 'ยืนยันลงทะเบียน'}</button>
              <button onClick={() => ctx.setCurrentView('login')} className="w-full text-slate-500 mt-2 hover:underline">กลับหน้าล็อกอิน</button>
            </div>
          </div>
        </div>
      );
    };
    const ProfileEditView = ({ ctx }) => {
      const [formData, setFormData] = useState({ name: ctx.currentUser?.name || '', position: ctx.currentUser?.position || '' });
      const [isSaving, setIsSaving] = useState(false);
      const handleSave = async () => {
        if(!formData.name || !formData.position) return ctx.showToast('กรุณากรอกข้อมูลให้ครบ', 'error');
        setIsSaving(true);
        try {
          await db.collection('users').doc(ctx.currentUser.uid).update(formData);
          await ctx.refreshData(); 
          ctx.showToast('อัปเดตข้อมูลส่วนตัวแล้ว'); ctx.setCurrentView('dashboard');
        } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }
      };
      return (
        <div className="bg-white rounded-2xl shadow-sm p-8 border max-w-lg mx-auto mt-10">
          <h2 className="text-2xl font-bold mb-6">แก้ไขข้อมูลส่วนตัว</h2>
          <div className="space-y-4">
              <div><label className="text-sm font-bold text-slate-600">ชื่อ-นามสกุล</label><input type="text" className="w-full border p-3 rounded-lg outline-none mt-1" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} /></div>
              <div><label className="text-sm font-bold text-slate-600">ตำแหน่ง</label><input type="text" className="w-full border p-3 rounded-lg outline-none mt-1" value={formData.position} onChange={e=>setFormData({...formData, position: e.target.value})} /></div>
              <div><label className="text-sm font-bold text-slate-600">รพ.สต. (แก้ไขผ่าน Admin)</label><input type="text" disabled className="w-full border p-3 rounded-lg bg-slate-100 text-slate-50 mt-1" value={ctx.appDb.hospitals.find(h=>h.hospital_id===ctx.currentUser?.hospital_id)?.hospital_name || ctx.currentUser?.hospital_id} /></div>
          </div>
          <div className="flex justify-end gap-3 mt-8">
             <button onClick={()=>ctx.setCurrentView('dashboard')} className="px-6 py-2 bg-slate-100 rounded-xl font-bold text-slate-600">ยกเลิก</button>
             <button onClick={handleSave} disabled={isSaving} className="px-8 py-2 bg-emerald-600 text-white rounded-xl font-bold">{isSaving ? 'กำลังบันทึก...' : 'บันทึก'}</button>
          </div>
        </div>
      )
    };

    const DashboardView = ({ ctx }) => {
      const isHospital = ctx.currentUser?.role === 'hospital';
      const isAdmin = ctx.currentUser?.role === 'admin';
      
      const [adminSelectedCard, setAdminSelectedCard] = useState('pending');

      const myReqs = isHospital ? ctx.appDb.requisitions.filter(r => r.hospitalId === ctx.currentUser?.hospital_id) : ctx.appDb.requisitions;
      const validReqs = myReqs.filter(r => !r.id.startsWith('HIST-'));

      const today = new Date();
      const currentDay = today.getDate();
      const currentMonth = today.getMonth() + 1;
      const currentYear = today.getFullYear();
      const isRequisitionPeriod = currentDay >= 20 && currentDay <= 31;

    // Component ใหม่: สำหรับหน้าจอคืนยา
const ReturnDrugView = ({ ctx }) => {
      const hospId = ctx.currentUser.hospital_id;
      const isAdmin = ctx.currentUser.role === 'admin';

      const [items, setItems] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [printData, setPrintData] = useState(null);
      
      const [returnTab, setReturnTab] = useState('new'); // ⭐️ แท็บ สลับหน้าคืนยา กับ หน้าประวัติ
      const [historyList, setHistoryList] = useState([]);

      useEffect(() => {
          const myBal = ctx.appDb.balances.filter(b => b.hospital_id === hospId);
          const list = myBal.map(b => {
              const drug = ctx.appDb.drugs.find(d => String(d.drug_id) === String(b.drug_id));
              const unitObj = drug ? ctx.appDb.units.find(u => String(u.unit_id) === String(drug.unit_id)) : null;
              const unitName = unitObj ? unitObj.unit_name : (drug?.unit_id || '');
              return {
                  drugId: b.drug_id, name: drug ? drug.drug_name : 'N/A', unit: unitName,
                  packSize: drug ? Number(drug.pack_size) : 1, price: drug ? drug.price : 0,
                  currentBal: Number(b.excess_balance), actualBal: '', returnQty: 0, selected: false
              };
          }).filter(i => i.currentBal > 0).sort((a,b) => a.drugId.localeCompare(b.drugId));
          setItems(list);
      }, [ctx.appDb.balances, hospId]);

      // ⭐️ โหลดประวัติเมื่อเปลี่ยนแท็บ
      useEffect(() => {
          if (returnTab === 'history') {
             db.collection('stock_returns').where('hospital_id', '==', hospId).get().then(snap => {
                 const data = snap.docs.map(d => d.data());
                 setHistoryList(data.sort((a,b) => (b.created_at?.seconds || 0) - (a.created_at?.seconds || 0)));
             });
          }
      }, [returnTab, hospId]);

      const handleActualChange = (drugId, val) => {
          const actual = val === '' ? '' : Number(val);
          setItems(prev => prev.map(item => {
              if (item.drugId === drugId) {
                  // ⭐️ ลบการจำกัดค่าสูงสุดออก กรอกเกินเครดิตได้
                  const returnQty = actual === '' ? 0 : Math.max(0, item.currentBal - actual);
                  return { ...item, actualBal: actual, returnQty, selected: returnQty > 0 };
              }
              return item;
          }));
      };

      const handleToggle = (drugId) => {
          setItems(prev => prev.map(item => item.drugId === drugId ? { ...item, selected: !item.selected } : item));
      };

      const handleSubmit = async () => {
          const toReturn = items.filter(i => i.selected && i.returnQty > 0);
          if (toReturn.length === 0) return ctx.showToast('กรุณาเลือกรายการที่ต้องการคืนและระบุยอด', 'error');

          setIsSubmitting(true);
          try {
              const batch = db.batch();
              const returnId = `RET-${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${Math.floor(Math.random()*1000).toString().padStart(3,'0')}`;
              
              const returnDoc = {
                  id: returnId, hospital_id: hospId,
                  hospital_name: ctx.appDb.hospitals.find(h=>h.hospital_id === hospId)?.hospital_name || hospId,
                  created_by: ctx.currentUser.name, created_at: firebase.firestore.FieldValue.serverTimestamp(),
                  items: toReturn.map(i => ({
                      drugId: i.drugId, name: i.name, unit: i.unit, packSize: i.packSize, price: i.price,
                      currentBal: i.currentBal, actualBal: i.actualBal, returnQty: i.returnQty,
                      returnValue: (i.returnQty / i.packSize) * i.price
                  })),
                  totalValue: toReturn.reduce((sum, i) => sum + ((i.returnQty / i.packSize) * i.price), 0),
                  status: 'Completed'
              };

              batch.set(db.collection('stock_returns').doc(returnId), returnDoc);
              toReturn.forEach(i => {
                  batch.set(db.collection('current_excess').doc(`${hospId}_${i.drugId}`), {
                      excess_balance: i.currentBal - i.returnQty, last_updated: firebase.firestore.FieldValue.serverTimestamp()
                  }, { merge: true });
              });

              await batch.commit();
              ctx.showToast('บันทึกการคืนยาสำเร็จ ระบบตัดสต๊อกเรียบร้อยแล้ว');
              await ctx.refreshData();
              setPrintData({...returnDoc, created_at_date: new Date()});
          } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSubmitting(false); }
      };

                          <p>ผู้ทำรายการ: {printData.created_by} | วันที่: {printData.created_at_date ? printData.created_at_date.toLocaleString('th-TH') : new Date(printData.created_at.seconds * 1000).toLocaleString('th-TH')}</p>
                      </div>
                      <table className="official-table w-full text-[12px] border-collapse border border-black mb-4">
                          <thead className="bg-slate-200">
                              <tr>
                                  <th className="p-2 border border-black w-12 text-center">ลำดับ</th>
                                  <th className="p-2 border border-black w-20 text-center">รหัสยา</th>
                                  <th className="p-2 border border-black text-left">รายการยา</th>
                                  <th className="p-2 border border-black text-center">หน่วย</th>
                                  <th className="p-2 border border-black text-right w-24">เครดิตเดิม (ย่อย)</th>
                                  <th className="p-2 border border-black text-right w-24">ยอดมีจริง (ย่อย)</th>
                                  <th className="p-2 border border-black text-right w-24">จำนวนส่งคืน (ย่อย)</th>
                                  <th className="p-2 border border-black text-right w-24">มูลค่า (บาท)</th>
                              </tr>

                          <tbody>
                              {printData.items.map((it, idx) => (
                                  <tr key={idx}>
                                      <td className="p-2 border border-black text-center">{idx + 1}</td>

                                      <td className="p-2 border border-black text-right font-bold text-red-600">{it.returnQty}</td>
                                      <td className="p-2 border border-black text-right">{(it.returnValue).toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                                  </tr>
                              ))}

                              <tr>
                                  <th colSpan="7" className="p-2 border border-black text-right">รวมมูลค่าส่งคืนทั้งสิ้น</th>

                              </tr>
                          </tfoot>
                      </table>
                      <div className="flex justify-between mt-10 text-center px-10">
                         <div>
                            <p>....................................................</p>
                            <p className="mt-1">( {printData.created_by} )</p>
                            <p className="mt-1">ผู้ส่งมอบ / รพ.สต.</p>
                         </div>
                         <div>
                            <p>....................................................</p>
                            <p className="mt-1">( .................................................... )</p>
                            <p className="mt-1">ผู้รับคืน / คลังยา</p>
                         </div>
                      </div>
                  </div>
              </div>
          );
      }

      const filteredItems = items.filter(d => d.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(d.drugId).includes(searchTerm.toLowerCase()));

      return (
          <div className="bg-white rounded-2xl shadow-sm p-4 lg:p-8 animate-fade-in relative min-h-[80vh]">
             <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
               <div>
                 <h2 className="text-2xl font-bold text-slate-800"><i className="fa-solid fa-right-left text-red-500 mr-2"></i> ระบบเช็คสต็อกและคืนยา</h2>
                 <p className="text-slate-500 mt-1">ใส่ยอดมีจริงในคลัง ระบบจะคำนวณยอดคืนและตัดสต็อกให้ทันที</p>
               </div>
               <button onClick={() => ctx.setCurrentView('my_stock')} className="text-slate-400 hover:text-slate-600 bg-slate-100 px-4 py-2 rounded-xl font-medium">กลับหน้าคลังยา</button>
             </div>

             <div className="flex gap-2 mb-6">
                <button onClick={()=>setReturnTab('new')} className={`px-6 py-2 rounded-xl font-bold transition ${returnTab==='new'?'bg-red-600 text-white shadow-lg':'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>ทำรายการคืนยา</button>
                <button onClick={()=>setReturnTab('history')} className={`px-6 py-2 rounded-xl font-bold transition ${returnTab==='history'?'bg-red-600 text-white shadow-lg':'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>ประวัติส่งคืนย้อนหลัง</button>
             </div>

             {returnTab === 'new' ? (
                <>
                   <div className="flex justify-between items-center mb-4 gap-4">
                      <div className="relative w-full max-w-md">
                        <i className="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-slate-400"></i>
                        <input type="text" placeholder="ค้นหาชื่อยาเพื่อคืน..." className="w-full pl-10 pr-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-red-500" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                      </div>
                      <button onClick={handleSubmit} disabled={isSubmitting} className="bg-red-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-red-200 hover:scale-105 transition shrink-0 disabled:opacity-50">
                        {isSubmitting ? 'กำลังบันทึก...' : <><i className="fa-solid fa-check mr-2"></i> บันทึกการคืนยาและออกใบเสร็จ</>}
                      </button>
                   </div>

                   <div className="overflow-x-auto border border-slate-200 rounded-xl w-full">
                     <table className="w-full text-left border-collapse whitespace-nowrap text-[13px]">
                       <thead className="bg-slate-100 text-slate-700 sticky top-0">
                         <tr>
                           <th className="p-3 font-bold border-b w-12 text-center">เลือก</th>
                           <th className="p-3 font-bold border-b">รหัส</th>
                           <th className="p-3 font-bold border-b">ชื่อรายการยา/เวชภัณฑ์</th>
                           <th className="p-3 text-center font-bold border-b">หน่วย</th>
                           <th className="p-3 text-center font-bold border-b text-blue-700 bg-blue-50">เครดิตที่มี (หน่วยย่อย)</th>
                           <th className="p-3 text-center font-bold border-b bg-amber-50 text-amber-700">ยอดมีจริง (Input)</th>
                           <th className="p-3 text-center font-bold border-b text-red-700 bg-red-50">ผลการคำนวณ (ยอดคืน)</th>
                         </tr>
                       </thead>
                       <tbody>
                         {filteredItems.map((item) => (
                           <tr key={item.drugId} className={`border-b border-slate-200 transition ${item.selected ? 'bg-red-50' : 'hover:bg-slate-50'}`}>
                             <td className="p-3 text-center border-r border-slate-100">
                                <input type="checkbox" className="w-5 h-5 accent-red-600 cursor-pointer" checked={item.selected} onChange={() => handleToggle(item.drugId)} disabled={item.returnQty <= 0} />
                             </td>
                             <td className="p-3 font-mono text-slate-500">{item.drugId}</td>
                             <td className="p-3 font-bold text-slate-800">{item.name}</td>
                             <td className="p-3 text-center text-slate-600">{item.packSize} {item.unit}</td>
                             <td className="p-3 text-center font-bold text-blue-600 bg-blue-50/30">{item.currentBal}</td>
                             <td className="p-3 bg-amber-50/50 text-center relative w-32">
                               {/* ⭐️ เอา max ออก สามารถกรอกยอดเกินได้ */}
                               <input type="number" min="0" className="w-full bg-transparent border-b-2 border-amber-300 p-1 text-center font-bold text-amber-900 outline-none focus:bg-white focus:border-amber-600" value={item.actualBal} onChange={e => handleActualChange(item.drugId, e.target.value)} placeholder="ระบุยอดมีจริง" />
                             </td>
                             <td className="p-3 text-center font-extrabold text-red-600 bg-red-50/30 text-[15px]">
                               {item.returnQty > 0 ? item.returnQty : '-'}
                             </td>
                           </tr>
                         ))}
                         {filteredItems.length === 0 && <tr><td colSpan="7" className="p-8 text-center text-slate-400">ไม่มีข้อมูลยาในคลังให้คืน</td></tr>}
                       </tbody>
                     </table>
                   </div>
                </>
             ) : (
                <div className="overflow-x-auto border border-slate-200 rounded-xl w-full">
                  <table className="w-full text-left border-collapse whitespace-nowrap text-[13px]">
                     <thead className="bg-slate-100 text-slate-700">
                        <tr>
                           <th className="p-3 font-bold border-b">รหัสเอกสาร</th>
                           <th className="p-3 font-bold border-b">วันที่ส่งคืน</th>
                           <th className="p-3 font-bold border-b">ผู้ส่งมอบ</th>
                           <th className="p-3 text-center font-bold border-b">จำนวนยาที่คืน</th>
                           <th className="p-3 text-right font-bold border-b">มูลค่ารวม (บาท)</th>
                           <th className="p-3 text-center font-bold border-b">พิมพ์ย้อนหลัง</th>
                        </tr>
                     </thead>
                     <tbody>
                        {historyList.map(h => (
                           <tr key={h.id} className="border-b hover:bg-slate-50">
                              <td className="p-3 font-bold text-slate-700">{h.id}</td>
                              <td className="p-3 text-slate-600">{new Date(h.created_at?.seconds * 1000).toLocaleString('th-TH')}</td>
                              <td className="p-3 text-slate-600">{h.created_by}</td>
                              <td className="p-3 text-center text-red-600 font-bold">{h.items?.length || 0} รายการ</td>
                              <td className="p-3 text-right font-bold text-slate-800">{h.totalValue?.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                              <td className="p-3 text-center">
                                 <button onClick={() => setPrintData(h)} className="bg-blue-100 text-blue-700 px-4 py-1.5 rounded-lg font-bold hover:bg-blue-200 transition"><i className="fa-solid fa-print"></i> เปิดเพื่อพิมพ์</button>
                              </td>
                           </tr>
                        ))}
                        {historyList.length === 0 && <tr><td colSpan="6" className="p-8 text-center text-slate-400">ไม่มีประวัติการส่งคืนยา</td></tr>}
                     </tbody>
                  </table>
                </div>
             )}
          </div>
      );
    };

    const MyStockView = ({ ctx }) => {
      const hospId = ctx.currentUser.hospital_id;
      const isAdmin = ctx.currentUser.role === 'admin';
      const [searchTerm, setSearchTerm] = useState('');
      const [showModal, setShowModal] = useState(false);
      const [editItem, setEditItem] = useState(null);
      const [stockTab, setStockTab] = useState('current');

      const drugList = useMemo(() => {
        if (!ctx.appDb) return [];
        const myPars = ctx.appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
        return myPars.map(p => {
          const drug = ctx.appDb.drugs.find(d => String(d.drug_id) === String(p.drug_id));
          const bal = ctx.appDb.balances.find(b => String(b.hospital_id) === String(hospId) && String(b.drug_id) === String(p.drug_id));
          
          const unitObj = drug ? ctx.appDb.units.find(u => String(u.unit_id) === String(drug.unit_id)) : null;
          const unitName = unitObj ? unitObj.unit_name : (drug?.unit_id || '');

          return { 
              drugId: p.drug_id, name: drug ? drug.drug_name : 'N/A', unit: unitName, 
              packSize: drug ? Number(drug.pack_size) : 1, type: drug ? drug.type : '1', price: drug ? drug.price : 0,
              targetVMI: p.par_qty, currentBal: bal ? Number(bal.excess_balance) : 0 
          };
        }).sort(sortDrugs);
      }, [ctx.appDb, hospId]);

      const filteredList = drugList.filter(d => d.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(d.drugId).includes(searchTerm.toLowerCase()));

      let totalValue = 0;
      let typeCounts = {};
      Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).forEach(k => typeCounts[k] = 0);
      
      drugList.forEach(d => {
         const val = (d.currentBal / d.packSize) * d.price;
         totalValue += (val || 0);
         if(typeCounts[d.type] !== undefined) typeCounts[d.type]++;
      });

      const handleSaveAdjust = async (e) => {
         e.preventDefault();
         const fd = new FormData(e.target);
         const data = Object.fromEntries(fd);
         if(!data.reason.trim()) return ctx.showToast('ระบุเหตุผลด้วย', 'error');
         try {
            const batch = db.batch();
            const adjStatus = isAdmin ? 'Approved' : 'Pending';
            batch.set(db.collection('stock_adjustments').doc(), { hospital_id: hospId, drug_id: editItem.drugId, old_balance: editItem.currentBal, new_balance: Number(data.new_balance), reason: data.reason, user_name: ctx.currentUser.name, status: adjStatus, date: firebase.firestore.FieldValue.serverTimestamp() });
            if (isAdmin) batch.set(db.collection('current_excess').doc(`${hospId}_${editItem.drugId}`), { hospital_id: hospId, drug_id: editItem.drugId, excess_balance: Number(data.new_balance), last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
            await batch.commit();
            ctx.showToast(isAdmin ? 'ปรับสต๊อกเรียบร้อยแล้ว' : 'ส่งคำขอปรับสต๊อกแล้ว รออนุมัติ');
            setShowModal(false); await ctx.refreshData();
         } catch(err) { ctx.showToast(err.message, 'error'); }
      };

      const handleDelete = async (drugId) => {
         try {
            const batch = db.batch();
            batch.delete(db.collection('config_par').doc(`${hospId}_${drugId}`));
            batch.delete(db.collection('current_excess').doc(`${hospId}_${drugId}`));
            await batch.commit();
            ctx.showToast('นำออกจากคลังเรียบร้อย'); await ctx.refreshData();
         } catch(err) { ctx.showToast(err.message, 'error'); }
      };

      const myHistory = ctx.appDb.stockAdjustments.filter(a => a.hospital_id === hospId).sort((a,b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));

      return (
        <div className="bg-white rounded-2xl shadow-sm p-4 lg:p-8 animate-fade-in relative min-h-[80vh]">
          <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
            <div>
               <h2 className="text-2xl font-bold text-slate-800"><i className="fa-solid fa-boxes-stacked text-emerald-500 mr-2"></i> คลังยาของฉัน (My Stock)</h2>
               <p className="text-slate-500 mt-1">บริหารจัดการรายการยาและเวชภัณฑ์ใน รพ.สต.</p>
            </div>
            <button onClick={() => ctx.setCurrentView('dashboard')} className="text-slate-400 hover:text-slate-600 bg-slate-100 px-4 py-2 rounded-xl font-medium">กลับหน้าหลัก</button>
          </div>

          <div className="flex flex-wrap gap-2 mb-6">
             <button onClick={()=>setStockTab('current')} className={`px-6 py-2 rounded-xl font-bold transition ${stockTab==='current'?'bg-emerald-600 text-white shadow-lg':'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>รายการยาในคลัง</button>
             <button onClick={()=>setStockTab('history')} className={`px-6 py-2 rounded-xl font-bold transition ${stockTab==='history'?'bg-emerald-600 text-white shadow-lg':'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>ประวัติการปรับยอด</button>
             <div className="flex-1"></div>
             <button onClick={() => ctx.setCurrentView('return_drug')} className="bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 px-6 py-2 rounded-xl font-bold transition shadow-sm"><i className="fa-solid fa-right-left mr-2"></i> เช็คสต็อกและคืนยา</button>
          </div>

          {stockTab === 'current' ? (
             <>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                   <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                      <div className="text-xs font-bold text-indigo-500 uppercase">รวมรายการทั้งหมด</div>
                      <div className="text-2xl font-black text-indigo-700">{drugList.length} รายการ</div>
                   </div>
                   <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                      <div className="text-xs font-bold text-emerald-500 uppercase">มูลค่าคงคลังโดยประมาณ</div>
                      <div className="text-2xl font-black text-emerald-700">฿ {totalValue.toLocaleString(undefined, {minimumFractionDigits:2})}</div>
                   </div>
                   {Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).slice(0,2).map(k => (
                      <div key={k} className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                         <div className="text-xs font-bold text-slate-500 uppercase">{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[k]}</div>
                         <div className="text-xl font-bold text-slate-700">{typeCounts[k]} รายการ</div>
                      </div>
                   ))}
                </div>

                <div className="flex flex-wrap justify-between items-center mb-4 gap-4">
                   <div className="relative w-full max-w-md">
                     <i className="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-slate-400"></i>
                     <input type="text" placeholder="ค้นหาชื่อหรือรหัสยา..." className="w-full pl-10 pr-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                   </div>
                   <button onClick={() => { setEditItem({ isNew: true }); setShowModal(true); }} className="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:scale-105 transition shrink-0"><i className="fa-solid fa-plus mr-2"></i> เพิ่มยาเข้าคลัง</button>
                </div>

                <div className="overflow-x-auto border border-slate-200 rounded-xl w-full">
                  <table className="w-full text-left border-collapse whitespace-nowrap text-[13px]">
                    <thead className="bg-slate-100 text-slate-700">
                      <tr>
                        <th className="p-3 font-bold border-b">รหัส</th>
                        <th className="p-3 font-bold border-b">ชื่อรายการยา/เวชภัณฑ์</th>
                        <th className="p-3 font-bold border-b">หมวดหมู่</th>
                        <th className="p-3 text-center font-bold border-b">ขนาดบรรจุ</th>
                        <th className="p-3 text-center font-bold border-b text-blue-700 bg-blue-50">Target (VMI)</th>
                        <th className="p-3 text-center font-bold border-b text-amber-700 bg-amber-50">เครดิตค้าง (หน่วยย่อย)</th>
                        <th className="p-3 text-center font-bold border-b">จัดการ</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredList.map((item) => (
                        <tr key={item.drugId} className="border-b border-slate-200 hover:bg-slate-50 transition">
                          <td className="p-3 font-mono text-slate-500">{item.drugId}</td>
                          <td className="p-3 font-bold text-slate-800">{item.name}</td>
                          <td className="p-3 text-slate-600">{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[item.type]}</td>
                          <td className="p-3 text-center text-slate-600">{item.packSize} {item.unit}</td>
                          <td className="p-3 text-center font-bold text-blue-600 bg-blue-50/30">{item.targetVMI}</td>
                          <td className="p-3 text-center font-extrabold text-amber-600 bg-amber-50/30 text-[15px]">{item.currentBal}</td>
                          <td className="p-3 text-center space-x-2">
                             <button onClick={() => { setEditItem({ ...item, isNew: false }); setShowModal(true); }} className="bg-slate-200 text-slate-700 hover:bg-amber-400 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition"><i className="fa-solid fa-sliders mr-1"></i> ปรับสต๊อก</button>
                             <button onClick={() => ctx.setConfirmDialog({title:'ยืนยันนำออก', message:'คุณต้องการลบยานี้ออกจากคลัง รพ.สต. ใช่หรือไม่? (ประวัติการเบิกจะไม่หายไป)', iconColor:'text-red-500', confirmBtnClass:'bg-red-500 hover:bg-red-600', onConfirm: ()=>handleDelete(item.drugId)})} className="bg-slate-200 text-slate-600 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition"><i className="fa-solid fa-trash"></i></button>
                          </td>
                        </tr>
                      ))}
                      {filteredList.length === 0 && <tr><td colSpan="7" className="p-8 text-center text-slate-400">ไม่มีข้อมูลในคลัง</td></tr>}
                    </tbody>
                  </table>
                </div>
             </>
          ) : (
             <div className="overflow-x-auto border border-slate-200 rounded-xl w-full">
                <table className="w-full text-left border-collapse whitespace-nowrap text-[13px]">
                   <thead className="bg-slate-100 text-slate-700">
                      <tr>
                         <th className="p-3 font-bold border-b">วันที่</th>
                         <th className="p-3 font-bold border-b">รายการยา</th>
                         <th className="p-3 text-center font-bold border-b">ยอดที่ขอปรับ</th>
                         <th className="p-3 font-bold border-b w-1/3">เหตุผล</th>
                         <th className="p-3 text-center font-bold border-b">สถานะ</th>
                      </tr>
                   </thead>
                   <tbody>
                      {myHistory.map((hist) => {
                         const drugName = ctx.appDb.drugs.find(d => d.drug_id === hist.drug_id)?.drug_name || hist.drug_id;
                         return (
                            <tr key={hist.id} className="border-b border-slate-200 hover:bg-slate-50 transition">
                               <td className="p-3 text-slate-600">{hist.date ? new Date(hist.date.seconds * 1000).toLocaleString('th-TH') : '-'}</td>
                               <td className="p-3 font-bold text-slate-800">{drugName} <span className="text-xs font-normal text-slate-500">[{hist.drug_id}]</span></td>
                               <td className="p-3 text-center bg-slate-50/50">
                                  <span className="text-slate-400 line-through mr-2">{hist.old_balance}</span>
                                  <span className="text-emerald-600 font-bold">{hist.new_balance}</span>
                               </td>
                               <td className="p-3 text-slate-600 italic whitespace-normal min-w-[200px]">"{hist.reason}"</td>
                               <td className="p-3 text-center">
                                  <span className={`px-2 py-1 rounded-lg text-[11px] font-bold ${hist.status === 'Approved' ? 'bg-emerald-100 text-emerald-700' : hist.status === 'Rejected' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}`}>
                                     {hist.status === 'Approved' ? 'อนุมัติแล้ว' : hist.status === 'Rejected' ? 'ไม่อนุมัติ' : 'รออนุมัติ'}
                                  </span>
                               </td>
                            </tr>
                         )
                      })}
                      {myHistory.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">ไม่มีประวัติการปรับสต๊อก</td></tr>}
                   </tbody>
                </table>
             </div>
          )}

          {showModal && editItem && (
             <Modal title={editItem.isNew ? 'เพิ่มยาเข้าคลัง' : 'ขอปรับปรุงสต๊อก (Adjust)'} isOpen={true} onClose={()=>setShowModal(false)}>
                {editItem.isNew ? (
                   <form onSubmit={async (e) => {
                      e.preventDefault();
                      const fd = new FormData(e.target); const drugId = fd.get('drug_id'); const target = Number(fd.get('target')); const current = Number(fd.get('current'));
                      if(!drugId) return;
                      const batch = db.batch();
                      batch.set(db.collection('config_par').doc(`${hospId}_${drugId}`), { hospital_id: hospId, drug_id: drugId, par_qty: target });
                      batch.set(db.collection('current_excess').doc(`${hospId}_${drugId}`), { hospital_id: hospId, drug_id: drugId, excess_balance: current, last_updated: firebase.firestore.FieldValue.serverTimestamp() });
                      await batch.commit(); ctx.showToast('เพิ่มยาลงคลังสำเร็จ'); setShowModal(false); ctx.refreshData();
                   }} className="space-y-4">
                      <div><label className="text-sm font-bold text-slate-600 mb-1 block">เลือกรหัสยาในระบบ</label>
                         <input list="add-drug-list" name="drug_id" className="w-full border p-3 rounded-xl outline-none" required placeholder="พิมพ์ค้นหา..."/>
                         <datalist id="add-drug-list">{ctx.appDb.drugs.map(d=><option key={d.drug_id} value={d.drug_id}>{d.drug_name}</option>)}</datalist>
                      </div>
                      <div className="flex gap-4">
                         <div className="w-1/2"><label className="text-sm font-bold text-slate-600 mb-1 block">Target VMI ที่ต้องการ</label><input type="number" name="target" defaultValue="0" className="w-full border p-3 rounded-xl outline-none" /></div>
                         <div className="w-1/2"><label className="text-sm font-bold text-slate-600 mb-1 block">เครดิตตั้งต้น (หน่วยย่อย)</label><input type="number" name="current" defaultValue="0" className="w-full border p-3 rounded-xl outline-none" /></div>
                      </div>
                      <div className="pt-4 flex justify-end"><button type="submit" className="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold">บันทึก</button></div>
                   </form>
                ) : (
                   <form onSubmit={handleSaveAdjust} className="space-y-4">
                      <div><label className="text-sm font-bold text-slate-600 mb-1 block">รายการยา</label><div className="bg-slate-100 p-3 rounded-xl font-bold">{editItem.name} <span className="font-normal text-xs ml-1">[{editItem.drugId}]</span></div></div>
                      <div className="flex gap-4">
                         <div className="w-1/2"><label className="text-sm font-bold text-slate-600 mb-1 block">ยอดเครดิตเดิมในระบบ</label><input disabled value={editItem.currentBal} className="w-full border p-3 rounded-xl bg-slate-50 text-slate-400 font-bold" /></div>
                         <div className="w-1/2"><label className="text-sm font-bold text-amber-600 mb-1 block">ระบุเครดิตใหม่ (หน่วยย่อย)</label><input type="number" name="new_balance" required className="w-full border-2 border-amber-400 p-3 rounded-xl outline-none focus:border-amber-600 font-bold text-amber-700" /></div>
                      </div>
                      <div><label className="text-sm font-bold text-slate-600 mb-1 block">เหตุผลการขอปรับ</label><textarea name="reason" required rows="2" className="w-full border p-3 rounded-xl outline-none" placeholder="เช่น ยาเสื่อมสภาพ, นับสต๊อกสิ้นเดือน, คีย์เบิกผิดรอบที่แล้ว..."></textarea></div>
                      <div className="pt-4 flex justify-end"><button type="submit" className="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold">ส่งคำขอ</button></div>
                   </form>
                )}
             </Modal>
          )}
        </div>
      );
    };

const CreateReqView = ({ ctx }) => {
      const hospId = ctx.targetUploadHosp || ctx.currentUser.hospital_id; 
      const isAdmin = ctx.currentUser.role === 'admin';
      const today = new Date();
      const currentMonth = today.getMonth() + 1;
      const currentYear = today.getFullYear();
      
      const isOutOfPeriod = !isAdmin && (today.getDate() < 20 || today.getDate() > 31);
      const hasExistingReq = !!ctx.editReqId;
      
      const [acknowledged, setAcknowledged] = useState(false);
      const [searchTerm, setSearchTerm] = useState(''); 
      const [filterType, setFilterType] = useState('all'); 
      const [showUsedOnly, setShowUsedOnly] = useState(false); 
      const [showCalc, setShowCalc] = useState(false); 
      
      const [excelFile, setExcelFile] = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);

      const [showImportModal, setShowImportModal] = useState(false);
      const [importData, setImportData] = useState({ hospInfo: '', periodInfo: '', isDateValid: true, items: [] });
      const [showZeroImport, setShowZeroImport] = useState(false);
      
      const [manualAddSearch, setManualAddSearch] = useState('');

      const [items, setItems] = useState(() => {
        if (!ctx.appDb || !ctx.appDb.parLevels) return [];
        
        let existingReqItems = [];
        if (ctx.editReqId) {
           const reqToEdit = ctx.appDb.requisitions.find(r => r.id === ctx.editReqId);
           if (reqToEdit) existingReqItems = reqToEdit.items || [];
        }

        const myPars = ctx.appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
        const generatedList = myPars.map(par => {
          const drug = ctx.appDb.drugs.find(d => String(d.drug_id) === String(par.drug_id));
          const bal = ctx.appDb.balances.find(b => String(b.hospital_id) === String(hospId) && String(b.drug_id) === String(par.drug_id));
          
          const unitObj = drug ? ctx.appDb.units.find(u => String(u.unit_id) === String(drug.unit_id)) : null;
          const unitName = unitObj ? unitObj.unit_name : (drug?.unit_id || '');
          
          const existingItem = existingReqItems.find(ex => ex.drugId === par.drug_id);
          const prevExcess = bal ? Number(bal.excess_balance) : 0;
          const isUnpacked = drug ? !!drug.unpacked : false;
          const type = drug ? drug.type : '1';
          const price = drug ? drug.price : 0;
          const packSize = drug ? Number(drug.pack_size) : 1;
          
          let m_usages = [];
          for(let i=1; i<=5; i++) {
            let m = currentMonth - i; let y = currentYear;
            if(m <= 0) { m += 12; y -= 1; }
            const key = getYearMonthKey(m, y);
            const hist = ctx.appDb.historicalUsages?.find(h => String(h.hospital_id) === String(hospId) && String(h.drug_id) === String(par.drug_id));
            const usage = (hist && hist.history && hist.history[key]) ? Number(hist.history[key]) : 0;
            m_usages.push(usage);
          }
          const pastHistory = m_usages.slice(0,5);

          if (existingItem) {
             return { ...existingItem, isUnpacked, type, price, requestMore: existingItem.requestMore || 0, isUnlocked: (existingItem.requestMore > 0), pastHistory };
          }

          const isVaccine = type === '6';

          return {
            drugId: par.drug_id, name: drug ? drug.drug_name : 'N/A', unit: unitName,
            packSize, isUnpacked, type, price, pastHistory,
            prevExcess, usage: 0, targetVMI: 0, 
            netNeed: 0, dispensePack: 0, dispenseQty: 0, 
            newExcess: prevExcess, isSpecial: false,
            requestMore: 0, isUnlocked: false, isNewDrug: true
          };
        });

        existingReqItems.forEach(ex => {
           if(!generatedList.find(g => g.drugId === ex.drugId)) generatedList.push({...ex, pastHistory: [0,0,0,0,0], requestMore: ex.requestMore || 0, isUnlocked: (ex.requestMore > 0)});
        });
        return generatedList.sort(sortDrugs);
      });

      const handleJHCISUpload = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        setExcelFile(file); 
        setIsProcessing(true);

        const processData = (dataRows) => {
          let hospInfo = ""; let periodInfo = ""; let isDateValid = true; let extracted = [];
          dataRows.forEach(row => {
            const rowArr = Array.isArray(row) ? row : Object.values(row);
            const compacted = rowArr.map(c => String(c || '').trim()).filter(c => c !== '');
            if (compacted.length === 0) return;
            if (compacted.some(c => c.includes('สถานบริการ'))) hospInfo = compacted.find(c => c.includes('สถานบริการ'));
            if (compacted.some(c => c.includes('ระหว่างวันที่'))) {
               periodInfo = compacted.find(c => c.includes('ระหว่างวันที่')) || compacted.join(' ');
               const dateRegex = /(\d{1,2})\s*([ก-๙\.]+)\s*(\d{4})\s*-\s*(\d{1,2})\s*([ก-๙\.]+)\s*(\d{4})/;
               const match = periodInfo.match(dateRegex);
               if (match) {
                  const startDay = parseInt(match[1]); const endDay = parseInt(match[4]);
                  if (startDay < 20 && endDay < 20) isDateValid = false;
               }
            }
            if (compacted.length >= 6 && /^\d+\.?$/.test(compacted[0])) {
               const rawName = compacted[1]; const usageStr = compacted[6]; 
               const usageNum = parseFloat(usageStr?.replace(/,/g, ''));
               if (!isNaN(usageNum) && usageNum >= 0 && rawName && !rawName.includes('รวม')) {
                   extracted.push({ id: Math.random().toString(), rawName, usage: usageNum, mappedDrugId: '' });
               }
            }
          });

          const normalize = (str) => String(str).toLowerCase().replace(/[\s\-\.\(\)]/g, '');
          extracted = extracted.map(item => {
            const normRaw = normalize(item.rawName);
            let mappedId = '';
            let matched = ctx.appDb.drugs.find(d => {
               const normSys = normalize(d.drug_name);
               const fuzzyArr = d.fuzzy ? String(d.fuzzy).split(',').map(normalize) : [];
               return normSys === normRaw || fuzzyArr.includes(normRaw);
            });
            if (!matched) {
              matched = ctx.appDb.drugs.find(d => {
                 const normSys = normalize(d.drug_name);
                 const fuzzyArr = d.fuzzy ? String(d.fuzzy).split(',').map(normalize) : [];
                 return normSys.includes(normRaw) || normRaw.includes(normSys) || fuzzyArr.some(f => normRaw.includes(f));
              });
            }
            if (matched) mappedId = matched.drug_id; 
            return { ...item, mappedDrugId: mappedId };
          });

          setImportData({ hospInfo, periodInfo, isDateValid, items: extracted });
          setShowImportModal(true);
          setIsProcessing(false);
        };

        if (file.name.endsWith('.csv')) {
          Papa.parse(file, { header: false, skipEmptyLines: true, complete: function(results) { processData(results.data); } });
        } else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
          const reader = new FileReader();
          reader.onload = (evt) => {
            const bstr = evt.target.result; const wb = XLSX.read(bstr, {type:'binary'});
            const wsname = wb.SheetNames[0]; const ws = wb.Sheets[wsname];
            const data = XLSX.utils.sheet_to_json(ws, {header:1});
            processData(data);
          };
          reader.readAsBinaryString(file);
        } else { ctx.showToast("รองรับเฉพาะไฟล์ .csv, .xls, .xlsx", "error"); setIsProcessing(false); e.target.value = null; }
      };

      const updateRow = (drugIdToUpdate, usageVal, requestMoreVal = null) => {
        const newItems = items.map(item => {
          if (item.drugId === drugIdToUpdate) {
            const usage = usageVal !== null ? (parseInt(usageVal) || 0) : item.usage;
            const requestMore = requestMoreVal !== null ? (parseInt(requestMoreVal) || 0) : item.requestMore;
            
            const recent5 = item.pastHistory ? item.pastHistory.slice(0, 5) : [0,0,0,0,0];
            const activeUsages = [...recent5, usage].filter(u => u > 0);
            const count = activeUsages.length || 1;
            const mean = activeUsages.reduce((a,b)=>a+b, 0) / count;
            const variance = activeUsages.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / (count === 1 ? 1 : count - 1);
            const SD = Math.sqrt(variance);
            const targetVMI = Math.ceil(mean + (1.645 * SD));

            const row = { ...item, usage, requestMore, targetVMI, isNewDrug: item.isNewDrug || (count === 1 && recent5.every(u=>u===0)), isAdjusted: requestMore > 0 };
            
            let currentBal = row.prevExcess - usage;
            let netNeed = targetVMI - currentBal;
            if (netNeed <= 0) netNeed = 0;
            
            let totalNeedToDispense = netNeed + requestMore;

            if (row.type === '6') {
               row.netNeed = 0; row.dispensePack = 0; row.dispenseQty = 0; row.newExcess = currentBal; 
            } else if (totalNeedToDispense <= 0) {
               row.netNeed = 0; row.dispensePack = 0; row.dispenseQty = 0; row.newExcess = currentBal; 
            } else {
               row.netNeed = netNeed; 
               if (row.isUnpacked) {
                  row.dispensePack = Math.ceil(totalNeedToDispense / row.packSize); 
                  row.dispenseQty = Math.ceil(totalNeedToDispense);
               } else {
                  row.dispensePack = Math.ceil(totalNeedToDispense / row.packSize); 
                  row.dispenseQty = row.dispensePack * row.packSize; 
               }
               row.newExcess = currentBal + row.dispenseQty;
            }
            return row;
          }
          return item;
        });
        setItems(newItems);
      };

      // ⭐️ ฟังก์ชันลบรายการออกจากใบเบิก (ไม่ลบคลัง)
      const handleDeleteItem = (drugId) => {
         ctx.setConfirmDialog({
           title: 'ยืนยันลบออกจากใบเบิก',
           message: 'ปุ่มนี้คือลบออกจากใบเบิกและรีเซ็ตจำนวนเบิกยานี้เป็น 0 แต่ยาจะยังคงอยู่ในคลังของคุณ ยืนยันหรือไม่?',
           icon: 'fa-trash',
           iconColor: 'text-red-500',
           confirmBtnClass: 'bg-red-600 hover:bg-red-700',
           confirmText: 'ลบออกจากใบเบิก',
           onConfirm: () => {
              setItems(prev => prev.filter(i => i.drugId !== drugId));
              ctx.showToast('ลบรายการยาออกจากตารางแล้ว (จะไม่ปรากฏในใบเบิก)');
           }
         });
      };

      const handleManualAdd = () => {
         if(!manualAddSearch) return;
         const drug = ctx.appDb.drugs.find(d => d.drug_id === manualAddSearch);
         if(!drug) return ctx.showToast('ไม่พบรหัสยานี้ในระบบ', 'error');
         if(items.find(i => i.drugId === drug.drug_id)) return ctx.showToast('มีรายการนี้ในใบเบิกอยู่แล้ว', 'error');

         const unitObj = ctx.appDb.units.find(u => String(u.unit_id) === String(drug.unit_id));
         const unitDisplay = unitObj ? unitObj.unit_name : (drug.unit_id || '');

         const newItem = {
            drugId: drug.drug_id, name: drug.drug_name, unit: unitDisplay,
            packSize: Number(drug.pack_size), isUnpacked: !!drug.unpacked, type: drug.type || '1', price: drug.price || 0,
            prevExcess: 0, usage: 0, targetVMI: 0, netNeed: 0, dispensePack: 0, dispenseQty: 0, newExcess: 0,
            isSpecial: false, requestMore: 0, isUnlocked: false, isNewDrug: true, pastHistory: [0,0,0,0,0], isAdjusted: true
         };
         setItems([newItem, ...items].sort(sortDrugs)); setManualAddSearch(''); ctx.showToast(`เพิ่ม ${drug.drug_name} ลงในใบเบิกแล้ว`);
      };

      const executeSubmit = async () => {
         const processSave = async (fileUrl) => {
            const skipped = importData.items.filter(i => i.mappedDrugId === '').map(i => ({ rawName: i.rawName, usage: i.usage }));
            
            const sanitizedItems = items.map(item => {
               return {
                  drugId: item.drugId || "", name: item.name || "N/A", unit: item.unit || "",
                  packSize: item.packSize || 1, isUnpacked: !!item.isUnpacked, type: item.type || '1', price: item.price || 0,
                  prevExcess: item.prevExcess || 0, usage: item.usage || 0, targetVMI: item.targetVMI || 0, netNeed: item.netNeed || 0,
                  dispensePack: item.dispensePack || 0, dispenseQty: item.dispenseQty || 0, newExcess: item.newExcess || 0,
                  isSpecial: false, requestMore: item.requestMore || 0, isNewDrug: !!item.isNewDrug, isAdjusted: !!item.isAdjusted
               };
            });

            const finalStatus = 'Pending'; 

            if (ctx.editReqId) {
               const payload = { items: sanitizedItems, skipped_items: skipped, updated_at: firebase.firestore.FieldValue.serverTimestamp(), status: finalStatus };
               if (fileUrl) payload.excel_url = fileUrl; 
               await db.collection('requisitions').doc(ctx.editReqId).update(payload);
               
               const batch = db.batch();
               importData.items.filter(i => i.mappedDrugId !== '').forEach(item => {
                  const drugRef = db.collection('master_drugs').doc(item.mappedDrugId);
                  const drugObj = ctx.appDb.drugs.find(d => d.drug_id === item.mappedDrugId);
                  if(drugObj) {
                     const existingFuzzy = drugObj.fuzzy ? drugObj.fuzzy.split(',').map(f=>f.trim().toLowerCase()) : [];
                     const rawLower = item.rawName.toLowerCase().replace(/[\s\-\.\(\)]/g, '');
                     if(!existingFuzzy.includes(rawLower)) {
                        batch.update(drugRef, { fuzzy: drugObj.fuzzy ? `${drugObj.fuzzy},${item.rawName}` : item.rawName });
                     }
                  }
               });
               
               await batch.commit();
               
               if(excelFile && !fileUrl) ctx.showToast('บันทึกยอดสำเร็จ แต่ไม่สามารถอัปโหลดไฟล์ รบ.301 ลง Google Drive ได้', 'error');
               else ctx.showToast('อัปเดตใบเบิกสำเร็จ');

            } else {
               const newId = `REQ-${currentYear}-${String(currentMonth).padStart(2, '0')}-${Math.floor(Math.random()*1000).toString().padStart(3, '0')}`;
               const batch = db.batch();
               const reqRef = db.collection('requisitions').doc(newId);
               batch.set(reqRef, {
                 hospitalId: hospId, month: currentMonth, year: currentYear, status: finalStatus, is_printed: false,
                 excel_url: fileUrl || "", items: sanitizedItems, skipped_items: skipped, 
                 created_by_name: ctx.currentUser?.name || 'System', 
                 created_by_position: ctx.currentUser?.position || 'เจ้าหน้าที่', 
                 created_at: firebase.firestore.FieldValue.serverTimestamp() 
               });
               importData.items.filter(i => i.mappedDrugId !== '').forEach(item => {
                  const drugRef = db.collection('master_drugs').doc(item.mappedDrugId);
                  const drugObj = ctx.appDb.drugs.find(d => d.drug_id === item.mappedDrugId);
                  if(drugObj) {
                     const existingFuzzy = drugObj.fuzzy ? drugObj.fuzzy.split(',').map(f=>f.trim().toLowerCase()) : [];
                     const rawLower = item.rawName.toLowerCase().replace(/[\s\-\.\(\)]/g, '');
                     if(!existingFuzzy.includes(rawLower)) {
                        batch.update(drugRef, { fuzzy: drugObj.fuzzy ? `${drugObj.fuzzy},${item.rawName}` : item.rawName });
                     }
                  }
               });
               
               await batch.commit();
               
               if(excelFile && !fileUrl) ctx.showToast('ส่งข้อมูลสำเร็จ แต่ไม่สามารถอัปโหลดไฟล์ รบ.301 ลง Google Drive ได้', 'error');
               else ctx.showToast(isAdmin ? 'อัปโหลดแทน รพ.สต. สำเร็จ (รอตรวจสอบ)' : 'ส่งข้อมูลสำเร็จ รอห้องยาจัดยา');
            }
            await ctx.refreshData(); ctx.setEditReqId(null); ctx.setTargetUploadHosp(null); ctx.setCurrentView('dashboard');
         };

         if (excelFile) {
            const reader = new FileReader();
            reader.onload = async (event) => {
               const base64Str = event.target.result.split(',')[1];
               let fileUrl = "";
               try {
                  if(GAS_DRIVE_URL.includes('/exec')) {
                     const uploadRes = await fetch(GAS_DRIVE_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ filename: `Rxfill_${hospId}_${currentMonth}_${currentYear}.xlsx`, mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', base64: base64Str })
                     });
                     const uploadData = await uploadRes.json();
                     if(uploadData.status === 'success') fileUrl = uploadData.url || "";
                  }
               } catch(err) {
                  console.error("Fetch GAS Failed:", err);
               }
               processSave(fileUrl);
            };
            reader.readAsDataURL(excelFile);
         } else { processSave(""); }
      };

      const handleSubmitPreCheck = () => {
         if(!excelFile && !ctx.editReqId && !isAdmin) return ctx.showToast('กรุณาแนบไฟล์ รบ.301 (.xlsx) เพื่อใช้เป็นหลักฐานประกอบการเบิก', 'error');
         if(items.filter(i => i.usage > 0 || i.requestMore > 0).length === 0) return ctx.showToast('ไม่มีรายการเบิกใดๆ กรุณากรอกยอด', 'error');
         
         ctx.setConfirmDialog({
            title: 'ยืนยันการส่งใบเบิก?',
            message: 'กรุณาตรวจสอบข้อมูลให้ครบถ้วน ยืนยันการส่งข้อมูลเข้าระบบหรือไม่?',
            icon: 'fa-paper-plane',
            confirmText: 'ส่งใบเบิก',
            onConfirm: () => {
               setIsSubmitting(true);
               executeSubmit().catch(e => { ctx.showToast(e.message, 'error'); setIsSubmitting(false); });
            }
         });
      };

      const filteredItems = items.filter(item => {
        const matchSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(item.drugId).includes(searchTerm.toLowerCase());
        const matchType = filterType === 'all' ? true : filterType === item.type;
        const matchUsage = showUsedOnly ? item.usage > 0 || item.requestMore > 0 : true;
        return matchSearch && matchType && matchUsage;
      });

      if (isOutOfPeriod && !acknowledged && !ctx.editReqId) {
        return (
          <div className="bg-white rounded-3xl p-10 text-center shadow-sm max-w-2xl mx-auto mt-10 border border-amber-200 animate-fade-in">
            <i className="fa-solid fa-triangle-exclamation text-6xl text-amber-500 mb-6"></i>
            <h2 className="text-2xl font-bold text-slate-800 mb-3">แจ้งเตือน: นอกช่วงเวลาเบิกยา</h2>
            <p className="text-slate-500 mb-8 text-lg">ระบบเปิดให้ทำเรื่องเติมยาเฉพาะ <span className="font-bold text-slate-700">วันที่ 20 ถึง 31 ของเดือน</span></p>
            <div className="flex flex-col sm:flex-row justify-center gap-4">
              <button onClick={() => { ctx.setTargetUploadHosp(null); ctx.setCurrentView('dashboard'); }} className="bg-slate-100 text-slate-600 px-6 py-3 rounded-xl font-bold hover:bg-slate-200 transition">กลับหน้าหลัก</button>
              <button onClick={() => setAcknowledged(true)} className="bg-gradient-to-r from-amber-400 to-orange-500 text-white px-6 py-3 rounded-xl font-bold hover:scale-105 transition shadow-lg shadow-amber-200">เข้าสู่โหมดฉุกเฉิน</button>
            </div>
          </div>
        );
      }

      const unmatchedCount = importData.items.filter(i => (showZeroImport || i.usage > 0) && !i.mappedDrugId).length;

      return (
        <div className="bg-white rounded-2xl shadow-sm p-4 lg:p-8 border border-slate-100 animate-fade-in relative w-full print-safe-wrapper">
          {isProcessing && <FullScreenSpinner />}
          <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
            <div>
              <h2 className="text-2xl font-bold text-slate-800">
                {ctx.editReqId ? `แก้ไขใบเบิกยารอบ ${currentMonth}/${currentYear}` : `ทำเรื่องเติมยารอบใหม่ (${currentMonth}/${currentYear})`}
                {isAdmin && <span className="ml-3 text-sm bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full"><i className="fa-solid fa-user-shield"></i> โหมดแอดมินจัดการแทน</span>}
              </h2>
              <p className="text-slate-500 mt-1">อัปโหลดไฟล์ Excel รบ.301 เพื่อดึงยอดใช้รายเดือนเข้าสู่ตาราง</p>
            </div>
            <button onClick={() => {ctx.setEditReqId(null); ctx.setTargetUploadHosp(null); ctx.setCurrentView('dashboard');}} className="text-slate-400 hover:text-slate-600 bg-slate-100 px-4 py-2 rounded-xl font-medium">ยกเลิก</button>
          </div>
