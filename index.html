<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Sawee Rxfill (VMI Edition)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💊</text></svg>">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

    .text-gradient { background: linear-gradient(135deg, #0d9488 0%, #059669 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* CSS สำหรับจัดหน้าเอกสาร A4 ปริ้นต์เป็น PDF */
    @media print {
      @page { size: A4 portrait; margin: 10mm; }
      body { background-color: #fff; }
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible; }
      .print-area { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
      .no-print { display: none !important; }
      
      table.official-table { width: 100%; border-collapse: collapse; font-size: 11px !important; margin-bottom: 10px; }
      table.official-table th, table.official-table td { padding: 4px !important; white-space: nowrap !important; border: 1px solid #000 !important; }
      table.official-table th { background-color: #f0f0f0 !important; -webkit-print-color-adjust: exact; text-align: center; }
      
      .print-header { text-align: center; margin-bottom: 15px; }
      .print-header h1 { font-size: 18px !important; font-weight: bold; margin-bottom: 5px; }
      .print-header p { font-size: 14px !important; margin-bottom: 2px; }
      
      .type-header { background-color: #e0e0e0 !important; -webkit-print-color-adjust: exact; font-weight: bold; font-size: 12px !important; text-align: left !important; }
      
      .signature-box { display: flex; justify-content: space-between; margin-top: 30px; font-size: 13px !important; }
      .signature-item { text-align: center; width: 30%; }
      .signature-line { border-bottom: 1px dotted #000; display: inline-block; width: 120px; margin-bottom: 5px; }
      
      /* บังคับขึ้นหน้าใหม่ถ้าตารางยาว */
      .page-break { page-break-before: always; }
    }
    
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0d9488; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">
  <div id="root" class="flex-grow"></div>

  <footer class="bg-slate-800 text-slate-400 py-4 text-center text-sm no-print mt-auto border-t-4 border-emerald-500">
    <p>Sawee Rxfill System | VMI & Logistics Management</p>
    <p class="mt-1 font-medium text-emerald-400"><i class="fa-solid fa-phone mr-1"></i> กรณีมีปัญหาการใช้งาน กรุณาติดต่อ Admin: 089-290-9255</p>
  </footer>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyAnzXAEkH8Zz0Ur4lCQ00qa4UqYATTikAs",
      authDomain: "sawee-rxfill.firebaseapp.com",
      projectId: "sawee-rxfill",
      storageBucket: "sawee-rxfill.firebasestorage.app",
      messagingSenderId: "186506077335",
      appId: "1:186506077335:web:71c5f6f90bb26e767df5d2",
      measurementId: "G-XFL0L1L213"
    };

    const GAS_DRIVE_URL = "https://script.google.com/macros/s/AKfycbyxqnZlYJKW22S_DO9PnYFQYsxs6SMbUVI5ckB7yZCDC6KhlqKpE8incdkzmuyVILCd/exec"; 

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();

    const DRUG_TYPES = { '1': 'ยา', '3': 'สมุนไพร', '25': 'ยาสำหรับโรคเรื้อรัง (NCDs)', '32': 'เวชภัณฑ์ทางการแพทย์' };
    const THAI_MONTHS = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];

    // Helper: หางบประมาณปี และ งวดที่
    const getFiscalInfo = (month, year) => {
      let fiscalYear = month >= 10 ? year + 1 + 543 : year + 543;
      let term = month >= 10 ? month - 9 : month + 3;
      return { fiscalYear, term };
    };

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);
      const bgColor = type === 'error' ? 'bg-red-500' : 'bg-emerald-500';
      return (
        <div className={`fixed top-6 right-6 ${bgColor} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center z-[250] animate-fade-in font-medium`}>
          <i className={`fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} mr-3 text-xl`}></i>
          {message}
        </div>
      );
    };

    const sortDrugs = (a, b) => {
      const idA = String(a.drugId || a.drug_id || "");
      const idB = String(b.drugId || b.drug_id || "");
      const isDrugA = idA.length >= 5;
      const isDrugB = idB.length >= 5;
      if (isDrugA && !isDrugB) return -1;
      if (!isDrugA && isDrugB) return 1;
      return idA.localeCompare(idB);
    };

    const executeBatchChunks = async (operations) => {
      const BATCH_SIZE = 450;
      for (let i = 0; i < operations.length; i += BATCH_SIZE) {
        const batch = db.batch();
        const chunk = operations.slice(i, i + BATCH_SIZE);
        chunk.forEach(op => {
          if (op.type === 'set') batch.set(op.ref, op.data, { merge: true });
          if (op.type === 'update') batch.update(op.ref, op.data);
          if (op.type === 'delete') batch.delete(op.ref);
        });
        await batch.commit();
      }
    };

    function App() {
      const [loading, setLoading] = useState(true);
      const [appDb, setAppDb] = useState(null); 
      const [currentUser, setCurrentUser] = useState(null);
      const [currentView, setCurrentView] = useState('login');
      const [toast, setToast] = useState(null);
      const [currentReqId, setCurrentReqId] = useState(null);
      const [editReqId, setEditReqId] = useState(null); 

      // Universal Confirm Modal State
      const [confirmDialog, setConfirmDialog] = useState(null);

      const showToast = (message, type = 'success') => setToast({ message, type });

      const refreshData = async () => {
        try {
          const [hospSnap, unitSnap, drugSnap, parSnap, balSnap, reqSnap, userSnap, adjustSnap, csvReqSnap] = await Promise.all([
            db.collection('master_hospitals').get(),
            db.collection('master_unit').get(),
            db.collection('master_drugs').get(),
            db.collection('config_par').get(),
            db.collection('current_excess').get(),
            db.collection('requisitions').orderBy('created_at', 'desc').get(),
            db.collection('users').get(),
            db.collection('stock_adjustments').orderBy('date', 'desc').get(),
            db.collection('csv_initial_requests').orderBy('created_at', 'desc').get()
          ]);

          const units = unitSnap.docs.map(d => ({ id: d.id, ...d.data() }));
          const drugs = drugSnap.docs.map(d => {
            const data = d.data();
            const matchedUnit = units.find(u => u.unit_id === data.unit_id);
            return { ...data, unit_display_name: matchedUnit ? matchedUnit.unit_name : data.unit_id };
          });
          
          setAppDb({
            hospitals: hospSnap.docs.map(d => ({ id: d.id, ...d.data() })),
            units: units,
            drugs: drugs,
            parLevels: parSnap.docs.map(d => ({ id: d.id, ...d.data() })),
            balances: balSnap.docs.map(d => ({ id: d.id, ...d.data() })),
            requisitions: reqSnap.docs.map(d => ({ id: d.id, ...d.data() })),
            usersList: userSnap.docs.map(d => ({ id: d.id, ...d.data() })),
            stockAdjustments: adjustSnap.docs.map(d => ({ id: d.id, ...d.data() })),
            csvRequests: csvReqSnap.docs.map(d => ({ id: d.id, ...d.data() }))
          });
        } catch (error) {
          console.error(error);
          showToast('เชื่อมต่อฐานข้อมูลล้มเหลว', 'error');
        }
      };

      const fetchData = async () => {
        setLoading(true);
        await refreshData();
        setLoading(false);
      };

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          if (user) {
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists) {
              setCurrentUser({ uid: user.uid, email: user.email, ...userDoc.data() });
              setCurrentView('dashboard');
            }
          } else {
            setCurrentUser(null);
            setCurrentView('login');
          }
          fetchData(); 
        });
        return () => unsubscribe();
      }, []);

      const handleLogin = async (email, password, rememberMe = true) => {
        setLoading(true);
        try {
          await auth.setPersistence(rememberMe ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
          await auth.signInWithEmailAndPassword(email, password);
          showToast('เข้าสู่ระบบสำเร็จ');
        } catch (error) {
          showToast('อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'error');
          setLoading(false);
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <div className="loader mb-4"></div>
            <p className="text-emerald-600 font-semibold animate-pulse">กำลังโหลดข้อมูล...</p>
          </div>
        );
      }

      const Modal = ({ title, children, onClose, isOpen, maxWidth }) => {
        if (!isOpen) return null;
        return (
          <div className="fixed inset-0 z-[150] flex items-center justify-center px-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
            <div className={`bg-white rounded-2xl shadow-2xl w-full ${maxWidth || 'max-w-2xl'} overflow-hidden flex flex-col max-h-[90vh]`}>
              <div className="p-5 border-b flex justify-between items-center bg-slate-50">
                <h3 className="text-xl font-bold text-slate-800">{title}</h3>
                <button onClick={onClose} className="text-slate-400 hover:text-red-500 transition bg-white border border-slate-200 rounded-full w-8 h-8 flex items-center justify-center shadow-sm">
                  <i className="fa-solid fa-xmark text-lg"></i>
                </button>
              </div>
              <div className="p-6 overflow-y-auto">{children}</div>
            </div>
          </div>
        );
      };

      const UniversalConfirmModal = () => {
        if (!confirmDialog) return null;
        return (
          <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[200] px-4 animate-fade-in">
            <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
              <div className="flex items-center text-slate-800 mb-4">
                <i className={`fa-solid ${confirmDialog.icon || 'fa-circle-question'} text-3xl mr-3 ${confirmDialog.iconColor || 'text-indigo-500'}`}></i>
                <h3 className="text-xl font-bold">{confirmDialog.title}</h3>
              </div>
              <p className="text-slate-500 mb-6">{confirmDialog.message}</p>
              <div className="flex justify-end gap-3">
                <button onClick={() => setConfirmDialog(null)} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-xl font-semibold hover:bg-slate-200 transition">ยกเลิก</button>
                <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className={`px-4 py-2 text-white rounded-xl font-semibold shadow-lg transition ${confirmDialog.confirmBtnClass || 'bg-indigo-600 hover:bg-indigo-700'}`}>
                  {confirmDialog.confirmText || 'ยืนยัน'}
                </button>
              </div>
            </div>
          </div>
        );
      };

      // ==========================================
      // VIEWS
      // ==========================================

      const LoginView = () => {
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [rememberMe, setRememberMe] = useState(true);
        const [showForgot, setShowForgot] = useState(false);
        const [forgotEmail, setForgotEmail] = useState('');

        const handleForgot = async () => {
          if(!forgotEmail) return showToast('กรุณากรอกอีเมล', 'error');
          try {
            await auth.sendPasswordResetEmail(forgotEmail);
            showToast('ส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลแล้ว');
            setShowForgot(false);
            setForgotEmail('');
          } catch(e) { showToast(e.message, 'error'); }
        };

        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
            <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-slate-100">
              <div className="flex flex-col items-center mb-8">
                <div className="bg-gradient-main p-4 rounded-2xl text-white mb-4 shadow-lg shadow-emerald-200">
                  <i className="fa-solid fa-truck-medical text-3xl"></i>
                </div>
                <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">Sawee Rxfill</h1>
                <p className="text-slate-500 text-sm mt-1">ระบบเติมยาและเวชภัณฑ์ VMI</p>
              </div>
              <div className="space-y-5">
                <div>
                  <label className="text-sm font-semibold text-slate-600 ml-1 mb-1 block">อีเมลเข้าสู่ระบบ</label>
                  <input type="email" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500 transition" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
                </div>
                <div>
                  <label className="text-sm font-semibold text-slate-600 ml-1 mb-1 block">รหัสผ่าน</label>
                  <input type="password" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500 transition" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin(email, password, rememberMe)} />
                </div>
                <label className="flex items-center text-sm text-slate-600 cursor-pointer">
                  <input type="checkbox" className="mr-2 w-4 h-4 text-emerald-600 rounded" checked={rememberMe} onChange={e => setRememberMe(e.target.checked)} />
                  จดจำการเข้าสู่ระบบ
                </label>
                <button onClick={() => handleLogin(email, password, rememberMe)} className="w-full bg-gradient-main text-white rounded-xl p-4 font-bold hover:opacity-90 transition shadow-lg shadow-emerald-200">
                  เข้าสู่ระบบ
                </button>
              </div>
              <div className="mt-6 flex justify-between text-sm">
                <button onClick={() => setCurrentView('register')} className="text-emerald-600 font-semibold hover:underline">ลงทะเบียนผู้ใช้ใหม่</button>
                <button onClick={() => setShowForgot(true)} className="text-slate-500 font-semibold hover:underline">ลืมรหัสผ่าน?</button>
              </div>
            </div>

            {showForgot && (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 px-4 animate-fade-in">
                <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                  <h3 className="text-xl font-bold text-slate-800 mb-2">รีเซ็ตรหัสผ่าน</h3>
                  <p className="text-sm text-slate-500 mb-4">กรุณากรอกอีเมลของคุณเพื่อรับลิงก์สำหรับตั้งรหัสผ่านใหม่</p>
                  <input type="email" className="w-full border border-slate-300 rounded-lg p-3 mb-4 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="อีเมล" value={forgotEmail} onChange={e => setForgotEmail(e.target.value)} />
                  <div className="flex justify-end gap-3">
                    <button onClick={() => setShowForgot(false)} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg font-semibold hover:bg-slate-200">ยกเลิก</button>
                    <button onClick={handleForgot} className="px-4 py-2 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700">ส่งลิงก์</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const RegisterView = () => {
        const [formData, setFormData] = useState({ email: '', password: '', name: '', position: '', hospitalId: '' });
        const [isSubmitting, setIsSubmitting] = useState(false);

        const handleRegister = async () => {
          if(!formData.hospitalId) return showToast('กรุณาระบุ รพ.สต.', 'error');
          if(!formData.name.trim()) return showToast('กรุณาระบุชื่อ-นามสกุล', 'error');
          if(!formData.position.trim()) return showToast('กรุณาระบุตำแหน่ง', 'error');
          setIsSubmitting(true);
          try {
            const userCredential = await auth.createUserWithEmailAndPassword(formData.email, formData.password);
            await db.collection('users').doc(userCredential.user.uid).set({
              name: formData.name, position: formData.position, hospital_id: formData.hospitalId, role: 'hospital', created_at: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('ลงทะเบียนสำเร็จ');
          } catch (error) {
            showToast(error.message, 'error');
          } finally { setIsSubmitting(false); }
        };

        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
            <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">
              <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">ลงทะเบียนเข้าใช้งาน</h2>
              <div className="space-y-4">
                <input type="text" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="คำนำหน้า ชื่อ-นามสกุล (เต็ม)" onChange={e => setFormData({...formData, name: e.target.value})} />
                <input type="text" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="ตำแหน่ง (เช่น พยาบาลวิชาชีพ)" onChange={e => setFormData({...formData, position: e.target.value})} />
                <select className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" onChange={e => setFormData({...formData, hospitalId: e.target.value})}>
                  <option value="">-- เลือก รพ.สต. ที่สังกัด --</option>
                  {appDb?.hospitals?.map(h => <option key={h.hospital_id} value={h.hospital_id}>{h.hospital_name}</option>)}
                </select>
                <input type="email" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="อีเมล (ใช้ล็อกอิน)" onChange={e => setFormData({...formData, email: e.target.value})} />
                <input type="password" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="รหัสผ่าน" onChange={e => setFormData({...formData, password: e.target.value})} />
                
                <button onClick={handleRegister} disabled={isSubmitting} className="w-full bg-gradient-main text-white rounded-xl p-4 font-bold shadow-lg shadow-emerald-200 mt-4 hover:opacity-90">
                  {isSubmitting ? 'กำลังบันทึก...' : 'ยืนยันลงทะเบียน'}
                </button>
                <button onClick={() => setCurrentView('login')} className="w-full text-slate-500 mt-2 hover:underline">กลับหน้าล็อกอิน</button>
              </div>
            </div>
          </div>
        );
      };

      const DashboardView = () => {
        const isHospital = currentUser?.role === 'hospital';
        const myReqs = isHospital ? appDb.requisitions.filter(r => r.hospitalId === currentUser.hospital_id) : appDb.requisitions;
        const colleagues = isHospital ? appDb.usersList.filter(u => u.hospital_id === currentUser.hospital_id && u.id !== currentUser.uid) : [];
        
        const today = new Date();
        const currentMonth = today.getMonth() + 1;
        const currentYear = today.getFullYear();
        const currentMonthReq = isHospital ? myReqs.find(r => r.month === currentMonth && r.year === currentYear) : null;

        const handleReqAction = () => {
          if (!currentMonthReq) {
            setEditReqId(null);
            setCurrentView('create_req');
          } else if (currentMonthReq.status === 'Pending') {
            setEditReqId(currentMonthReq.id);
            setCurrentView('create_req');
          }
        };

        return (
          <div className="space-y-8 animate-fade-in">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-end bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
              <div>
                <h2 className="text-3xl font-extrabold text-slate-800">ภาพรวมระบบเติมยา</h2>
                <p className="text-slate-500 mt-1 text-lg">สวัสดี, <span className="font-semibold text-emerald-600">{currentUser.name}</span></p>
                {isHospital && <p className="text-sm text-slate-400 mt-1"><i className="fa-solid fa-location-dot"></i> {appDb.hospitals.find(h=>h.hospital_id === currentUser.hospital_id)?.hospital_name}</p>}
              </div>
              <div className="space-x-3 flex flex-wrap gap-y-2">
                {currentUser.role === 'admin' && (
                   <button onClick={() => setCurrentView('upload_csv')} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition">
                     <i className="fa-solid fa-file-csv mr-2"></i> Initial Stock (CSV)
                   </button>
                )}
                {isHospital && (
                  <button onClick={() => setCurrentView('adjust_stock')} className="bg-white border-2 border-emerald-500 text-emerald-600 px-6 py-3 rounded-xl font-bold hover:bg-emerald-50 transition">
                    <i className="fa-solid fa-boxes-stacked mr-2"></i> ขอปรับสต๊อก
                  </button>
                )}
                {isHospital && (
                  <button 
                    onClick={handleReqAction} 
                    disabled={currentMonthReq && currentMonthReq.status === 'Completed'}
                    className={`px-6 py-3 rounded-xl font-bold shadow-lg transition flex items-center ${currentMonthReq && currentMonthReq.status === 'Completed' ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : currentMonthReq && currentMonthReq.status === 'Pending' ? 'bg-amber-500 text-white hover:bg-amber-600 shadow-amber-200' : 'bg-gradient-main text-white hover:scale-105 shadow-emerald-200'}`}
                  >
                    {currentMonthReq && currentMonthReq.status === 'Completed' ? <><i className="fa-solid fa-lock mr-2"></i> เบิกแล้ว (รอรอบหน้า)</> :
                     currentMonthReq && currentMonthReq.status === 'Pending' ? <><i className="fa-solid fa-pen mr-2"></i> แก้ไขใบเบิกรอบนี้</> : 
                     <><i className="fa-solid fa-boxes-packing mr-2"></i> ทำเรื่องเติมยา</>}
                  </button>
                )}
              </div>
            </div>
            
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 flex items-center">
                <div className="bg-blue-100 p-4 rounded-xl text-blue-600 mr-4"><i className="fa-solid fa-file-invoice text-2xl"></i></div>
                <div><div className="text-slate-500 font-medium">ประวัติทั้งหมด</div><div className="text-3xl font-extrabold">{myReqs.length}</div></div>
              </div>
              <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 flex items-center">
                <div className="bg-amber-100 p-4 rounded-xl text-amber-600 mr-4"><i className="fa-solid fa-clock text-2xl"></i></div>
                <div><div className="text-slate-500 font-medium">รอห้องยาอนุมัติ</div><div className="text-3xl font-extrabold">{myReqs.filter(r => r.status === 'Pending').length}</div></div>
              </div>
              <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 flex items-center">
                <div className="bg-emerald-100 p-4 rounded-xl text-emerald-600 mr-4"><i className="fa-solid fa-check-double text-2xl"></i></div>
                <div><div className="text-slate-500 font-medium">จัดยาแล้ว</div><div className="text-3xl font-extrabold">{myReqs.filter(r => r.status === 'Completed').length}</div></div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div className="p-5 border-b border-slate-100 font-bold text-slate-800 bg-slate-50"><i className="fa-solid fa-list-ul text-emerald-500 mr-2"></i> ประวัติการเติมยา</div>
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="border-b text-sm text-slate-500 bg-white">
                      <th className="p-4 font-medium">รหัสเอกสาร</th>
                      <th className="p-4 font-medium">ผู้เบิก</th>
                      <th className="p-4 font-medium">รอบบิล</th>
                      <th className="p-4 font-medium">สถานะ</th>
                      <th className="p-4 font-medium text-right">เอกสาร</th>
                    </tr>
                  </thead>
                  <tbody>
                    {myReqs.map(req => (
                      <tr key={req.id} className="border-b hover:bg-slate-50 transition cursor-pointer" onClick={() => { setCurrentReqId(req.id); setCurrentView('view_req'); }}>
                        <td className="p-4 font-semibold text-slate-700">{req.id}</td>
                        <td className="p-4 text-slate-600">{req.created_by_name || '-'}</td>
                        <td className="p-4 text-slate-600">{req.month}/{req.year}</td>
                        <td className="p-4">
                          <span className={`px-3 py-1 rounded-lg text-xs font-bold ${req.status === 'Pending' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}>
                            {req.status === 'Pending' ? 'กำลังดำเนินการ' : 'สำเร็จ'}
                          </span>
                        </td>
                        <td className="p-4 text-right">
                           <button className="text-emerald-600 hover:text-emerald-800 bg-emerald-50 px-3 py-1.5 rounded-lg text-sm font-semibold">
                             เปิดดูรายการ
                           </button>
                        </td>
                      </tr>
                    ))}
                    {myReqs.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">ยังไม่มีประวัติ</td></tr>}
                  </tbody>
                </table>
              </div>

              {isHospital && (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 h-fit">
                  <div className="p-5 border-b border-slate-100 font-bold text-slate-800 bg-slate-50"><i className="fa-solid fa-users text-blue-500 mr-2"></i> เจ้าหน้าที่ รพ.สต. เดียวกัน</div>
                  <div className="p-4 space-y-3">
                    {colleagues.length > 0 ? colleagues.map(c => (
                      <div key={c.id} className="flex items-center p-3 bg-slate-50 rounded-xl">
                        <div className="w-10 h-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold text-lg mr-3">
                          {c.name.charAt(0)}
                        </div>
                        <div>
                          <div className="font-semibold text-slate-700 text-sm">{c.name}</div>
                          <div className="text-xs text-slate-500">{c.position || c.role}</div>
                        </div>
                      </div>
                    )) : <div className="text-center text-slate-400 text-sm py-4">ไม่มีเจ้าหน้าที่คนอื่น</div>}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      const CreateReqView = () => {
        const hospId = currentUser.hospital_id;
        const isAdmin = currentUser.role === 'admin';
        const today = new Date();
        const isOutOfPeriod = today.getDate() < 25 && !isAdmin;
        const currentMonth = today.getMonth() + 1;
        const currentYear = today.getFullYear();
        
        const [acknowledged, setAcknowledged] = useState(false);
        const [searchTerm, setSearchTerm] = useState(''); 
        const [filterType, setFilterType] = useState('all'); 
        const [showUsedOnly, setShowUsedOnly] = useState(false); 
        
        const [excelFile, setExcelFile] = useState(null);
        const [isSubmitting, setIsSubmitting] = useState(false);

        const [showImportModal, setShowImportModal] = useState(false);
        const [importData, setImportData] = useState({ hospInfo: '', periodInfo: '', isDateValid: true, items: [] });
        
        const [manualAddSearch, setManualAddSearch] = useState('');

        const VMI_MULTIPLIER = 1.25; // ค่าคงที่ตามกติกาใหม่

        const [items, setItems] = useState(() => {
          if (!appDb || !appDb.parLevels) return [];
          
          let existingReqItems = [];
          if (editReqId) {
             const reqToEdit = appDb.requisitions.find(r => r.id === editReqId);
             if (reqToEdit) existingReqItems = reqToEdit.items || [];
          }

          const myPars = appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
          const generatedList = myPars.map(par => {
            const drug = appDb.drugs.find(d => String(d.drug_id) === String(par.drug_id));
            const bal = appDb.balances.find(b => String(b.hospital_id) === String(hospId) && String(b.drug_id) === String(par.drug_id));
            
            const existingItem = existingReqItems.find(ex => ex.drugId === par.drug_id);
            const prevExcess = bal ? Number(bal.excess_balance) : 0;
            const isUnpacked = drug ? !!drug.unpacked : false;
            const type = drug ? drug.type : '1';
            const price = drug ? drug.price : 0;
            
            let m_usages = [];
            for(let i=1; i<=6; i++) {
              let m = currentMonth - i; let y = currentYear;
              if(m <= 0) { m += 12; y -= 1; }
              const oldReq = appDb.requisitions.find(r => r.hospitalId === hospId && r.month === m && r.year === y && r.id !== editReqId);
              let usage = 0;
              if(oldReq && oldReq.items) {
                const oldItem = oldReq.items.find(it => it.drugId === par.drug_id);
                if(oldItem) usage = Number(oldItem.usage);
              }
              m_usages.push(usage);
            }
            
            const total6M = m_usages.reduce((a,b)=>a+b, 0);
            const ADU = total6M / 180; 
            const mean6M = total6M / 6;
            const variance = m_usages.reduce((acc, val) => acc + Math.pow(val - mean6M, 2), 0) / 5;
            const SD = Math.sqrt(variance || 0);
            
            const targetVMI = Math.ceil((ADU * 30) + (1.645 * SD));

            if (existingItem) {
               // ถ้าเป็นการ Edit เอาของเดิมมาแต่ให้แน่ใจว่า field พื้นฐานครบ
               return { ...existingItem, targetVMI, isUnpacked, avgUsage: ADU.toFixed(2), type, price };
            }

            return {
              drugId: par.drug_id, name: drug ? drug.drug_name : 'N/A', unit: drug ? drug.unit_display_name : '',
              packSize: drug ? Number(drug.pack_size) : 1, isUnpacked: isUnpacked, type, price,
              avgUsage: ADU.toFixed(2), prevExcess: prevExcess, 
              usage: 0, targetVMI: targetVMI, netNeed: 0, dispensePack: 0, dispenseQty: 0, newExcess: prevExcess, isSpecial: false
            };
          });

          // ดึง Special Items จาก existingReqItems ที่ไม่ได้อยู่ใน Par
          existingReqItems.forEach(ex => {
             if(!generatedList.find(g => g.drugId === ex.drugId)) {
                generatedList.push(ex);
             }
          });

          return generatedList.sort(sortDrugs);
        });

        // ⭐️ ตรวจสอบไฟล์ Excel .xlsx
        const handleJHCISUpload = (e) => {
          const file = e.target.files[0];
          if(!file) return;
          setExcelFile(file); // เก็บไฟล์ไว้เพื่อ Upload เข้า Drive ตอนกดส่ง

          const processData = (dataRows) => {
            let hospInfo = "";
            let periodInfo = "";
            let isDateValid = true;
            let extracted = [];

            dataRows.forEach(row => {
              const rowArr = Array.isArray(row) ? row : Object.values(row);
              const compacted = rowArr.map(c => String(c || '').trim()).filter(c => c !== '');
              if (compacted.length === 0) return;

              if (compacted.some(c => c.includes('สถานบริการ'))) {
                 hospInfo = compacted.find(c => c.includes('สถานบริการ'));
              }
              // หาช่องที่มีคำว่า ระหว่างวันที่ เพื่อดึง Date
              if (compacted.some(c => c.includes('ระหว่างวันที่'))) {
                 periodInfo = compacted.find(c => c.includes('ระหว่างวันที่')) || compacted.join(' ');
                 // Regex หาวันที่แบบคร่าวๆ: (1 พ.ค. 2569-31 พ.ค. 2569)
                 const dateRegex = /(\d{1,2})\s*([ก-๙\.]+)\s*(\d{4})\s*-\s*(\d{1,2})\s*([ก-๙\.]+)\s*(\d{4})/;
                 const match = periodInfo.match(dateRegex);
                 if (match) {
                    const startDay = parseInt(match[1]);
                    const startMonthStr = match[2];
                    const startYearThai = parseInt(match[3]);
                    const endDay = parseInt(match[4]);
                    // เช็คกรอบเวลาคร่าวๆ: ควรเริ่มแถวๆ 25 หรือจบแถวๆ 25
                    if (startDay < 20 && endDay < 20) {
                       isDateValid = false; // นอกช่วงเวลา หรือไม่ใช่รอบที่ถูกต้อง
                    }
                 }
              }

              if (compacted.length >= 6 && /^\d+\.?$/.test(compacted[0])) {
                 const rawName = compacted[1];
                 const usageStr = compacted[6]; 
                 const usageNum = parseFloat(usageStr?.replace(/,/g, ''));
                 if (!isNaN(usageNum) && usageNum > 0 && rawName && !rawName.includes('รวม')) {
                     extracted.push({ id: Math.random().toString(), rawName, usage: usageNum, mappedDrugId: '' });
                 }
              }
            });

            const normalize = (str) => String(str).toLowerCase().replace(/[\s\-\.\(\)]/g, '');
            extracted = extracted.map(item => {
              const normRaw = normalize(item.rawName);
              let mappedId = '';
              
              let matched = appDb.drugs.find(d => {
                 const normSys = normalize(d.drug_name);
                 const fuzzyArr = d.fuzzy ? String(d.fuzzy).split(',').map(normalize) : [];
                 return normSys === normRaw || fuzzyArr.includes(normRaw);
              });
              
              if (!matched) {
                matched = appDb.drugs.find(d => {
                   const normSys = normalize(d.drug_name);
                   const fuzzyArr = d.fuzzy ? String(d.fuzzy).split(',').map(normalize) : [];
                   return normSys.includes(normRaw) || normRaw.includes(normSys) || fuzzyArr.some(f => normRaw.includes(f));
                });
              }
              if (matched) mappedId = matched.drug_id;
              return { ...item, mappedDrugId: mappedId };
            });

            setImportData({ hospInfo, periodInfo, isDateValid, items: extracted });
            setShowImportModal(true);
          };

          if (file.name.endsWith('.csv')) {
            Papa.parse(file, { header: false, skipEmptyLines: true, complete: function(results) { processData(results.data); } });
          } else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
            const reader = new FileReader();
            reader.onload = (evt) => {
              const bstr = evt.target.result;
              const wb = XLSX.read(bstr, {type:'binary'});
              const wsname = wb.SheetNames[0];
              const ws = wb.Sheets[wsname];
              const data = XLSX.utils.sheet_to_json(ws, {header:1});
              processData(data);
            };
            reader.readAsBinaryString(file);
          } else {
            showToast("รองรับเฉพาะไฟล์ .csv, .xls, .xlsx", "error"); e.target.value = null;
          }
        };

        const updateRow = (drugIdToUpdate, usageVal) => {
          const usage = parseInt(usageVal) || 0;
          const newItems = items.map(item => {
            if (item.drugId === drugIdToUpdate) {
              const row = { ...item, usage };
              let currentBal = row.prevExcess - usage;
              let netNeed = row.targetVMI - currentBal;
              
              if (netNeed <= 0) {
                 row.netNeed = 0; row.dispensePack = 0; row.dispenseQty = 0; 
                 row.newExcess = currentBal; 
              } else {
                 row.netNeed = netNeed; 
                 if (row.isUnpacked) {
                    row.dispensePack = Math.ceil(netNeed / row.packSize);
                    row.dispenseQty = Math.ceil(netNeed);
                 } else {
                    row.dispensePack = Math.ceil(netNeed / row.packSize);
                    row.dispenseQty = row.dispensePack * row.packSize; 
                 }
                 row.newExcess = currentBal + row.dispenseQty;
              }
              return row;
            }
            return item;
          });
          setItems(newItems);
        };

        // ⭐️ ฟังก์ชันเพิ่มยาด้วยตนเองจากกล่องค้นหา
        const handleManualAdd = () => {
           if(!manualAddSearch) return;
           const drug = appDb.drugs.find(d => d.drug_id === manualAddSearch);
           if(!drug) return showToast('ไม่พบรหัสยานี้ในระบบ', 'error');
           if(items.find(i => i.drugId === drug.drug_id)) return showToast('มีรายการนี้ในใบเบิกอยู่แล้ว', 'error');

           const isMed = drug.type === '32'; // เวชภัณฑ์
           const newItem = {
              drugId: drug.drug_id, name: drug.drug_name, unit: drug.unit_display_name,
              packSize: Number(drug.pack_size), isUnpacked: !!drug.unpacked, type: drug.type, price: drug.price,
              avgUsage: 0, prevExcess: 0, usage: 0, targetVMI: 0, netNeed: 0, dispensePack: 0, dispenseQty: 0, newExcess: 0,
              isSpecial: !isMed // ถ้าไม่ใช่เวชภัณฑ์ ให้ติดป้ายแดงว่า "กรณีพิเศษ"
           };
           
           setItems([newItem, ...items].sort(sortDrugs));
           setManualAddSearch('');
           showToast(`เพิ่ม ${drug.drug_name} ลงในใบเบิกแล้ว`);
        };

        const handleSubmit = async () => {
          if(!excelFile && !editReqId) return showToast('กรุณาแนบไฟล์ รบ.301 (.xlsx) เพื่อใช้เป็นหลักฐานประกอบการเบิก', 'error');
          setIsSubmitting(true);
          
          try {
            const processSave = async (fileUrl) => {
               // หา Item ที่ข้าม (Skipped) ไปให้แอดมิน
               const skipped = importData.items.filter(i => i.mappedDrugId === '').map(i => ({ rawName: i.rawName, usage: i.usage }));

               const sanitizedItems = items.map(item => ({
                  drugId: item.drugId || "", name: item.name || "N/A", unit: item.unit || "",
                  packSize: item.packSize || 1, isUnpacked: !!item.isUnpacked, type: item.type || '1', price: item.price || 0,
                  avgUsage: item.avgUsage || 0, prevExcess: item.prevExcess || 0,
                  usage: item.usage || 0, vmiTarget: item.vmiTarget || 0, netNeed: item.netNeed || 0,
                  dispensePack: item.dispensePack || 0, dispenseQty: item.dispenseQty || 0, newExcess: item.newExcess || 0,
                  isSpecial: !!item.isSpecial
               }));

               if (editReqId) {
                  const payload = { items: sanitizedItems, skipped_items: skipped, updated_at: firebase.firestore.FieldValue.serverTimestamp() };
                  if (fileUrl) payload.excel_url = fileUrl; 
                  await db.collection('requisitions').doc(editReqId).update(payload);
                  
                  // อัปเดต Fuzzy ให้อัตโนมัติ (กรณี User จับคู่มือ)
                  const batch = db.batch();
                  importData.items.filter(i => i.mappedDrugId !== '').forEach(item => {
                     const drugRef = db.collection('master_drugs').doc(item.mappedDrugId);
                     const drugObj = appDb.drugs.find(d => d.drug_id === item.mappedDrugId);
                     if(drugObj) {
                        const existingFuzzy = drugObj.fuzzy ? drugObj.fuzzy.split(',').map(s=>s.trim().toLowerCase()) : [];
                        const rawLower = item.rawName.toLowerCase().replace(/[\s\-\.\(\)]/g, '');
                        if(!existingFuzzy.includes(rawLower)) {
                           const newFuzzy = drugObj.fuzzy ? `${drugObj.fuzzy},${item.rawName}` : item.rawName;
                           batch.update(drugRef, { fuzzy: newFuzzy });
                        }
                     }
                  });
                  await batch.commit();

                  showToast('อัปเดตใบเบิกสำเร็จ');
               } else {
                  const newId = `REQ-${currentYear}-${String(currentMonth).padStart(2, '0')}-${Math.floor(Math.random()*1000).toString().padStart(3, '0')}`;
                  
                  const batch = db.batch();
                  const reqRef = db.collection('requisitions').doc(newId);
                  batch.set(reqRef, {
                    hospitalId: hospId, month: currentMonth, year: currentYear, status: 'Pending',
                    excel_url: fileUrl || "", items: sanitizedItems, skipped_items: skipped, created_by_name: currentUser.name, created_at: firebase.firestore.FieldValue.serverTimestamp() 
                  });

                  // อัปเดต Fuzzy
                  importData.items.filter(i => i.mappedDrugId !== '').forEach(item => {
                     const drugRef = db.collection('master_drugs').doc(item.mappedDrugId);
                     const drugObj = appDb.drugs.find(d => d.drug_id === item.mappedDrugId);
                     if(drugObj) {
                        const existingFuzzy = drugObj.fuzzy ? drugObj.fuzzy.split(',').map(s=>s.trim().toLowerCase()) : [];
                        const rawLower = item.rawName.toLowerCase().replace(/[\s\-\.\(\)]/g, '');
                        if(!existingFuzzy.includes(rawLower)) {
                           const newFuzzy = drugObj.fuzzy ? `${drugObj.fuzzy},${item.rawName}` : item.rawName;
                           batch.update(drugRef, { fuzzy: newFuzzy });
                        }
                     }
                  });

                  await batch.commit();
                  showToast('ส่งเรื่องเติมยาสำเร็จ');
               }
               await refreshData();
               setEditReqId(null);
               setCurrentView('dashboard');
            };

            if (excelFile) {
              const reader = new FileReader();
              reader.onload = async (event) => {
                const base64Str = event.target.result.split(',')[1];
                let fileUrl = "";
                if(GAS_DRIVE_URL.includes('/exec')) {
                  const uploadRes = await fetch(GAS_DRIVE_URL, {
                    method: 'POST',
                    body: JSON.stringify({ filename: `Rxfill_${hospId}_${currentMonth}_${currentYear}.xlsx`, mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', base64: base64Str })
                  });
                  const uploadData = await uploadRes.json();
                  if(uploadData.status === 'success') fileUrl = uploadData.url || "";
                }
                processSave(fileUrl);
              };
              reader.readAsDataURL(excelFile);
            } else { processSave(""); }
          } catch (e) { showToast('เกิดข้อผิดพลาด: ' + e.message, 'error'); setIsSubmitting(false); }
        };

        const filteredItems = items.filter(item => {
          const matchSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(item.drugId).includes(searchTerm.toLowerCase());
          const matchType = filterType === 'all' ? true : filterType === item.type;
          const matchUsage = showUsedOnly ? item.usage > 0 : true;
          return matchSearch && matchType && matchUsage;
        });

        if (isOutOfPeriod && !acknowledged && !editReqId) {
          return (
            <div className="bg-white rounded-3xl p-10 text-center shadow-sm max-w-2xl mx-auto mt-10 border border-amber-200 animate-fade-in">
              <i className="fa-solid fa-triangle-exclamation text-6xl text-amber-500 mb-6"></i>
              <h2 className="text-2xl font-bold text-slate-800 mb-3">แจ้งเตือน: นอกช่วงเวลาเบิกยา</h2>

      const ViewReqView = () => {

        const [isApproving, setIsApproving] = useState(false);
        const [editableItems, setEditableItems] = useState(req?.items || []);
        
        useEffect(() => { if(req) setEditableItems(req.items); }, [req]);
        if(!req) return null;
        
        const isAdmin = currentUser.role === 'admin';
        const isPending = req.status === 'Pending';
        const hosp = appDb.hospitals.find(h => h.hospital_id === req.hospitalId);
        const userInfo = appDb.usersList.find(u => u.name === req.created_by_name) || { position: 'เจ้าหน้าที่' };

        const { fiscalYear, term } = getFiscalInfo(req.month, req.year);

        const handleAdjust = (idx, val) => {
          const qty = parseInt(val) || 0; const newItems = [...editableItems];
          newItems[idx] = { ...newItems[idx], dispenseQty: qty, dispensePack: Math.ceil(qty / newItems[idx].packSize), newExcess: (newItems[idx].prevExcess - newItems[idx].usage) + qty, isAdjusted: true };
          setEditableItems(newItems);
        };

        const handleApprove = async () => {
          setIsApproving(true);
          try {
            const batch = db.batch(); batch.update(db.collection('requisitions').doc(req.id), { status: 'Completed', items: editableItems });
            editableItems.forEach(it => batch.set(db.collection('current_excess').doc(`${req.hospitalId}_${it.drugId}`), { hospital_id: req.hospitalId, drug_id: it.drugId, excess_balance: it.newExcess, last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }));
            
            // Map skipped items to fuzzy if admin mapped them
            if(req.skipped_items) {
               req.skipped_items.filter(s => s.mappedDrugId).forEach(s => {
                  const d = appDb.drugs.find(x => x.drug_id === s.mappedDrugId);
                  if(d) {
                     const existingFuzzy = d.fuzzy ? d.fuzzy.split(',').map(f=>f.trim().toLowerCase()) : [];
                     const rawLower = s.rawName.toLowerCase().replace(/[\s\-\.\(\)]/g, '');
                     if(!existingFuzzy.includes(rawLower)) {
                        batch.update(db.collection('master_drugs').doc(d.drug_id), { fuzzy: d.fuzzy ? `${d.fuzzy},${s.rawName}` : s.rawName });
                     }
                  }
               });
            }

            await batch.commit(); showToast('อนุมัติแล้ว'); await refreshData(); setCurrentView('dashboard');
          } catch(e) { showToast(e.message, 'error'); } finally { setIsApproving(false); }

        // การสร้างกลุ่มสำหรับ Print
        const groupedItems = { '1': [], '3': [], '25': [], '32': [] };
        editableItems.forEach(it => { if(groupedItems[it.type]) groupedItems[it.type].push(it); else groupedItems['1'].push(it); });
        
        let grandTotalItems = 0;
        let grandTotalPrice = 0;

        return (
          <div className="bg-white rounded-2xl shadow-sm p-4 lg:p-8 animate-fade-in border border-slate-100 print:p-0 print:border-none print:shadow-none">

              <button onClick={() => setCurrentView('dashboard')} className="text-slate-500 font-bold hover:text-slate-800"><i className="fa-solid fa-arrow-left mr-1"></i> กลับ</button>

                {req.excel_url && <a href={req.excel_url} target="_blank" className="bg-slate-100 px-4 py-2 rounded-xl font-bold flex items-center hover:bg-slate-200"><i className="fa-solid fa-file-excel text-emerald-600 mr-2"></i> โหลด รบ.301</a>}

              </div>

            {isAdmin && isPending && req.skipped_items && req.skipped_items.length > 0 && (

                     <thead><tr className="border-b border-amber-200"><th>ชื่อยา (ข้อมูลดิบ)</th><th>ยอดใช้</th></tr></thead>

        const ApproveStockManager = () => {

            setIsSaving(true);
            try {
              const batch = db.batch();
              batch.update(db.collection('stock_adjustments').doc(adj.id), { status: 'Approved', approved_at: firebase.firestore.FieldValue.serverTimestamp() });
              const docId = `${adj.hospital_id}_${adj.drug_id}`;
              batch.set(db.collection('current_excess').doc(docId), {
                hospital_id: adj.hospital_id, drug_id: adj.drug_id, excess_balance: Number(adj.new_balance), last_updated: firebase.firestore.FieldValue.serverTimestamp()
              }, { merge: true });
              await batch.commit();
              showToast('อนุมัติปรับสต๊อกเรียบร้อยแล้ว');
              await refreshData();
            } catch(e) { showToast(e.message, 'error'); } finally { setIsSaving(false); }

        const ApproveCSVManager = () => {
          const pendingRequests = appDb.csvRequests ? appDb.csvRequests.filter(r => r.status === 'Pending') : [];

          const handleApproveCSV = async (reqDoc) => {
            setIsSaving(true);
            try {
              const batches = [];
              let currentBatch = db.batch();
              let opCount = 0;

              const commitCurrentBatch = () => {
                batches.push(currentBatch.commit());
                currentBatch = db.batch();
                opCount = 0;
              };
              const addOp = () => {
                opCount++;
                if (opCount >= 450) commitCurrentBatch();
              };

              const hospId = reqDoc.hospital_id;
              currentBatch.update(db.collection('csv_initial_requests').doc(reqDoc.id), { status: 'Approved', approved_at: firebase.firestore.FieldValue.serverTimestamp() });
              addOp();

              // ⭐️ เตรียมข้อมูลบิล พ.ค. 69 (เดือน 5 ปี 2026) จ่ายเท่ากับ Target Stock ไม่หักลบ
              const newReqId = `REQ-2026-05-${Math.floor(Math.random()*1000).toString().padStart(3, '0')}`;
              const newReqItems = [];

              reqDoc.items.forEach(item => {
                if (item.isNewDrug) {
                  currentBatch.set(db.collection('master_drugs').doc(String(item.drug_id)), {
                    drug_id: item.drug_id, drug_name: item.drugName, pack_size: item.packSize || 1, unit_id: 'U01', type: '1', unpacked: false
                  }, { merge: true });
                  addOp();
                }

                const docId = `${hospId}_${item.drug_id}`;
                currentBatch.set(db.collection('config_par').doc(docId), { hospital_id: hospId, drug_id: item.drug_id, par_qty: item.finalQty }, { merge: true }); addOp();
                currentBatch.set(db.collection('current_excess').doc(docId), { hospital_id: hospId, drug_id: item.drug_id, excess_balance: item.finalQty, last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }); addOp();

                // นำไปใส่ในบิลเดือน พ.ค. 69 โดยให้ dispenseQty = finalQty
                newReqItems.push({
                   drugId: item.drug_id, name: item.drugName || item.drug_id, 
                   usage: 0, prevExcess: 0, netNeed: item.finalQty, targetVMI: item.finalQty,
                   dispensePack: item.finalPack, dispenseQty: item.finalQty, 
                   newExcess: item.finalQty, packSize: item.packSize, type: item.type || '1', price: item.price || 0 
                });
              });

              // ⭐️ เซฟบิล พ.ค. 69 อัตโนมัติ เพื่อตั้งต้นระบบ
              currentBatch.set(db.collection('requisitions').doc(newReqId), {
                 hospitalId: hospId, month: 5, year: 2026, status: 'Completed', 
                 created_by_name: 'System (CSV Setup)', items: newReqItems
              });
              addOp();

              if (opCount > 0) batches.push(currentBatch.commit());
              await Promise.all(batches);
              showToast('อนุมัติ Initial Stock และสร้างบิลตั้งต้น พ.ค. 69 สำเร็จ');
              await refreshData();
            } catch (e) { showToast(e.message, 'error'); } finally { setIsSaving(false); }
          };

          const handleRejectCSV = async (reqDoc) => {
            setIsSaving(true);
            try {
              await db.collection('csv_initial_requests').doc(reqDoc.id).delete();
              showToast('ลบคำขอสำเร็จ'); await refreshData();
            } catch(e) { showToast(e.message, 'error'); } finally { setIsSaving(false); }
          };

          return (
            <div className="p-6">
              <div className="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                <table className="w-full text-left border-collapse text-sm">
                  <thead className="bg-slate-50 text-slate-600 border-b">
                    <tr>
                      <th className="p-4">วันที่ส่ง</th>
                      <th className="p-4">ผู้ส่ง (รพ.สต.)</th>
                      <th className="p-4 text-center">จำนวนยา</th>
                      <th className="p-4 text-center">จัดการ</th>
                    </tr>
                  </thead>
                  <tbody>
                    {pendingRequests.map(req => {
                      const dDate = req.created_at ? new Date(req.created_at.seconds * 1000).toLocaleDateString('th-TH') : '-';
                      const hospName = appDb.hospitals.find(h => h.hospital_id === req.hospital_id)?.hospital_name || req.hospital_id;
                      return (
                        <tr key={req.id} className="border-b hover:bg-slate-50 transition">
                          <td className="p-4 text-slate-500 font-medium">{dDate}</td>
                          <td className="p-4 font-semibold text-slate-800">{hospName} <div className="text-xs font-normal text-slate-500 mt-1">ผู้ทำรายการ: {req.user_name}</div></td>
                          <td className="p-4 text-center font-bold text-indigo-600 bg-indigo-50/50">{req.items?.length || 0} รายการ</td>
                          <td className="p-4 text-center space-x-2">
                            <button onClick={()=>setConfirmDialog({title:'ยืนยันอนุมัติ Initial Stock', message:'ยืนยันการอนุมัติ Initial Stock และสร้างบิลเดือน พ.ค. 69 อัตโนมัติ?', onConfirm: ()=>handleApproveCSV(req), icon:'fa-cloud-arrow-down', confirmText:'นำเข้า'})} className="bg-indigo-500 text-white px-3 py-2 rounded-lg shadow hover:bg-indigo-600"><i className="fa-solid fa-cloud-arrow-down mr-1"></i> นำเข้าฐานข้อมูล</button>
                            <button onClick={()=>setConfirmDialog({title:'ยืนยันลบคำขอ', message:'ต้องการลบคำขอ Initial Stock นี้ทิ้ง?', onConfirm: ()=>handleRejectCSV(req), iconColor:'text-red-500', confirmBtnClass:'bg-red-500 hover:bg-red-600'})} className="bg-red-500 text-white px-3 py-2 rounded-lg shadow hover:bg-red-600"><i className="fa-solid fa-trash"></i> ลบทิ้ง</button>
                          </td>
                        </tr>
                      )
                    })}
                    {pendingRequests.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-400">ไม่มีคำขอ Initial Stock แบบ CSV ที่รออนุมัติ</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          );
        };

        return (
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-fade-in relative">
            <div className="bg-slate-800 text-white p-6 flex justify-between items-center">
              <h2 className="text-2xl font-bold"><i className="fa-solid fa-server mr-2 text-emerald-400"></i> จัดการฐานข้อมูล (Admin Console)</h2>
              {isSaving && <div className="flex items-center text-emerald-400 font-bold animate-pulse"><i className="fa-solid fa-circle-notch fa-spin mr-2"></i> กำลังบันทึก...</div>}
            </div>
            <div className="flex overflow-x-auto border-b bg-slate-50 whitespace-nowrap scrollbar-hide">
              <TabBtn id="drugs" icon="fa-pills" label="รายการยาและราคา" />
              <TabBtn id="units" icon="fa-box" label="หน่วยนับ" />
              <TabBtn id="hospitals" icon="fa-hospital" label="รพ.สต." />
              <TabBtn id="stock" icon="fa-cubes" label="ตั้งค่า Target Stock" />
              <TabBtn id="approve_stock" icon="fa-check-to-slot" label="อนุมัติปรับสต๊อก" />
              <TabBtn id="approve_csv" icon="fa-file-csv" label="อนุมัติ Initial CSV" />
              <TabBtn id="users" icon="fa-users" label="ผู้ใช้งาน" />
            </div>
            <div className="bg-white">
              {activeTab === 'drugs' && <DrugManager />}
              {activeTab === 'units' && <UnitManager />}
              {activeTab === 'hospitals' && <HospitalManager />}
              {activeTab === 'stock' && <StockManager />}
              {activeTab === 'approve_stock' && <ApproveStockManager />}
              {activeTab === 'approve_csv' && <ApproveCSVManager />}
              {activeTab === 'users' && <UserManager />}
            </div>
            
            {editTarget && (
              <Modal title={`${editTarget.isNew ? 'เพิ่ม' : 'แก้ไข'}ข้อมูล ${editTarget.col === 'master_drugs' ? 'ยา' : editTarget.col === 'master_unit' ? 'หน่วยนับ' : editTarget.col === 'users' ? 'ผู้ใช้งาน' : 'รพ.สต.'}`} isOpen={true} onClose={()=>setEditTarget(null)}>
                <form className="space-y-4" onSubmit={handleSaveForm}>
                  <div className="grid grid-cols-1 gap-4">
                    {editTarget.col === 'master_drugs' && (
                      <>
                        <div>
                          <label className="text-sm font-bold text-slate-600 block mb-1">รหัสยา</label>
                          <input name="drug_id" defaultValue={editTarget.data.drug_id} placeholder="เช่น 01201" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                        <div>
                          <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อยา</label>
                          <input name="drug_name" defaultValue={editTarget.data.drug_name} placeholder="ชื่อยา" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                        <div>
                          <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อพ้อง (Fuzzy) - คั่นด้วยลูกน้ำ</label>
                          <input name="fuzzy" defaultValue={editTarget.data.fuzzy} placeholder="เช่น พารา, paracetamol tab" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" />
                        </div>
                        <div className="flex gap-4">
                          <div className="w-1/2">
                            <label className="text-sm font-bold text-slate-600 block mb-1">หมวดหมู่</label>
                            <select name="type" defaultValue={editTarget.data.type || '1'} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                              <option value="1">ยา</option><option value="25">โรคเรื้อรัง (NCDs)</option><option value="3">สมุนไพร</option><option value="32">เวชภัณฑ์</option>
                            </select>
                          </div>
                          <div className="w-1/2">
                            <label className="text-sm font-bold text-slate-600 block mb-1">ขนาดบรรจุ (Pack)</label>
                            <input name="pack_size" type="number" defaultValue={editTarget.data.pack_size} placeholder="เช่น 100" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                          </div>
                        </div>
                        <div className="flex gap-4">
                          <div className="w-1/2">
                            <label className="text-sm font-bold text-slate-600 block mb-1">หน่วยนับ</label>
                            <select name="unit_id" defaultValue={editTarget.data.unit_id} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                              <option value="">- เลือกหน่วย -</option>
                              {appDb.units.map(u=><option key={u.id} value={u.unit_id}>{u.unit_name}</option>)}
                            </select>
                          </div>
                          <div className="w-1/2">
                            <label className="text-sm font-bold text-slate-600 block mb-1">ราคา (฿)</label>
                            <input name="price" type="number" defaultValue={editTarget.data.price} placeholder="ราคาต่อ 1 หน่วย" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                          </div>
                        </div>
                        <div className="mt-2 bg-slate-50 p-3 rounded-xl border border-slate-200">
                          <label className="flex items-center gap-2 font-bold text-slate-700 cursor-pointer">
                            <input type="checkbox" name="unpacked" defaultChecked={editTarget.data.unpacked} className="w-5 h-5 accent-emerald-600" /> ยานี้อนุญาตให้จ่ายแตกหน่วยย่อยได้
                          </label>
                        </div>
                      </>
                    )}
                    {editTarget.col === 'master_unit' && (
                      <>
                        <div>
                          <label className="text-sm font-bold text-slate-600 block mb-1">รหัสหน่วย</label>
                          <input name="unit_id" defaultValue={editTarget.data.unit_id} placeholder="เช่น U01" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                        <div>
                          <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อหน่วยนับ</label>
                          <input name="unit_name" defaultValue={editTarget.data.unit_name} placeholder="ชื่อหน่วย" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                      </>
                    )}
                    {editTarget.col === 'master_hospitals' && (
                      <>
                        <div>
                          <label className="text-sm font-bold text-slate-600 block mb-1">รหัส รพ.สต.</label>
                          <input name="hospital_id" defaultValue={editTarget.data.hospital_id} placeholder="เช่น H01" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                        <div>
                          <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อ รพ.สต.</label>
                          <input name="hospital_name" defaultValue={editTarget.data.hospital_name} placeholder="ชื่อหน่วยงาน" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                      </>
                    )}
                    {editTarget.col === 'users' && (
                      <>
                        <input type="hidden" name="id" value={editTarget.data.id} />
                        <div>
                          <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อ-นามสกุล ผู้ใช้งาน</label>
                          <input name="name" defaultValue={editTarget.data.name} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                        <div>
                          <label className="text-sm font-bold text-slate-600 block mb-1">ตำแหน่ง</label>
                          <input name="position" defaultValue={editTarget.data.position} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                        <div>
                          <label className="text-sm font-bold text-slate-600 block mb-1">รพ.สต. ต้นสังกัด</label>
                          <select name="hospital_id" defaultValue={editTarget.data.hospital_id} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required>
                            <option value="">- เลือก รพ.สต. -</option>
                            {appDb.hospitals.map(h=><option key={h.id} value={h.hospital_id}>{h.hospital_name}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="text-sm font-bold text-slate-600 block mb-1">ระดับสิทธิ์ (Role)</label>
                          <select name="role" defaultValue={editTarget.data.role} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required>
                            <option value="hospital">Hospital (รพ.สต.)</option>
                            <option value="admin">Admin (แอดมิน)</option>
                          </select>
                        </div>
                      </>
                    )}
                  </div>
                  <div className="flex justify-end gap-3 mt-6 pt-4 border-t">
                    <button type="button" onClick={()=>setEditTarget(null)} className="px-6 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition">ยกเลิก</button>
                    <button type="submit" disabled={isSaving} className="px-8 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition">
                      {isSaving ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : <i className="fa-solid fa-save mr-2"></i>}
                      {isSaving ? 'กำลังบันทึก...' : 'บันทึกข้อมูล'}
                    </button>
                  </div>
                </form>
              </Modal>
            )}
          </div>
        );
      };

      if (currentView === 'login') return <><LoginView />{toast && <Toast {...toast} onClose={()=>setToast(null)} />}</>;
      if (currentView === 'register') return <><RegisterView />{toast && <Toast {...toast} onClose={()=>setToast(null)} />}</>;

      return (
        <div className="flex flex-col min-h-screen lg:flex-row">
          <div className="w-full lg:w-72 bg-slate-900 text-white flex flex-col no-print shrink-0 shadow-2xl z-10">
            <div className="p-6 flex items-center border-b border-slate-800 bg-slate-900">
              <div className="bg-gradient-main p-2 rounded-lg mr-3 shadow-lg"><i className="fa-solid fa-truck-medical text-white"></i></div>
              <h1 className="text-xl font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-400">Sawee Rxfill</h1>
            </div>
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
              <button onClick={() => setCurrentView('dashboard')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='dashboard'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-house w-6 text-center mr-2"></i> แดชบอร์ด</button>
              {currentUser?.role === 'hospital' && <button onClick={() => {setEditReqId(null); setCurrentView('create_req');}} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='create_req'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-boxes-packing w-6 text-center mr-2"></i> เบิกยา / เติมยา</button>}
              {currentUser?.role === 'admin' && <button onClick={() => setCurrentView('config')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='config'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-database w-6 text-center mr-2"></i> จัดการฐานข้อมูล</button>}
            </nav>
            <div className="p-5 border-t border-slate-800 bg-slate-900">
              <div className="flex items-center mb-4 text-sm text-slate-300 font-medium bg-slate-800 p-3 rounded-xl border border-slate-700">
                <div className="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold mr-3">{currentUser?.name?.charAt(0)}</div>
                <div className="truncate">{currentUser?.name}</div>
              </div>
              <button onClick={() => auth.signOut()} className="w-full text-left p-3 rounded-xl text-red-400 hover:bg-red-500/10 font-bold border border-red-500/30 transition flex items-center justify-center"><i className="fa-solid fa-power-off mr-2"></i> ออกจากระบบ</button>
            </div>
          </div>
          <div className="flex-1 p-4 lg:p-10 overflow-auto bg-[#f8fafc] w-full relative">
            <div className="max-w-7xl mx-auto pb-20">
              {currentView === 'dashboard' && <DashboardView />}
              {currentView === 'create_req' && <CreateReqView />}
              {currentView === 'view_req' && <ViewReqView />}
              {currentView === 'adjust_stock' && <AdjustStockView />}
              {currentView === 'upload_csv' && <UploadCSVView />}
              {currentView === 'config' && <AdminConfigView />}
            </div>
          </div>
          <UniversalConfirmModal />
          {toast && <Toast {...toast} onClose={() => setToast(null)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
