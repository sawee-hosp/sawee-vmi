                      Object.keys(aggregatedUsages).forEach(mappedDrugId => {
                         let existing = newItemsArr.find(i => i.drugId === mappedDrugId);
                         if(!existing) {
                            const d = ctx.appDb.drugs.find(x => x.drug_id === mappedDrugId);
                            if(d) {
                               const unitObj = ctx.appDb.units.find(u => String(u.unit_id) === String(d.unit_id));
                               const unitDisplay = unitObj ? unitObj.unit_name : (d.unit_id || '');

                               existing = {
                                  drugId: d.drug_id, name: d.drug_name, unit: unitDisplay,
                                  packSize: Number(d.pack_size), isUnpacked: !!d.unpacked, type: d.type, price: d.price,
                                  prevExcess: 0, usage: 0, targetVMI: 0, netNeed: 0,
                                  dispensePack: 0, dispenseQty: 0, newExcess: 0, isSpecial: false, requestMore: 0,
                                  isUnlocked: false, isNewDrug: true, pastHistory: [0,0,0,0,0], isAdjusted: false
                               };
                               newItemsArr.push(existing);
                               newAdded = true;
                            }
                         }
                      });

                      if(newAdded) newItemsArr.sort(sortDrugs);
                      
                      const calcItems = newItemsArr.map(item => {
                         const totalImportUsage = aggregatedUsages[item.drugId];
                         if (totalImportUsage !== undefined) {
                            const usage = parseInt(totalImportUsage) || 0;
                            const requestMore = item.requestMore || 0;
                            
                            const recent5 = item.pastHistory ? item.pastHistory.slice(0, 5) : [0,0,0,0,0];
                            const activeUsages = [...recent5, usage].filter(u => u > 0);
                            const count = activeUsages.length || 1;
                            const mean = activeUsages.reduce((a,b)=>a+b, 0) / count;
                            const variance = activeUsages.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / (count === 1 ? 1 : count - 1);
                            const SD = Math.sqrt(variance);
                            const dynamicTargetVMI = Math.ceil(mean + (1.645 * SD));

                            const currentBal = item.prevExcess - usage;
                            let netNeed = dynamicTargetVMI - currentBal;
                            if (netNeed <= 0) netNeed = 0;

                            const totalNeed = netNeed + requestMore;
                            
                            let dispensePack=0, dispenseQty=0, newExcess=currentBal;

                            if (item.type === '6') {
                               dispensePack = 0; dispenseQty = 0; newExcess = currentBal; netNeed = 0;
                            } else if (totalNeed > 0) {
                               if (item.isUnpacked) {
                                  dispensePack = Math.ceil(totalNeed / item.packSize); dispenseQty = Math.ceil(totalNeed);
                               } else {
                                  dispensePack = Math.ceil(totalNeed / item.packSize); dispenseQty = dispensePack * item.packSize;
                               }
                               newExcess = currentBal + dispenseQty;
                            }
                            return { ...item, usage, netNeed, dispensePack, dispenseQty, newExcess, targetVMI: dynamicTargetVMI };
                         }
                         return item;
                      });

                      setItems(calcItems);
                      setShowImportModal(false);
                      ctx.showToast('ดึงข้อมูลยอดใช้เข้าสู่ตารางเรียบร้อยแล้ว (รวมยอดรายการซ้ำให้อัตโนมัติ)');
                   }} className="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 flex items-center transition">
                     <i className="fa-solid fa-file-import mr-2"></i> ยืนยันนำยอดไปใส่ในใบเบิก
                   </button>
               </div>
            </Modal>
          )}
        </div>
      );
    };

const ViewReqView = ({ ctx }) => {
      const req = ctx.appDb.requisitions.find(r => r.id === ctx.currentReqId);
      const [isApproving, setIsApproving] = useState(false);
      const [editableItems, setEditableItems] = useState(req?.items || []);
      const [showSkipped, setShowSkipped] = useState(false);
      const [skippedMapping, setSkippedMapping] = useState({});
      
      const isHospital = ctx.currentUser?.role === 'hospital';
      const isAdmin = ctx.currentUser?.role === 'admin';
      const isPending = req?.status === 'Pending';
      const canEdit = isPending && (isAdmin || isHospital); 
      
      const userInfo = ctx.appDb.usersList.find(u => u.name === req?.created_by_name) || { position: 'เจ้าหน้าที่', role: '' };
      const [reqName, setReqName] = useState(req?.created_by_name || '');
      const [reqPosition, setReqPosition] = useState(req?.created_by_position || userInfo?.position || 'เจ้าหน้าที่');
      
      const [manualAddSearch, setManualAddSearch] = useState('');

      useEffect(() => { if(req) setEditableItems(req.items); }, [req]);
      if(!req) return null;
      
      const hosp = ctx.appDb.hospitals.find(h => h.hospital_id === req.hospitalId);
      const hospNameClean = hosp?.hospital_name?.replace('รพ.สต.', '') || '';

      const { fiscalYear, term } = getFiscalInfo(req.month, req.year);

      const handleAdjust = (idx, val) => {
        const qty = parseInt(val) || 0; const newItems = [...editableItems];
        newItems[idx] = { ...newItems[idx], dispenseQty: qty, dispensePack: Math.ceil(qty / newItems[idx].packSize), newExcess: (newItems[idx].prevExcess - newItems[idx].usage) + qty, isAdjusted: true };
        setEditableItems(newItems);
      };

      // ⭐️ ฟังก์ชันลบรายการยาออกจากใบเบิก (ไม่เอาไปรวมในเอกสาร)
      const handleDeleteItem = (drugId) => {
         ctx.setConfirmDialog({
           title: 'ยืนยันลบออกจากใบเบิก',
           message: 'ปุ่มนี้คือลบออกจากใบเบิกและรีเซ็ตจำนวนเบิกยานี้เป็น 0 แต่ยาจะยังคงอยู่ในคลังของคุณ ยืนยันหรือไม่?',
           icon: 'fa-trash',
           iconColor: 'text-red-500',
           confirmBtnClass: 'bg-red-600 hover:bg-red-700',
           confirmText: 'ลบออกจากใบเบิก',
           onConfirm: () => {
              setEditableItems(prev => prev.filter(i => i.drugId !== drugId));
              ctx.showToast('ลบรายการยาออกจากตารางแล้ว (จะไม่ปรากฏในใบเบิก)');
           }
         });
      };

      // ⭐️ ฟังก์ชันเพิ่มรายการยาในหน้า Preview แบบ Realtime
      const handleManualAdd = () => {
         if(!manualAddSearch) return;
         const drug = ctx.appDb.drugs.find(d => d.drug_id === manualAddSearch);
         if(!drug) return ctx.showToast('ไม่พบรหัสยานี้ในระบบ', 'error');
         if(editableItems.find(i => i.drugId === drug.drug_id)) return ctx.showToast('มีรายการนี้ในใบเบิกอยู่แล้ว', 'error');

         const unitObj = ctx.appDb.units.find(u => String(u.unit_id) === String(drug.unit_id));
         const unitDisplay = unitObj ? unitObj.unit_name : (drug.unit_id || '');
         const bal = ctx.appDb.balances.find(b => String(b.hospital_id) === String(req.hospitalId) && String(b.drug_id) === drug.drug_id);
         const prevExcess = bal ? Number(bal.excess_balance) : 0;

         const newItem = {
            drugId: drug.drug_id, name: drug.drug_name, unit: unitDisplay,
            packSize: Number(drug.pack_size), isUnpacked: !!drug.unpacked, type: drug.type || '1', price: drug.price || 0,
            prevExcess: prevExcess, usage: 0, targetVMI: 0, netNeed: 0, dispensePack: 0, dispenseQty: 0, newExcess: prevExcess,
            isSpecial: false, requestMore: 0, isUnlocked: false, isNewDrug: true, pastHistory: [0,0,0,0,0], isAdjusted: true
         };
         setEditableItems([newItem, ...editableItems].sort(sortDrugs)); 
         setManualAddSearch(''); 
         ctx.showToast(`เพิ่ม ${drug.drug_name} ลงในใบเบิกแล้ว`);
      };

      const handleAddMappedSkipped = (idx, mappedDrugId, usage) => {
          const drug = ctx.appDb.drugs.find(d => d.drug_id === mappedDrugId);
          if(!drug) return;

          const bal = ctx.appDb.balances.find(b => String(b.hospital_id) === String(req.hospitalId) && String(b.drug_id) === mappedDrugId);
          const prevExcess = bal ? Number(bal.excess_balance) : 0;
          const packSize = Number(drug.pack_size) || 1;
          
          let m_usages = [];
          for(let i=1; i<=6; i++) {
              let m = req.month - i; let y = req.year;
              if(m <= 0) { m += 12; y -= 1; }
              const key = getYearMonthKey(m, y);
              const hist = ctx.appDb.historicalUsages?.find(h => String(h.hospital_id) === String(req.hospitalId) && String(h.drug_id) === mappedDrugId);
              const pastUsage = (hist && hist.history && hist.history[key]) ? Number(hist.history[key]) : 0;
              m_usages.push(pastUsage);
          }
          const total6M = m_usages.reduce((a,b)=>a+b, 0);
          const mean6M = total6M / 6;
          const variance = m_usages.reduce((acc, val) => acc + Math.pow(val - mean6M, 2), 0) / 5;
          const SD = Math.sqrt(variance || 0);
          const targetVMI = Math.ceil(mean6M + (1.645 * SD));

          const currentBal = prevExcess - usage;
          let netNeed = targetVMI - currentBal;
          if (netNeed <= 0) netNeed = 0;

          let dispensePack=0, dispenseQty=0, newExcess=currentBal;
          
          if (drug.type === '6') {
             netNeed = 0; dispensePack = 0; dispenseQty = 0; newExcess = currentBal;
          } else if (netNeed > 0) {
              if (drug.unpacked) {
                  dispensePack = Math.ceil(netNeed / packSize); 
                  dispenseQty = Math.ceil(netNeed);
              } else {
                  dispensePack = Math.ceil(netNeed / packSize); 
                  dispenseQty = dispensePack * packSize;
              }
              newExcess = currentBal + dispenseQty;
          }

          const unitObj = ctx.appDb.units.find(u => String(u.unit_id) === String(drug.unit_id));
          const unitDisplay = unitObj ? unitObj.unit_name : (drug.unit_id || '');

          const newItem = {
              drugId: mappedDrugId, name: drug.drug_name, unit: unitDisplay,
              packSize, isUnpacked: !!drug.unpacked, type: drug.type || '1', price: drug.price || 0,
              prevExcess, usage, targetVMI, netNeed, dispensePack, dispenseQty, newExcess,
              isSpecial: false, requestMore: 0, isNewDrug: true, isAdjusted: true
          };

          setEditableItems(prev => {
              const existingIdx = prev.findIndex(i => i.drugId === mappedDrugId);
              if (existingIdx >= 0) {
                  const arr = [...prev];
                  arr[existingIdx].usage += usage;
                  let cBal = arr[existingIdx].prevExcess - arr[existingIdx].usage;
                  let nNeed = arr[existingIdx].targetVMI - cBal;
                  if (nNeed < 0) nNeed = 0;
                  arr[existingIdx].netNeed = nNeed;
                  
                  let dPack=0, dQty=0, nExcess=cBal;
                  if (arr[existingIdx].type === '6') {
                      nNeed = 0; dPack = 0; dQty = 0; nExcess = cBal;
                  } else if(nNeed > 0) {
                      if(arr[existingIdx].isUnpacked) { dPack = Math.ceil(nNeed / arr[existingIdx].packSize); dQty = Math.ceil(nNeed); } 
                      else { dPack = Math.ceil(nNeed / arr[existingIdx].packSize); dQty = dPack * arr[existingIdx].packSize; }
                      nExcess = cBal + dQty;
                  }
                  arr[existingIdx].dispensePack = dPack;
                  arr[existingIdx].dispenseQty = dQty;
                  arr[existingIdx].newExcess = nExcess;
                  arr[existingIdx].isAdjusted = true;
                  return arr;
              }
              return [...prev, newItem].sort(sortDrugs);
          });

          const updatedSkipped = [...req.skipped_items];
          updatedSkipped.splice(idx, 1);
          req.skipped_items = updatedSkipped;
          ctx.showToast(`นำยา ${drug.drug_name} เข้ารายการแล้ว`);
      };

      const handleSaveChanges = async () => {
          setIsApproving(true);
          try {
              await db.collection('requisitions').doc(req.id).update({
                  items: editableItems,
                  created_by_name: reqName,
                  created_by_position: reqPosition
              });
              ctx.showToast('บันทึกการแก้ไขข้อมูลสำเร็จ');
              await ctx.refreshData();
          } catch(e) { ctx.showToast(e.message, 'error'); }
          setIsApproving(false);
      };

      const handleApprove = async () => {
        setIsApproving(true);
        try {
          const batch = db.batch(); 
          batch.update(db.collection('requisitions').doc(req.id), { 
              status: 'Completed', 
              items: editableItems, 
              skipped_items: req.skipped_items || [],
              created_by_name: reqName,
              created_by_position: reqPosition
          });
          
          const currentKey = getYearMonthKey(req.month, req.year);

          editableItems.forEach(it => {
              batch.set(db.collection('current_excess').doc(`${req.hospitalId}_${it.drugId}`), { hospital_id: req.hospitalId, drug_id: it.drugId, excess_balance: it.newExcess, last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
              
              batch.set(db.collection('historical_usages').doc(`${req.hospitalId}_${it.drugId}`), {
                  hospital_id: req.hospitalId, drug_id: it.drugId,
                  history: { [currentKey]: it.usage }, 
                  updated_at: firebase.firestore.FieldValue.serverTimestamp()
              }, { merge: true });
          });
          
          if(req.skipped_items) {
             req.skipped_items.filter(s => s.mappedDrugId).forEach(s => {
                const d = ctx.appDb.drugs.find(x => x.drug_id === s.mappedDrugId);
                if(d) {
                   const existingFuzzy = d.fuzzy ? d.fuzzy.split(',').map(f=>f.trim().toLowerCase()) : [];
                   const rawLower = s.rawName.toLowerCase().replace(/[\s\-\.\(\)]/g, '');
                   if(!existingFuzzy.includes(rawLower)) {
                      batch.update(db.collection('master_drugs').doc(d.drug_id), { fuzzy: d.fuzzy ? `${d.fuzzy},${s.rawName}` : s.rawName });
                   }
                }
             });
          }

          await batch.commit(); ctx.showToast('อนุมัติแล้ว'); await ctx.refreshData(); ctx.setCurrentView('dashboard');
        } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsApproving(false); }
      };

      const handleRejectReq = async () => {
         setIsApproving(true);
         try {
            await db.collection('requisitions').doc(req.id).update({ status: 'Rejected' });
            ctx.showToast('ไม่อนุมัติใบเบิก');
            await ctx.refreshData();
            ctx.setCurrentView('dashboard');
         } catch(e) { ctx.showToast(e.message, 'error'); setIsApproving(false); }
      };

      const handleDeleteReq = async () => {
         setIsApproving(true);
         try {
            await db.collection('requisitions').doc(req.id).delete();
            ctx.showToast('ลบใบเบิกสำเร็จ');
            await ctx.refreshData();
            ctx.setCurrentView('dashboard');
         } catch(e) { ctx.showToast(e.message, 'error'); setIsApproving(false); }
      };

      const handleTriggerPrint = () => {
         db.collection('requisitions').doc(req.id).update({is_printed: true});
         
         const originalTitle = document.title;
         document.title = `ใบเบิก ${hospNameClean} ${req.month}/${fiscalYear}`;
         
         setTimeout(() => {
             window.print();
             document.title = originalTitle;
         }, 100);
      };

      const groupedItems = {};
      const typeKeys = Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES);
      typeKeys.forEach(k => groupedItems[k] = []);
      
      // ⭐️ ระบุเงื่อนไข: หากจำนวนยาเบิกเหลือ 0 จะไม่ปรากฏในใบเบิก
      const itemsToDisplay = editableItems.filter(it => it.dispenseQty > 0 || it.type === '6');

      itemsToDisplay.forEach(it => { if(groupedItems[it.type]) groupedItems[it.type].push(it); else groupedItems['1'].push(it); });
      
      let grandTotalItems = 0;
      let grandTotalPrice = 0;
      let globalItemIndex = 0;

      const directorText = hosp?.affiliation === 'OPT' ? `ผอ.${hospNameClean}` : `ผอ.รพ.สต.${hospNameClean}`;

      return (
        <div className="bg-white rounded-2xl shadow-sm p-4 lg:p-8 animate-fade-in border border-slate-100 print-safe-wrapper print:p-0 print:border-none print:shadow-none w-full relative">
          
          <div className="flex justify-between items-center mb-6 no-print pb-4 border-b relative z-10">
            <button onClick={() => ctx.setCurrentView('dashboard')} className="text-slate-500 font-bold hover:text-slate-800"><i className="fa-solid fa-arrow-left mr-1"></i> กลับ</button>
            <div className="flex gap-2">
              {req.excel_url && <a href={req.excel_url} target="_blank" className="bg-emerald-100 px-4 py-2 rounded-xl font-bold flex items-center text-emerald-700 hover:bg-emerald-200 transition border border-emerald-200 shadow-sm"><i className="fa-solid fa-file-excel mr-2"></i> ดูไฟล์ Excel (รบ.301)</a>}
              <button onClick={() => { handleTriggerPrint(); }} className={`text-white px-4 py-2 rounded-xl font-bold shadow-lg flex items-center transition bg-blue-600 hover:bg-blue-700`}><i className="fa-solid fa-print mr-2"></i> พิมพ์เอกสารเบิก</button>
              
              {(isAdmin || (isHospital && isPending)) && (
                 <button onClick={() => ctx.setConfirmDialog({ title: 'ยืนยันลบใบเบิก', message: `ลบใบเบิก เดือน ${THAI_MONTHS[req.month - 1]} ของ ${hosp?.hospital_name} แล้วข้อมูลจะหายไป และโปรดเบิกเข้ามาใหม่อีก`, icon: 'fa-triangle-exclamation', iconColor: 'text-red-500', confirmBtnClass: 'bg-red-600 hover:bg-red-700 shadow-lg', confirmText: 'รับทราบ ลบทิ้ง', onConfirm: handleDeleteReq })} disabled={isApproving} className="bg-red-100 text-red-700 px-4 py-2 rounded-xl font-bold shadow-sm flex items-center hover:bg-red-200 transition">
                   <i className="fa-solid fa-trash mr-2"></i> ลบใบเบิกทิ้ง
                 </button>
              )}
              
              {isAdmin && isPending && (
                 <>
                    <button onClick={() => ctx.setConfirmDialog({ title: 'ยืนยันไม่อนุมัติ', message: 'คุณต้องการไม่อนุมัติใบเบิกนี้ใช่หรือไม่?', icon: 'fa-xmark', iconColor: 'text-red-500', confirmBtnClass: 'bg-red-600 hover:bg-red-700', confirmText: 'ไม่อนุมัติ', onConfirm: handleRejectReq })} disabled={isApproving} className="bg-white border-2 border-red-500 text-red-600 px-6 py-2 rounded-xl font-bold shadow hover:bg-red-50 transition">ไม่อนุมัติ</button>
                    <button onClick={() => ctx.setConfirmDialog({ title: 'ยืนยันจัดยา', message: 'คุณตรวจสอบยอดและต้องการจัดยานี้ใช่หรือไม่?', icon: 'fa-check-double', confirmText: 'ยืนยันจัดยา', onConfirm: handleApprove })} disabled={isApproving} className="bg-gradient-main text-white px-6 py-2 rounded-xl font-bold shadow-lg flex items-center hover:scale-105">{isApproving ? '...' : <span><i className="fa-solid fa-check-double mr-2"></i> บันทึกจัดยาแล้ว</span>}</button>
                 </>
              )}
            </div>
          </div>

          {canEdit && (
            <div className="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 no-print flex flex-col md:flex-row gap-4 items-end">
               <div className="w-full md:w-1/3">
                  <label className="text-xs font-bold text-slate-500 block mb-1">ชื่อผู้ทำรายการเบิก</label>
                  <input className="w-full border border-slate-300 p-2 rounded-lg outline-none focus:border-blue-500" value={reqName} onChange={e=>setReqName(e.target.value)} />
               </div>
               <div className="w-full md:w-1/3">
                  <label className="text-xs font-bold text-slate-500 block mb-1">ตำแหน่ง</label>
                  <input className="w-full border border-slate-300 p-2 rounded-lg outline-none focus:border-blue-500" value={reqPosition} onChange={e=>setReqPosition(e.target.value)} />
               </div>
               <button onClick={handleSaveChanges} disabled={isApproving} className="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold shadow hover:bg-emerald-700 transition whitespace-nowrap">
                  {isApproving ? <i className="fa-solid fa-spinner fa-spin mr-1"></i> : <i className="fa-solid fa-save mr-1"></i>} 
                  {isApproving ? 'กำลังบันทึก...' : 'บันทึกการแก้ไขข้อมูล'}
               </button>
            </div>
          )}

          {/* ⭐️ ส่วนเพิ่มยาในหน้า Preview ขั้นตอนสุดท้าย */}
          {canEdit && (
              <div className="flex flex-col md:flex-row gap-4 mb-6 items-center bg-slate-50 p-4 rounded-xl border border-slate-200 no-print">
                 <div className="font-bold text-slate-700 w-full md:w-auto shrink-0"><i className="fa-solid fa-plus-circle text-blue-500 mr-2"></i> เพิ่มยาเข้ารายการเบิก</div>
                 <div className="flex flex-grow w-full gap-2">
                   <input list="all-drugs-view" className="border border-slate-300 rounded-lg p-2 flex-grow outline-none focus:border-blue-500" placeholder="พิมพ์ชื่อหรือรหัส..." value={manualAddSearch} onChange={e=>setManualAddSearch(e.target.value)} />
                   <datalist id="all-drugs-view">
                      {ctx.appDb.drugs.map(d => <option key={d.drug_id} value={d.drug_id}>{d.drug_name} [{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[d.type]}]</option>)}
                   </datalist>
                   <button onClick={handleManualAdd} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700">เพิ่ม</button>
                 </div>
              </div>
          )}

          {isAdmin && isPending && req.skipped_items && req.skipped_items.length > 0 && (
             <div className="mb-6 bg-amber-50 p-4 rounded-xl border border-amber-200 no-print relative z-10">
                <div className="flex justify-between items-center cursor-pointer" onClick={() => setShowSkipped(!showSkipped)}>
                    <h3 className="font-bold text-amber-800"><i className="fa-solid fa-triangle-exclamation mr-2"></i> รายการยาที่ รพ.สต. ข้ามไป ({req.skipped_items.length} รายการ)</h3>
                    <i className={`fa-solid fa-chevron-${showSkipped ? 'up' : 'down'} text-amber-800`}></i>
                </div>
                {showSkipped && (
                    <table className="w-full text-sm text-left mt-4">
                       <thead><tr className="border-b border-amber-200"><th>ชื่อยา (ข้อมูลดิบ)</th><th>ยอดใช้</th><th>จับคู่เพื่อดึงเข้าตาราง</th></tr></thead>
                       <tbody>
                          {req.skipped_items.map((s, idx) => (
                             <tr key={idx} className="border-b border-amber-100">
                                <td className="py-2 text-amber-900">{s.rawName}</td>
                                <td className="py-2 font-bold text-amber-700">{s.usage}</td>

          const reqs = ctx.appDb.requisitions.filter(r => r.month === filterMonth && r.year === filterYear && r.status === 'Completed');

          const hospTotals = ctx.appDb.hospitals.map(h => {
             const hReq = reqs.find(r => r.hospitalId === h.hospital_id);
             let sums = {};
             let total = 0;
             if (ctx.appDb.drugTypes) {
                Object.keys(ctx.appDb.drugTypes).forEach(k => sums[k] = 0);
             } else {
                Object.keys(DEFAULT_DRUG_TYPES).forEach(k => sums[k] = 0);
             }

             if (hReq && hReq.items) {
                hReq.items.forEach(it => {
                   const val = it.isUnpacked ? (it.dispenseQty / (it.packSize||1)) * (it.price||0) : it.dispensePack * (it.price||0);
                   if(sums[it.type] !== undefined) sums[it.type] += val;
                   else if(sums['1'] !== undefined) sums['1'] += val; 
                   total += val;
                });
             }
             return { hospital_id: h.hospital_id, hospital_name: h.hospital_name, sums, total, hasReq: !!hReq };
          }).sort((a,b) => b.total - a.total);

          let grandSums = {};
          let grandTotal = 0;
          if (ctx.appDb.drugTypes) {
             Object.keys(ctx.appDb.drugTypes).forEach(k => grandSums[k] = 0);
          } else {
             Object.keys(DEFAULT_DRUG_TYPES).forEach(k => grandSums[k] = 0);
          }

          hospTotals.forEach(h => {
             Object.keys(h.sums).forEach(k => grandSums[k] += h.sums[k]);
             grandTotal += h.total;
          });

          return { rows: hospTotals, grandSums, grandTotal };
       }, [ctx.appDb, filterMonth, filterYear]);

    const DrugHistoryView = ({ ctx }) => {
        const isAdmin = ctx.currentUser?.role === 'admin';
        const [selHosp, setSelHosp] = useState(ctx.currentUser?.hospital_id || ctx.appDb.hospitals[0]?.hospital_id || '');
        
        const today = new Date();
        const currentMonth = today.getMonth() + 1;
        const currentYear = today.getFullYear();

        const historyData = useMemo(() => {
            if (!selHosp || !ctx.appDb) return [];
            const result = [];

            ctx.appDb.drugs.forEach(d => {
                let m_usages = [];
                let totalUsages = 0;
                for(let i=1; i<=6; i++) {
                    let m = currentMonth - i; let y = currentYear;
                    if(m <= 0) { m += 12; y -= 1; }
                    const oldReq = ctx.appDb.requisitions.find(r => r.hospitalId === selHosp && r.month === m && r.year === y && !r.id.startsWith('HIST-'));
                    let usage = 0;
                    if(oldReq && oldReq.items) {
                        const oldItem = oldReq.items.find(it => it.drugId === d.drug_id);
                        if(oldItem) usage = Number(oldItem.usage);
                    } else {
                        const key = getYearMonthKey(m, y);
                        const hist = ctx.appDb.historicalUsages?.find(h => String(h.hospital_id) === String(selHosp) && String(h.drug_id) === String(d.drug_id));
                        usage = (hist && hist.history && hist.history[key]) ? Number(hist.history[key]) : 0;
                    }
                    m_usages.push({ m, y, usage });
                    totalUsages += usage;
                }

                if (totalUsages > 0) {
                    const activeUsages = m_usages.filter(u => u.usage > 0).map(u => u.usage);
                    const count = activeUsages.length || 1;
                    const mean = activeUsages.reduce((a,b)=>a+b, 0) / count;
                    const variance = activeUsages.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / (count === 1 ? 1 : count - 1);
                    const sd = Math.sqrt(variance);
                    const sdz = sd * 1.645;
                    const adu = mean / 30;

                    const unitObj = ctx.appDb.units.find(u => String(u.unit_id) === String(d.unit_id));
                    const unitName = unitObj ? unitObj.unit_name : (d.unit_id || '');

                    result.push({
                        drug_id: d.drug_id, drug_name: d.drug_name, type: d.type, unit: unitName,
                        m_usages: m_usages.reverse(), 
                        mean, sd, sdz, adu
                    });
                }
            });
            return result.sort((a,b) => b.mean - a.mean);
        }, [ctx.appDb, selHosp, currentMonth, currentYear]);

        const typesSource = ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES;

                        <li><b>SD*1.645:</b> ยอดเผื่อความผันผวน (Safety Stock)</li>
                        <li className="text-amber-600"><b>หมายเหตุ:</b> คิดจากประวัติการเบิกรอบ 6 เดือนล่าสุด หารเฉลี่ยเฉพาะเดือนที่ใช้จริง</li>
                    </ul>
                </div>

                <div className="overflow-x-auto w-full border border-slate-200 rounded-xl">
                    <table className="w-full text-left text-[13px] whitespace-nowrap border-collapse">
                        <thead className="bg-slate-100 sticky top-0 z-10 shadow-sm border-b">
                            <tr>
                                <th className="p-3" rowSpan="2">รหัส</th>

                                    <td className="p-2 text-center font-bold text-slate-600 border-l border-blue-100">{row.sd.toFixed(2)}</td>
                                    <td className="p-2 text-center font-bold text-amber-600 border-l border-blue-100">{row.sdz.toFixed(2)}</td>

      const RawDBManager = () => {
         const collections = [
            { id: 'requisitions', name: 'ใบเบิก/เติมยา' },
            { id: 'current_excess', name: 'เครดิต (ยอดยกมา)' },
            { id: 'config_par', name: 'Target VMI (Par)' },
            { id: 'master_drugs', name: 'รายการยา/ราคา' },
            { id: 'master_hospitals', name: 'รพ.สต.' },
            { id: 'users', name: 'ผู้ใช้งาน' },
            { id: 'historical_usages', name: 'ประวัติเก่า (Time-Series)' },
            { id: 'stock_adjustments', name: 'คำขอปรับสต๊อก' }
         ];
         const [selCol, setSelCol] = useState(collections[0].id);
         const [data, setData] = useState([]);
         
         useEffect(() => {
            db.collection(selCol).limit(100).get().then(snap => {
               setData(snap.docs.map(d => ({ _docId: d.id, ...d.data() })));
            });
         }, [selCol]);

         const handleCellEdit = async (docId, field, val) => {
            try {
               let parsedVal = val;
               try { parsedVal = JSON.parse(val); } catch(e) {} 
               await db.collection(selCol).doc(docId).update({ [field]: parsedVal });
               ctx.showToast('อัปเดตช่องข้อมูลแล้ว');
               setData(prev => prev.map(d => d._docId === docId ? { ...d, [field]: parsedVal } : d));
            } catch(e) { ctx.showToast(e.message, 'error'); }
         };

         if(data.length === 0) return (
            <div className="p-6 text-center text-slate-500">
               <select value={selCol} onChange={e=>setSelCol(e.target.value)} className="mb-4 border p-2 rounded">
                  {collections.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
               </select><br/>ไม่มีข้อมูลในตารางนี้
            </div>
         );

         const keys = Object.keys(data[0]).filter(k => k !== '_docId');

         return (
            <div className="p-6">
               <div className="flex items-center gap-4 mb-4">
                  <span className="font-bold text-slate-700">เลือกตาราง:</span>
                  <select value={selCol} onChange={e=>setSelCol(e.target.value)} className="border border-slate-300 bg-slate-50 p-2 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-indigo-700">
                     {collections.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                  <span className="text-xs text-red-500 font-bold bg-red-50 p-2 rounded-lg"><i className="fa-solid fa-triangle-exclamation mr-1"></i> โหมดอันตราย (แก้ฐานข้อมูลโดยตรง) ช่อง Arrays/Objects จะแสดงเป็น JSON Format</span>
               </div>
               <div className="overflow-x-auto border border-slate-300 rounded-xl max-h-[600px] overflow-y-auto">
                  <table className="w-full text-left text-[12px] whitespace-nowrap bg-white">
                     <thead className="bg-slate-800 text-white sticky top-0 z-10">
                        <tr>
                           <th className="p-2 border border-slate-700">Doc ID</th>
                           {keys.map(k => <th key={k} className="p-2 border border-slate-700">{k}</th>)}
                        </tr>
                     </thead>
                     <tbody>
                        {data.map((row) => (
                           <tr key={row._docId} className="hover:bg-amber-50 group">
                              <td className="p-2 border border-slate-200 font-mono text-slate-500 bg-slate-50">{row._docId}</td>
                              {keys.map(k => {
                                 let displayVal = row[k];
                                 if(typeof displayVal === 'object' && displayVal !== null) {
                                    if(displayVal.seconds) displayVal = new Date(displayVal.seconds*1000).toISOString();
                                    else displayVal = JSON.stringify(displayVal);
                                 }
                                 return (
                                    <td key={k} className="p-0 border border-slate-200 relative">
                                       <textarea 
                                          defaultValue={displayVal} 
                                          onBlur={(e) => { if(e.target.value !== String(displayVal)) handleCellEdit(row._docId, k, e.target.value) }}
                                          className="w-full h-full min-h-[30px] p-2 bg-transparent outline-none focus:bg-amber-100 focus:ring-inset focus:ring-2 focus:ring-amber-500 resize-none overflow-hidden hover:bg-slate-50"
                                          rows="1"
                                       />
                                    </td>
                                 );
                              })}
                           </tr>
                        ))}
                     </tbody>
                  </table>
               </div>
            </div>
         );
      };

      const ApproveStockManager = () => {
        const pendingAdjustments = ctx.appDb.stockAdjustments ? ctx.appDb.stockAdjustments.filter(a => a.status === 'Pending') : [];

        const handleApprove = async (adj) => {
          setIsSaving(true);
          try {
            const batch = db.batch();
            batch.update(db.collection('stock_adjustments').doc(adj.id), { status: 'Approved', approved_at: firebase.firestore.FieldValue.serverTimestamp() });
            const docId = `${adj.hospital_id}_${adj.drug_id}`;
            batch.set(db.collection('current_excess').doc(docId), {
              hospital_id: adj.hospital_id, drug_id: adj.drug_id, excess_balance: Number(adj.new_balance), last_updated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            await batch.commit();
            ctx.showToast('อนุมัติปรับสต๊อกเรียบร้อยแล้ว');
            await ctx.refreshData();
          } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }
        };

        const handleReject = async (adj) => {
          setIsSaving(true);
          try {
            await db.collection('stock_adjustments').doc(adj.id).update({ status: 'Rejected', rejected_at: firebase.firestore.FieldValue.serverTimestamp() });
            ctx.showToast('ปฏิเสธคำขอแล้ว');
            await ctx.refreshData();
          } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }
        };

        return (
          <div className="p-6">
            <div className="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
              <table className="w-full text-left border-collapse text-sm">
                <thead className="bg-slate-50 text-slate-600 border-b">
                  <tr>
                    <th className="p-4">รพ.สต.</th>
                    <th className="p-4">รายการยา</th>
                    <th className="p-4 text-center">ยอดเดิม <i className="fa-solid fa-arrow-right mx-1 text-slate-400"></i> ยอดใหม่</th>
                    <th className="p-4 w-1/4">เหตุผลในการขอปรับ</th>
                    <th className="p-4 text-center">จัดการ</th>
                  </tr>
                </thead>
                <tbody>
                  {pendingAdjustments.map(adj => {
                    const hospName = ctx.appDb.hospitals.find(h => h.hospital_id === adj.hospital_id)?.hospital_name || adj.hospital_id;
                    const drugName = ctx.appDb.drugs.find(d => d.drug_id === adj.drug_id)?.drug_name || adj.drug_id;
                    return (
                      <tr key={adj.id} className="border-b hover:bg-slate-50 transition">
                        <td className="p-4">
                           <div className="font-semibold text-slate-800">{hospName}</div>
                           <div className="text-xs text-slate-500 mt-1">ผู้ขอ: {adj.user_name}</div>
                        </td>
                        <td className="p-4 font-bold text-slate-800">{drugName} <span className="text-xs font-normal text-slate-500">[{adj.drug_id}]</span></td>
                        <td className="p-4 text-center bg-slate-50/50">
                          <span className="text-slate-400 line-through mr-2">{adj.old_balance}</span>
                          <span className="text-emerald-600 font-bold text-lg">{adj.new_balance}</span>
                        </td>
                        <td className="p-4 text-amber-700 bg-amber-50/50 italic leading-snug">"{adj.reason}"</td>
                        <td className="p-4 text-center space-x-2 whitespace-nowrap">
                          <button onClick={()=>ctx.setConfirmDialog({title:'ยืนยันอนุมัติ', message:'คุณต้องการอนุมัติปรับสต๊อกนี้ใช่หรือไม่?', onConfirm: ()=>handleApprove(adj), icon:'fa-check', confirmText:'อนุมัติ'})} className="bg-emerald-500 text-white px-3 py-2 rounded-lg shadow hover:bg-emerald-600"><i className="fa-solid fa-check mr-1"></i> อนุมัติ</button>
                          <button onClick={()=>ctx.setConfirmDialog({title:'ปฏิเสธคำขอ', message:'คุณต้องการปฏิเสธการขอปรับสต๊อกนี้ใช่หรือไม่?', onConfirm: ()=>handleReject(adj), iconColor:'text-red-500', confirmBtnClass:'bg-red-500 hover:bg-red-600'})} className="bg-red-500 text-white px-3 py-2 rounded-lg shadow hover:bg-red-600"><i className="fa-solid fa-xmark mr-1"></i> ปฏิเสธ</button>
                        </td>
                      </tr>
                    )
                  })}
                  {pendingAdjustments.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">ไม่มีคำขอปรับสต๊อกที่รออนุมัติ</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      const SystemCleanupManager = () => {
         const handleCleanupCSVSetup = async () => {
             setIsSaving(true);
             try {
                 const reqs = ctx.appDb.requisitions.filter(r => r.created_by_name === 'System (CSV Setup)' || r.id.startsWith('HIST-'));
                 const batches = [];
                 let currentBatch = db.batch();
                 let count = 0;
                 reqs.forEach(r => {
                     currentBatch.delete(db.collection('requisitions').doc(r.id));
                     count++;
                     if(count >= 450) { batches.push(currentBatch.commit()); currentBatch = db.batch(); count = 0; }
                 });
                 if(count > 0) batches.push(currentBatch.commit());
                 await Promise.all(batches);
                 ctx.showToast(`ลบประวัติ HIST ออกจากใบเบิกสำเร็จ ${reqs.length} รายการ`);
                 ctx.refreshData();
             } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }
         };

         const handleResetCredits = async () => {
             setIsSaving(true);
             try {
                 const excess = await db.collection('current_excess').get();
                 const batches = [];
                 let currentBatch = db.batch();
                 let count = 0;
                 excess.docs.forEach(doc => {
                     currentBatch.delete(doc.ref);
                     count++;
                     if(count >= 450) { batches.push(currentBatch.commit()); currentBatch = db.batch(); count = 0; }
                 });
                 if(count > 0) batches.push(currentBatch.commit());
                 await Promise.all(batches);
                 ctx.showToast(`รีเซ็ตเครดิตทั้งหมดเป็น 0 สำเร็จ`);
                 ctx.refreshData();
             } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }
         };

         const handleHistoricalDataUpload = (e) => {
             const file = e.target.files[0];
             if(!file) return;
             Papa.parse(file, {
               header: true, skipEmptyLines: true,
               complete: async (results) => {
                 setIsSaving(true);
                 try {
                   const headers = results.meta.fields;
                   const monthRegex = /^\d{4}-\d{2}$/;
                   const monthHeaders = headers.filter(h => monthRegex.test(h));

                   if (monthHeaders.length === 0) {
                      throw new Error('ไม่พบคอลัมน์ที่เป็นรูปแบบ YYYY-MM (เช่น 2026-01) ในไฟล์ CSV');
                   }

                   const ops = results.data.map(row => {
                     if (!row.hospital_id || !row.drug_id) return null;
                     const historyObj = {};
                     monthHeaders.forEach(h => historyObj[h] = Number(row[h]) || 0);

                     return {
                       type: 'set', ref: db.collection('historical_usages').doc(`${row.hospital_id}_${row.drug_id}`),
                       data: {
                         hospital_id: row.hospital_id, drug_id: row.drug_id,
                         history: historyObj,
                         updated_at: firebase.firestore.FieldValue.serverTimestamp()
                       }
                     };
                   }).filter(Boolean);
                   
                   await executeBatchChunks(ops);
                   ctx.refreshData(); ctx.showToast(`อัปโหลดประวัติ (นำเข้า ${monthHeaders.length} เดือน) สำเร็จ`);
                 } catch (err) {
                   ctx.showToast(err.message, 'error');
                 } finally {
                   setIsSaving(false); e.target.value = null;
                 }
               }
             });
         };

         return (
            <div className="p-6 space-y-6">
                <div className="bg-indigo-50 p-6 rounded-2xl border border-indigo-200">
                    <h3 className="font-bold text-indigo-800 text-lg mb-2"><i className="fa-solid fa-file-csv mr-2"></i> อัปโหลดฐานข้อมูลการใช้ยาย้อนหลัง (นำเข้าครั้งแรก)</h3>

                    <h3 className="font-bold text-red-800 text-lg mb-2"><i className="fa-solid fa-triangle-exclamation mr-2"></i> ลบประวัติ HIST ที่ค้างในใบเบิก</h3>
                    <p className="text-sm text-red-600 mb-4">กดปุ่มนี้เพื่อลบเอกสารใบเบิกที่มีรหัสขึ้นต้นด้วย HIST- ทั้งหมดออกจากระบบ</p>

                <div className="bg-orange-50 p-6 rounded-2xl border border-orange-200">
                    <h3 className="font-bold text-orange-800 text-lg mb-2"><i className="fa-solid fa-rotate-left mr-2"></i> รีเซ็ตยอดเครดิต (ล้างยอดยกมาทั้งหมด)</h3>
                    <p className="text-sm text-orange-600 mb-4">การกดปุ่มนี้จะทำการลบข้อมูล "เครดิตสะสม" ของยาทุกตัวในทุก รพ.สต. กลับไปเริ่มต้นที่ 0 ใหม่ทั้งหมด (ใช้กรณีต้องการทดสอบระบบใหม่)</p>
                    <button onClick={()=>ctx.setConfirmDialog({title:'ยืนยันรีเซ็ตเครดิต', message:'ข้อมูลเครดิตสะสมทั้งหมดจะกลายเป็น 0 ยืนยันใช่หรือไม่?', onConfirm: handleResetCredits, iconColor:'text-red-500', confirmBtnClass:'bg-red-500 hover:bg-red-600'})} className="bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition"><i className="fa-solid fa-rotate-left mr-2"></i> รีเซ็ตเครดิตทั้งหมดเป็น 0</button>
                </div>
            </div>
         );
      };

      const HistManager = () => {
         const [selHosp, setSelHosp] = useState(ctx.appDb.hospitals[0]?.hospital_id || '');
         const [localHist, setLocalHist] = useState([]);
         const [isSavingHist, setIsSavingHist] = useState(false);

         const today = new Date();
         const targetMonths = [];
         for(let i=1; i<=6; i++) {
            let m = today.getMonth() + 1 - i; let y = today.getFullYear();
            if(m <= 0) { m += 12; y -= 1; }
            targetMonths.push({ m, y, key: getYearMonthKey(m, y) });
         }
         targetMonths.reverse();

         useEffect(() => {
            const records = ctx.appDb.historicalUsages.filter(h => h.hospital_id === selHosp);
            const myPars = ctx.appDb.parLevels.filter(p => p.hospital_id === selHosp);
            const tableData = myPars.map(p => {
               const drug = ctx.appDb.drugs.find(d => String(d.drug_id) === String(p.drug_id));
               const hist = records.find(h => String(h.drug_id) === String(p.drug_id));
               
               const monthData = {};
               targetMonths.forEach(tm => {
                  monthData[tm.key] = (hist && hist.history && hist.history[tm.key]) ? Number(hist.history[tm.key]) : 0;
               });

               return {
                  drug_id: p.drug_id,
                  drug_name: drug ? drug.drug_name : 'N/A',
                  history: monthData,
                  isDirty: false
               };
            }).sort((a,b) => a.drug_id.localeCompare(b.drug_id));
            setLocalHist(tableData);
         }, [selHosp, ctx.appDb]);

         const handleCellChange = (drugId, key, val) => {
             const numVal = Number(val) || 0;
             setLocalHist(prev => prev.map(row => {
                 if (row.drug_id === drugId) {
                     return { ...row, history: { ...row.history, [key]: numVal }, isDirty: true };
                 }
                 return row;
             }));
         };

         const saveDirtyRows = async () => {
             const dirty = localHist.filter(r => r.isDirty);
             if(dirty.length === 0) {
                 ctx.showToast('ไม่มีข้อมูลเปลี่ยนแปลง');
                 return;
             }
             setIsSavingHist(true);
             try {
                 const batches = [];
                 let currentBatch = db.batch();
                 let count = 0;
                 dirty.forEach(row => {
                     currentBatch.set(db.collection('historical_usages').doc(`${selHosp}_${row.drug_id}`), {
                         hospital_id: selHosp, drug_id: row.drug_id, 
                         history: row.history,
                         updated_at: firebase.firestore.FieldValue.serverTimestamp()
                     }, { merge: true });
                     count++;
                     if (count >= 450) { batches.push(currentBatch.commit()); currentBatch = db.batch(); count = 0; }
                 });
                 if (count > 0) batches.push(currentBatch.commit());
                 await Promise.all(batches);
                 ctx.showToast(`บันทึกประวัติตั้งต้น ${dirty.length} รายการ สำเร็จ`);
                 await ctx.refreshData();
             } catch (e) {
                 ctx.showToast(e.message, 'error');
             } finally {
                 setIsSavingHist(false);
             }
         };

         return (
            <div className="p-6">
                <div className="flex justify-between items-center bg-indigo-50 p-4 rounded-xl mb-6 border border-indigo-100">

                       </select>
                       <button onClick={saveDirtyRows} disabled={isSavingHist} className="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg hover:scale-105 transition disabled:opacity-50">
                           {isSavingHist ? 'กำลังบันทึก...' : 'บันทึกประวัติเก่า'}
                       </button>
                   </div>
                </div>

                            {targetMonths.map(tm => (

                            ))}

                      </thead>
                      <tbody>
                         {localHist.map(row => (
                            <tr key={row.drug_id} className={`border-b border-slate-100 hover:bg-slate-50 transition ${row.isDirty ? 'bg-amber-50/30' : ''}`}>

                               {targetMonths.map(tm => (
                                   <td key={tm.key} className="p-0 border-r border-slate-100 relative">
                                       <input 
                                           type="number" 
                                           min="0"
                                           value={row.history[tm.key]} 
                                           onChange={(e) => handleCellChange(row.drug_id, tm.key, e.target.value)}
                                           className="w-full h-full min-h-[40px] p-2 text-center bg-transparent outline-none focus:bg-white focus:ring-inset focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-600"
                                       />
                                   </td>
                               ))}
                            </tr>
                         ))}
                         {localHist.length === 0 && <tr><td colSpan="9" className="p-8 text-center text-slate-400">ไม่มีข้อมูลยา (Par Level) สำหรับหน่วยงานนี้</td></tr>}
                      </tbody>
                   </table>
                </div>
            </div>
         );
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-fade-in relative">

            {isSaving && <div className="flex items-center text-emerald-400 font-bold animate-pulse"><i className="fa-solid fa-circle-notch fa-spin mr-2"></i> กำลังบันทึก...</div>}
          </div>
          <div className="flex overflow-x-auto border-b bg-slate-50 whitespace-nowrap scrollbar-hide">
            <TabBtn id="drugs" icon="fa-pills" label="รายการยาและราคา" />

            <TabBtn id="cleanup" icon="fa-broom" label="ตั้งค่า/ล้างข้อมูล" />
          </div>
          <div className="bg-white">
            {activeTab === 'drugs' && <DrugManager />}
            {activeTab === 'types' && <TypeManager />}
            {activeTab === 'units' && <UnitManager />}
            {activeTab === 'hospitals' && <HospitalManager />}

            {activeTab === 'cleanup' && <SystemCleanupManager />}
          </div>
          
          {editTarget && (
            <Modal title={`${editTarget.isNew ? 'เพิ่ม' : 'แก้ไข'}ข้อมูล ${editTarget.col === 'master_drugs' ? 'ยา' : editTarget.col === 'master_unit' ? 'หน่วยนับ' : editTarget.col === 'master_drug_types' ? 'หมวดหมู่' : editTarget.col === 'users' ? 'ผู้ใช้งาน' : 'รพ.สต.'}`} isOpen={true} onClose={()=>setEditTarget(null)}>

                  {editTarget.col === 'master_drugs' && (

                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อยา</label>

                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อพ้อง (Fuzzy) - คั่นด้วยลูกน้ำ</label>
                        <input name="fuzzy" defaultValue={editTarget.data.fuzzy} placeholder="เช่น พารา, paracetamol tab" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" />
                      </div>
                      <div className="flex gap-4">
                        <div className="w-1/2">
                          <label className="text-sm font-bold text-slate-600 block mb-1">หมวดหมู่</label>
                          <select name="type" defaultValue={editTarget.data.type || '1'} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">

                      <div className="flex gap-4">
                        <div className="w-1/2">

const App = () => {

      });
      const [currentReqId, setCurrentReqId] = useState(null);
      const [editReqId, setEditReqId] = useState(null);
      const [adminActiveTab, setAdminActiveTab] = useState('drugs');
      const [targetUploadHosp, setTargetUploadHosp] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);

      const showToast = (message, type = 'success') => setToast({ message, type });

      // ⭐️ แก้ปัญหาการแจ้งเตือน Error Code ตอน Login ให้เป็นภาษาไทยที่อ่านรู้เรื่อง
      const handleLogin = async (email, password, rememberMe) => {
        try {
          await auth.setPersistence(rememberMe ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
          await auth.signInWithEmailAndPassword(email, password);
        } catch (error) {
          let msg = 'เกิดข้อผิดพลาด: ' + error.message;
          if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
             msg = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
          } else if (error.code === 'auth/too-many-requests') {
             msg = 'ล็อกอินล้มเหลวหลายครั้งเกินไป กรุณารอสักครู่แล้วลองใหม่';
          } else if (error.code === 'auth/quota-exceeded') {
             msg = 'โควต้าเต็ม (Quota Exceeded) กรุณาตรวจสอบ Firebase';
          } else if (error.code === 'auth/network-request-failed') {
             msg = 'ไม่สามารถเชื่อมต่ออินเทอร์เน็ตได้';
          }
          showToast(msg, 'error');
        }
      };

// ⭐️ แก้ปัญหาโควต้าเต็ม (Quota Exceeded) โดยดึงข้อมูลเฉพาะที่จำเป็น
      const refreshData = async (userData) => {
        // ใช้ userData ที่ส่งเข้ามา หรือดึงจาก state ปัจจุบัน
        const activeUser = userData || currentUser; 
        if (!activeUser) return;

        const isAdmin = activeUser.role === 'admin';
        const hospId = activeUser.hospital_id;

        try {
          // 1. ดึงข้อมูลพื้นฐานที่ทุกคนต้องใช้ (ตารางขนาดเล็ก โหลดนิดเดียว)
          const [drugsSnap, hospSnap, unitSnap, userSnap, configSnap] = await Promise.all([
            db.collection('master_drugs').get(),
            db.collection('master_hospitals').get(),
            db.collection('master_unit').get(),
            db.collection('users').get(),
            db.collection('config').doc('drug_types').get()
          ]);

          let parSnap, balSnap, reqSnap, adjSnap, histSnap;

          // 2. แยกดึงข้อมูลตารางขนาดใหญ่ตามสิทธิ์
          if (isAdmin) {
             // แอดมินจำเป็นต้องดูภาพรวม จึงต้องโหลดทั้งหมด (ระวังแอดมินอย่ากด F5 รีเฟรชหน้ารัวๆ)
             [parSnap, balSnap, reqSnap, adjSnap, histSnap] = await Promise.all([
               db.collection('config_par').get(),
               db.collection('current_excess').get(),
               db.collection('requisitions').get(),
               db.collection('stock_adjustments').get(),
               db.collection('historical_usages').get()
             ]);
          } else {
             // ⭐️ รพ.สต. จะดึง "เฉพาะข้อมูลของตัวเองเท่านั้น" (ลดการใช้ Quota ได้ 95%!!)
             [parSnap, balSnap, reqSnap, adjSnap, histSnap] = await Promise.all([
               db.collection('config_par').where('hospital_id', '==', hospId).get(),
               db.collection('current_excess').where('hospital_id', '==', hospId).get(),
               db.collection('requisitions').where('hospitalId', '==', hospId).get(), // ใบเบิกของตัวเอง
               db.collection('stock_adjustments').where('hospital_id', '==', hospId).get(),
               db.collection('historical_usages').where('hospital_id', '==', hospId).get()
             ]);
          }

          setAppDb({
            drugs: drugsSnap.docs.map(d => d.data()),
            hospitals: hospSnap.docs.map(d => ({id: d.id, ...d.data()})),
            units: unitSnap.docs.map(d => d.data()),
            parLevels: parSnap.docs.map(d => d.data()),
            balances: balSnap.docs.map(d => d.data()),
            requisitions: reqSnap.docs.map(d => ({id: d.id, ...d.data()})),
            usersList: userSnap.docs.map(d => ({id: d.id, ...d.data()})),
            stockAdjustments: adjSnap.docs.map(d => ({id: d.id, ...d.data()})),
            drugTypes: configSnap.exists ? configSnap.data() : null,
            historicalUsages: histSnap.docs.map(d => d.data())
          });
        } catch (error) {
          showToast('โหลดข้อมูลล้มเหลว: ' + error.message, 'error');
        }
      };

useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          if (user) {
            try {
              const userDoc = await db.collection('users').doc(user.uid).get();
              if (userDoc.exists) {
                const userData = { uid: user.uid, ...userDoc.data() };
                setCurrentUser(userData);
                await refreshData(userData); 
                setCurrentView('dashboard');
              } else {
                showToast('ไม่พบข้อมูลสิทธิ์ผู้ใช้งาน', 'error');
                auth.signOut();
              }
            } catch(e) {
                // ⭐️ แก้ไขตรงนี้: ถ้าระบบอ่านข้อมูลไม่ได้ (ติด Permission) ให้เตะออกไปหน้าล็อกอิน ไม่ให้ค้าง
                showToast('เกิดข้อผิดพลาดในการตรวจสอบสิทธิ์: ' + e.message, 'error');
                auth.signOut(); 
                setCurrentUser(null);
                setCurrentView('login');
            }
          } else {
            setCurrentUser(null);
            setCurrentView('login');
          }
          setIsInitializing(false);
        });
        return () => unsubscribe();
      }, []);

      if (isInitializing) return <FullScreenSpinner />;

      if (currentView === 'login') return <><LoginView ctx={{handleLogin, setCurrentView, showToast}} />{toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)} />}</>;
      if (currentView === 'register') return <><RegisterView ctx={{setCurrentView, showToast, appDb}} />{toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)} />}</>;

      const ctx = { appDb, currentUser, setCurrentView, showToast, refreshData, currentReqId, setCurrentReqId, editReqId, setEditReqId, setConfirmDialog, adminActiveTab, setAdminActiveTab, targetUploadHosp, setTargetUploadHosp, handleLogin };

      return (
        <div className="flex h-screen bg-[#f8fafc] overflow-hidden print-safe-wrapper">
          <div className="w-64 bg-slate-900 text-white flex flex-col no-print shrink-0 shadow-2xl z-20 h-full">
            <div className="p-6 flex items-center border-b border-slate-800 bg-slate-900 shrink-0">
              <div className="bg-gradient-main p-2 rounded-lg mr-3 shadow-lg"><i className="fa-solid fa-truck-medical text-white"></i></div>
              <h1 className="text-xl font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-400">Sawee Rxfill</h1>
            </div>
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
              <button onClick={() => setCurrentView('dashboard')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='dashboard'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-house w-6 text-center mr-2"></i> แดชบอร์ด</button>
              {currentUser?.role === 'hospital' && <button onClick={() => {setEditReqId(null); setCurrentView('create_req');}} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='create_req'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-boxes-packing w-6 text-center mr-2"></i> เบิกยา / เติมยา</button>}
              <button onClick={() => setCurrentView('drug_history')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='drug_history'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-chart-line w-6 text-center mr-2"></i> ประวัติการใช้ยา</button>
              {currentUser?.role === 'admin' && <button onClick={() => setCurrentView('config')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='config'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-database w-6 text-center mr-2"></i> จัดการฐานข้อมูล</button>}
              
              <div className="border-t border-slate-800 my-2 pt-2"></div>
              <button onClick={() => setCurrentView('profile_edit')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='profile_edit'?'bg-slate-700 text-white':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-user-pen w-6 text-center mr-2"></i> แก้ไขข้อมูลส่วนตัว</button>
            </nav>
            <div className="p-5 border-t border-slate-800 bg-slate-900 shrink-0">
              <div className="flex items-center mb-4 text-sm text-slate-300 font-medium bg-slate-800 p-3 rounded-xl border border-slate-700">
                <div className="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold mr-3 shrink-0">{currentUser?.name?.charAt(0)}</div>
                <div className="truncate w-full">
                   <div className="truncate">{currentUser?.name}</div>
                   <div className="text-[10px] text-slate-500">{currentUser?.position || currentUser?.role}</div>
                </div>
              </div>
              <button onClick={() => auth.signOut()} className="w-full text-left p-3 rounded-xl text-red-400 hover:bg-red-500/10 font-bold border border-red-500/30 transition flex items-center justify-center"><i className="fa-solid fa-power-off mr-2"></i> ออกจากระบบ</button>
            </div>
          </div>
          <div className="flex-1 p-4 lg:p-10 overflow-auto w-full relative print-safe-wrapper print:p-0 print:bg-white">
            <div className="max-w-7xl mx-auto pb-20 print-safe-wrapper print:pb-0 print:max-w-full">
              {currentView === 'dashboard' && <DashboardView ctx={ctx} />}
              {currentView === 'create_req' && <CreateReqView ctx={ctx} />}
              {currentView === 'view_req' && <ViewReqView ctx={ctx} />}
              {currentView === 'my_stock' && <MyStockView ctx={ctx} />}
              {currentView === 'return_drug' && <ReturnDrugView ctx={ctx} />}
              {currentView === 'config' && <AdminConfigView ctx={ctx} />}
              {currentView === 'profile_edit' && <ProfileEditView ctx={ctx} />}
              {currentView === 'summary_report' && <SummaryReportView ctx={ctx} />}
              {currentView === 'item_usage_report' && <ItemUsageReportView ctx={ctx} />}
              {currentView === 'drug_history' && <DrugHistoryView ctx={ctx} />}
            </div>
          </div>
          <UniversalConfirmModal confirmDialog={confirmDialog} setConfirmDialog={setConfirmDialog} />
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
