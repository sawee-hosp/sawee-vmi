                  {pendingAdjustments.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">ไม่มีคำขอปรับสต๊อกที่รออนุมัติ</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      const ApproveCSVManager = () => {
        const pendingRequests = ctx.appDb.csvRequests ? ctx.appDb.csvRequests.filter(r => r.status === 'Pending') : [];

        const handleApproveCSV = async (reqDoc) => {
          setIsSaving(true);
          try {
            const batches = [];
            let currentBatch = db.batch();
            let opCount = 0;

            const commitCurrentBatch = () => {
              batches.push(currentBatch.commit());
              currentBatch = db.batch();
              opCount = 0;
            };
            const addOp = () => {
              opCount++;
              if (opCount >= 450) commitCurrentBatch();
            };

            const hospId = reqDoc.hospital_id;
            currentBatch.update(db.collection('csv_initial_requests').doc(reqDoc.id), { status: 'Approved', approved_at: firebase.firestore.FieldValue.serverTimestamp() });
            addOp();

            const newReqId = `REQ-2026-05-${Math.floor(Math.random()*1000).toString().padStart(3, '0')}`;
            const newReqItems = [];

            reqDoc.items.forEach(item => {
              if (item.isNewDrug) {
                currentBatch.set(db.collection('master_drugs').doc(String(item.drug_id)), {
                  drug_id: item.drug_id, drug_name: item.drugName, pack_size: item.packSize || 1, unit_id: 'U01', type: '1', unpacked: false
                }, { merge: true });
                addOp();
              }

              const docId = `${hospId}_${item.drug_id}`;
              currentBatch.set(db.collection('config_par').doc(docId), { hospital_id: hospId, drug_id: item.drug_id, par_qty: item.finalQty }, { merge: true }); addOp();
              currentBatch.set(db.collection('current_excess').doc(docId), { hospital_id: hospId, drug_id: item.drug_id, excess_balance: item.finalQty, last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }); addOp();

              newReqItems.push({
                 drugId: item.drug_id, name: item.drugName || item.drug_id, 
                 usage: 0, prevExcess: 0, netNeed: item.finalQty, targetVMI: item.finalQty,
                 dispensePack: item.finalPack, dispenseQty: item.finalQty, 
                 newExcess: item.finalQty, packSize: item.packSize, type: item.type || '1', price: item.price || 0 
              });
            });

            currentBatch.set(db.collection('requisitions').doc(newReqId), {
               hospitalId: hospId, month: 5, year: 2026, status: 'Completed', is_printed: false,
               created_by_name: 'System (CSV Setup)', items: newReqItems
            });
            addOp();

            if (opCount > 0) batches.push(currentBatch.commit());
            await Promise.all(batches);
            ctx.showToast('อนุมัติ Initial Stock และสร้างบิลตั้งต้น พ.ค. 69 สำเร็จ');
            await ctx.refreshData();
          } catch (e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }
        };

        const handleRejectCSV = async (reqDoc) => {
          setIsSaving(true);
          try {
            await db.collection('csv_initial_requests').doc(reqDoc.id).delete();
            ctx.showToast('ลบคำขอสำเร็จ'); await ctx.refreshData();
          } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }
        };

        return (
          <div className="p-6">
            <div className="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
              <table className="w-full text-left border-collapse text-sm">
                <thead className="bg-slate-50 text-slate-600 border-b">
                  <tr>
                    <th className="p-4">วันที่ส่ง</th>
                    <th className="p-4">ผู้ส่ง (รพ.สต.)</th>
                    <th className="p-4 text-center">จำนวนยา</th>
                    <th className="p-4 text-center">จัดการ</th>
                  </tr>
                </thead>
                <tbody>
                  {pendingRequests.map(req => {
                    const dDate = req.created_at ? new Date(req.created_at.seconds * 1000).toLocaleDateString('th-TH') : '-';
                    const hospName = ctx.appDb.hospitals.find(h => h.hospital_id === req.hospital_id)?.hospital_name || req.hospital_id;
                    return (
                      <tr key={req.id} className="border-b hover:bg-slate-50 transition">
                        <td className="p-4 text-slate-500 font-medium">{dDate}</td>
                        <td className="p-4 font-semibold text-slate-800">{hospName} <div className="text-xs font-normal text-slate-500 mt-1">ผู้ทำรายการ: {req.user_name}</div></td>
                        <td className="p-4 text-center font-bold text-indigo-600 bg-indigo-50/50">{req.items?.length || 0} รายการ</td>
                        <td className="p-4 text-center space-x-2">
                          <button onClick={()=>ctx.setConfirmDialog({title:'ยืนยันอนุมัติ Initial Stock', message:'ยืนยันการอนุมัติ Initial Stock และสร้างบิลเดือน พ.ค. 69 อัตโนมัติ (จะทับข้อมูลเดิมที่มีอยู่)?', onConfirm: ()=>handleApproveCSV(req), icon:'fa-cloud-arrow-down', confirmText:'นำเข้า'})} className="bg-indigo-500 text-white px-3 py-2 rounded-lg shadow hover:bg-indigo-600"><i className="fa-solid fa-cloud-arrow-down mr-1"></i> นำเข้าฐานข้อมูล</button>
                          <button onClick={()=>ctx.setConfirmDialog({title:'ยืนยันลบคำขอ', message:'ต้องการลบคำขอ Initial Stock นี้ทิ้ง?', onConfirm: ()=>handleRejectCSV(req), iconColor:'text-red-500', confirmBtnClass:'bg-red-500 hover:bg-red-600'})} className="bg-red-500 text-white px-3 py-2 rounded-lg shadow hover:bg-red-600"><i className="fa-solid fa-trash"></i> ลบทิ้ง</button>
                        </td>
                      </tr>
                    )
                  })}
                  {pendingRequests.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-400">ไม่มีคำขอ Initial Stock แบบ CSV ที่รออนุมัติ</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-fade-in relative">
          <div className="bg-slate-800 text-white p-6 flex justify-between items-center">
            <h2 className="text-2xl font-bold"><i className="fa-solid fa-server mr-2 text-emerald-400"></i> จัดการฐานข้อมูล (Admin Console)</h2>
            {isSaving && <div className="flex items-center text-emerald-400 font-bold animate-pulse"><i className="fa-solid fa-circle-notch fa-spin mr-2"></i> กำลังบันทึก...</div>}
          </div>
          <div className="flex overflow-x-auto border-b bg-slate-50 whitespace-nowrap scrollbar-hide">
            <TabBtn id="drugs" icon="fa-pills" label="รายการยาและราคา" />
            <TabBtn id="types" icon="fa-tags" label="หมวดยา" />
            <TabBtn id="units" icon="fa-box" label="หน่วยนับ" />
            <TabBtn id="hospitals" icon="fa-hospital" label="รพ.สต." />
            <TabBtn id="stock" icon="fa-cubes" label="ตั้งค่า Target Stock" />
            <TabBtn id="approve_stock" icon="fa-check-to-slot" label="อนุมัติปรับสต๊อก" />
            <TabBtn id="approve_csv" icon="fa-file-csv" label="อนุมัติ Initial CSV" />
            <TabBtn id="users" icon="fa-users" label="ผู้ใช้งาน" />
            <TabBtn id="raw_db" icon="fa-table" label="ฐานข้อมูลดิบ (Raw DB)" />
          </div>
          <div className="bg-white">
            {activeTab === 'drugs' && <DrugManager />}
            {activeTab === 'types' && <TypeManager />}
            {activeTab === 'units' && <UnitManager />}
            {activeTab === 'hospitals' && <HospitalManager />}
            {activeTab === 'stock' && <StockManager />}
            {activeTab === 'approve_stock' && <ApproveStockManager />}
            {activeTab === 'approve_csv' && <ApproveCSVManager />}
            {activeTab === 'users' && <UserManager />}
            {activeTab === 'raw_db' && <RawDBManager />}
          </div>
          
          {editTarget && (
            <Modal title={`${editTarget.isNew ? 'เพิ่ม' : 'แก้ไข'}ข้อมูล ${editTarget.col === 'master_drugs' ? 'ยา' : editTarget.col === 'master_unit' ? 'หน่วยนับ' : editTarget.col === 'master_drug_types' ? 'หมวดหมู่' : editTarget.col === 'users' ? 'ผู้ใช้งาน' : 'รพ.สต.'}`} isOpen={true} onClose={()=>setEditTarget(null)}>
              <form className="space-y-4" onSubmit={handleSaveForm}>
                <div className="grid grid-cols-1 gap-4">
                  {editTarget.col === 'master_drugs' && (
                    <>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">รหัสยา</label>
                        <input name="drug_id" defaultValue={editTarget.data.drug_id} placeholder="เช่น 01201" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อยา</label>
                        <input name="drug_name" defaultValue={editTarget.data.drug_name} placeholder="ชื่อยา" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อพ้อง (Fuzzy) - คั่นด้วยลูกน้ำ</label>
                        <input name="fuzzy" defaultValue={editTarget.data.fuzzy} placeholder="เช่น พารา, paracetamol tab" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" />
                      </div>
                      <div className="flex gap-4">
                        <div className="w-1/2">
                          <label className="text-sm font-bold text-slate-600 block mb-1">หมวดหมู่</label>
                          <select name="type" defaultValue={editTarget.data.type || '1'} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                            {Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).map(k=><option key={k} value={k}>{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[k]}</option>)}
                          </select>
                        </div>
                        <div className="w-1/2">
                          <label className="text-sm font-bold text-slate-600 block mb-1">ขนาดบรรจุ (Pack)</label>
                          <input name="pack_size" type="number" defaultValue={editTarget.data.pack_size} placeholder="เช่น 100" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                      </div>
                      <div className="flex gap-4">
                        <div className="w-1/2">
                          <label className="text-sm font-bold text-slate-600 block mb-1">หน่วยนับ</label>
                          <select name="unit_id" defaultValue={editTarget.data.unit_id} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                            <option value="">- เลือกหน่วย -</option>
                            {ctx.appDb.units.map(u=><option key={u.id} value={u.unit_id}>{u.unit_name}</option>)}
                          </select>
                        </div>
                        <div className="w-1/2">
                          <label className="text-sm font-bold text-slate-600 block mb-1">ราคา (฿) - ต่อ Pack</label>
                          <input name="price" type="number" step="0.01" defaultValue={editTarget.data.price} placeholder="ราคาต่อ 1 Pack" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                      </div>
                      <div className="mt-2 bg-slate-50 p-3 rounded-xl border border-slate-200">
                        <label className="flex items-center gap-2 font-bold text-slate-700 cursor-pointer">
                          <input type="checkbox" name="unpacked" defaultChecked={editTarget.data.unpacked} className="w-5 h-5 accent-emerald-600" /> ยานี้อนุญาตให้จ่ายแตกหน่วยย่อยได้
                        </label>
                      </div>
                    </>
                  )}
                  {editTarget.col === 'master_drug_types' && (
                    <>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">รหัสหมวดหมู่</label>
                        <input name="type_id" defaultValue={editTarget.data.type_id} disabled={!editTarget.isNew} placeholder="เช่น 1, 32" className={`w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 ${!editTarget.isNew?'bg-gray-100':''}`} required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อหมวดหมู่</label>
                        <input name="type_name" defaultValue={editTarget.data.type_name} placeholder="เช่น ยา, เวชภัณฑ์" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                    </>
                  )}
                  {editTarget.col === 'master_unit' && (
                    <>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">รหัสหน่วย</label>
                        <input name="unit_id" defaultValue={editTarget.data.unit_id} placeholder="เช่น U01" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อหน่วยนับ</label>
                        <input name="unit_name" defaultValue={editTarget.data.unit_name} placeholder="ชื่อหน่วย" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                    </>
                  )}
                  {editTarget.col === 'master_hospitals' && (
                    <>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">รหัส รพ.สต.</label>
                        <input name="hospital_id" defaultValue={editTarget.data.hospital_id} placeholder="เช่น H01" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อ รพ.สต.</label>
                        <input name="hospital_name" defaultValue={editTarget.data.hospital_name} placeholder="ชื่อหน่วยงาน" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">สังกัด</label>
                        <select name="affiliation" defaultValue={editTarget.data.affiliation || 'SSO'} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                           <option value="SSO">สสอ. (สาธารณสุขอำเภอ)</option>
                           <option value="OPT">อปท. (องค์การบริหารส่วนท้องถิ่น)</option>
                        </select>
                      </div>
                    </>
                  )}
                  {editTarget.col === 'users' && (
                    <>
                      <input type="hidden" name="id" value={editTarget.data.id} />
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อ-นามสกุล ผู้ใช้งาน</label>
                        <input name="name" defaultValue={editTarget.data.name} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">อีเมล (อ่านอย่างเดียว)</label>
                        <input disabled defaultValue={editTarget.data.email} className="w-full p-3 border rounded-xl bg-slate-100 text-slate-500" />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ตำแหน่ง</label>
                        <input name="position" defaultValue={editTarget.data.position} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">รพ.สต. ต้นสังกัด</label>
                        <select name="hospital_id" defaultValue={editTarget.data.hospital_id} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required>
                          <option value="">- เลือก รพ.สต. -</option>
                          {ctx.appDb.hospitals.map(h=><option key={h.id} value={h.hospital_id}>{h.hospital_name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ระดับสิทธิ์ (Role)</label>
                        <select name="role" defaultValue={editTarget.data.role} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required>
                          <option value="hospital">Hospital (รพ.สต.)</option>
                          <option value="admin">Admin (แอดมิน)</option>
                        </select>
                      </div>
                    </>
                  )}
                </div>
                <div className="flex justify-end gap-3 mt-6 pt-4 border-t">
                  <button type="button" onClick={()=>setEditTarget(null)} className="px-6 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition">ยกเลิก</button>
                  <button type="submit" disabled={isSaving} className="px-8 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition">
                    {isSaving ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : <i className="fa-solid fa-save mr-2"></i>}
                    {isSaving ? 'กำลังบันทึก...' : 'บันทึกข้อมูล'}
                  </button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    };

    const App = () => {
      const [currentView, setCurrentView] = useState('login');
      const [toast, setToast] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [currentUser, setCurrentUser] = useState(null);
      const [appDb, setAppDb] = useState({
        drugs: [], hospitals: [], units: [], parLevels: [],
        balances: [], requisitions: [], usersList: [],
        stockAdjustments: [], csvRequests: [], drugTypes: null
      });
      const [currentReqId, setCurrentReqId] = useState(null);
      const [editReqId, setEditReqId] = useState(null);
      const [adminActiveTab, setAdminActiveTab] = useState('drugs');
      const [targetUploadHosp, setTargetUploadHosp] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);

      const showToast = (message, type = 'success') => setToast({ message, type });

      const handleLogin = async (email, password, rememberMe) => {
        try {
          await auth.setPersistence(rememberMe ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
          await auth.signInWithEmailAndPassword(email, password);
        } catch (error) {
          showToast(error.message, 'error');
        }
      };

      const refreshData = async () => {
        if (!auth.currentUser) return;
        try {
          const [drugsSnap, hospSnap, unitSnap, parSnap, balSnap, reqSnap, userSnap, adjSnap, csvSnap, configSnap] = await Promise.all([
            db.collection('master_drugs').get(),
            db.collection('master_hospitals').get(),
            db.collection('master_unit').get(),
            db.collection('config_par').get(),
            db.collection('current_excess').get(),
            db.collection('requisitions').get(),
            db.collection('users').get(),
            db.collection('stock_adjustments').get(),
            db.collection('csv_initial_requests').get(),
            db.collection('config').doc('drug_types').get()
          ]);

          setAppDb({
            drugs: drugsSnap.docs.map(d => d.data()),
            hospitals: hospSnap.docs.map(d => ({id: d.id, ...d.data()})),
            units: unitSnap.docs.map(d => d.data()),
            parLevels: parSnap.docs.map(d => d.data()),
            balances: balSnap.docs.map(d => d.data()),
            requisitions: reqSnap.docs.map(d => ({id: d.id, ...d.data()})),
            usersList: userSnap.docs.map(d => ({id: d.id, ...d.data()})),
            stockAdjustments: adjSnap.docs.map(d => ({id: d.id, ...d.data()})),
            csvRequests: csvSnap.docs.map(d => ({id: d.id, ...d.data()})),
            drugTypes: configSnap.exists ? configSnap.data() : null
          });
        } catch (error) {
          showToast('โหลดข้อมูลจากฐานข้อมูลล้มเหลว', 'error');
        }
      };

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          if (user) {
            try {
              const userDoc = await db.collection('users').doc(user.uid).get();
              if (userDoc.exists) {
                setCurrentUser({ uid: user.uid, ...userDoc.data() });
                await refreshData();
                setCurrentView('dashboard');
              } else {
                showToast('ไม่พบข้อมูลสิทธิ์ผู้ใช้งาน', 'error');
                auth.signOut();
              }
            } catch(e) {
                showToast('เกิดข้อผิดพลาดในการตรวจสอบสิทธิ์', 'error');
            }
          } else {
            setCurrentUser(null);
            setCurrentView('login');
          }
          setIsInitializing(false);
        });
        return () => unsubscribe();
      }, []);

      if (isInitializing) return <FullScreenSpinner />;

      if (currentView === 'login') return <><LoginView ctx={{handleLogin, setCurrentView, showToast}} />{toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)} />}</>;
      if (currentView === 'register') return <><RegisterView ctx={{setCurrentView, showToast, appDb}} />{toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)} />}</>;

      const ctx = { appDb, currentUser, setCurrentView, showToast, refreshData, currentReqId, setCurrentReqId, editReqId, setEditReqId, setConfirmDialog, adminActiveTab, setAdminActiveTab, targetUploadHosp, setTargetUploadHosp, handleLogin };

      return (
        <div className="flex flex-col min-h-screen lg:flex-row">
          <div className="w-full lg:w-72 bg-slate-900 text-white flex flex-col no-print shrink-0 shadow-2xl z-10">
            <div className="p-6 flex items-center border-b border-slate-800 bg-slate-900">
              <div className="bg-gradient-main p-2 rounded-lg mr-3 shadow-lg"><i className="fa-solid fa-truck-medical text-white"></i></div>
              <h1 className="text-xl font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-400">Sawee Rxfill</h1>
            </div>
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
              <button onClick={() => setCurrentView('dashboard')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='dashboard'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-house w-6 text-center mr-2"></i> แดชบอร์ด</button>
              {currentUser?.role === 'hospital' && <button onClick={() => {setEditReqId(null); setCurrentView('create_req');}} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='create_req'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-boxes-packing w-6 text-center mr-2"></i> เบิกยา / เติมยา</button>}
              {currentUser?.role === 'admin' && <button onClick={() => setCurrentView('config')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='config'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-database w-6 text-center mr-2"></i> จัดการฐานข้อมูล</button>}
              
              <div className="border-t border-slate-800 my-2 pt-2"></div>
              <button onClick={() => setCurrentView('profile_edit')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='profile_edit'?'bg-slate-700 text-white':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-user-pen w-6 text-center mr-2"></i> แก้ไขข้อมูลส่วนตัว</button>
            </nav>
            <div className="p-5 border-t border-slate-800 bg-slate-900">
              <div className="flex items-center mb-4 text-sm text-slate-300 font-medium bg-slate-800 p-3 rounded-xl border border-slate-700">
                <div className="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold mr-3">{currentUser?.name?.charAt(0)}</div>
                <div className="truncate w-full">
                   <div>{currentUser?.name}</div>
                   <div className="text-[10px] text-slate-500">{currentUser?.position || currentUser?.role}</div>
                </div>
              </div>
              <button onClick={() => auth.signOut()} className="w-full text-left p-3 rounded-xl text-red-400 hover:bg-red-500/10 font-bold border border-red-500/30 transition flex items-center justify-center"><i className="fa-solid fa-power-off mr-2"></i> ออกจากระบบ</button>
            </div>
          </div>
          <div className="flex-1 p-4 lg:p-10 overflow-auto bg-[#f8fafc] w-full relative">
            <div className="max-w-7xl mx-auto pb-20">
              {currentView === 'dashboard' && <DashboardView ctx={ctx} />}
              {currentView === 'create_req' && <CreateReqView ctx={ctx} />}
              {currentView === 'view_req' && <ViewReqView ctx={ctx} />}
              {currentView === 'adjust_stock' && <AdjustStockView ctx={ctx} />}
              {currentView === 'upload_csv' && <UploadCSVView ctx={ctx} />}
              {currentView === 'config' && <AdminConfigView ctx={ctx} />}
              {currentView === 'profile_edit' && <ProfileEditView ctx={ctx} />}
              {currentView === 'summary_report' && <SummaryReportView ctx={ctx} />}
              {currentView === 'initial_setup' && <InitialStockSetupView ctx={ctx} />}
            </div>
          </div>
          <UniversalConfirmModal confirmDialog={confirmDialog} setConfirmDialog={setConfirmDialog} />
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
