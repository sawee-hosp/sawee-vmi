            await db.collection('requisitions').doc(req.id).delete();
            ctx.showToast('ลบใบเบิกสำเร็จ'); await ctx.refreshData(); ctx.setCurrentView('dashboard');
         } catch(e) { ctx.showToast(e.message, 'error'); setIsApproving(false); }
      };

      const handleTriggerPrint = (mode) => {
         setPrintMode(mode);
         if(mode === 'req') db.collection('requisitions').doc(req.id).update({is_printed: true});
         setTimeout(() => window.print(), 100);
      };

      const groupedItems = {};
      const typeKeys = Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES);
      typeKeys.forEach(k => groupedItems[k] = []);
      
      const itemsToDisplay = (isAdmin && isPending) ? editableItems : editableItems.filter(it => it.dispenseQty > 0 || it.requestMore > 0 || it.netNeed > 0 || (it.returnQty && it.returnQty > 0));
      itemsToDisplay.forEach(it => { if(groupedItems[it.type]) groupedItems[it.type].push(it); else groupedItems['1'].push(it); });
      
      let grandTotalItems = 0;
      let grandTotalPrice = 0;
      let globalItemIndex = 0;

      const returnItems = editableItems.filter(i => i.returnQty > 0);
      let returnTotal = 0;

      return (
        <div className="bg-white rounded-2xl shadow-sm p-4 lg:p-8 animate-fade-in border border-slate-100 print:p-0 print:border-none print:shadow-none relative">
          
          {!isAdmin && isApprovalRequired && printMode === 'req' && (
             <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-50 print:block">
                <div className="watermark-print bg-white/80 backdrop-blur-sm">
                   รอ Admin อนุมัติยาที่เบิกเพิ่มก่อนพิมพ์
                </div>
             </div>
          )}

          <div className="flex justify-between items-center mb-6 no-print pb-4 border-b">
            <button onClick={() => ctx.setCurrentView('dashboard')} className="text-slate-500 font-bold hover:text-slate-800"><i className="fa-solid fa-arrow-left mr-1"></i> กลับ</button>
            <div className="flex gap-2">
              {req.excel_url && <a href={req.excel_url} target="_blank" className="bg-slate-100 px-4 py-2 rounded-xl font-bold flex items-center hover:bg-slate-200"><i className="fa-solid fa-file-excel text-emerald-600 mr-2"></i> โหลด รบ.301</a>}
              {req.isInitialSetup && returnItems.length > 0 && <button onClick={() => handleTriggerPrint('return')} className={`text-white px-4 py-2 rounded-xl font-bold shadow-lg flex items-center transition bg-slate-700 hover:bg-slate-800`}><i className="fa-solid fa-print mr-2"></i> พิมพ์ใบคืนยา</button>}
              <button onClick={() => { if(!isAdmin && isApprovalRequired) return; handleTriggerPrint('req'); }} disabled={!isAdmin && isApprovalRequired} className={`text-white px-4 py-2 rounded-xl font-bold shadow-lg flex items-center transition ${(!isAdmin && isApprovalRequired) ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}><i className="fa-solid fa-print mr-2"></i> พิมพ์เอกสารเบิก</button>
              
              {isAdmin && (
                 <button onClick={() => ctx.setConfirmDialog({ title: 'ยืนยันลบใบเบิก', message: 'คุณต้องการลบใบเบิกนี้ทิ้งใช่หรือไม่?', icon: 'fa-trash', iconColor: 'text-red-500', confirmBtnClass: 'bg-red-600 hover:bg-red-700', confirmText: 'ลบทิ้ง', onConfirm: handleDeleteReq })} disabled={isApproving} className="bg-red-100 text-red-700 px-4 py-2 rounded-xl font-bold shadow-sm flex items-center hover:bg-red-200 transition">
                   <i className="fa-solid fa-trash mr-2"></i> ลบใบเบิกทิ้ง
                 </button>
              )}
              
              {isAdmin && isPending && (
                 <>
                    <button onClick={() => ctx.setConfirmDialog({ title: 'ยืนยันไม่อนุมัติ', message: 'คุณต้องการไม่อนุมัติใบเบิกนี้ใช่หรือไม่?', icon: 'fa-xmark', iconColor: 'text-red-500', confirmBtnClass: 'bg-red-600 hover:bg-red-700', confirmText: 'ไม่อนุมัติ', onConfirm: handleRejectReq })} disabled={isApproving} className="bg-white border-2 border-red-500 text-red-600 px-6 py-2 rounded-xl font-bold shadow hover:bg-red-50 transition">ไม่อนุมัติ</button>
                    <button onClick={() => ctx.setConfirmDialog({ title: 'ยืนยันอนุมัติ', message: 'คุณตรวจสอบยอดและต้องการอนุมัติการจ่ายยานี้ใช่หรือไม่?', icon: 'fa-check-double', confirmText: 'ยืนยันอนุมัติ', onConfirm: handleApprove })} disabled={isApproving} className="bg-gradient-main text-white px-6 py-2 rounded-xl font-bold shadow-lg flex items-center hover:scale-105">{isApproving ? '...' : <span><i className="fa-solid fa-check-double mr-2"></i> อนุมัติจัดยา</span>}</button>
                 </>
              )}
            </div>
          </div>

          <div className={`print-area font-sarabun w-full ${printMode === 'req' ? 'block' : 'hidden no-print'}`}>
             <div className="print-header mb-6 text-center">
                <h1 className="text-lg font-bold mb-1">แบบเบิกเวชภัณฑ์สำหรับโรงพยาบาลส่งเสริมสุขภาพระดับตำบล (รพ.สต)</h1>
                <div className="text-left text-[14px] leading-relaxed mt-4">
                   <p>ข้าพเจ้า <span className="font-semibold border-b border-dotted border-black inline-block px-2">{req.created_by_name}</span> ตำแหน่ง <span className="font-semibold border-b border-dotted border-black inline-block px-2">{userInfo.position || userInfo.role}</span> หน่วยงาน <span className="font-semibold border-b border-dotted border-black inline-block px-2">{hosp?.hospital_name}</span> อ.สวี จ.ชุมพร</p>
                   <p>งบที่ได้รับจัดสรรปี <span className="font-semibold border-b border-dotted border-black inline-block px-2">{fiscalYear}</span> เป็นเงิน <span className="border-b border-dotted border-black inline-block px-8"></span> บาท ได้เบิกเวชภัณฑ์ ปีนี้ ไปแล้วมูลค่า <span className="border-b border-dotted border-black inline-block px-8"></span> บาท</p>
                   <p>มีความประสงค์เบิกเวชภัณฑ์ปี <span className="font-semibold border-b border-dotted border-black inline-block px-2">{fiscalYear}</span> ครั้งที่ <span className="font-semibold border-b border-dotted border-black inline-block px-2">{term}</span> ดังนี้</p>
                </div>
             </div>

             <table className="official-table w-full text-[11px] border-collapse border border-black mb-2 relative">
                <thead>
                   <tr className="bg-gray-200">
                      <th className="w-8">ที่</th>
                      <th style={{ width: '25%' }}>ชื่อยา/เวชภัณฑ์</th>
                      <th className="w-16">ขนาดบรรจุ</th>
                      <th className="w-12">Target Stock</th>
                      <th className="w-12">ยอดใช้</th>
                      <th className="w-12">เครดิต</th>
                      <th className="w-16">จำนวนจ่าย</th>
                      <th className="w-16">ราคา/หน่วย</th>
                      <th className="w-20">มูลค่า (บาท)</th>
                      <th className="w-16">คงเหลือ</th>
                      <th className="w-16">รหัส</th>
                   </tr>
                </thead>
                {typeKeys.map((typeKey) => {
                   const typeItems = groupedItems[typeKey];
                   if(!typeItems || typeItems.length === 0) return null;
                   
                   let subTotalItems = typeItems.length;
                   let subTotalPrice = 0;
                   typeItems.forEach(it => subTotalPrice += (it.dispenseQty / (it.packSize||1)) * (it.price || 0));

                   grandTotalItems += subTotalItems;
                   grandTotalPrice += subTotalPrice;

                   return (
                      <tbody key={typeKey}>
                         <tr>
                            <td colSpan="8" className="font-bold bg-gray-100 text-left pl-2 border-y border-black">
                               {(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[typeKey]}
                            </td>
                            <td colSpan="3" className="font-bold bg-gray-100 text-right pr-2 border-y border-black">
                               รวม {(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[typeKey]} {subTotalPrice.toLocaleString(undefined, {minimumFractionDigits:2})} บาท
                            </td>
                         </tr>
                         {typeItems.map((it) => {
                            globalItemIndex++;
                            const itemValue = (it.dispenseQty / (it.packSize||1)) * (it.price || 0);
                            return (
                               <tr key={it.drugId}>
                                  <td className="text-center">{globalItemIndex}</td>
                                  <td className="font-semibold text-left pl-1">
                                     {it.name} {it.requestMore > 0 && <span className="text-blue-600 font-bold ml-1">(ขอเพิ่ม)</span>}
                                  </td>
                                  <td className="text-center">{it.packSize} {it.unit}</td>
                                  <td className="text-center text-gray-600">{formatQty(it.targetVMI, it.packSize)}</td>
                                  <td className="text-center">{formatQty(it.usage, it.packSize)}</td>
                                  <td className="text-center text-blue-700">{formatQty(it.prevExcess - it.usage, it.packSize)}</td>
                                  <td className="text-center font-bold bg-emerald-50/50 no-print">
                                     {isAdmin && isPending ? <input type="number" className="w-16 text-center border-b border-emerald-500 bg-transparent outline-none focus:bg-white text-emerald-700" value={it.dispenseQty} onChange={e=>handleAdjust(editableItems.findIndex(x=>x.drugId===it.drugId), e.target.value)} /> : <span>{formatQty(it.dispenseQty, it.packSize)}</span>}
                                  </td>
                                  <td className="text-center font-bold hidden print:table-cell">{formatQty(it.dispenseQty, it.packSize)}</td>
                                  <td className="text-right pr-1 text-slate-500">{(it.price || 0).toFixed(2)}</td>
                                  <td className="text-right pr-1 font-semibold">{itemValue.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                                  <td></td>
                                  <td className="text-center font-mono text-gray-600">{it.drugId}</td>
                               </tr>
                            )
                         })}
                      </tbody>
                   );
                })}
             </table>

             <div className="flex justify-end mb-8">
                <table className="official-table w-[400px] border-none text-[13px]">
                   <tbody>
                      <tr>
                          <th className="text-right border-none pb-1 bg-white">รวมจำนวนรายการทั้งหมด:</th>
                          <td className="text-center font-bold border-none pb-1 bg-white">{grandTotalItems} รายการ</td>
                      </tr>
                      <tr>
                          <th className="text-right bg-gray-200 border-none font-bold">รวมเป็นเงินทั้งสิ้น:</th>
                          <td className="text-right font-bold text-lg bg-gray-200 border-none pr-4">{grandTotalPrice.toLocaleString(undefined, {minimumFractionDigits:2})} บาท</td>
                      </tr>
                   </tbody>
                </table>
             </div>

             <div className="mt-8 px-4 text-[13px] leading-relaxed break-inside-avoid w-full max-w-2xl mx-auto space-y-8">
                 {[
                     `ผู้เบิก`,
                     `ผอ.รพ.สต.${hospNameClean}`,
                     hosp?.affiliation === 'OPT' ? 'รักษาการแทน นายก อบจ.ชุมพร' : 'สาธารณสุขอำเภอสวี',
                     `ผู้อนุมัติ`,
                     `ผู้จ่าย`,
                     `ผู้รับ`
                 ].map((role, idx) => (
                     <div key={idx} className="flex justify-between items-end w-full">
                         <div className="flex w-1/2 items-end">
                             <span className="w-12">ลงชื่อ</span>
                             <span className="flex-1 border-b border-dotted border-black inline-block text-center"></span>
                             <span className="w-56 text-left pl-2">{role}</span>
                         </div>
                         <div className="flex w-1/2 items-end pl-10">
                             <span className="w-12 text-center">วันที่</span>
                             <span className="flex-1 border-b border-dotted border-black inline-block text-center"></span>
                         </div>
                     </div>
                 ))}
             </div>

          const reqs = ctx.appDb.requisitions.filter(r => r.month === filterMonth && r.year === filterYear && r.status === 'Completed');
          
          let itemStats = {};

          const hospTotals = ctx.appDb.hospitals.map(h => {
             const hReq = reqs.find(r => r.hospitalId === h.hospital_id);
             let sums = {};
             let total = 0;
             if (ctx.appDb.drugTypes) {
                Object.keys(ctx.appDb.drugTypes).forEach(k => sums[k] = 0);

                Object.keys(DEFAULT_DRUG_TYPES).forEach(k => sums[k] = 0);
             }

             if (hReq && hReq.items) {
                hReq.items.forEach(it => {
                   const val = it.isUnpacked ? (it.dispenseQty / (it.packSize||1)) * (it.price||0) : it.dispensePack * (it.price||0);
                   if(sums[it.type] !== undefined) sums[it.type] += val;
                   else if(sums['1'] !== undefined) sums['1'] += val; 
                   total += val;

                   if (!itemStats[it.drugId]) itemStats[it.drugId] = { name: it.name, type: it.type, qty: 0, val: 0, unit: it.unit, packSize: it.packSize };
                   itemStats[it.drugId].qty += it.dispenseQty;
                   itemStats[it.drugId].val += val;
                });
             }
             return { hospital_id: h.hospital_id, hospital_name: h.hospital_name, sums, total, hasReq: !!hReq };
          }).sort((a,b) => b.total - a.total);

          let grandSums = {};
          let grandTotal = 0;
          if (ctx.appDb.drugTypes) {

    const AdminConfigView = ({ ctx }) => {

      const [isSaving, setIsSaving] = useState(false);

      useEffect(() => { ctx.setAdminActiveTab(activeTab); }, [activeTab]);

      const executeDelete = async (col, id) => {
        try {
          await db.collection(col).doc(id).delete();
          ctx.showToast('ลบข้อมูลสำเร็จ'); await ctx.refreshData(); 
        } catch(e) { ctx.showToast(e.message, 'error'); }
      };

      const handleSave = async (col, id, data) => {
        setIsSaving(true);
        try {
          await db.collection(col).doc(id).set(data, { merge: true });
          ctx.showToast('อัปเดตข้อมูลสำเร็จ'); await ctx.refreshData(); setEditTarget(null);
        } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }
      };

      const handleSaveForm = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const data = Object.fromEntries(fd);
        let payload = {};
        let docId = editTarget.data.id || data.drug_id || data.unit_id || data.hospital_id || data.type_id;
        
        if (editTarget.col === 'master_drugs') {
           docId = data.drug_id;
           payload = { drug_id: data.drug_id, drug_name: data.drug_name, type: data.type, pack_size: Number(data.pack_size) || 1, price: Number(data.price) || 0, unit_id: data.unit_id, unpacked: !!data.unpacked, fuzzy: data.fuzzy || '' };
        } else if (editTarget.col === 'master_unit') {
           docId = data.unit_id; payload = { unit_id: data.unit_id, unit_name: data.unit_name };
        } else if (editTarget.col === 'master_drug_types') {
           docId = data.type_id; payload = { [data.type_id]: data.type_name }; 
           await db.collection('config').doc('drug_types').set(payload, { merge: true });
           ctx.showToast('อัปเดตหมวดหมู่สำเร็จ'); await ctx.refreshData(); setEditTarget(null); return;

           docId = data.hospital_id; payload = { hospital_id: data.hospital_id, hospital_name: data.hospital_name, affiliation: data.affiliation };
        } else if (editTarget.col === 'users') {
           docId = editTarget.data.id; payload = { name: data.name, position: data.position, hospital_id: data.hospital_id, role: data.role };
        }
        await handleSave(editTarget.col, docId, payload);

                  <button onClick={()=>setEditTarget({ col: 'master_drug_types', data: {}, isNew: true })} className="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg hover:scale-105 transition"><i className="fa-solid fa-plus mr-1"></i> เพิ่มหมวดหมู่ใหม่</button>
               </div>

                         </td>
                       </tr>
                     ))}
                   </tbody>
                 </table>
               </div>
            </div>
         );

         const collections = [
            { id: 'requisitions', name: 'ใบเบิก/เติมยา' },
            { id: 'current_excess', name: 'เครดิต (ยอดยกมา)' },
            { id: 'config_par', name: 'Target VMI (Par)' },
            { id: 'master_drugs', name: 'รายการยา/ราคา' },
            { id: 'master_hospitals', name: 'รพ.สต.' },
            { id: 'users', name: 'ผู้ใช้งาน' },
            { id: 'stock_adjustments', name: 'คำขอปรับสต๊อก' }
         ];
         const [selCol, setSelCol] = useState(collections[0].id);
         const [data, setData] = useState([]);
         
         useEffect(() => {
            db.collection(selCol).limit(100).get().then(snap => {
               setData(snap.docs.map(d => ({ _docId: d.id, ...d.data() })));
            });
         }, [selCol]);

         const handleCellEdit = async (docId, field, val) => {
            try {
               let parsedVal = val;
               try { parsedVal = JSON.parse(val); } catch(e) {} 
               await db.collection(selCol).doc(docId).update({ [field]: parsedVal });
               ctx.showToast('อัปเดตช่องข้อมูลแล้ว');
               setData(prev => prev.map(d => d._docId === docId ? { ...d, [field]: parsedVal } : d));

         };

         if(data.length === 0) return (
            <div className="p-6 text-center text-slate-500">
               <select value={selCol} onChange={e=>setSelCol(e.target.value)} className="mb-4 border p-2 rounded">

      const ApproveStockManager = () => {
        const pendingAdjustments = ctx.appDb.stockAdjustments ? ctx.appDb.stockAdjustments.filter(a => a.status === 'Pending') : [];

        const handleApprove = async (adj) => {
          setIsSaving(true);
          try {
            const batch = db.batch();
            batch.update(db.collection('stock_adjustments').doc(adj.id), { status: 'Approved', approved_at: firebase.firestore.FieldValue.serverTimestamp() });
            const docId = `${adj.hospital_id}_${adj.drug_id}`;
            batch.set(db.collection('current_excess').doc(docId), {
              hospital_id: adj.hospital_id, drug_id: adj.drug_id, excess_balance: Number(adj.new_balance), last_updated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            await batch.commit();
            ctx.showToast('อนุมัติปรับสต๊อกเรียบร้อยแล้ว');

          } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }

      const DrugManager = () => {
        const [searchTerm, setSearchTerm] = useState('');
        const handleCSVUpload = (e) => {
          const file = e.target.files[0];
          if(!file) return;
          Papa.parse(file, {
            header: true, skipEmptyLines: true,
            complete: async (results) => {
              const ops = results.data.map(row => {
                const isUnpacked = String(row.unpacked).toUpperCase() === 'TRUE';
                return {
                  type: 'set', ref: db.collection('master_drugs').doc(row.drug_id),
                  data: {
                    drug_id: row.drug_id, drug_name: row.drug_name, pack_size: Number(row.pack_size) || 1,
                    unit_id: row.unit_id, price: Number(row.price) || 0, type: String(row.type) || '1', unpacked: isUnpacked, fuzzy: row.fuzzy || ''
                  }
                };
              }).filter(op => op.data.drug_id);
              await executeBatchChunks(ops);
              ctx.refreshData(); ctx.showToast('อัปโหลดและอัปเดตข้อมูลยาผ่าน CSV สำเร็จ');
              e.target.value = null;
            }
          });
        };

        const filteredDrugs = ctx.appDb.drugs.filter(d => 
          (d.drug_name || '').toLowerCase().includes(searchTerm.toLowerCase()) || 
          (d.drug_id || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
          (d.fuzzy || '').toLowerCase().includes(searchTerm.toLowerCase())

              <label className="bg-indigo-600 text-white px-4 py-2 rounded-lg cursor-pointer font-bold hover:bg-indigo-700 shrink-0 shadow-lg">
                <i className="fa-solid fa-file-csv mr-2"></i>อัปโหลด CSV ยา <input type="file" accept=".csv" className="hidden" onChange={handleCSVUpload}/>
              </label>
            </div>
            
            <div className="flex justify-between items-center mb-4 gap-4">
               <div className="relative w-full max-w-sm">
                 <i className="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-slate-400"></i>
                 <input type="text" placeholder="ค้นหารายการยา..." className="w-full pl-10 pr-4 py-3 border rounded-xl outline-none focus:border-emerald-500" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
               </div>
               <button onClick={()=>setEditTarget({ col: 'master_drugs', data: {}, isNew: true })} className="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shrink-0 hover:scale-105 transition">
                 <i className="fa-solid fa-plus mr-1"></i> เพิ่มรายการยา
               </button>
            </div>

            <div className="overflow-x-auto border border-slate-200 rounded-xl shadow-sm max-h-[600px] overflow-y-auto w-full">
              <table className="w-full text-left text-sm border-collapse whitespace-nowrap">
                <thead className="bg-slate-100 border-b sticky top-0 z-10">
                  <tr><th className="p-4">รหัส</th><th className="p-4">หมวด</th><th className="p-4">ชื่อยา</th><th className="p-4">ชื่อพ้อง (Fuzzy)</th><th className="p-4 text-center">Pack</th><th className="p-4 text-center">หน่วย</th><th className="p-4 text-center">แตกย่อย</th><th className="p-4 text-right">ราคา (฿)</th><th className="p-4 text-center">จัดการ</th></tr>

                <tbody>

                      <td className="p-4 font-bold text-slate-800">{d.drug_name}</td>
                      <td className="p-4 text-xs text-slate-500 max-w-[150px] truncate" title={d.fuzzy}>{d.fuzzy || '-'}</td>

                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      const UnitManager = () => {
        const [searchTerm, setSearchTerm] = useState('');
        
        const handleCSVUploadAndClear = (e) => {
          const file = e.target.files[0];
          if(!file) return;
          
          ctx.setConfirmDialog({
            title: 'คำเตือน: ลบข้อมูลเดิมทั้งหมด?',

            icon: 'fa-triangle-exclamation',
            iconColor: 'text-red-500',
            confirmBtnClass: 'bg-red-600 hover:bg-red-700',
            confirmText: 'ยืนยัน ลบและนำเข้า',
            onConfirm: () => {
               Papa.parse(file, {
                 header: true, skipEmptyLines: true,
                 complete: async (results) => {
                   setIsSaving(true);
                   try {
                     const existingDocs = await db.collection('master_unit').get();
                     const deleteOps = existingDocs.docs.map(doc => ({ type: 'delete', ref: db.collection('master_unit').doc(doc.id) }));
                     
                     const setOps = results.data.map(row => ({
                       type: 'set', ref: db.collection('master_unit').doc(row.unit_id), data: { unit_id: row.unit_id, unit_name: row.unit_name }
                     })).filter(op => op.data.unit_id);
                     
                     await executeBatchChunks([...deleteOps, ...setOps]);
                     ctx.refreshData(); ctx.showToast('ล้างข้อมูลเดิมและนำเข้า CSV หน่วยนับแล้ว');
                   } catch(err) {
                     ctx.showToast(err.message, 'error');
                   } finally {
                     setIsSaving(false);
                     e.target.value = null;
                   }
                 }
               });
            }
          });

          (u.unit_id || '').toLowerCase().includes(searchTerm.toLowerCase())

              </label>

               <div className="relative w-full max-w-sm">
                 <i className="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-slate-400"></i>
                 <input type="text" placeholder="ค้นหาหน่วยนับ..." className="w-full pl-10 pr-4 py-3 border rounded-xl outline-none focus:border-emerald-500" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
               </div>
               <button onClick={()=>setEditTarget({ col: 'master_unit', data: {}, isNew: true })} className="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:scale-105 transition">
                 <i className="fa-solid fa-plus mr-1"></i> เพิ่มหน่วยนับ
               </button>
            </div>
            <div className="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
              <table className="w-full text-left text-sm border-collapse">
                <thead className="bg-slate-50 border-b"><tr><th className="p-4">รหัสหน่วย</th><th className="p-4">ชื่อหน่วย</th><th className="p-4 text-center">จัดการ</th></tr></thead>
                <tbody>
                  {filteredUnits.map(u=>(
                    <tr key={u.id} className="border-b hover:bg-slate-50">
                      <td className="p-4 font-mono">{u.unit_id}</td>
                      <td className="p-4 font-bold text-slate-800">{u.unit_name}</td>
                      <td className="p-4 text-center space-x-2">
                        <button onClick={()=>setEditTarget({ col: 'master_unit', data: u, isNew: false })} className="text-blue-500 hover:text-blue-700 bg-blue-50 w-8 h-8 rounded-lg"><i className="fa-solid fa-pen-to-square"></i></button>
                        <button onClick={()=>ctx.setConfirmDialog({title:'ยืนยันลบข้อมูล', message:`คุณต้องการลบหน่วย ${u.unit_name} ใช่หรือไม่?`, onConfirm: ()=>executeDelete('master_unit', u.unit_id), iconColor:'text-red-500', confirmBtnClass:'bg-red-500 hover:bg-red-600'})} className="text-red-500 hover:text-red-700 bg-red-50 w-8 h-8 rounded-lg"><i className="fa-solid fa-trash"></i></button>
                      </td>
                    </tr>

                  {filteredUnits.length === 0 && <tr><td colSpan="3" className="text-center p-8 text-slate-400">ไม่มีข้อมูลหน่วยนับ</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        );

                 <input type="text" placeholder="ค้นหา รพ.สต...." className="w-full pl-10 pr-4 py-3 border rounded-xl outline-none focus:border-emerald-500" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
               </div>
               <button onClick={()=>setEditTarget({ col: 'master_hospitals', data: {}, isNew: true })} className="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:scale-105 transition">
                 <i className="fa-solid fa-plus mr-1"></i> เพิ่ม รพ.สต.

                      <td className="p-4 font-bold text-slate-800">{h.hospital_name}</td>
                      <td className="p-4 text-center space-x-2">

                      </td>

                </tbody>
              </table>
            </div>
          </div>
        );
      };

        return (
          <div className="p-6">
            <div className="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
              <table className="w-full text-left text-sm border-collapse">
                <thead className="bg-slate-50 border-b"><tr><th className="p-4">ชื่อผู้ใช้งาน</th><th className="p-4">อีเมล</th><th className="p-4">ตำแหน่ง</th><th className="p-4">รพ.สต. ที่สังกัด</th><th className="p-4">ระดับสิทธิ์</th><th className="p-4 text-center">จัดการ</th></tr></thead>
                <tbody>
                  {ctx.appDb.usersList.map(u=>(
                    <tr key={u.id} className="border-b hover:bg-slate-50">
                      <td className="p-4 font-bold text-slate-800">{u.name}</td>
                      <td className="p-4 text-slate-500">{u.email}</td>
                      <td className="p-4 text-slate-600">{u.position || '-'}</td>
                      <td className="p-4 text-slate-600 font-medium">{ctx.appDb.hospitals.find(h=>h.hospital_id === u.hospital_id)?.hospital_name || u.hospital_id}</td>
                      <td className="p-4">
                        <span className={`px-2 py-1 rounded text-xs font-bold ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}>{u.role === 'admin' ? 'แอดมิน' : 'รพ.สต.'}</span>
                      </td>
                      <td className="p-4 text-center space-x-2">
                        <button onClick={()=>setEditTarget({ col: 'users', data: u, isNew: false })} className="text-blue-500 hover:text-blue-700 bg-blue-50 w-8 h-8 rounded-lg"><i className="fa-solid fa-pen-to-square"></i></button>
                        <button onClick={()=>ctx.setConfirmDialog({title:'ยืนยันลบผู้ใช้งาน', message:`คุณต้องการลบผู้ใช้งาน ${u.name} ใช่หรือไม่?`, onConfirm: ()=>executeDelete('users', u.id), iconColor:'text-red-500', confirmBtnClass:'bg-red-500 hover:bg-red-600'})} className="text-red-500 hover:text-red-700 bg-red-50 w-8 h-8 rounded-lg"><i className="fa-solid fa-trash"></i></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

            <h2 className="text-2xl font-bold"><i className="fa-solid fa-server mr-2 text-emerald-400"></i> จัดการฐานข้อมูล (Admin Console)</h2>
            {isSaving && <div className="flex items-center text-emerald-400 font-bold animate-pulse"><i className="fa-solid fa-circle-notch fa-spin mr-2"></i> กำลังบันทึก...</div>}

                        <input name="drug_name" defaultValue={editTarget.data.drug_name} placeholder="ชื่อยา" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />

                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อพ้อง (Fuzzy) - คั่นด้วยลูกน้ำ</label>
                        <input name="fuzzy" defaultValue={editTarget.data.fuzzy} placeholder="เช่น พารา, paracetamol tab" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" />
                      </div>
                      <div className="flex gap-4">
                        <div className="w-1/2">
                          <label className="text-sm font-bold text-slate-600 block mb-1">หมวดหมู่</label>
                          <select name="type" defaultValue={editTarget.data.type || '1'} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                            {Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).map(k=><option key={k} value={k}>{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[k]}</option>)}
                          </select>
                        </div>
                        <div className="w-1/2">
                          <label className="text-sm font-bold text-slate-600 block mb-1">ขนาดบรรจุ (Pack)</label>
                          <input name="pack_size" type="number" defaultValue={editTarget.data.pack_size} placeholder="เช่น 100" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                      </div>
                      <div className="flex gap-4">
                        <div className="w-1/2">
                          <label className="text-sm font-bold text-slate-600 block mb-1">หน่วยนับ</label>
                          <select name="unit_id" defaultValue={editTarget.data.unit_id} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                            <option value="">- เลือกหน่วย -</option>
                            {ctx.appDb.units.map(u=><option key={u.id} value={u.unit_id}>{u.unit_name}</option>)}
                          </select>
                        </div>
                        <div className="w-1/2">
                          <label className="text-sm font-bold text-slate-600 block mb-1">ราคา (฿) - ต่อ Pack</label>
                          <input name="price" type="number" step="0.01" defaultValue={editTarget.data.price} placeholder="ราคาต่อ 1 Pack" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                        </div>
                      </div>
                      <div className="mt-2 bg-slate-50 p-3 rounded-xl border border-slate-200">
                        <label className="flex items-center gap-2 font-bold text-slate-700 cursor-pointer">
                          <input type="checkbox" name="unpacked" defaultChecked={editTarget.data.unpacked} className="w-5 h-5 accent-emerald-600" /> ยานี้อนุญาตให้จ่ายแตกหน่วยย่อยได้
                        </label>
                      </div>
                    </>
                  )}
                  {editTarget.col === 'master_drug_types' && (
                    <>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">รหัสหมวดหมู่</label>
                        <input name="type_id" defaultValue={editTarget.data.type_id} disabled={!editTarget.isNew} placeholder="เช่น 1, 32" className={`w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 ${!editTarget.isNew?'bg-gray-100':''}`} required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อหมวดหมู่</label>
                        <input name="type_name" defaultValue={editTarget.data.type_name} placeholder="เช่น ยา, เวชภัณฑ์" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                    </>
                  )}
                  {editTarget.col === 'master_unit' && (
                    <>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">รหัสหน่วย</label>
                        <input name="unit_id" defaultValue={editTarget.data.unit_id} placeholder="เช่น U01" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อหน่วยนับ</label>
                        <input name="unit_name" defaultValue={editTarget.data.unit_name} placeholder="ชื่อหน่วย" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                    </>
                  )}
                  {editTarget.col === 'master_hospitals' && (
                    <>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">รหัส รพ.สต.</label>
                        <input name="hospital_id" defaultValue={editTarget.data.hospital_id} placeholder="เช่น H01" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อ รพ.สต.</label>
                        <input name="hospital_name" defaultValue={editTarget.data.hospital_name} placeholder="ชื่อหน่วยงาน" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">สังกัด</label>
                        <select name="affiliation" defaultValue={editTarget.data.affiliation || 'SSO'} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                           <option value="SSO">สสอ. (สาธารณสุขอำเภอ)</option>
                           <option value="OPT">อปท. (องค์การบริหารส่วนท้องถิ่น)</option>
                        </select>
                      </div>
                    </>
                  )}
                  {editTarget.col === 'users' && (
                    <>
                      <input type="hidden" name="id" value={editTarget.data.id} />
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ชื่อ-นามสกุล ผู้ใช้งาน</label>
                        <input name="name" defaultValue={editTarget.data.name} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">อีเมล (อ่านอย่างเดียว)</label>
                        <input disabled defaultValue={editTarget.data.email} className="w-full p-3 border rounded-xl bg-slate-100 text-slate-500" />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ตำแหน่ง</label>
                        <input name="position" defaultValue={editTarget.data.position} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">รพ.สต. ต้นสังกัด</label>
                        <select name="hospital_id" defaultValue={editTarget.data.hospital_id} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required>
                          <option value="">- เลือก รพ.สต. -</option>
                          {ctx.appDb.hospitals.map(h=><option key={h.id} value={h.hospital_id}>{h.hospital_name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-600 block mb-1">ระดับสิทธิ์ (Role)</label>
                        <select name="role" defaultValue={editTarget.data.role} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required>
                          <option value="hospital">Hospital (รพ.สต.)</option>
                          <option value="admin">Admin (แอดมิน)</option>
                        </select>
                      </div>
                    </>
                  )}
                </div>
                <div className="flex justify-end gap-3 mt-6 pt-4 border-t">
                  <button type="button" onClick={()=>setEditTarget(null)} className="px-6 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition">ยกเลิก</button>
                  <button type="submit" disabled={isSaving} className="px-8 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition">
                    {isSaving ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : <i className="fa-solid fa-save mr-2"></i>}
                    {isSaving ? 'กำลังบันทึก...' : 'บันทึกข้อมูล'}
                  </button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    };

    const App = () => {
      const [currentView, setCurrentView] = useState('login');
      const [toast, setToast] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [currentUser, setCurrentUser] = useState(null);
      const [appDb, setAppDb] = useState({
        drugs: [], hospitals: [], units: [], parLevels: [],
        balances: [], requisitions: [], usersList: [],
        stockAdjustments: [], drugTypes: null
      });
      const [currentReqId, setCurrentReqId] = useState(null);
      const [editReqId, setEditReqId] = useState(null);
      const [adminActiveTab, setAdminActiveTab] = useState('drugs');
      const [targetUploadHosp, setTargetUploadHosp] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);

      const showToast = (message, type = 'success') => setToast({ message, type });

      const handleLogin = async (email, password, rememberMe) => {
        try {
          await auth.setPersistence(rememberMe ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
          await auth.signInWithEmailAndPassword(email, password);
        } catch (error) {
          showToast(error.message, 'error');
        }
      };

      const refreshData = async () => {
        if (!auth.currentUser) return;
        try {
          const [drugsSnap, hospSnap, unitSnap, parSnap, balSnap, reqSnap, userSnap, adjSnap, configSnap] = await Promise.all([
            db.collection('master_drugs').get(),
            db.collection('master_hospitals').get(),
            db.collection('master_unit').get(),
            db.collection('config_par').get(),
            db.collection('current_excess').get(),
            db.collection('requisitions').get(),
            db.collection('users').get(),
            db.collection('stock_adjustments').get(),
            db.collection('config').doc('drug_types').get()
          ]);

          setAppDb({
            drugs: drugsSnap.docs.map(d => d.data()),
            hospitals: hospSnap.docs.map(d => ({id: d.id, ...d.data()})),
            units: unitSnap.docs.map(d => d.data()),
            parLevels: parSnap.docs.map(d => d.data()),
            balances: balSnap.docs.map(d => d.data()),
            requisitions: reqSnap.docs.map(d => ({id: d.id, ...d.data()})),
            usersList: userSnap.docs.map(d => ({id: d.id, ...d.data()})),
            stockAdjustments: adjSnap.docs.map(d => ({id: d.id, ...d.data()})),
            drugTypes: configSnap.exists ? configSnap.data() : null
          });
        } catch (error) {
          showToast('โหลดข้อมูลจากฐานข้อมูลล้มเหลว', 'error');
        }
      };

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          if (user) {
            try {
              const userDoc = await db.collection('users').doc(user.uid).get();
              if (userDoc.exists) {
                setCurrentUser({ uid: user.uid, ...userDoc.data() });
                await refreshData();
                setCurrentView('dashboard');
              } else {
                showToast('ไม่พบข้อมูลสิทธิ์ผู้ใช้งาน', 'error');
                auth.signOut();
              }
            } catch(e) {
                showToast('เกิดข้อผิดพลาดในการตรวจสอบสิทธิ์', 'error');
            }
          } else {
            setCurrentUser(null);
            setCurrentView('login');
          }
          setIsInitializing(false);
        });
        return () => unsubscribe();
      }, []);

      if (isInitializing) return <FullScreenSpinner />;

      if (currentView === 'login') return <><LoginView ctx={{handleLogin, setCurrentView, showToast}} />{toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)} />}</>;
      if (currentView === 'register') return <><RegisterView ctx={{setCurrentView, showToast, appDb}} />{toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)} />}</>;

      const ctx = { appDb, currentUser, setCurrentView, showToast, refreshData, currentReqId, setCurrentReqId, editReqId, setEditReqId, setConfirmDialog, adminActiveTab, setAdminActiveTab, targetUploadHosp, setTargetUploadHosp, handleLogin };

      return (
        <div className="flex flex-col min-h-screen lg:flex-row">
          <div className="w-full lg:w-72 bg-slate-900 text-white flex flex-col no-print shrink-0 shadow-2xl z-10">
            <div className="p-6 flex items-center border-b border-slate-800 bg-slate-900">
              <div className="bg-gradient-main p-2 rounded-lg mr-3 shadow-lg"><i className="fa-solid fa-truck-medical text-white"></i></div>
              <h1 className="text-xl font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-400">Sawee Rxfill</h1>
            </div>
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
              <button onClick={() => setCurrentView('dashboard')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='dashboard'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-house w-6 text-center mr-2"></i> แดชบอร์ด</button>
              {currentUser?.role === 'hospital' && <button onClick={() => {setEditReqId(null); setCurrentView('create_req');}} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='create_req'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-boxes-packing w-6 text-center mr-2"></i> ทำเรื่องเติมยา</button>}
              {currentUser?.role === 'admin' && <button onClick={() => setCurrentView('config')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='config'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-database w-6 text-center mr-2"></i> จัดการระบบ</button>}
              
              <div className="border-t border-slate-800 my-2 pt-2"></div>
              <button onClick={() => setCurrentView('profile_edit')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='profile_edit'?'bg-slate-700 text-white':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-user-pen w-6 text-center mr-2"></i> แก้ไขข้อมูลส่วนตัว</button>
            </nav>
            <div className="p-5 border-t border-slate-800 bg-slate-900">
              <div className="flex items-center mb-4 text-sm text-slate-300 font-medium bg-slate-800 p-3 rounded-xl border border-slate-700">
                <div className="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold mr-3">{currentUser?.name?.charAt(0)}</div>
                <div className="truncate w-full">
                   <div>{currentUser?.name}</div>
                   <div className="text-[10px] text-slate-500">{currentUser?.position || currentUser?.role}</div>
                </div>
              </div>
              <button onClick={() => auth.signOut()} className="w-full text-left p-3 rounded-xl text-red-400 hover:bg-red-500/10 font-bold border border-red-500/30 transition flex items-center justify-center"><i className="fa-solid fa-power-off mr-2"></i> ออกจากระบบ</button>
            </div>
          </div>
          <div className="flex-1 p-4 lg:p-10 overflow-auto bg-[#f8fafc] w-full relative">
            <div className="max-w-7xl mx-auto pb-20">
              {currentView === 'dashboard' && <DashboardView ctx={ctx} />}
              {currentView === 'create_req' && <CreateReqView ctx={ctx} />}
              {currentView === 'view_req' && <ViewReqView ctx={ctx} />}
              {currentView === 'my_stock' && <MyStockView ctx={ctx} />}
              {currentView === 'upload_csv' && <UploadCSVView ctx={ctx} />}
              {currentView === 'config' && <AdminConfigView ctx={ctx} />}
              {currentView === 'profile_edit' && <ProfileEditView ctx={ctx} />}
              {currentView === 'summary_report' && <SummaryReportView ctx={ctx} />}
              {currentView === 'initial_setup' && <InitialStockSetupView ctx={ctx} />}
            </div>
          </div>
          <UniversalConfirmModal confirmDialog={confirmDialog} setConfirmDialog={setConfirmDialog} />
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
