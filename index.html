<html lang="th">
<head>

  <script src="https://cdn.tailwindcss.com"></script>

  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
    .bg-gradient-main { background: linear-gradient(135deg, #0d9488 0%, #059669 100%); }
    .text-gradient { background: linear-gradient(135deg, #0d9488 0%, #059669 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    @media print {
      @page { size: A4 portrait; margin: 10mm; }
      body { background-color: #fff; }

      table.official-table thead { display: table-header-group; }
      table.official-table tfoot { display: table-footer-group; }

      table.official-table th { background-color: #f0f0f0 !important; -webkit-print-color-adjust: exact; text-align: center; }
      
      .print-header { text-align: center; margin-bottom: 15px; }

    }
    
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0d9488; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">
  <div id="root" class="flex-grow"></div>

  <footer class="bg-slate-800 text-slate-400 py-4 text-center text-sm no-print mt-auto border-t-4 border-emerald-500">
    <p>Sawee Rxfill System | VMI & Logistics Management</p>
    <p class="mt-1 font-medium text-emerald-400"><i class="fa-solid fa-phone mr-1"></i> กรณีมีปัญหาการใช้งาน กรุณาติดต่อ Admin: 089-290-9255</p>
  </footer>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyAnzXAEkH8Zz0Ur4lCQ00qa4UqYATTikAs",
      authDomain: "sawee-rxfill.firebaseapp.com",
      projectId: "sawee-rxfill",
      storageBucket: "sawee-rxfill.firebasestorage.app",
      messagingSenderId: "186506077335",
      appId: "1:186506077335:web:71c5f6f90bb26e767df5d2",
      measurementId: "G-XFL0L1L213"
    };

    const GAS_DRIVE_URL = "https://script.google.com/macros/s/AKfycbyxqnZlYJKW22S_DO9PnYFQYsxs6SMbUVI5ckB7yZCDC6KhlqKpE8incdkzmuyVILCd/exec"; 

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const THAI_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
    
    // Default fallback drug types
    const DEFAULT_DRUG_TYPES = { '1': 'ยา', '3': 'สมุนไพร', '25': 'ยาสำหรับโรคเรื้อรัง (NCDs)', '32': 'เวชภัณฑ์ทางการแพทย์' };

    const getFiscalInfo = (month, year) => {
      let fiscalYear = month >= 10 ? year + 1 + 543 : year + 543;
      let term = month >= 10 ? month - 9 : month + 3;
      return { fiscalYear, term };
    };

    const sortDrugs = (a, b) => {
      const idA = String(a.drugId || a.drug_id || "");
      const idB = String(b.drugId || b.drug_id || "");
      const isDrugA = idA.length >= 5;
      const isDrugB = idB.length >= 5;
      if (isDrugA && !isDrugB) return -1;
      if (!isDrugA && isDrugB) return 1;
      return idA.localeCompare(idB);
    };

    const formatQty = (qty, packSize) => {
       if (qty === 0 || !qty) return '0(0)';
       const p = Math.floor(qty / packSize);
       return `${p}(${qty})`;
    };

    const executeBatchChunks = async (operations) => {
      const BATCH_SIZE = 450;
      for (let i = 0; i < operations.length; i += BATCH_SIZE) {
        const batch = db.batch();
        operations.slice(i, i + BATCH_SIZE).forEach(op => {
          if (op.type === 'set') batch.set(op.ref, op.data, { merge: true });
          if (op.type === 'update') batch.update(op.ref, op.data);
          if (op.type === 'delete') batch.delete(op.ref);
        });
        await batch.commit();
      }
    };

    // ==========================================
    // SHARED COMPONENTS
    // ==========================================

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);
      const bgColor = type === 'error' ? 'bg-red-500' : 'bg-emerald-500';
      return (
        <div className={`fixed top-6 right-6 ${bgColor} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center z-[250] animate-fade-in font-medium`}>
          <i className={`fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} mr-3 text-xl`}></i>
          {message}
        </div>
      );
    };

    const Modal = ({ title, children, onClose, isOpen, maxWidth }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[150] flex items-center justify-center px-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
          <div className={`bg-white rounded-2xl shadow-2xl w-full ${maxWidth || 'max-w-2xl'} overflow-hidden flex flex-col max-h-[90vh]`}>
            <div className="p-5 border-b flex justify-between items-center bg-slate-50">
              <h3 className="text-xl font-bold text-slate-800">{title}</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-red-500 transition bg-white border border-slate-200 rounded-full w-8 h-8 flex items-center justify-center shadow-sm">
                <i className="fa-solid fa-xmark"></i>
              </button>
            </div>
            <div className="p-6 overflow-y-auto">{children}</div>
          </div>
        </div>
      );
    };

    const UniversalConfirmModal = ({ confirmDialog, setConfirmDialog }) => {
      if (!confirmDialog) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[200] px-4 animate-fade-in">
          <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
            <div className="flex items-center text-slate-800 mb-4">
              <i className={`fa-solid ${confirmDialog.icon || 'fa-circle-question'} text-3xl mr-3 ${confirmDialog.iconColor || 'text-indigo-500'}`}></i>
              <h3 className="text-xl font-bold">{confirmDialog.title}</h3>
            </div>
            <p className="text-slate-500 mb-6">{confirmDialog.message}</p>
            <div className="flex justify-end gap-3">
              <button onClick={() => setConfirmDialog(null)} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200">ยกเลิก</button>
              <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className={`px-4 py-2 text-white rounded-xl font-bold shadow-lg ${confirmDialog.confirmBtnClass || 'bg-indigo-600 hover:bg-indigo-700'}`}>
                {confirmDialog.confirmText || 'ยืนยัน'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const FullScreenSpinner = () => (
      <div className="fixed inset-0 z-[300] bg-slate-900/60 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in">
        <div className="loader mb-4 border-t-emerald-400 border-4 border-white/20 w-16 h-16"></div>
        <p className="text-white font-bold text-lg tracking-wider animate-pulse">กำลังประมวลผล กรุณารอสักครู่...</p>
      </div>
    );

    // ==========================================
    // AUTH VIEWS
    // ==========================================

    const LoginView = ({ ctx }) => {
      const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
      const [rememberMe, setRememberMe] = useState(true); const [showForgot, setShowForgot] = useState(false);
      const [forgotEmail, setForgotEmail] = useState('');

      const handleForgot = async () => {
        if(!forgotEmail) return ctx.showToast('กรุณากรอกอีเมล', 'error');
        try { await auth.sendPasswordResetEmail(forgotEmail); ctx.showToast('ส่งลิงก์ไปที่อีเมลแล้ว'); setShowForgot(false); } catch(e) { ctx.showToast(e.message, 'error'); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
          <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-slate-100">
            <div className="flex flex-col items-center mb-8">
              <div className="bg-gradient-main p-4 rounded-2xl text-white mb-4 shadow-lg"><i className="fa-solid fa-truck-medical text-3xl"></i></div>
              <h1 className="text-3xl font-extrabold text-slate-800">Sawee Rxfill</h1>
              <p className="text-slate-500 text-sm mt-1">ระบบเติมยาและเวชภัณฑ์ VMI</p>
            </div>
            <div className="space-y-5">
              <input type="email" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
              <input type="password" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && ctx.handleLogin(email, password, rememberMe)} />
              <label className="flex items-center text-sm text-slate-600 cursor-pointer"><input type="checkbox" className="mr-2 w-4 h-4 text-emerald-600 rounded" checked={rememberMe} onChange={e => setRememberMe(e.target.checked)} />จดจำการเข้าสู่ระบบ</label>
              <button onClick={() => ctx.handleLogin(email, password, rememberMe)} className="w-full bg-gradient-main text-white rounded-xl p-4 font-bold hover:opacity-90 shadow-lg">เข้าสู่ระบบ</button>
            </div>
            <div className="mt-6 flex justify-between text-sm">
              <button onClick={() => ctx.setCurrentView('register')} className="text-emerald-600 font-semibold hover:underline">ลงทะเบียนผู้ใช้ใหม่</button>
              <button onClick={() => setShowForgot(true)} className="text-slate-500 font-semibold hover:underline">ลืมรหัสผ่าน?</button>
            </div>
          </div>
          {showForgot && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 px-4">
              <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                <h3 className="text-xl font-bold text-slate-800 mb-2">รีเซ็ตรหัสผ่าน</h3>
                <input type="email" className="w-full border p-3 mb-4 rounded-lg outline-none" placeholder="อีเมล" value={forgotEmail} onChange={e => setForgotEmail(e.target.value)} />
                <div className="flex justify-end gap-3">
                  <button onClick={() => setShowForgot(false)} className="px-4 py-2 bg-slate-100 rounded-lg">ยกเลิก</button>
                  <button onClick={handleForgot} className="px-4 py-2 bg-emerald-600 text-white rounded-lg">ส่งลิงก์</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const RegisterView = ({ ctx }) => {
      const [formData, setFormData] = useState({ email: '', password: '', name: '', position: '', hospitalId: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const handleRegister = async () => {
        if(!formData.hospitalId || !formData.name.trim() || !formData.position.trim()) return ctx.showToast('กรุณากรอกข้อมูลให้ครบ', 'error');
        setIsSubmitting(true);
        try {
          const userCredential = await auth.createUserWithEmailAndPassword(formData.email, formData.password);
          await db.collection('users').doc(userCredential.user.uid).set({ name: formData.name, position: formData.position, hospital_id: formData.hospitalId, role: 'hospital', created_at: firebase.firestore.FieldValue.serverTimestamp() });
          ctx.showToast('ลงทะเบียนสำเร็จ');
        } catch (error) { ctx.showToast(error.message, 'error'); } finally { setIsSubmitting(false); }
      };
      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
          <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">
            <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">ลงทะเบียนเข้าใช้งาน</h2>
            <div className="space-y-4">
              <input type="text" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="คำนำหน้า ชื่อ-นามสกุล (เต็ม)" onChange={e => setFormData({...formData, name: e.target.value})} />
              <input type="text" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="ตำแหน่ง (บังคับ)" onChange={e => setFormData({...formData, position: e.target.value})} />
              <select className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" onChange={e => setFormData({...formData, hospitalId: e.target.value})}>
                <option value="">-- เลือก รพ.สต. ที่สังกัด --</option>
                {ctx.appDb?.hospitals?.map(h => <option key={h.hospital_id} value={h.hospital_id}>{h.hospital_name}</option>)}
              </select>
              <input type="email" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="อีเมล (ใช้ล็อกอิน)" onChange={e => setFormData({...formData, email: e.target.value})} />
              <input type="password" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="รหัสผ่าน" onChange={e => setFormData({...formData, password: e.target.value})} />
              <button onClick={handleRegister} disabled={isSubmitting} className="w-full bg-gradient-main text-white rounded-xl p-4 font-bold shadow-lg mt-4">{isSubmitting ? 'กำลังบันทึก...' : 'ยืนยันลงทะเบียน'}</button>
              <button onClick={() => ctx.setCurrentView('login')} className="w-full text-slate-500 mt-2 hover:underline">กลับหน้าล็อกอิน</button>
            </div>
          </div>
        </div>
      );
    };

    const ProfileEditView = ({ ctx }) => {
      const [formData, setFormData] = useState({ name: ctx.currentUser?.name || '', position: ctx.currentUser?.position || '' });
      const [isSaving, setIsSaving] = useState(false);
      const handleSave = async () => {
        if(!formData.name || !formData.position) return ctx.showToast('กรุณากรอกข้อมูลให้ครบ', 'error');
        setIsSaving(true);
        try {
          await db.collection('users').doc(ctx.currentUser.uid).update(formData);
          await ctx.refreshData(); 
          ctx.showToast('อัปเดตข้อมูลส่วนตัวแล้ว'); ctx.setCurrentView('dashboard');
        } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }
      };
      return (
        <div className="bg-white rounded-2xl shadow-sm p-8 border max-w-lg mx-auto mt-10">
          <h2 className="text-2xl font-bold mb-6">แก้ไขข้อมูลส่วนตัว</h2>
          <div className="space-y-4">
             <div><label className="text-sm font-bold text-slate-600">ชื่อ-นามสกุล</label><input type="text" className="w-full border p-3 rounded-lg outline-none mt-1" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} /></div>
             <div><label className="text-sm font-bold text-slate-600">ตำแหน่ง</label><input type="text" className="w-full border p-3 rounded-lg outline-none mt-1" value={formData.position} onChange={e=>setFormData({...formData, position: e.target.value})} /></div>
             <div><label className="text-sm font-bold text-slate-600">รพ.สต. (แก้ไขผ่าน Admin)</label><input type="text" disabled className="w-full border p-3 rounded-lg bg-slate-100 text-slate-500 mt-1" value={ctx.appDb.hospitals.find(h=>h.hospital_id===ctx.currentUser?.hospital_id)?.hospital_name || ctx.currentUser?.hospital_id} /></div>
          </div>
          <div className="flex justify-end gap-3 mt-8">
             <button onClick={()=>ctx.setCurrentView('dashboard')} className="px-6 py-2 bg-slate-100 rounded-xl font-bold text-slate-600">ยกเลิก</button>
             <button onClick={handleSave} disabled={isSaving} className="px-8 py-2 bg-emerald-600 text-white rounded-xl font-bold">{isSaving ? 'กำลังบันทึก...' : 'บันทึก'}</button>
          </div>
        </div>
      )
    };

    // ==========================================
    // FEATURE VIEWS
    // ==========================================

    const UploadCSVView = ({ ctx }) => {
      const [parsedData, setParsedData] = useState([]);
      const [isProcessing, setIsProcessing] = useState(false);

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        setIsProcessing(true);

        Papa.parse(file, {
          header: true, skipEmptyLines: true,
          complete: function(results) {
            const rawData = results.data;
            const processed = rawData.map(row => {
              const m = [ Number(row.usage_m1)||0, Number(row.usage_m2)||0, Number(row.usage_m3)||0, Number(row.usage_m4)||0, Number(row.usage_m5)||0, Number(row.usage_m6)||0, Number(row.usage_m7)||0 ];
              const total = m.reduce((a,b)=>a+b, 0); const mean = total / 7;
              const variance = m.reduce((a,b) => a + Math.pow(b - mean, 2), 0) / 6;
              const sd = Math.sqrt(variance || 0);

              const ADU = total / 210;
              const SS = 1.645 * (sd / 30) * Math.sqrt(7);
              const rawInitial = (ADU * 45) + SS;
              const ceilInitial = Math.ceil(rawInitial);

              const drug = ctx.appDb.drugs.find(d => d.drug_id === row.drug_id);
              const hosp = ctx.appDb.hospitals.find(h => h.hospital_id === row.hospital_id);
              const packSize = drug ? (Number(drug.pack_size) || 1) : 1;
              const isUnpacked = drug ? !!drug.unpacked : false;

              let finalQty, finalPack;
              if (isUnpacked) { finalQty = ceilInitial; finalPack = Math.ceil(ceilInitial / packSize); } 
              else { finalPack = Math.ceil(ceilInitial / packSize); finalQty = finalPack * packSize; }

              return {
                hospital_id: row.hospital_id, drug_id: row.drug_id, m1: m[0], m2: m[1], m3: m[2], m4: m[3], m5: m[4], m6: m[5], m7: m[6],
                total, adu: ADU.toFixed(3), sd: sd.toFixed(3), ss: SS.toFixed(3), ceilInitial, packSize, finalPack, finalQty, isUnpacked,
                isNewDrug: !drug, isNewHosp: !hosp, drugName: drug ? drug.drug_name : 'ไม่พบชื่อยาในระบบ', unit: drug ? drug.unit_display_name : '-'
              };
            });
            setParsedData(processed);
            setIsProcessing(false);
          }
        });
      };

      const handleSubmitRequest = async () => {
        if (parsedData.length === 0) return ctx.showToast('ไม่มีข้อมูล', 'error');
        setIsProcessing(true);
        try {
          const grouped = {};
          parsedData.forEach(item => { if(!grouped[item.hospital_id]) grouped[item.hospital_id] = []; grouped[item.hospital_id].push(item); });
          const operations = [];
          for (const hospId in grouped) {
            const newReqRef = db.collection('csv_initial_requests').doc();
            operations.push({ type: 'set', ref: newReqRef, data: { hospital_id: hospId, items: grouped[hospId], status: 'Pending', created_at: firebase.firestore.FieldValue.serverTimestamp(), user_name: ctx.currentUser.name } });
          }
          await executeBatchChunks(operations);
          ctx.showToast('ส่งข้อมูลคำขอ Initial Stock (CSV) สำเร็จ (ทับข้อมูลเดิมเมื่ออนุมัติ)');
          setParsedData([]); ctx.refreshData(); ctx.setCurrentView('dashboard');
        } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsProcessing(false); }
      };

      return (

          {isProcessing && <FullScreenSpinner />}
          <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">

              <h2 className="text-2xl font-bold text-slate-800">นำเข้าข้อมูล CSV เพื่อตั้งค่า Initial Stock</h2>

                        <td className="p-3 text-center text-slate-500">{row.total}</td><td className="p-3 text-center font-mono">{row.adu}</td><td className="p-3 text-center font-mono">{row.sd}</td><td className="p-3 text-center font-mono text-amber-600">{row.ss}</td><td className="p-3 text-center font-bold text-amber-600 bg-amber-50/50">{row.ceilInitial}</td><td className="p-3 text-center">{row.packSize}</td><td className="p-3 text-center font-bold text-emerald-600">{row.finalPack}</td><td className="p-3 text-center font-extrabold text-emerald-700 bg-emerald-50/50">{row.finalQty}</td>

    const AdjustStockView = ({ ctx }) => {
      const hospId = ctx.currentUser.hospital_id;
      const isAdmin = ctx.currentUser.role === 'admin';
      const [searchTerm, setSearchTerm] = useState('');
      const [showMyStockOnly, setShowMyStockOnly] = useState(true);
      const [selectedDrug, setSelectedDrug] = useState(null);
      const [newBalance, setNewBalance] = useState('');
      const [reason, setReason] = useState('');
      const [isSaving, setIsSaving] = useState(false);

      const drugList = useMemo(() => {
        if (!ctx.appDb) return [];
        const myPars = ctx.appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
        const myParDrugIds = myPars.map(p => String(p.drug_id));
        let listToProcess = ctx.appDb.drugs;
        if (showMyStockOnly) listToProcess = ctx.appDb.drugs.filter(d => myParDrugIds.includes(String(d.drug_id)));
        let list = listToProcess.map(drug => {
          const bal = ctx.appDb.balances.find(b => String(b.hospital_id) === String(hospId) && String(b.drug_id) === String(drug.drug_id));
          return { drugId: drug.drug_id, name: drug.drug_name || 'N/A', unit: drug.unit_display_name || '', currentBal: bal ? Number(bal.excess_balance) : 0 };
        });
        return list.sort(sortDrugs);
      }, [ctx.appDb, hospId, showMyStockOnly]);

      const filteredList = drugList.filter(d => d.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(d.drugId).includes(searchTerm.toLowerCase()));

      const handleSaveAdjust = async () => {
        if(!selectedDrug) return ctx.showToast('กรุณาเลือกรายการยา', 'error');
        if(newBalance === '') return ctx.showToast('กรุณาระบุยอดยกมาใหม่', 'error');
        if(!reason.trim()) return ctx.showToast('บังคับต้องระบุเหตุผลในการปรับ', 'error');
        setIsSaving(true);
        try {
          const batch = db.batch();
          const adjStatus = isAdmin ? 'Approved' : 'Pending';
          batch.set(db.collection('stock_adjustments').doc(), { hospital_id: hospId, drug_id: selectedDrug.drugId, old_balance: selectedDrug.currentBal, new_balance: Number(newBalance), reason: reason, user_name: ctx.currentUser.name, status: adjStatus, date: firebase.firestore.FieldValue.serverTimestamp() });
          if (isAdmin) batch.set(db.collection('current_excess').doc(`${hospId}_${selectedDrug.drugId}`), { hospital_id: hospId, drug_id: selectedDrug.drugId, excess_balance: Number(newBalance), last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
          await batch.commit();
          ctx.showToast(isAdmin ? 'ปรับสต๊อกเรียบร้อยแล้ว' : 'ส่งคำขอปรับสต๊อกแล้ว กรุณารอแอดมินอนุมัติ');
          setNewBalance(''); setReason(''); setSelectedDrug(null); await ctx.refreshData();
          if(!isAdmin) ctx.setCurrentView('dashboard');
        } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm p-8 border border-slate-100 animate-fade-in max-w-4xl mx-auto">
          <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
            <div><h2 className="text-2xl font-bold text-slate-800">ขอปรับปรุงยอดยกมา (Adjust Stock)</h2><p className="text-slate-500 mt-1">กรณีที่สต๊อกในระบบไม่ตรงกับความจริง ต้องส่งเรื่องให้แอดมินอนุมัติ</p></div>
            <button onClick={() => ctx.setCurrentView('dashboard')} className="text-slate-400 hover:text-slate-600 bg-slate-100 px-4 py-2 rounded-xl font-medium">กลับหน้าหลัก</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
              <div className="mb-4 relative"><i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i><input type="text" placeholder="ค้นหารายการยา..." className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 transition" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} /></div>
              <label className="flex items-center gap-2 cursor-pointer mb-4 text-emerald-700 font-semibold bg-emerald-50 p-2 rounded-lg border border-emerald-200"><input type="checkbox" className="w-5 h-5 accent-emerald-600" checked={showMyStockOnly} onChange={e=>setShowMyStockOnly(e.target.checked)} /> แสดงเฉพาะยาที่มีในคลังย่อย (ตั้ง Target ไว้)</label>
              <div className="border border-slate-200 rounded-xl max-h-[400px] overflow-y-auto">
                {filteredList.map(d => (
                  <div key={d.drugId} onClick={() => { setSelectedDrug(d); setNewBalance(''); setReason(''); }} className={`p-4 border-b cursor-pointer transition ${selectedDrug?.drugId === d.drugId ? 'bg-emerald-50 border-l-4 border-l-emerald-500' : 'hover:bg-slate-50 border-l-4 border-l-transparent'}`}>
                    <div className="font-bold text-slate-800">{d.name} <span className="text-xs font-normal text-slate-500 ml-1">[{d.drugId}]</span></div>
                    <div className="text-sm text-slate-500 mt-1">ยอดปัจจุบันในระบบ: <span className="font-bold text-blue-600">{d.currentBal}</span> {d.unit}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 h-fit">
              {selectedDrug ? (
                <div className="space-y-4 animate-fade-in">
                  <h3 className="font-bold text-lg text-slate-800 border-b pb-2">รายละเอียดการปรับแก้</h3>
                  <div><label className="block text-sm font-semibold text-slate-600 mb-1">รายการยา</label><div className="font-bold text-emerald-700 bg-emerald-100/50 p-3 rounded-lg border border-emerald-200">{selectedDrug.name} <span className="text-xs font-normal">[{selectedDrug.drugId}]</span></div></div>
                  <div className="flex gap-4"><div className="flex-1"><label className="block text-sm font-semibold text-slate-600 mb-1">ยอดเดิม</label><input type="text" disabled value={selectedDrug.currentBal} className="w-full bg-slate-200 border-none rounded-lg p-3 text-slate-500 font-bold" /></div><div className="flex-1"><label className="block text-sm font-semibold text-red-600 mb-1">ยอดใหม่ที่ถูกต้อง <span className="text-xs font-normal">({selectedDrug.unit})</span></label><input type="number" min="0" value={newBalance} onChange={e=>setNewBalance(e.target.value)} className="w-full border-2 border-red-300 rounded-lg p-3 font-bold text-red-700 outline-none focus:border-red-500" placeholder="0" /></div></div>
                  <div><label className="block text-sm font-semibold text-slate-600 mb-1">เหตุผลในการปรับยอด (บังคับ) <span className="text-red-500">*</span></label><textarea rows="3" value={reason} onChange={e=>setReason(e.target.value)} className="w-full border border-slate-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="เช่น ยาเสื่อมสภาพ, นับสต๊อกสิ้นเดือน, คีย์เบิกผิดรอบที่แล้ว..."></textarea></div>
                  <button onClick={handleSaveAdjust} disabled={isSaving} className="w-full bg-emerald-600 text-white rounded-lg p-4 font-bold shadow-lg hover:bg-emerald-700 transition disabled:opacity-50 mt-4">{isSaving ? 'กำลังบันทึก...' : 'ส่งคำขอปรับสต๊อก'}</button>
                </div>
              ) : (
                <div className="text-center text-slate-400 py-20"><i className="fa-solid fa-hand-pointer text-4xl mb-3 opacity-50"></i><p>คลิกเลือกรายการยาจากตารางด้านซ้าย<br/>เพื่อทำการขอปรับยอด</p></div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const InitialStockSetupView = ({ ctx }) => {
      const hospId = ctx.currentUser?.hospital_id;
      const hospName = ctx.appDb.hospitals.find(h => h.hospital_id === hospId)?.hospital_name || hospId;
      
      const [isProcessing, setIsProcessing] = useState(false);
      const [printMode, setPrintMode] = useState('req'); // 'req' or 'return'
      
      const [setupItems, setSetupItems] = useState(() => {
        if (!ctx.appDb || !ctx.appDb.parLevels) return [];
        // ดึงยาทุกตัวที่มีในระบบ หรือเคยมีประวัติ
        const myPars = ctx.appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
        
        return myPars.map(par => {
          const drug = ctx.appDb.drugs.find(d => String(d.drug_id) === String(par.drug_id));
          const packSize = drug ? Number(drug.pack_size) : 1;
          const isUnpacked = drug ? !!drug.unpacked : false;
          const targetQty = Number(par.par_qty) || 0;

          return {
            drugId: par.drug_id, name: drug ? drug.drug_name : 'N/A', unit: drug ? drug.unit_display_name : '',
            packSize, isUnpacked, type: drug ? drug.type : '1', price: drug ? drug.price : 0,
            targetVMI: targetQty, 
            currentStock: '', // Input field
            returnPack: 0, returnQty: 0, 
            requestPack: 0, requestQty: 0,
            newExcess: 0
          };
        }).sort(sortDrugs);
      });

      const handleUpdateStock = (drugId, val) => {
        const stockStr = val.trim();
        const currentStockPack = stockStr === '' ? '' : parseInt(stockStr) || 0;
        
        const newItems = setupItems.map(item => {
          if (item.drugId === drugId) {
            const row = { ...item, currentStock: currentStockPack };
            if (stockStr === '') {
               row.returnPack = 0; row.returnQty = 0; row.requestPack = 0; row.requestQty = 0; row.newExcess = 0;
               return row;
            }
            
            const currentStockUnits = currentStockPack * row.packSize;
            
            if (currentStockUnits > row.targetVMI) {
               const overAmount = currentStockUnits - row.targetVMI;
               row.returnPack = Math.floor(overAmount / row.packSize);
               row.returnQty = row.returnPack * row.packSize;
               row.requestPack = 0; row.requestQty = 0;
               row.newExcess = currentStockUnits - row.returnQty;
            } else if (currentStockUnits < row.targetVMI) {
               const shortAmount = row.targetVMI - currentStockUnits;
               if (row.isUnpacked) {
                  row.requestPack = Math.ceil(shortAmount / row.packSize);
                  row.requestQty = Math.ceil(shortAmount);
               } else {
                  row.requestPack = Math.ceil(shortAmount / row.packSize);
                  row.requestQty = row.requestPack * row.packSize;
               }
               row.returnPack = 0; row.returnQty = 0;
               row.newExcess = currentStockUnits + row.requestQty;
            } else {
               row.returnPack = 0; row.returnQty = 0; row.requestPack = 0; row.requestQty = 0;
               row.newExcess = currentStockUnits;
            }
            return row;
          }
          return item;
        });
        setSetupItems(newItems);
      };

      const handlePrintReturn = () => {
         setPrintMode('return');
         setTimeout(() => window.print(), 100);
      };

      const handleSaveAndPrintRequest = async () => {
         const invalidItems = setupItems.filter(i => i.currentStock === '');
         if (invalidItems.length > 0) {
            return ctx.showToast(`กรุณากรอกยอดคงเหลือให้ครบทุกรายการ (เหลือ ${invalidItems.length} รายการ)`, 'error');
         }

         setIsProcessing(true);
         try {
            const newId = `REQ-2026-06-${Math.floor(Math.random()*1000).toString().padStart(3, '0')}`;
            const reqItems = setupItems.map(item => ({
               drugId: item.drugId || "", 
               name: item.name || "N/A", 
               unit: item.unit || "",
               packSize: Number(item.packSize) || 1, 
               isUnpacked: !!item.isUnpacked, 
               type: item.type || "1", 
               price: Number(item.price) || 0,
               avgUsage: 0, 
               prevExcess: Number(item.currentStock || 0) * (Number(item.packSize) || 1),
               usage: 0, 
               vmiTarget: Number(item.targetVMI) || 0, 
               netNeed: item.requestQty > 0 ? ((Number(item.targetVMI) || 0) - (Number(item.currentStock || 0) * (Number(item.packSize) || 1))) : 0,
               dispensePack: Number(item.requestPack) || 0, 
               dispenseQty: Number(item.requestQty) || 0, 
               newExcess: Number(item.newExcess) || 0,
               isSpecial: false, 
               isReturned: Number(item.returnQty) > 0, 
               returnQty: Number(item.returnQty) || 0,
               requestMore: 0
            }));

            const batch = db.batch();
            batch.set(db.collection('requisitions').doc(newId), {
               hospitalId: hospId, month: 6, year: 2026, status: 'Pending', is_printed: true,
               created_by_name: ctx.currentUser?.name || 'System', created_at: firebase.firestore.FieldValue.serverTimestamp(),
               items: reqItems, isInitialSetup: true
            });

            setupItems.forEach(item => {
               batch.set(db.collection('current_excess').doc(`${hospId}_${item.drugId}`), {
                  hospital_id: hospId, drug_id: item.drugId, excess_balance: Number(item.newExcess) || 0, last_updated: firebase.firestore.FieldValue.serverTimestamp()
               }, { merge: true });
            });

            await batch.commit();
            ctx.showToast('บันทึกสต็อกเริ่มต้นและสร้างใบเบิกสำเร็จ');
            await ctx.refreshData();
            ctx.setCurrentReqId(newId);
            ctx.setCurrentView('view_req');

         } catch (e) { ctx.showToast(e.message, 'error'); } finally { setIsProcessing(false); }
      };

      const returnItems = setupItems.filter(i => i.returnQty > 0);
      let returnTotal = 0;

      return (
         <div className="bg-white rounded-2xl shadow-sm p-4 lg:p-8 animate-fade-in border border-slate-100">
            {isProcessing && <FullScreenSpinner />}
            <div className="flex justify-between items-center mb-6 no-print pb-4 border-b">
               <div>
                  <h2 className="text-2xl font-bold text-slate-800"><i className="fa-solid fa-boxes-packing text-amber-500 mr-2"></i> สร้างสต็อกเริ่มต้น (เฉพาะกิจ เดือนแรก)</h2>
                  <p className="text-slate-500 mt-1">กรอกจำนวนแพ็คที่เหลืออยู่ ระบบจะคำนวณยอดคืนและยอดเบิกเพิ่มให้อัตโนมัติ</p>
               </div>
               <button onClick={() => ctx.setCurrentView('dashboard')} className="text-slate-500 font-bold hover:text-slate-800"><i className="fa-solid fa-arrow-left mr-1"></i> กลับหน้าหลัก</button>
            </div>

            <div className="no-print overflow-x-auto mb-8 border border-slate-200 rounded-xl max-h-[600px] overflow-y-auto">
               <table className="w-full text-left border-collapse whitespace-nowrap text-sm">
                  <thead className="sticky top-0 z-10 shadow-sm">
                     <tr className="bg-slate-100 text-slate-700 border-b border-slate-200">
                        <th className="p-3">รายการยา [รหัส]</th>
                        <th className="p-3 text-center">Pack</th>
                        <th className="p-3 text-center text-blue-800 bg-blue-50">Target 60 วัน<br/><span className="text-[10px] font-normal">(หน่วยย่อย)</span></th>
                        <th className="p-3 text-center bg-amber-100 text-amber-800 border-x border-amber-200">ยาเหลือจริง<br/><span className="text-[10px] font-normal">(ระบุเป็น แพ็ค)</span></th>
                        <th className="p-3 text-center text-red-700 bg-red-50">ต้องส่งคืน<br/><span className="text-[10px] font-normal">(แพ็ค)</span></th>
                        <th className="p-3 text-center text-emerald-700 bg-emerald-50 border-l border-emerald-100">ต้องเบิกเพิ่ม<br/><span className="text-[10px] font-normal">(หน่วยย่อย)</span></th>
                     </tr>
                  </thead>
                  <tbody>
                     {setupItems.map(item => (
                        <tr key={item.drugId} className="border-b hover:bg-slate-50">
                           <td className="p-3">
                              <div className="font-bold text-slate-800">{item.name}</div>
                              <div className="text-[10px] text-slate-500">[{item.drugId}] | หมวด: {ctx.appDb.drugTypes?.[item.type] || DEFAULT_DRUG_TYPES[item.type]}</div>
                           </td>
                           <td className="p-3 text-center text-slate-500">{item.packSize} {item.unit}</td>
                           <td className="p-3 text-center font-bold text-blue-700 bg-blue-50/30">{item.targetVMI}</td>
                           <td className="p-3 text-center bg-amber-50/50 border-x border-amber-100">
                              <input type="number" min="0" className="w-20 border-b-2 border-amber-400 bg-transparent p-1 text-center font-bold text-amber-900 outline-none focus:bg-white focus:border-amber-600 transition" value={item.currentStock} onChange={e => handleUpdateStock(item.drugId, e.target.value)} placeholder="0" />
                           </td>
                           <td className="p-3 text-center font-bold text-red-600 bg-red-50/30">{item.returnPack > 0 ? item.returnPack : '-'}</td>
                           <td className="p-3 text-center font-bold text-emerald-600 bg-emerald-50/30">{item.requestQty > 0 ? `${item.requestPack} ${item.isUnpacked ? `(${item.requestQty})` : ''}` : '-'}</td>
                        </tr>
                     ))}
                  </tbody>
               </table>
            </div>

          const hospTotals = ctx.appDb.hospitals.map(h => {
             const hReq = reqs.find(r => r.hospitalId === h.hospital_id);
             let sums = {};
             let total = 0;
             if (ctx.appDb.drugTypes) {
                Object.keys(ctx.appDb.drugTypes).forEach(k => sums[k] = 0);
             } else {
                Object.keys(DEFAULT_DRUG_TYPES).forEach(k => sums[k] = 0);
             }

             if (hReq && hReq.items) {
                hReq.items.forEach(it => {
                   const val = it.isUnpacked ? (it.dispenseQty / (it.packSize||1)) * (it.price||0) : it.dispensePack * (it.price||0);
                   if(sums[it.type] !== undefined) sums[it.type] += val;
                   else if(sums['1'] !== undefined) sums['1'] += val; 
                   total += val;
                });
             }
             return { hospital_id: h.hospital_id, hospital_name: h.hospital_name, sums, total, hasReq: !!hReq };
