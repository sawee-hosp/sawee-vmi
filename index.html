<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
    .bg-gradient-main { background: linear-gradient(135deg, #0d9488 0%, #059669 100%); }
    .text-gradient { background: linear-gradient(135deg, #0d9488 0%, #059669 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    @media print {
      @page { size: A4 portrait; margin: 10mm 10mm 15mm 10mm; }
      body { background-color: #fff; }
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible; }
      .print-area { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
      .no-print { display: none !important; }
      
      table.official-table { width: 100%; border-collapse: collapse; font-size: 11px !important; margin-bottom: 10px; page-break-inside: auto; }
      table.official-table tr { page-break-inside: avoid; page-break-after: auto; }
      table.official-table thead { display: table-header-group; }
      table.official-table tfoot { display: table-footer-group; }
      table.official-table th, table.official-table td { padding: 4px !important; white-space: normal !important; border: 1px solid #000 !important; }
      table.official-table th { background-color: #f0f0f0 !important; -webkit-print-color-adjust: exact; text-align: center; }
      
      .print-header { text-align: center; margin-bottom: 15px; }
      .print-header h1 { font-size: 16px !important; font-weight: bold; margin-bottom: 5px; }
      .print-header p { font-size: 13px !important; margin-bottom: 2px; }
      
      .watermark-print { position: fixed; top: 40%; left: 5%; width: 90%; text-align: center; font-size: 40px; font-weight: bold; color: rgba(255, 0, 0, 0.2); transform: rotate(-35deg); z-index: 9999; pointer-events: none; border: 8px solid rgba(255,0,0,0.15); padding: 20px; border-radius: 20px; }
    }
    
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0d9488; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .tooltip-container:hover .tooltip-content { display: block; }
  </style>

<body class="text-slate-800 flex flex-col min-h-screen">
  <div id="root" class="flex-grow"></div>

  <footer class="bg-slate-800 text-slate-400 py-4 text-center text-sm no-print mt-auto border-t-4 border-emerald-500">
    <p>Sawee Rxfill System | VMI & Logistics Management</p>
    <p class="mt-1 font-medium text-emerald-400"><i class="fa-solid fa-phone mr-1"></i> กรณีมีปัญหาการใช้งาน กรุณาติดต่อ Admin: 089-290-9255</p>
  </footer>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyAnzXAEkH8Zz0Ur4lCQ00qa4UqYATTikAs",
      authDomain: "sawee-rxfill.firebaseapp.com",
      projectId: "sawee-rxfill",
      storageBucket: "sawee-rxfill.firebasestorage.app",
      messagingSenderId: "186506077335",
      appId: "1:186506077335:web:71c5f6f90bb26e767df5d2",
      measurementId: "G-XFL0L1L213"
    };

    const GAS_DRIVE_URL = "https://script.google.com/macros/s/AKfycbyxqnZlYJKW22S_DO9PnYFQYsxs6SMbUVI5ckB7yZCDC6KhlqKpE8incdkzmuyVILCd/exec"; 

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const THAI_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
    const DEFAULT_DRUG_TYPES = { '1': 'ยา', '3': 'สมุนไพร', '25': 'ยาสำหรับโรคเรื้อรัง (NCDs)', '32': 'เวชภัณฑ์ทางการแพทย์' };

    const getFiscalInfo = (month, year) => {
      let fiscalYear = month >= 10 ? year + 1 + 543 : year + 543;
      let term = month >= 10 ? month - 9 : month + 3;
      return { fiscalYear, term };
    };

    const sortDrugs = (a, b) => {
      const idA = String(a.drugId || a.drug_id || "");
      const idB = String(b.drugId || b.drug_id || "");
      const isDrugA = idA.length >= 5;
      const isDrugB = idB.length >= 5;
      if (isDrugA && !isDrugB) return -1;
      if (!isDrugA && isDrugB) return 1;
      return idA.localeCompare(idB);
    };

    const formatQty = (qty, packSize) => {
       if (!qty || qty <= 0) return '0';
       const p = Math.floor(qty / packSize);
       const r = qty % packSize;
       if (r === 0) return p.toString();
       if (p === 0) return `(${r})`;
       return `${p}(${r})`;
    };

    const executeBatchChunks = async (operations) => {
      const BATCH_SIZE = 450;
      for (let i = 0; i < operations.length; i += BATCH_SIZE) {
        const batch = db.batch();
        operations.slice(i, i + BATCH_SIZE).forEach(op => {
          if (op.type === 'set') batch.set(op.ref, op.data, { merge: true });
          if (op.type === 'update') batch.update(op.ref, op.data);
          if (op.type === 'delete') batch.delete(op.ref);
        });
        await batch.commit();
      }
    };

    // ==========================================
    // SHARED COMPONENTS
    // ==========================================
    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);
      const bgColor = type === 'error' ? 'bg-red-500' : 'bg-emerald-500';
      return (
        <div className={`fixed top-6 right-6 ${bgColor} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center z-[250] animate-fade-in font-medium`}>
          <i className={`fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} mr-3 text-xl`}></i>
          {message}
        </div>
      );
    };

    const Modal = ({ title, children, onClose, isOpen, maxWidth }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[150] flex items-center justify-center px-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in py-10">
          <div className={`bg-white rounded-2xl shadow-2xl w-full ${maxWidth || 'max-w-2xl'} overflow-hidden flex flex-col max-h-full`}>
            <div className="p-5 border-b flex justify-between items-center bg-slate-50 shrink-0">
              <h3 className="text-xl font-bold text-slate-800">{title}</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-red-500 transition bg-white border border-slate-200 rounded-full w-8 h-8 flex items-center justify-center shadow-sm">
                <i className="fa-solid fa-xmark"></i>
              </button>
            </div>
            <div className="p-6 overflow-y-auto">{children}</div>
          </div>
        </div>
      );
    };

    const UniversalConfirmModal = ({ confirmDialog, setConfirmDialog }) => {
      if (!confirmDialog) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[200] px-4 animate-fade-in">
          <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
            <div className="flex items-center text-slate-800 mb-4">
              <i className={`fa-solid ${confirmDialog.icon || 'fa-circle-question'} text-3xl mr-3 ${confirmDialog.iconColor || 'text-indigo-500'}`}></i>
              <h3 className="text-xl font-bold">{confirmDialog.title}</h3>
            </div>
            <p className="text-slate-500 mb-6">{confirmDialog.message}</p>
            <div className="flex justify-end gap-3">
              <button onClick={() => setConfirmDialog(null)} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200">ยกเลิก</button>
              <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className={`px-4 py-2 text-white rounded-xl font-bold shadow-lg ${confirmDialog.confirmBtnClass || 'bg-indigo-600 hover:bg-indigo-700'}`}>
                {confirmDialog.confirmText || 'ยืนยัน'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const FullScreenSpinner = () => (
      <div className="fixed inset-0 z-[300] bg-slate-900/60 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in">
        <div className="loader mb-4 border-t-emerald-400 border-4 border-white/20 w-16 h-16"></div>
        <p className="text-white font-bold text-lg tracking-wider animate-pulse">กำลังประมวลผล กรุณารอสักครู่...</p>
      </div>
    );

    // ==========================================
    // AUTH VIEWS
    // ==========================================
    const LoginView = ({ ctx }) => {
      const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
      const [rememberMe, setRememberMe] = useState(true); const [showForgot, setShowForgot] = useState(false);
      const [forgotEmail, setForgotEmail] = useState('');

      const handleForgot = async () => {
        if(!forgotEmail) return ctx.showToast('กรุณากรอกอีเมล', 'error');
        try { await auth.sendPasswordResetEmail(forgotEmail); ctx.showToast('ส่งลิงก์ไปที่อีเมลแล้ว'); setShowForgot(false); } catch(e) { ctx.showToast(e.message, 'error'); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
          <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-slate-100">
            <div className="flex flex-col items-center mb-8">
              <div className="bg-gradient-main p-4 rounded-2xl text-white mb-4 shadow-lg"><i className="fa-solid fa-truck-medical text-3xl"></i></div>
              <h1 className="text-3xl font-extrabold text-slate-800">Sawee Rxfill</h1>
              <p className="text-slate-500 text-sm mt-1">ระบบเติมยาและเวชภัณฑ์ VMI</p>
            </div>
            <div className="space-y-5">
              <input type="email" autoComplete="email" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
              <input type="password" autoComplete="current-password" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && ctx.handleLogin(email, password, rememberMe)} />
              <label className="flex items-center text-sm text-slate-600 cursor-pointer"><input type="checkbox" className="mr-2 w-4 h-4 text-emerald-600 rounded" checked={rememberMe} onChange={e => setRememberMe(e.target.checked)} />จดจำการเข้าสู่ระบบ</label>
              <button onClick={() => ctx.handleLogin(email, password, rememberMe)} className="w-full bg-gradient-main text-white rounded-xl p-4 font-bold hover:opacity-90 shadow-lg">เข้าสู่ระบบ</button>
            </div>
            <div className="mt-6 flex justify-between text-sm">
              <button onClick={() => ctx.setCurrentView('register')} className="text-emerald-600 font-semibold hover:underline">ลงทะเบียนผู้ใช้ใหม่</button>
              <button onClick={() => setShowForgot(true)} className="text-slate-500 font-semibold hover:underline">ลืมรหัสผ่าน?</button>
            </div>
          </div>
          {showForgot && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 px-4">
              <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                <h3 className="text-xl font-bold text-slate-800 mb-2">รีเซ็ตรหัสผ่าน</h3>
                <input type="email" className="w-full border p-3 mb-4 rounded-lg outline-none" placeholder="อีเมล" value={forgotEmail} onChange={e => setForgotEmail(e.target.value)} />
                <div className="flex justify-end gap-3">
                  <button onClick={() => setShowForgot(false)} className="px-4 py-2 bg-slate-100 rounded-lg">ยกเลิก</button>
                  <button onClick={handleForgot} className="px-4 py-2 bg-emerald-600 text-white rounded-lg">ส่งลิงก์</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const RegisterView = ({ ctx }) => {
      const [formData, setFormData] = useState({ email: '', password: '', name: '', position: '', hospitalId: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const handleRegister = async () => {
        if(!formData.hospitalId || !formData.name.trim() || !formData.position.trim()) return ctx.showToast('กรุณากรอกข้อมูลให้ครบ', 'error');
        setIsSubmitting(true);
        try {
          const userCredential = await auth.createUserWithEmailAndPassword(formData.email, formData.password);
          await db.collection('users').doc(userCredential.user.uid).set({ name: formData.name, position: formData.position, hospital_id: formData.hospitalId, role: 'hospital', created_at: firebase.firestore.FieldValue.serverTimestamp() });
          ctx.showToast('ลงทะเบียนสำเร็จ');
        } catch (error) { ctx.showToast(error.message, 'error'); } finally { setIsSubmitting(false); }
      };
      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
          <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">
            <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">ลงทะเบียนเข้าใช้งาน</h2>
            <div className="space-y-4">
              <input type="text" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="คำนำหน้า ชื่อ-นามสกุล (เต็ม)" onChange={e => setFormData({...formData, name: e.target.value})} />
              <input type="text" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="ตำแหน่ง (บังคับ)" onChange={e => setFormData({...formData, position: e.target.value})} />
              <select className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" onChange={e => setFormData({...formData, hospitalId: e.target.value})}>
                <option value="">-- เลือก รพ.สต. ที่สังกัด --</option>
                {ctx.appDb?.hospitals?.map(h => <option key={h.hospital_id} value={h.hospital_id}>{h.hospital_name}</option>)}
              </select>
              <input type="email" autoComplete="email" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="อีเมล (ใช้ล็อกอิน)" onChange={e => setFormData({...formData, email: e.target.value})} />
              <input type="password" autoComplete="new-password" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="รหัสผ่าน" onChange={e => setFormData({...formData, password: e.target.value})} />
              <button onClick={handleRegister} disabled={isSubmitting} className="w-full bg-gradient-main text-white rounded-xl p-4 font-bold shadow-lg mt-4">{isSubmitting ? 'กำลังบันทึก...' : 'ยืนยันลงทะเบียน'}</button>
              <button onClick={() => ctx.setCurrentView('login')} className="w-full text-slate-500 mt-2 hover:underline">กลับหน้าล็อกอิน</button>
            </div>
          </div>
        </div>
      );
    };

    const ProfileEditView = ({ ctx }) => {
      const [formData, setFormData] = useState({ name: ctx.currentUser?.name || '', position: ctx.currentUser?.position || '' });
      const [isSaving, setIsSaving] = useState(false);
      const handleSave = async () => {
        if(!formData.name || !formData.position) return ctx.showToast('กรุณากรอกข้อมูลให้ครบ', 'error');
        setIsSaving(true);
        try {
          await db.collection('users').doc(ctx.currentUser.uid).update(formData);
          await ctx.refreshData(); 
          ctx.showToast('อัปเดตข้อมูลส่วนตัวแล้ว'); ctx.setCurrentView('dashboard');
        } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsSaving(false); }
      };
      return (
        <div className="bg-white rounded-2xl shadow-sm p-8 border max-w-lg mx-auto mt-10">
          <h2 className="text-2xl font-bold mb-6">แก้ไขข้อมูลส่วนตัว</h2>
          <div className="space-y-4">
             <div><label className="text-sm font-bold text-slate-600">ชื่อ-นามสกุล</label><input type="text" className="w-full border p-3 rounded-lg outline-none mt-1" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} /></div>
             <div><label className="text-sm font-bold text-slate-600">ตำแหน่ง</label><input type="text" className="w-full border p-3 rounded-lg outline-none mt-1" value={formData.position} onChange={e=>setFormData({...formData, position: e.target.value})} /></div>
             <div><label className="text-sm font-bold text-slate-600">รพ.สต. (แก้ไขผ่าน Admin)</label><input type="text" disabled className="w-full border p-3 rounded-lg bg-slate-100 text-slate-500 mt-1" value={ctx.appDb.hospitals.find(h=>h.hospital_id===ctx.currentUser?.hospital_id)?.hospital_name || ctx.currentUser?.hospital_id} /></div>
          </div>
          <div className="flex justify-end gap-3 mt-8">
             <button onClick={()=>ctx.setCurrentView('dashboard')} className="px-6 py-2 bg-slate-100 rounded-xl font-bold text-slate-600">ยกเลิก</button>
             <button onClick={handleSave} disabled={isSaving} className="px-8 py-2 bg-emerald-600 text-white rounded-xl font-bold">{isSaving ? 'กำลังบันทึก...' : 'บันทึก'}</button>
          </div>
        </div>
      )
    };

    // ==========================================
    // MAIN APP VIEWS
    // ==========================================
    const DashboardView = ({ ctx }) => {
      const isHospital = ctx.currentUser?.role === 'hospital';
      const isAdmin = ctx.currentUser?.role === 'admin';
      
      const [adminSelectedCard, setAdminSelectedCard] = useState('pending'); // all, pending, completed, month

      const myReqs = isHospital ? ctx.appDb.requisitions.filter(r => r.hospitalId === ctx.currentUser?.hospital_id) : ctx.appDb.requisitions;
      const validReqs = myReqs; 

      const today = new Date();
      const currentDay = today.getDate();
      const currentMonth = today.getMonth() + 1;
      const currentYear = today.getFullYear();
      const isRequisitionPeriod = currentDay >= 20 && currentDay <= 31;

      const currentMonthReq = isHospital ? validReqs.find(r => r.month === currentMonth && r.year === currentYear) : null;
      
      const [adminFilterMonth, setAdminFilterMonth] = useState(currentMonth);
      const [adminFilterYear, setAdminFilterYear] = useState(currentYear);

      const handleReqAction = () => {
        if (!currentMonthReq) { ctx.setEditReqId(null); ctx.setCurrentView('create_req'); } 
        else if (currentMonthReq.status === 'Pending' || currentMonthReq.status === 'Pending_Approval') { ctx.setEditReqId(currentMonthReq.id); ctx.setCurrentView('create_req'); }
      };

      const handleAdminUploadForHosp = (hospId) => {
        ctx.setTargetUploadHosp(hospId);
        ctx.setCurrentView('create_req');
      };

      return (
        <div className="space-y-8 animate-fade-in">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-end bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
            <div>
              <h2 className="text-3xl font-extrabold text-slate-800">ภาพรวมระบบเติมยา VMI</h2>
              <p className="text-slate-500 mt-1 text-lg">สวัสดี, <span className="font-semibold text-emerald-600">{ctx.currentUser?.name || 'ผู้ใช้งาน'}</span></p>
              {isHospital && <p className="text-sm text-slate-400 mt-1"><i className="fa-solid fa-location-dot"></i> {ctx.appDb.hospitals.find(h=>h.hospital_id === ctx.currentUser?.hospital_id)?.hospital_name || ctx.currentUser?.hospital_id}</p>}
            </div>
            <div className="space-x-3 flex flex-wrap gap-y-2">
              {isAdmin && <button onClick={() => ctx.setCurrentView('summary_report')} className="bg-indigo-100 text-indigo-700 border border-indigo-200 px-6 py-3 rounded-xl font-bold shadow-sm hover:bg-indigo-200 transition"><i className="fa-solid fa-chart-bar mr-2"></i> รายงานสรุปยอด</button>}
              {isHospital && <button onClick={() => ctx.setCurrentView('my_stock')} className="bg-white border-2 border-emerald-500 text-emerald-600 px-6 py-3 rounded-xl font-bold hover:bg-emerald-50 transition"><i className="fa-solid fa-boxes-stacked mr-2"></i> คลังยาของฉัน (My Stock)</button>}
              {isHospital && (
                <button 
                  onClick={handleReqAction} 
                  disabled={currentMonthReq && currentMonthReq.status === 'Completed'}
                  className={`px-6 py-3 rounded-xl font-bold shadow-lg transition flex items-center ${currentMonthReq && currentMonthReq.status === 'Completed' ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : currentMonthReq && (currentMonthReq.status === 'Pending' || currentMonthReq.status === 'Pending_Approval') ? 'bg-amber-500 text-white hover:bg-amber-600 shadow-amber-200' : 'bg-gradient-main text-white hover:scale-105 shadow-emerald-200'}`}
                >
                  {currentMonthReq && currentMonthReq.status === 'Completed' ? <><i className="fa-solid fa-lock mr-2"></i> เบิกแล้ว (รอรอบหน้า)</> :
                   currentMonthReq && (currentMonthReq.status === 'Pending' || currentMonthReq.status === 'Pending_Approval') ? <><i className="fa-solid fa-pen mr-2"></i> แก้ไข/ตรวจสอบรอบนี้</> : 
                   <><i className="fa-solid fa-boxes-packing mr-2"></i> ทำเรื่องเติมยา</>}
                </button>
              )}
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
            {isHospital && (
               <div onClick={() => ctx.setCurrentView('create_req')} className={`rounded-2xl shadow-sm p-6 border flex items-center cursor-pointer transition bg-white hover:bg-slate-50 ${isRequisitionPeriod ? 'border-emerald-500' : 'border-slate-200'}`}>
                 <div className={`p-4 rounded-xl mr-4 ${isRequisitionPeriod ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}><i className="fa-regular fa-calendar-check text-2xl"></i></div>
                 <div>
                    <div className="text-slate-500 font-medium">ปฏิทินเบิกยา (วันที่ 20-31)</div>
                    {isRequisitionPeriod ? <div className="text-xl font-extrabold text-emerald-600">เปิดการเบิก</div> : <div className="text-xl font-bold text-slate-400">ยังไม่ถึงช่วงเบิก</div>}
                 </div>
               </div>
            )}
            {!isHospital && (
               <div onClick={() => setAdminSelectedCard('month')} className={`rounded-2xl shadow-sm p-6 border flex items-center cursor-pointer transition bg-white hover:bg-slate-50 ${adminSelectedCard === 'month' ? 'ring-2 ring-indigo-500 border-indigo-500' : 'border-slate-200'}`}>
                 <div className="bg-indigo-100 p-4 rounded-xl text-indigo-600 mr-4"><i className="fa-regular fa-calendar-check text-2xl"></i></div>
                 <div><div className="text-slate-500 font-medium">สถานะเบิกเดือนนี้</div><div className="text-xl font-extrabold text-indigo-600">ตรวจสอบการส่ง</div></div>
               </div>
            )}

            <div onClick={() => isAdmin && setAdminSelectedCard('all')} className={`bg-white rounded-2xl shadow-sm p-6 border flex items-center transition ${isAdmin ? 'cursor-pointer hover:bg-slate-50' : ''} ${adminSelectedCard==='all' ? 'ring-2 ring-blue-500 border-blue-500' : 'border-slate-100'}`}>
              <div className="bg-blue-100 p-4 rounded-xl text-blue-600 mr-4"><i className="fa-solid fa-file-invoice text-2xl"></i></div>
              <div><div className="text-slate-500 font-medium">ประวัติทั้งหมด</div><div className="text-3xl font-extrabold">{validReqs.length}</div></div>
            </div>
            
            <div onClick={() => isAdmin && setAdminSelectedCard('pending')} className={`bg-white rounded-2xl shadow-sm p-6 border flex items-center transition ${isAdmin ? 'cursor-pointer hover:bg-slate-50' : ''} ${adminSelectedCard==='pending' ? 'ring-2 ring-amber-500 border-amber-500' : 'border-slate-100'}`}>
              <div className="bg-amber-100 p-4 rounded-xl text-amber-600 mr-4"><i className="fa-solid fa-clock text-2xl"></i></div>
              <div><div className="text-slate-500 font-medium">รอห้องยาอนุมัติ</div><div className="text-3xl font-extrabold">{validReqs.filter(r => r.status === 'Pending' || r.status === 'Pending_Approval').length}</div></div>
            </div>
            
            <div onClick={() => isAdmin && setAdminSelectedCard('completed')} className={`bg-white rounded-2xl shadow-sm p-6 border flex items-center transition ${isAdmin ? 'cursor-pointer hover:bg-slate-50' : ''} ${adminSelectedCard==='completed' ? 'ring-2 ring-emerald-500 border-emerald-500' : 'border-slate-100'}`}>
              <div className="bg-emerald-100 p-4 rounded-xl text-emerald-600 mr-4"><i className="fa-solid fa-check-double text-2xl"></i></div>
              <div><div className="text-slate-500 font-medium">จัดยาแล้ว</div><div className="text-3xl font-extrabold">{validReqs.filter(r => r.status === 'Completed').length}</div></div>
            </div>

            {isAdmin && (
               <div onClick={() => setAdminSelectedCard('adjust')} className={`bg-white rounded-2xl shadow-sm p-6 border flex items-center cursor-pointer transition ${adminSelectedCard==='adjust' ? 'ring-2 ring-purple-500 border-purple-500' : 'border-slate-100 hover:bg-slate-50'}`}>
                 <div className="bg-purple-100 p-4 rounded-xl text-purple-600 mr-4"><i className="fa-solid fa-boxes-stacked text-2xl"></i></div>
                 <div><div className="text-slate-500 font-medium">คำขอปรับ Stock</div><div className="text-3xl font-extrabold">{ctx.appDb.stockAdjustments?.filter(a => a.status === 'Pending').length || 0}</div></div>
               </div>
            )}
          </div>

          {isAdmin && adminSelectedCard === 'month' && (
             <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-fade-in">
                <div className="p-5 border-b font-bold text-slate-800 bg-slate-50 flex flex-wrap justify-between items-center gap-4">
                  <div className="flex items-center"><i className="fa-solid fa-clipboard-list text-indigo-500 mr-2"></i> สถานะการเบิกประจำเดือน</div>
                  <div className="flex gap-2">
                    <select className="border border-slate-300 rounded p-1 outline-none" value={adminFilterMonth} onChange={e=>setAdminFilterMonth(Number(e.target.value))}>
                      {THAI_MONTHS.map((m, i) => <option key={i} value={i+1}>{m}</option>)}
                    </select>
                    <select className="border border-slate-300 rounded p-1 outline-none" value={adminFilterYear} onChange={e=>setAdminFilterYear(Number(e.target.value))}>
                      {[2024,2025,2026,2027].map(y => <option key={y} value={y}>{y+543}</option>)}
                    </select>
                  </div>
                </div>
                <div className="overflow-x-auto">
                   <table className="w-full text-left text-sm whitespace-nowrap">
                      <thead className="bg-slate-100 border-b">
                         <tr><th className="p-3">รพ.สต.</th><th className="p-3">วันที่ส่ง</th><th className="p-3 text-center">สถานะการเบิก</th><th className="p-3 text-center">พิมพ์ใบเบิก?</th><th className="p-3 text-center">จัดการ</th></tr>
                      </thead>
                      <tbody>
                         {ctx.appDb.hospitals.map(h => {
                            const req = validReqs.find(r => r.hospitalId === h.hospital_id && r.month === adminFilterMonth && r.year === adminFilterYear);
                            const submitDate = req?.created_at ? new Date(req.created_at.seconds * 1000).toLocaleString('th-TH') : '-';
                            return (
                               <tr key={h.id} className="border-b hover:bg-slate-50">
                                  <td className="p-3 font-bold text-slate-700">{h.hospital_name}</td>
                                  <td className="p-3 text-slate-500">{submitDate}</td>
                                  <td className="p-3 text-center">
                                     {req ? (
                                        req.status === 'Completed' ? <span className="text-emerald-600 font-bold"><i className="fa-solid fa-check-circle"></i> อนุมัติแล้ว</span> : 
                                        req.status === 'Pending_Approval' ? <span className="text-red-500 font-bold"><i className="fa-solid fa-exclamation-circle"></i> ขอเบิกเพิ่ม (รออนุมัติ)</span> :
                                        <span className="text-amber-500 font-bold"><i className="fa-solid fa-clock"></i> ส่งบิลแล้ว</span>
                                     ) : <span className="text-slate-400">- ยังไม่ส่ง -</span>}
                                  </td>
                                  <td className="p-3 text-center">
                                     {req?.is_printed ? <span className="text-blue-600 font-bold"><i className="fa-solid fa-print"></i> พิมพ์แล้ว</span> : <span className="text-slate-300">-</span>}
                                  </td>
                                  <td className="p-3 text-center">
                                     {req ? (
                                        <button onClick={() => { ctx.setCurrentReqId(req.id); ctx.setCurrentView('view_req'); }} className="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-lg font-bold hover:bg-emerald-200 transition"><i className="fa-solid fa-folder-open mr-1"></i> เปิดดู</button>
                                     ) : (
                                        <button onClick={() => handleAdminUploadForHosp(h.hospital_id)} className="bg-indigo-100 text-indigo-700 px-4 py-1.5 rounded-lg font-bold hover:bg-indigo-200 transition"><i className="fa-solid fa-upload mr-1"></i> อัปโหลดแทน</button>
                                     )}
                                  </td>
                               </tr>
                            )
                         })}
                      </tbody>
                   </table>
                </div>
             </div>
          )}

          {isAdmin && adminSelectedCard === 'adjust' && (
             <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-fade-in">
                <div className="p-5 border-b font-bold text-slate-800 bg-slate-50"><i className="fa-solid fa-boxes-stacked text-purple-500 mr-2"></i> คำขอปรับปรุงสต๊อก (รอดำเนินการ)</div>
                <div className="p-6 text-center">
                   <p className="mb-4 text-slate-600">ตรวจสอบและอนุมัติคำขอปรับสต๊อกได้ที่หน้าจัดการฐานข้อมูล</p>
                   <button onClick={() => { ctx.setAdminActiveTab('approve_stock'); ctx.setCurrentView('config'); }} className="bg-purple-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-purple-700">ไปที่หน้าจัดการ</button>
                </div>
             </div>
          )}

          {(!isAdmin || (isAdmin && ['all','pending','completed'].includes(adminSelectedCard))) && (
             <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-fade-in">
               <div className="p-5 border-b border-slate-100 font-bold text-slate-800 bg-slate-50 flex justify-between items-center">
                  <span><i className="fa-solid fa-list-ul text-emerald-500 mr-2"></i> ประวัติการเติมยา {adminSelectedCard === 'pending' && <span className="text-red-500 ml-2">(แสดงเฉพาะที่รออนุมัติ)</span>}</span>
               </div>
               <table className="w-full text-left border-collapse">
                 <thead>
                   <tr className="border-b text-sm text-slate-500 bg-white">
                     <th className="p-4 font-medium">รหัสเอกสาร</th>
                     <th className="p-4 font-medium">ผู้ทำรายการ</th>
                     <th className="p-4 font-medium">รอบบิล</th>
                     <th className="p-4 font-medium">สถานะ</th>
                     <th className="p-4 font-medium text-right">เอกสาร</th>
                   </tr>
                 </thead>
                 <tbody>
                   {validReqs.filter(r => {
                      if (!isAdmin) return true;
                      if (adminSelectedCard === 'all') return true;
                      if (adminSelectedCard === 'pending') return r.status === 'Pending' || r.status === 'Pending_Approval';
                      if (adminSelectedCard === 'completed') return r.status === 'Completed';
                      return true;
                   }).slice(0,20).map(req => {
                     const isPendingHighlight = isAdmin && adminSelectedCard === 'pending';
                     return (
                        <tr key={req.id} className={`border-b transition cursor-pointer ${isPendingHighlight ? 'bg-amber-50 hover:bg-amber-100' : 'hover:bg-slate-50'}`} onClick={() => { ctx.setCurrentReqId(req.id); ctx.setCurrentView('view_req'); }}>
                          <td className="p-4 font-semibold text-slate-700">{req.id} {req.isInitialSetup && <span className="text-[10px] bg-amber-100 text-amber-700 px-1 rounded ml-1">Set-up</span>}</td>
                          <td className="p-4 text-slate-600">{req.created_by_name || '-'} {isAdmin && <span className="text-xs text-indigo-500 block">{ctx.appDb.hospitals.find(h=>h.hospital_id===req.hospitalId)?.hospital_name}</span>}</td>
                          <td className="p-4 text-slate-600">{req.month}/{req.year}</td>
                          <td className="p-4">
                            <span className={`px-3 py-1 rounded-lg text-xs font-bold ${req.status === 'Completed' ? 'bg-emerald-100 text-emerald-700' : req.status === 'Pending_Approval' ? 'bg-red-100 text-red-700 border border-red-300' : 'bg-amber-100 text-amber-700'}`}>
                              {req.status === 'Completed' ? 'สำเร็จ' : req.status === 'Pending_Approval' ? 'รออนุมัติเพิ่ม' : 'กำลังดำเนินการ'}
                            </span>
                          </td>
                          <td className="p-4 text-right">
                             {isAdmin && (req.status === 'Pending' || req.status === 'Pending_Approval') ? (
                                <button className="text-white bg-red-600 hover:bg-red-700 px-4 py-1.5 rounded-lg text-sm font-semibold transition shadow" onClick={(e) => { e.stopPropagation(); ctx.setCurrentReqId(req.id); ctx.setCurrentView('view_req'); }}>
                                  เปิดดู / จัดการ
                                </button>
                             ) : (
                                <button className="text-emerald-600 hover:text-emerald-800 bg-emerald-50 px-3 py-1.5 rounded-lg text-sm font-semibold transition">
                                  เปิดดู
                                </button>
                             )}
                          </td>
                        </tr>
                     )
                   })}
                   {validReqs.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">ไม่มีข้อมูลการเบิกยา</td></tr>}
                 </tbody>
               </table>
             </div>
          )}
        </div>
      );
    };

    const MyStockView = ({ ctx }) => {
      const hospId = ctx.currentUser.hospital_id;
      const isAdmin = ctx.currentUser.role === 'admin';
      const [searchTerm, setSearchTerm] = useState('');
      const [showModal, setShowModal] = useState(false);
      const [editItem, setEditItem] = useState(null);

      const drugList = useMemo(() => {
        if (!ctx.appDb) return [];
        const myPars = ctx.appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
        return myPars.map(p => {
          const drug = ctx.appDb.drugs.find(d => String(d.drug_id) === String(p.drug_id));
          const bal = ctx.appDb.balances.find(b => String(b.hospital_id) === String(hospId) && String(b.drug_id) === String(p.drug_id));
          return { 
             drugId: p.drug_id, name: drug ? drug.drug_name : 'N/A', unit: drug ? drug.unit_display_name : '', 
             packSize: drug ? Number(drug.pack_size) : 1, type: drug ? drug.type : '1', price: drug ? drug.price : 0,
             targetVMI: p.par_qty, currentBal: bal ? Number(bal.excess_balance) : 0 
          };
        }).sort(sortDrugs);
      }, [ctx.appDb, hospId]);

      const filteredList = drugList.filter(d => d.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(d.drugId).includes(searchTerm.toLowerCase()));

      let totalValue = 0;
      let typeCounts = {};
      Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).forEach(k => typeCounts[k] = 0);
      
      drugList.forEach(d => {
         const val = (d.currentBal / d.packSize) * d.price;
         totalValue += (val || 0);
         if(typeCounts[d.type] !== undefined) typeCounts[d.type]++;
      });

      const handleSaveAdjust = async (e) => {
         e.preventDefault();
         const fd = new FormData(e.target);
         const data = Object.fromEntries(fd);
         if(!data.reason.trim()) return ctx.showToast('ระบุเหตุผลด้วย', 'error');
         try {
            const batch = db.batch();
            const adjStatus = isAdmin ? 'Approved' : 'Pending';
            batch.set(db.collection('stock_adjustments').doc(), { hospital_id: hospId, drug_id: editItem.drugId, old_balance: editItem.currentBal, new_balance: Number(data.new_balance), reason: data.reason, user_name: ctx.currentUser.name, status: adjStatus, date: firebase.firestore.FieldValue.serverTimestamp() });
            if (isAdmin) batch.set(db.collection('current_excess').doc(`${hospId}_${editItem.drugId}`), { hospital_id: hospId, drug_id: editItem.drugId, excess_balance: Number(data.new_balance), last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
            await batch.commit();
            ctx.showToast(isAdmin ? 'ปรับสต๊อกเรียบร้อยแล้ว' : 'ส่งคำขอปรับสต๊อกแล้ว รออนุมัติ');
            setShowModal(false); await ctx.refreshData();
         } catch(err) { ctx.showToast(err.message, 'error'); }
      };

      const handleDelete = async (drugId) => {
         try {
            const batch = db.batch();
            batch.delete(db.collection('config_par').doc(`${hospId}_${drugId}`));
            batch.delete(db.collection('current_excess').doc(`${hospId}_${drugId}`));
            await batch.commit();
            ctx.showToast('นำออกจากคลังเรียบร้อย'); await ctx.refreshData();
         } catch(err) { ctx.showToast(err.message, 'error'); }
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm p-4 lg:p-8 animate-fade-in relative min-h-[80vh]">
          <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
            <div>
               <h2 className="text-2xl font-bold text-slate-800"><i className="fa-solid fa-boxes-stacked text-emerald-500 mr-2"></i> คลังยาของฉัน (My Stock)</h2>
               <p className="text-slate-500 mt-1">บริหารจัดการรายการยาและเวชภัณฑ์ใน รพ.สต.</p>
            </div>
            <button onClick={() => ctx.setCurrentView('dashboard')} className="text-slate-400 hover:text-slate-600 bg-slate-100 px-4 py-2 rounded-xl font-medium">กลับหน้าหลัก</button>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
             <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                <div className="text-xs font-bold text-indigo-500 uppercase">รวมรายการทั้งหมด</div>
                <div className="text-2xl font-black text-indigo-700">{drugList.length} รายการ</div>
             </div>
             <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                <div className="text-xs font-bold text-emerald-500 uppercase">มูลค่าคงคลังโดยประมาณ</div>
                <div className="text-2xl font-black text-emerald-700">฿ {totalValue.toLocaleString(undefined, {minimumFractionDigits:2})}</div>
             </div>
             {Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).slice(0,2).map(k => (
                <div key={k} className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                   <div className="text-xs font-bold text-slate-500 uppercase">หมวด {(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[k]}</div>
                   <div className="text-xl font-bold text-slate-700">{typeCounts[k]} รายการ</div>
                </div>
             ))}
          </div>

          <div className="flex flex-wrap justify-between items-center mb-4 gap-4">
             <div className="relative w-full max-w-md">
               <i className="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-slate-400"></i>
               <input type="text" placeholder="ค้นหาชื่อหรือรหัสยา..." className="w-full pl-10 pr-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
             </div>
             <button onClick={() => { setEditItem({ isNew: true }); setShowModal(true); }} className="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:scale-105 transition shrink-0"><i className="fa-solid fa-plus mr-2"></i> เพิ่มยาเข้าคลัง</button>
          </div>

          <div className="overflow-x-auto border border-slate-200 rounded-xl max-h-[650px] overflow-y-auto w-full">
            <table className="w-full text-left border-collapse whitespace-nowrap text-[13px]">
              <thead className="sticky top-0 z-10 shadow-sm bg-slate-100 text-slate-700">
                <tr>
                  <th className="p-3 font-bold border-b">รหัส</th>
                  <th className="p-3 font-bold border-b">ชื่อรายการยา/เวชภัณฑ์</th>
                  <th className="p-3 font-bold border-b">หมวดหมู่</th>
                  <th className="p-3 text-center font-bold border-b">ขนาดบรรจุ</th>
                  <th className="p-3 text-center font-bold border-b text-blue-700 bg-blue-50">Target (VMI)</th>
                  <th className="p-3 text-center font-bold border-b text-amber-700 bg-amber-50">เครดิตค้าง (หน่วยย่อย)</th>
                  <th className="p-3 text-center font-bold border-b">จัดการ</th>
                </tr>
              </thead>
              <tbody>
                {filteredList.map((item) => (
                  <tr key={item.drugId} className="border-b border-slate-200 hover:bg-slate-50 transition">
                    <td className="p-3 font-mono text-slate-500">{item.drugId}</td>
                    <td className="p-3 font-bold text-slate-800">{item.name}</td>
                    <td className="p-3 text-slate-600">{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[item.type]}</td>
                    <td className="p-3 text-center text-slate-600">{item.packSize} {item.unit}</td>
                    <td className="p-3 text-center font-bold text-blue-600 bg-blue-50/30">{item.targetVMI}</td>
                    <td className="p-3 text-center font-extrabold text-amber-600 bg-amber-50/30 text-[15px]">{item.currentBal}</td>
                    <td className="p-3 text-center space-x-2">
                       <button onClick={() => { setEditItem({ ...item, isNew: false }); setShowModal(true); }} className="bg-slate-200 text-slate-700 hover:bg-amber-400 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition"><i className="fa-solid fa-sliders mr-1"></i> ปรับสต๊อก</button>
                       <button onClick={() => ctx.setConfirmDialog({title:'ยืนยันนำออก', message:'คุณต้องการลบยานี้ออกจากคลัง รพ.สต. ใช่หรือไม่? (ประวัติการเบิกจะไม่หายไป)', iconColor:'text-red-500', confirmBtnClass:'bg-red-500 hover:bg-red-600', onConfirm: ()=>handleDelete(item.drugId)})} className="bg-slate-200 text-slate-600 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition"><i className="fa-solid fa-trash"></i></button>
                    </td>
                  </tr>
                ))}
                {filteredList.length === 0 && <tr><td colSpan="7" className="p-8 text-center text-slate-400">ไม่มีข้อมูลในคลัง</td></tr>}
              </tbody>
            </table>
          </div>

          {showModal && editItem && (
             <Modal title={editItem.isNew ? 'เพิ่มยาเข้าคลัง' : 'ขอปรับปรุงสต๊อก (Adjust)'} isOpen={true} onClose={()=>setShowModal(false)}>
                {editItem.isNew ? (
                   <form onSubmit={async (e) => {
                      e.preventDefault();
                      const fd = new FormData(e.target); const drugId = fd.get('drug_id'); const target = Number(fd.get('target')); const current = Number(fd.get('current'));
                      if(!drugId) return;
                      const batch = db.batch();
                      batch.set(db.collection('config_par').doc(`${hospId}_${drugId}`), { hospital_id: hospId, drug_id: drugId, par_qty: target });
                      batch.set(db.collection('current_excess').doc(`${hospId}_${drugId}`), { hospital_id: hospId, drug_id: drugId, excess_balance: current, last_updated: firebase.firestore.FieldValue.serverTimestamp() });
                      await batch.commit(); ctx.showToast('เพิ่มยาลงคลังสำเร็จ'); setShowModal(false); ctx.refreshData();
                   }} className="space-y-4">
                      <div><label className="text-sm font-bold text-slate-600 mb-1 block">เลือกรหัสยาในระบบ</label>
                         <input list="add-drug-list" name="drug_id" className="w-full border p-3 rounded-xl outline-none" required placeholder="พิมพ์ค้นหา..."/>
                         <datalist id="add-drug-list">{ctx.appDb.drugs.map(d=><option key={d.drug_id} value={d.drug_id}>{d.drug_name}</option>)}</datalist>
                      </div>
                      <div className="flex gap-4">
                         <div className="w-1/2"><label className="text-sm font-bold text-slate-600 mb-1 block">Target VMI ที่ต้องการ</label><input type="number" name="target" defaultValue="0" className="w-full border p-3 rounded-xl outline-none" /></div>
                         <div className="w-1/2"><label className="text-sm font-bold text-slate-600 mb-1 block">เครดิตตั้งต้น (หน่วยย่อย)</label><input type="number" name="current" defaultValue="0" className="w-full border p-3 rounded-xl outline-none" /></div>
                      </div>
                      <div className="pt-4 flex justify-end"><button type="submit" className="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold">บันทึก</button></div>
                   </form>
                ) : (
                   <form onSubmit={handleSaveAdjust} className="space-y-4">
                      <div><label className="text-sm font-bold text-slate-600 mb-1 block">รายการยา</label><div className="bg-slate-100 p-3 rounded-xl font-bold">{editItem.name} <span className="font-normal text-xs ml-1">[{editItem.drugId}]</span></div></div>
                      <div className="flex gap-4">
                         <div className="w-1/2"><label className="text-sm font-bold text-slate-600 mb-1 block">ยอดเครดิตเดิมในระบบ</label><input disabled value={editItem.currentBal} className="w-full border p-3 rounded-xl bg-slate-50 text-slate-400 font-bold" /></div>
                         <div className="w-1/2"><label className="text-sm font-bold text-amber-600 mb-1 block">ระบุเครดิตใหม่ (หน่วยย่อย)</label><input type="number" name="new_balance" required className="w-full border-2 border-amber-400 p-3 rounded-xl outline-none focus:border-amber-600 font-bold text-amber-700" /></div>
                      </div>
                      <div><label className="text-sm font-bold text-slate-600 mb-1 block">เหตุผลการขอปรับ</label><textarea name="reason" required rows="2" className="w-full border p-3 rounded-xl outline-none" placeholder="เช่น ยาเสื่อมสภาพ, คีย์เบิกผิดรอบที่แล้ว..."></textarea></div>
                      <div className="pt-4 flex justify-end"><button type="submit" className="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold">ส่งคำขอ</button></div>
                   </form>
                )}
             </Modal>
          )}
        </div>
      );
    };

    const CreateReqView = ({ ctx }) => {
      const hospId = ctx.targetUploadHosp || ctx.currentUser.hospital_id; 
      const isAdmin = ctx.currentUser.role === 'admin';
      const today = new Date();
      const currentMonth = today.getMonth() + 1;
      const currentYear = today.getFullYear();
      
      const isOutOfPeriod = !isAdmin && (today.getDate() < 20 || today.getDate() > 31);
      
      const [acknowledged, setAcknowledged] = useState(false);
      const [searchTerm, setSearchTerm] = useState(''); 
      const [filterType, setFilterType] = useState('all'); 
      const [showUsedOnly, setShowUsedOnly] = useState(false); 
      
      const [excelFile, setExcelFile] = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);

      const [showImportModal, setShowImportModal] = useState(false);
      const [importData, setImportData] = useState({ hospInfo: '', periodInfo: '', isDateValid: true, items: [] });
      
      const [manualAddSearch, setManualAddSearch] = useState('');

      const [items, setItems] = useState(() => {
        if (!ctx.appDb || !ctx.appDb.parLevels) return [];
        
        let existingReqItems = [];
        if (ctx.editReqId) {
           const reqToEdit = ctx.appDb.requisitions.find(r => r.id === ctx.editReqId);
           if (reqToEdit) existingReqItems = reqToEdit.items || [];
        }

        const myPars = ctx.appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
        const generatedList = myPars.map(par => {
          const drug = ctx.appDb.drugs.find(d => String(d.drug_id) === String(par.drug_id));
          const bal = ctx.appDb.balances.find(b => String(b.hospital_id) === String(hospId) && String(b.drug_id) === String(par.drug_id));
          
          const existingItem = existingReqItems.find(ex => ex.drugId === par.drug_id);
          const prevExcess = bal ? Number(bal.excess_balance) : 0;
          const isUnpacked = drug ? !!drug.unpacked : false;
          const type = drug ? drug.type : '1';
          const price = drug ? drug.price : 0;
          const packSize = drug ? Number(drug.pack_size) : 1;
          
          let m_usages = [];
          for(let i=1; i<=6; i++) {
            let m = currentMonth - i; let y = currentYear;
            if(m <= 0) { m += 12; y -= 1; }
            const oldReq = ctx.appDb.requisitions.find(r => r.hospitalId === hospId && r.month === m && r.year === y && r.id !== ctx.editReqId);
            let usage = 0;
            if(oldReq && oldReq.items) {
              const oldItem = oldReq.items.find(it => it.drugId === par.drug_id);
              if(oldItem) usage = Number(oldItem.usage);
            }
            m_usages.push(usage);
          }
          
          // คำนวณใหม่ เอาเฉพาะเดือนที่เบิก
          const nonZero = m_usages.filter(u => u > 0);
          const count = nonZero.length || 1;
          const totalPast = nonZero.reduce((a,b)=>a+b, 0);
          const meanPast = totalPast / count; 
          const variance = nonZero.reduce((acc, val) => acc + Math.pow(val - meanPast, 2), 0) / (count === 1 ? 1 : count - 1);
          const SD = Math.sqrt(variance || 0);
          const targetVMI = Math.ceil(meanPast + (1.645 * SD));

          const isNewDrug = count === 1 && totalPast === 0 && !existingItem; // ไม่มีประวัติ

          if (existingItem) {
             return { ...existingItem, targetVMI, isUnpacked, avgUsage: meanPast.toFixed(2), type, price, requestMore: existingItem.requestMore || 0, isNewDrug };
          }

          return {
            drugId: par.drug_id, name: drug ? drug.drug_name : 'N/A', unit: drug ? drug.unit_display_name : '',
            packSize, isUnpacked, type, price, isNewDrug,
            avgUsage: meanPast.toFixed(2), prevExcess, 
            usage: 0, targetVMI, netNeed: 0, dispensePack: 0, dispenseQty: 0, newExcess: prevExcess, isSpecial: false,
            requestMore: 0
          };
        });

        existingReqItems.forEach(ex => {
           if(!generatedList.find(g => g.drugId === ex.drugId)) generatedList.push({...ex, requestMore: ex.requestMore || 0});
        });
        return generatedList.sort(sortDrugs);
      });

      const handleJHCISUpload = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        setExcelFile(file); 
        setIsProcessing(true);

        const processData = (dataRows) => {
          let hospInfo = ""; let periodInfo = ""; let isDateValid = true; let extracted = [];
          dataRows.forEach(row => {
            const rowArr = Array.isArray(row) ? row : Object.values(row);
            const compacted = rowArr.map(c => String(c || '').trim()).filter(c => c !== '');
            if (compacted.length === 0) return;
            if (compacted.some(c => c.includes('สถานบริการ'))) hospInfo = compacted.find(c => c.includes('สถานบริการ'));
            if (compacted.some(c => c.includes('ระหว่างวันที่'))) {
               periodInfo = compacted.find(c => c.includes('ระหว่างวันที่')) || compacted.join(' ');
               const dateRegex = /(\d{1,2})\s*([ก-๙\.]+)\s*(\d{4})\s*-\s*(\d{1,2})\s*([ก-๙\.]+)\s*(\d{4})/;
               const match = periodInfo.match(dateRegex);
               if (match) {
                  const startDay = parseInt(match[1]); const endDay = parseInt(match[4]);
                  if (startDay < 20 && endDay < 20) isDateValid = false;
               }
            }
            if (compacted.length >= 6 && /^\d+\.?$/.test(compacted[0])) {
               const rawName = compacted[1]; const usageStr = compacted[6]; 
               const usageNum = parseFloat(usageStr?.replace(/,/g, ''));
               if (!isNaN(usageNum) && usageNum > 0 && rawName && !rawName.includes('รวม')) {
                   extracted.push({ id: Math.random().toString(), rawName, usage: usageNum, mappedDrugId: '' });
               }
            }
          });

          const normalize = (str) => String(str).toLowerCase().replace(/[\s\-\.\(\)]/g, '');
          extracted = extracted.map(item => {
            const normRaw = normalize(item.rawName);
            let mappedId = '';
            let matched = ctx.appDb.drugs.find(d => {
               const normSys = normalize(d.drug_name);
               const fuzzyArr = d.fuzzy ? String(d.fuzzy).split(',').map(normalize) : [];
               return normSys === normRaw || fuzzyArr.includes(normRaw);
            });
            if (!matched) {
              matched = ctx.appDb.drugs.find(d => {
                 const normSys = normalize(d.drug_name);
                 const fuzzyArr = d.fuzzy ? String(d.fuzzy).split(',').map(normalize) : [];
                 return normSys.includes(normRaw) || normRaw.includes(normSys) || fuzzyArr.some(f => normRaw.includes(f));
              });
            }
            if (matched) mappedId = mappedId || matched.drug_id; // Default to first match
            return { ...item, mappedDrugId: mappedId };
          });

          setImportData({ hospInfo, periodInfo, isDateValid, items: extracted });
          setShowImportModal(true);
          setIsProcessing(false);
        };

        if (file.name.endsWith('.csv')) {
          Papa.parse(file, { header: false, skipEmptyLines: true, complete: function(results) { processData(results.data); } });
        } else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
          const reader = new FileReader();
          reader.onload = (evt) => {
            const bstr = evt.target.result; const wb = XLSX.read(bstr, {type:'binary'});
            const wsname = wb.SheetNames[0]; const ws = wb.Sheets[wsname];
            const data = XLSX.utils.sheet_to_json(ws, {header:1});
            processData(data);
          };
          reader.readAsBinaryString(file);
        } else { ctx.showToast("รองรับเฉพาะไฟล์ .csv, .xls, .xlsx", "error"); setIsProcessing(false); e.target.value = null; }
      };

      const updateRow = (drugIdToUpdate, usageVal, requestMoreVal = null) => {
        const newItems = items.map(item => {
          if (item.drugId === drugIdToUpdate) {
            const usage = usageVal !== null ? (parseInt(usageVal) || 0) : item.usage;
            const requestMore = requestMoreVal !== null ? (parseInt(requestMoreVal) || 0) : item.requestMore;
            
            const row = { ...item, usage, requestMore };
            let netNeed = row.targetVMI - row.prevExcess;
            if (netNeed <= 0) netNeed = 0;
            
            let totalNeedToDispense = netNeed + requestMore;

            if (totalNeedToDispense <= 0) {
               row.netNeed = 0; row.dispensePack = 0; row.dispenseQty = 0; row.newExcess = row.prevExcess - usage; 
            } else {
               row.netNeed = netNeed; 
               row.dispensePack = Math.ceil(totalNeedToDispense / row.packSize); 
               row.dispenseQty = row.dispensePack * row.packSize; 
               row.newExcess = row.prevExcess + row.dispenseQty - usage;
            }
            return row;
          }
          return item;
        });
        setItems(newItems);
      };

      const handleManualAdd = () => {
         if(!manualAddSearch) return;
         const drug = ctx.appDb.drugs.find(d => d.drug_id === manualAddSearch);
         if(!drug) return ctx.showToast('ไม่พบรหัสยานี้ในระบบ', 'error');
         if(items.find(i => i.drugId === drug.drug_id)) return ctx.showToast('มีรายการนี้ในใบเบิกอยู่แล้ว', 'error');

         const newItem = {
            drugId: drug.drug_id, name: drug.drug_name, unit: drug.unit_display_name,
            packSize: Number(drug.pack_size), isUnpacked: !!drug.unpacked, type: drug.type, price: drug.price,
            avgUsage: 0, prevExcess: 0, usage: 0, targetVMI: 0, netNeed: 0, dispensePack: 0, dispenseQty: 0, newExcess: 0,
            isSpecial: false, requestMore: 0, isNewDrug: true
         };
         setItems([newItem, ...items].sort(sortDrugs)); setManualAddSearch(''); ctx.showToast(`เพิ่ม ${drug.drug_name} ลงในใบเบิกแล้ว`);
      };

      const executeSubmit = async () => {
         const processSave = async (fileUrl) => {
            const skipped = importData.items.filter(i => i.mappedDrugId === '').map(i => ({ rawName: i.rawName, usage: i.usage }));
            
            let requiresApproval = false;
            const sanitizedItems = items.map(item => {
               if (item.requestMore > 0 && item.type !== '32') requiresApproval = true;
               return {
                  drugId: item.drugId || "", name: item.name || "N/A", unit: item.unit || "",
                  packSize: item.packSize || 1, isUnpacked: !!item.isUnpacked, type: item.type || '1', price: item.price || 0,
                  avgUsage: item.avgUsage || 0, prevExcess: item.prevExcess || 0,
                  usage: item.usage || 0, vmiTarget: item.targetVMI || 0, netNeed: item.netNeed || 0,
                  dispensePack: item.dispensePack || 0, dispenseQty: item.dispenseQty || 0, newExcess: item.newExcess || 0,
                  isSpecial: false, requestMore: item.requestMore || 0
               };
            });

            const finalStatus = isAdmin ? 'Completed' : (requiresApproval ? 'Pending_Approval' : 'Completed');

            if (ctx.editReqId) {
               const payload = { items: sanitizedItems, skipped_items: skipped, updated_at: firebase.firestore.FieldValue.serverTimestamp(), status: finalStatus };
               if (fileUrl) payload.excel_url = fileUrl; 
               await db.collection('requisitions').doc(ctx.editReqId).update(payload);
               
               const batch = db.batch();
               importData.items.filter(i => i.mappedDrugId !== '').forEach(item => {
                  const drugRef = db.collection('master_drugs').doc(item.mappedDrugId);
                  const drugObj = ctx.appDb.drugs.find(d => d.drug_id === item.mappedDrugId);
                  if(drugObj && !drugObj.fuzzy?.includes(item.rawName)) {
                     batch.update(drugRef, { fuzzy: drugObj.fuzzy ? `${drugObj.fuzzy},${item.rawName}` : item.rawName });
                  }
               });
               if(finalStatus === 'Completed') {
                  sanitizedItems.forEach(it => batch.set(db.collection('current_excess').doc(`${hospId}_${it.drugId}`), { hospital_id: hospId, drug_id: it.drugId, excess_balance: it.newExcess, last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }));
               }
               await batch.commit();
               ctx.showToast(requiresApproval && !isAdmin ? 'อัปเดตสำเร็จ (รอแอดมินอนุมัติยอดเบิกเพิ่ม)' : 'อัปเดตใบเบิกสำเร็จ');
            } else {
               const newId = `REQ-${currentYear}-${String(currentMonth).padStart(2, '0')}-${Math.floor(Math.random()*1000).toString().padStart(3, '0')}`;
               const batch = db.batch();
               const reqRef = db.collection('requisitions').doc(newId);
               batch.set(reqRef, {
                 hospitalId: hospId, month: currentMonth, year: currentYear, status: finalStatus, is_printed: false,
                 excel_url: fileUrl || "", items: sanitizedItems, skipped_items: skipped, created_by_name: ctx.currentUser?.name || 'System', created_at: firebase.firestore.FieldValue.serverTimestamp() 
               });
               importData.items.filter(i => i.mappedDrugId !== '').forEach(item => {
                  const drugRef = db.collection('master_drugs').doc(item.mappedDrugId);
                  const drugObj = ctx.appDb.drugs.find(d => d.drug_id === item.mappedDrugId);
                  if(drugObj && !drugObj.fuzzy?.includes(item.rawName)) {
                     batch.update(drugRef, { fuzzy: drugObj.fuzzy ? `${drugObj.fuzzy},${item.rawName}` : item.rawName });
                  }
               });
               if(finalStatus === 'Completed') {
                  sanitizedItems.forEach(it => batch.set(db.collection('current_excess').doc(`${hospId}_${it.drugId}`), { hospital_id: hospId, drug_id: it.drugId, excess_balance: it.newExcess, last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }));
               }
               await batch.commit();
               ctx.showToast(requiresApproval && !isAdmin ? 'ส่งข้อมูลสำเร็จ (รอแอดมินอนุมัติยอดเบิกเพิ่ม)' : 'อนุมัติจ่ายอัตโนมัติสำเร็จ');
            }
            await ctx.refreshData(); ctx.setEditReqId(null); ctx.setTargetUploadHosp(null); ctx.setCurrentView('dashboard');
         };

         if (excelFile) {
            const reader = new FileReader();
            reader.onload = async (event) => {
               const base64Str = event.target.result.split(',')[1];
               let fileUrl = "";
               if(GAS_DRIVE_URL.includes('/exec')) {
               const uploadRes = await fetch(GAS_DRIVE_URL, {
                  method: 'POST',
                  body: JSON.stringify({ filename: `Rxfill_${hospId}_${currentMonth}_${currentYear}.xlsx`, mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', base64: base64Str })
               });
               const uploadData = await uploadRes.json();
               if(uploadData.status === 'success') fileUrl = uploadData.url || "";
               }
               processSave(fileUrl);
            };
            reader.readAsDataURL(excelFile);
         } else { processSave(""); }
      };

      const handleSubmitPreCheck = () => {
         if(!excelFile && !ctx.editReqId) return ctx.showToast('กรุณาแนบไฟล์ รบ.301 (.xlsx) เพื่อใช้เป็นหลักฐานประกอบการเบิก', 'error');
         if(items.filter(i => i.usage > 0 || i.requestMore > 0).length === 0) return ctx.showToast('ไม่มีรายการเบิกใดๆ กรุณากรอกยอด', 'error');
         
         ctx.setConfirmDialog({
            title: 'ยืนยันการส่งใบเบิก?',
            message: 'หากมียาที่ขอเบิกเพิ่มนอกเหนือจากยอดคำนวณ (ยกเว้นเวชภัณฑ์) จะต้องรอการอนุมัติ ยืนยันการส่งหรือไม่?',
            icon: 'fa-paper-plane',
            confirmText: 'ส่งใบเบิก',
            onConfirm: () => {
               setIsSubmitting(true);
               executeSubmit().catch(e => { ctx.showToast(e.message, 'error'); setIsSubmitting(false); });
            }
         });
      };

      const filteredItems = items.filter(item => {
        const matchSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(item.drugId).includes(searchTerm.toLowerCase());
        const matchType = filterType === 'all' ? true : filterType === item.type;
        const matchUsage = showUsedOnly ? item.usage > 0 || item.requestMore > 0 : true;
        return matchSearch && matchType && matchUsage;
      });

      if (isOutOfPeriod && !acknowledged && !ctx.editReqId) {
        return (
          <div className="bg-white rounded-3xl p-10 text-center shadow-sm max-w-2xl mx-auto mt-10 border border-amber-200 animate-fade-in">
            <i className="fa-solid fa-triangle-exclamation text-6xl text-amber-500 mb-6"></i>
            <h2 className="text-2xl font-bold text-slate-800 mb-3">แจ้งเตือน: นอกช่วงเวลาเบิกยา</h2>
            <p className="text-slate-500 mb-8 text-lg">ระบบเปิดให้ทำเรื่องเติมยาเฉพาะ <span className="font-bold text-slate-700">วันที่ 20 ถึง 31 ของเดือน</span></p>
            <div className="flex flex-col sm:flex-row justify-center gap-4">
              <button onClick={() => { ctx.setTargetUploadHosp(null); ctx.setCurrentView('dashboard'); }} className="bg-slate-100 text-slate-600 px-6 py-3 rounded-xl font-bold hover:bg-slate-200 transition">กลับหน้าหลัก</button>
              <button onClick={() => setAcknowledged(true)} className="bg-gradient-to-r from-amber-400 to-orange-500 text-white px-6 py-3 rounded-xl font-bold hover:scale-105 transition shadow-lg shadow-amber-200">เข้าสู่โหมดฉุกเฉิน</button>
            </div>
          </div>
        );
      }

      return (
        <div className="bg-white rounded-2xl shadow-sm p-4 lg:p-8 border border-slate-100 animate-fade-in relative min-h-[80vh]">
          {isProcessing && <FullScreenSpinner />}
          <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
            <div>
              <h2 className="text-2xl font-bold text-slate-800">
                {ctx.editReqId ? `แก้ไขใบเบิกยารอบ ${currentMonth}/${currentYear}` : `ทำเรื่องเติมยารอบใหม่ (${currentMonth}/${currentYear})`}
              </h2>
              <p className="text-slate-500 mt-1">อัปโหลดไฟล์ Excel รบ.301 เพื่อดึงยอดใช้รายเดือนเข้าสู่ตาราง</p>
            </div>
            <button onClick={() => {ctx.setEditReqId(null); ctx.setTargetUploadHosp(null); ctx.setCurrentView('dashboard');}} className="text-slate-400 hover:text-slate-600 bg-slate-100 px-4 py-2 rounded-xl font-medium">ยกเลิก</button>
          </div>

          <div className="bg-indigo-50 p-6 rounded-2xl border border-indigo-200 mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
            <div>
              <h3 className="font-bold text-indigo-800 text-lg flex items-center"><i className="fa-solid fa-file-excel mr-2"></i> ดึงยอดใช้จากไฟล์ รบ.301 (Excel)</h3>
              <p className="text-sm text-indigo-600 mt-1">อัปโหลดไฟล์สรุปรวมรายเดือน ระบบจะดึงยอดจ่ายมาคีย์ลงตารางให้อัตโนมัติ</p>
              {excelFile && <p className="text-sm font-bold text-emerald-600 mt-2"><i className="fa-solid fa-check"></i> แนบสำเร็จ: {excelFile.name}</p>}
            </div>
            <label className="bg-white border-2 border-indigo-600 text-indigo-700 px-6 py-3 rounded-xl cursor-pointer hover:bg-indigo-100 transition flex items-center font-bold shrink-0 shadow-lg shadow-indigo-100">
              <i className="fa-solid fa-upload mr-2"></i> เลือกไฟล์ .xlsx / .csv
              <input type="file" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" className="hidden" onChange={handleJHCISUpload} />
            </label>
          </div>

          <div className="flex flex-col md:flex-row gap-4 mb-6 items-center bg-slate-50 p-4 rounded-xl border border-slate-200">
             <div className="font-bold text-slate-700 w-full md:w-auto shrink-0"><i className="fa-solid fa-plus-circle text-blue-500 mr-2"></i> เพิ่มยาที่ไม่มีใน รบ.301</div>
             <div className="flex flex-grow w-full gap-2">
               <input list="all-drugs" className="border border-slate-300 rounded-lg p-2 flex-grow outline-none focus:border-blue-500" placeholder="พิมพ์ชื่อหรือรหัส..." value={manualAddSearch} onChange={e=>setManualAddSearch(e.target.value)} />
               <datalist id="all-drugs">
                  {ctx.appDb.drugs.map(d => <option key={d.drug_id} value={d.drug_id}>{d.drug_name} [{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[d.type]}]</option>)}
               </datalist>
               <button onClick={handleManualAdd} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700">เพิ่ม</button>
             </div>
          </div>

          <div className="flex justify-between items-center mb-4 border-b pb-4">
             <div className="flex gap-2 shrink-0 bg-slate-100 p-1 rounded-xl overflow-x-auto w-full md:w-auto">
               <button onClick={()=>setFilterType('all')} className={`px-4 py-2 rounded-lg font-bold text-sm transition ${filterType==='all'?'bg-white shadow text-emerald-700':'text-slate-500 hover:bg-slate-200'}`}>ทั้งหมด</button>
               {Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).map(k=>(
                  <button key={k} onClick={()=>setFilterType(k)} className={`px-4 py-2 rounded-lg font-bold text-sm transition ${filterType===k?'bg-white shadow text-emerald-700':'text-slate-500 hover:bg-slate-200'}`}>{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[k]}</button>
               ))}
             </div>
             <label className="flex items-center gap-2 cursor-pointer bg-amber-50 px-4 py-2 rounded-xl border border-amber-200 text-amber-800 font-bold shrink-0">
               <input type="checkbox" className="w-5 h-5 accent-amber-500" checked={showUsedOnly} onChange={e=>setShowUsedOnly(e.target.checked)} /> เฉพาะยอดเคลื่อนไหว
             </label>
          </div>

          <div className="overflow-x-auto mb-10 w-full rounded-xl border border-slate-200 bg-white shadow-sm pb-10">
            <table className="w-full text-left border-collapse whitespace-nowrap text-[13px]">
              <thead className="sticky top-0 z-20 shadow-md">
                <tr className="bg-slate-800 text-white border-b-4 border-slate-700">
                  <th className="p-3 font-bold">รายการยา/เวชภัณฑ์</th>
                  <th className="p-3 text-center border-l border-slate-600 w-16">จำนวน<br/>ต่อหน่วย</th>
                  <th className="p-3 text-center border-l border-slate-600 w-16">หน่วย<br/>ย่อย</th>
                  <th className="p-3 text-center border-l border-slate-600 bg-slate-700">เครดิตค้าง<br/>แพ็ค(ย่อย)</th>
                  <th className="p-3 text-center border-l border-slate-600">ยอดใช้ 1 เดือน<br/><span className="font-normal text-[10px] text-amber-300">(หน่วยย่อยสุด)</span></th>
                  <th className="p-3 text-center border-l border-slate-600 bg-slate-700">ยอดควรมี (Target)<br/><span className="font-normal text-[10px] text-emerald-300">Avg+(1.645*SD)</span></th>
                  <th className="p-3 text-center border-l border-slate-600 text-amber-300 font-bold">ยอดต้องเติม<br/>เต็มหน่วย</th>
                  <th className="p-3 text-center border-l border-slate-600 bg-indigo-900 text-white font-bold w-24">ขอเพิ่ม</th>
                  <th className="p-3 text-center border-l border-slate-600 bg-emerald-900 text-emerald-300 font-extrabold text-[14px]">ยอดเบิกรอบนี้<br/>แพ็ค(ย่อย)</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {filteredItems.map((item) => {
                  return (
                    <tr key={item.drugId} className="hover:bg-amber-50/30 transition">
                      <td className="p-3 font-bold text-slate-800">
                         {item.name} 
                         <span className="text-xs font-normal text-slate-400 ml-1">[{item.drugId}]</span>
                         {item.isNewDrug && <span className="ml-1 text-[10px] bg-red-100 text-red-600 px-1 rounded font-bold">ยาใหม่</span>}
                         {item.requestMore > 0 && <span className="text-xs text-blue-600 font-bold ml-2">(ขอเพิ่ม)</span>}
                      </td>
                      <td className="p-3 text-center font-bold text-slate-600 border-l border-slate-100">{item.packSize}</td>
                      <td className="p-3 text-center text-slate-500 border-l border-slate-100">{item.unit}</td>
                      <td className="p-3 text-center text-blue-600 font-bold bg-blue-50/20 border-l border-slate-100">{formatQty(item.prevExcess, item.packSize)}</td>
                      <td className="p-3 bg-amber-50/50 border-l border-slate-100 relative text-center">
                        <input type="number" min="0" className="w-20 border-b-2 border-amber-300 bg-transparent p-1 text-center font-bold text-amber-900 outline-none focus:bg-white focus:border-amber-600 transition" value={item.usage || ''} onChange={e => updateRow(item.drugId, e.target.value, null)} placeholder="0" />
                      </td>
                      <td className="p-3 text-center font-bold text-slate-600 border-l border-slate-100 bg-slate-50/50">{formatQty(item.targetVMI, item.packSize)}</td>
                      <td className="p-3 text-center font-bold text-slate-600 border-l border-slate-100">{formatQty(item.netNeed, item.packSize)}</td>
                      <td className="p-3 bg-indigo-50/50 border-l border-slate-100 text-center tooltip-container relative">
                        <input type="number" min="0" className="w-16 border-b-2 border-indigo-300 bg-transparent p-1 text-center font-bold text-indigo-900 outline-none focus:bg-white focus:border-indigo-600 transition" value={item.requestMore || ''} onChange={e => updateRow(item.drugId, null, e.target.value)} placeholder="+0" />
                        {item.packSize > 1 && item.requestMore > 0 && (
                           <div className="tooltip-content hidden absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 w-max px-2 py-1 bg-slate-800 text-white text-[10px] rounded shadow-lg">
                              คุณระบุ {item.requestMore} = เบิกเพิ่มรวม {item.requestMore * item.packSize} หน่วย
                           </div>
                        )}
                      </td>
                      <td className="p-3 text-center font-black text-emerald-700 bg-emerald-50/30 border-l border-slate-100 text-[15px]">
                         {formatQty(item.dispenseQty, item.packSize)}
                      </td>
                    </tr>
                  )
                })}
                {filteredItems.length === 0 && (
                  <tr><td colSpan="9" className="p-12 text-center text-slate-400 font-bold">ไม่พบรายการยา</td></tr>
                )}
              </tbody>
            </table>
          </div>

          <div className="flex justify-end mt-4">
            <button onClick={handleSubmitPreCheck} disabled={isSubmitting} className="bg-gradient-main text-white px-10 py-5 rounded-xl font-black shadow-2xl hover:scale-105 transition disabled:opacity-50 text-xl flex items-center shadow-emerald-200 w-full md:w-auto justify-center">
               {isSubmitting ? <i className="fa-solid fa-circle-notch fa-spin mr-3"></i> : <i className="fa-solid fa-paper-plane mr-3"></i>}
               {isSubmitting ? 'กำลังส่งข้อมูล...' : 'ส่งใบเบิกเข้าระบบ VMI'}
            </button>
          </div>
        </div>
      );
    };

    const ViewReqView = ({ ctx }) => {
      const req = ctx.appDb.requisitions.find(r => r.id === ctx.currentReqId);
      const [isApproving, setIsApproving] = useState(false);
      const [editableItems, setEditableItems] = useState(req?.items || []);
      const [printMode, setPrintMode] = useState('req'); 
      
      useEffect(() => { if(req) setEditableItems(req.items); }, [req]);
      if(!req) return null;
      
      const isAdmin = ctx.currentUser.role === 'admin';
      const isPending = req.status === 'Pending' || req.status === 'Pending_Approval';
      const isApprovalRequired = req.status === 'Pending_Approval';
      const hosp = ctx.appDb.hospitals.find(h => h.hospital_id === req.hospitalId);
      const userInfo = ctx.appDb.usersList.find(u => u.name === req.created_by_name) || { position: 'เจ้าหน้าที่', role: '' };
      const hospNameClean = hosp?.hospital_name?.replace('รพ.สต.', '') || '';

      const { fiscalYear, term } = getFiscalInfo(req.month, req.year);

      const handleAdjust = (idx, val) => {
        const qty = parseInt(val) || 0; const newItems = [...editableItems];
        newItems[idx] = { ...newItems[idx], dispenseQty: qty, dispensePack: Math.ceil(qty / newItems[idx].packSize), newExcess: (newItems[idx].prevExcess - newItems[idx].usage) + qty, isAdjusted: true };
        setEditableItems(newItems);
      };

      const handleApprove = async () => {
        setIsApproving(true);
        try {
          const batch = db.batch(); batch.update(db.collection('requisitions').doc(req.id), { status: 'Completed', items: editableItems });
          editableItems.forEach(it => batch.set(db.collection('current_excess').doc(`${req.hospitalId}_${it.drugId}`), { hospital_id: req.hospitalId, drug_id: it.drugId, excess_balance: it.newExcess, last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }));
          await batch.commit(); ctx.showToast('อนุมัติแล้ว'); await ctx.refreshData(); ctx.setCurrentView('dashboard');
        } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsApproving(false); }
      };

      const handleRejectReq = async () => {
         setIsApproving(true);
         try {
            await db.collection('requisitions').doc(req.id).update({ status: 'Rejected' });
            ctx.showToast('ไม่อนุมัติใบเบิก'); await ctx.refreshData(); ctx.setCurrentView('dashboard');
         } catch(e) { ctx.showToast(e.message, 'error'); setIsApproving(false); }
      };

      const handleDeleteReq = async () => {
         setIsApproving(true);
         try {
