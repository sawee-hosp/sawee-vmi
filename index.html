                                        <span className="text-amber-500 font-bold"><i className="fa-solid fa-clock"></i> ส่งบิลแล้ว</span>
                                     ) : <span className="text-slate-400">- ยังไม่ส่ง -</span>}
                                  </td>
                                  <td className="p-3 text-center">
                                     {req?.is_printed ? <span className="text-blue-600 font-bold"><i className="fa-solid fa-print"></i> พิมพ์แล้ว</span> : <span className="text-slate-300">-</span>}
                                  </td>
                                  <td className="p-3 text-center">
                                     {req ? (
                                        <button onClick={() => { ctx.setCurrentReqId(req.id); ctx.setCurrentView('view_req'); }} className="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-lg font-bold hover:bg-emerald-200 transition"><i className="fa-solid fa-folder-open mr-1"></i> เปิดดู</button>
                                     ) : (
                                        <button onClick={() => handleAdminUploadForHosp(h.hospital_id)} className="bg-indigo-100 text-indigo-700 px-4 py-1.5 rounded-lg font-bold hover:bg-indigo-200 transition"><i className="fa-solid fa-upload mr-1"></i> อัปโหลดแทน</button>
                                     )}
                                  </td>
                               </tr>
                            )
                         })}
                      </tbody>
                   </table>
                </div>
             </div>
          )}

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
              <div className="p-5 border-b border-slate-100 font-bold text-slate-800 bg-slate-50 flex justify-between items-center">
                 <span><i className="fa-solid fa-list-ul text-emerald-500 mr-2"></i> ประวัติการเติมยา {reqFilter === 'pending' && <span className="text-red-500 ml-2">(แสดงเฉพาะที่รออนุมัติ)</span>}</span>
                 {reqFilter !== 'all' && <button onClick={() => setReqFilter('all')} className="text-xs font-normal text-slate-500 hover:text-blue-500">ดูทั้งหมด</button>}
              </div>
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="border-b text-sm text-slate-500 bg-white">
                    <th className="p-4 font-medium">รหัสเอกสาร</th>
                    <th className="p-4 font-medium">ผู้ทำรายการ</th>
                    <th className="p-4 font-medium">รอบบิล</th>
                    <th className="p-4 font-medium">สถานะ</th>
                    <th className="p-4 font-medium text-right">เอกสาร</th>
                  </tr>
                </thead>
                <tbody>
                  {displayReqs.slice(0,15).map(req => {
                    const isPendingHighlight = reqFilter === 'pending' && (req.status === 'Pending' || req.status === 'Pending_Approval');
                    return (
                       <tr key={req.id} className={`border-b transition cursor-pointer ${isPendingHighlight ? 'bg-red-50 hover:bg-red-100' : 'hover:bg-slate-50'}`} onClick={() => { ctx.setCurrentReqId(req.id); ctx.setCurrentView('view_req'); }}>
                         <td className="p-4 font-semibold text-slate-700">{req.id} {req.isInitialSetup && <span className="text-[10px] bg-amber-100 text-amber-700 px-1 rounded ml-1">Set-up</span>}</td>
                         <td className="p-4 text-slate-600">{req.created_by_name || '-'} {isAdmin && <span className="text-xs text-indigo-500 block">{ctx.appDb.hospitals.find(h=>h.hospital_id===req.hospitalId)?.hospital_name}</span>}</td>
                         <td className="p-4 text-slate-600">{req.month}/{req.year}</td>
                         <td className="p-4">
                           <span className={`px-3 py-1 rounded-lg text-xs font-bold ${req.status === 'Completed' ? 'bg-emerald-100 text-emerald-700' : req.status === 'Pending_Approval' ? 'bg-red-100 text-red-700 border border-red-300' : 'bg-amber-100 text-amber-700'}`}>
                             {req.status === 'Completed' ? 'สำเร็จ' : req.status === 'Pending_Approval' ? 'รออนุมัติเพิ่ม' : 'กำลังดำเนินการ'}
                           </span>
                         </td>
                         <td className="p-4 text-right">
                            {isAdmin && isPendingHighlight ? (
                               <button className="text-white bg-red-600 hover:bg-red-700 px-4 py-1.5 rounded-lg text-sm font-semibold transition shadow">
                                 <i className="fa-solid fa-eye mr-1"></i> เปิดดู / อนุมัติ
                               </button>
                            ) : (
                               <button className="text-emerald-600 hover:text-emerald-800 bg-emerald-50 px-3 py-1.5 rounded-lg text-sm font-semibold transition">
                                 เปิดดู
                               </button>
                            )}
                         </td>
                       </tr>
                    )
                  })}
                  {displayReqs.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">ไม่มีข้อมูลที่ตรงกับตัวกรอง</td></tr>}
                </tbody>
              </table>
            </div>

            {isHospital && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 h-fit">
                <div className="p-5 border-b border-slate-100 font-bold text-slate-800 bg-slate-50"><i className="fa-solid fa-users text-blue-500 mr-2"></i> เจ้าหน้าที่ รพ.สต. เดียวกัน</div>
                <div className="p-4 space-y-3">
                  {ctx.appDb.usersList.filter(u => u.hospital_id === ctx.currentUser?.hospital_id && u.id !== ctx.currentUser?.uid).map(c => (
                    <div key={c.id} className="flex items-center p-3 bg-slate-50 rounded-xl">
                      <div className="w-10 h-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold text-lg mr-3">
                        {c.name.charAt(0)}
                      </div>
                      <div>
                        <div className="font-semibold text-slate-700 text-sm">{c.name}</div>
                        <div className="text-xs text-slate-500">{c.position || c.role}</div>
                      </div>
                    </div>
                  ))}
                  {ctx.appDb.usersList.filter(u => u.hospital_id === ctx.currentUser?.hospital_id && u.id !== ctx.currentUser?.uid).length === 0 && <div className="text-center text-slate-400 text-sm py-4">ไม่มีเจ้าหน้าที่คนอื่น</div>}
                </div>
              </div>
            )}
          </div>
          
          {isHospital && (
             <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mt-6">
                <div className="p-5 border-b font-bold text-slate-800 bg-slate-50"><i className="fa-solid fa-chart-line text-amber-500 mr-2"></i> สรุปมูลค่าการเบิกย้อนหลัง</div>
                <div className="overflow-x-auto">
                   <table className="w-full text-left text-sm whitespace-nowrap">
                      <thead className="bg-slate-100 border-b">
                         <tr>
                            <th className="p-3">รอบเดือน</th>
                            {Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).map((k)=><th key={k} className="p-3 text-right">{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[k]}</th>)}
                            <th className="p-3 text-right bg-slate-200">รวมทั้งหมด (บาท)</th>
                         </tr>
                      </thead>
                      <tbody>
                         {myReqs.filter(r => r.status === 'Completed').slice(0, 6).map(req => {
                            const typeSums = {};
                            let total = 0;
                            Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).forEach(k => typeSums[k] = 0);
                            
                            req.items.forEach(it => {
                               const val = it.isUnpacked ? (it.dispenseQty / (it.packSize||1)) * (it.price||0) : it.dispensePack * (it.price||0);
                               if(typeSums[it.type] !== undefined) typeSums[it.type] += val;
                               else if(typeSums['1'] !== undefined) typeSums['1'] += val; 
                               total += val;
                            });

                            return (
                               <tr key={req.id} className="border-b hover:bg-slate-50">
                                  <td className="p-3 font-bold text-slate-700">{THAI_MONTHS[req.month-1]} {req.year + 543}</td>
                                  {Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).map((k)=><td key={k} className="p-3 text-right text-slate-600">{typeSums[k].toLocaleString(undefined, {minimumFractionDigits:2})}</td>)}
                                  <td className="p-3 text-right font-bold text-indigo-700 bg-slate-50">{total.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                               </tr>
                            )
                         })}
                         {myReqs.filter(r => r.status === 'Completed').length === 0 && <tr><td colSpan={Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).length + 2} className="p-6 text-center text-slate-400">ยังไม่มีข้อมูลอนุมัติ</td></tr>}
                      </tbody>
                   </table>
                </div>
             </div>
          )}
        </div>
      );
    };

    const CreateReqView = ({ ctx }) => {
      const hospId = ctx.targetUploadHosp || ctx.currentUser.hospital_id; 
      const isAdmin = ctx.currentUser.role === 'admin';
      const today = new Date();
      const currentMonth = today.getMonth() + 1;
      const currentYear = today.getFullYear();
      
      const isOutOfPeriod = !isAdmin && (today.getDate() < 25 && today.getDate() > 5);
      
      const [acknowledged, setAcknowledged] = useState(false);
      const [searchTerm, setSearchTerm] = useState(''); 
      const [filterType, setFilterType] = useState('all'); 
      const [showUsedOnly, setShowUsedOnly] = useState(false); 
      
      const [excelFile, setExcelFile] = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);
      const [showReview, setShowReview] = useState(false);

      const [showImportModal, setShowImportModal] = useState(false);
      const [importData, setImportData] = useState({ hospInfo: '', periodInfo: '', isDateValid: true, items: [] });
      
      const [manualAddSearch, setManualAddSearch] = useState('');

      const [items, setItems] = useState(() => {
        if (!ctx.appDb || !ctx.appDb.parLevels) return [];
        
        let existingReqItems = [];
        if (ctx.editReqId) {
           const reqToEdit = ctx.appDb.requisitions.find(r => r.id === ctx.editReqId);
           if (reqToEdit) existingReqItems = reqToEdit.items || [];
        }

        const myPars = ctx.appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
        const generatedList = myPars.map(par => {
          const drug = ctx.appDb.drugs.find(d => String(d.drug_id) === String(par.drug_id));
          const bal = ctx.appDb.balances.find(b => String(b.hospital_id) === String(hospId) && String(b.drug_id) === String(par.drug_id));
          
          const existingItem = existingReqItems.find(ex => ex.drugId === par.drug_id);
          const prevExcess = bal ? Number(bal.excess_balance) : 0;
          const isUnpacked = drug ? !!drug.unpacked : false;
          const type = drug ? drug.type : '1';
          const price = drug ? drug.price : 0;
          const packSize = drug ? Number(drug.pack_size) : 1;
          
          let m_usages = [];
          for(let i=1; i<=6; i++) {
            let m = currentMonth - i; let y = currentYear;
            if(m <= 0) { m += 12; y -= 1; }
            const oldReq = ctx.appDb.requisitions.find(r => r.hospitalId === hospId && r.month === m && r.year === y && r.id !== ctx.editReqId);
            let usage = 0;
            if(oldReq && oldReq.items) {
              const oldItem = oldReq.items.find(it => it.drugId === par.drug_id);
              if(oldItem) usage = Number(oldItem.usage);
            }
            m_usages.push(usage);
          }
          
          const total6M = m_usages.reduce((a,b)=>a+b, 0);
          const mean6M = total6M / 6; 
          const variance = m_usages.reduce((acc, val) => acc + Math.pow(val - mean6M, 2), 0) / 5;
          const SD = Math.sqrt(variance || 0);
          
          // Target = Average Monthly Usage + (1.645 * SD)
          const targetVMI = Math.ceil(mean6M + (1.645 * SD));

          if (existingItem) {
             return { ...existingItem, targetVMI, isUnpacked, avgUsage: mean6M.toFixed(2), type, price, requestMore: existingItem.requestMore || 0 };
          }

          return {
            drugId: par.drug_id, name: drug ? drug.drug_name : 'N/A', unit: drug ? drug.unit_display_name : '',
            packSize, isUnpacked, type, price,
            avgUsage: mean6M.toFixed(2), prevExcess, 
            usage: 0, targetVMI, netNeed: 0, dispensePack: 0, dispenseQty: 0, newExcess: prevExcess, isSpecial: false,
            requestMore: 0 // New field for manual extra requests
          };
        });

        existingReqItems.forEach(ex => {
           if(!generatedList.find(g => g.drugId === ex.drugId)) generatedList.push({...ex, requestMore: ex.requestMore || 0});
        });
        return generatedList.sort(sortDrugs);
      });

      const handleJHCISUpload = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        setExcelFile(file); 
        setIsProcessing(true);

        const processData = (dataRows) => {
          let hospInfo = ""; let periodInfo = ""; let isDateValid = true; let extracted = [];
          dataRows.forEach(row => {
            const rowArr = Array.isArray(row) ? row : Object.values(row);
            const compacted = rowArr.map(c => String(c || '').trim()).filter(c => c !== '');
            if (compacted.length === 0) return;
            if (compacted.some(c => c.includes('สถานบริการ'))) hospInfo = compacted.find(c => c.includes('สถานบริการ'));
            if (compacted.some(c => c.includes('ระหว่างวันที่'))) {
               periodInfo = compacted.find(c => c.includes('ระหว่างวันที่')) || compacted.join(' ');
               const dateRegex = /(\d{1,2})\s*([ก-๙\.]+)\s*(\d{4})\s*-\s*(\d{1,2})\s*([ก-๙\.]+)\s*(\d{4})/;
               const match = periodInfo.match(dateRegex);
               if (match) {
                  const startDay = parseInt(match[1]); const endDay = parseInt(match[4]);
                  if (startDay < 20 && endDay < 20) isDateValid = false;
               }
            }
            if (compacted.length >= 6 && /^\d+\.?$/.test(compacted[0])) {
               const rawName = compacted[1]; const usageStr = compacted[6]; 
               const usageNum = parseFloat(usageStr?.replace(/,/g, ''));
               if (!isNaN(usageNum) && usageNum > 0 && rawName && !rawName.includes('รวม')) {
                   extracted.push({ id: Math.random().toString(), rawName, usage: usageNum, mappedDrugId: '' });
               }
            }
          });

          const normalize = (str) => String(str).toLowerCase().replace(/[\s\-\.\(\)]/g, '');
          extracted = extracted.map(item => {
            const normRaw = normalize(item.rawName);
            let mappedId = '';
            let matched = ctx.appDb.drugs.find(d => {
               const normSys = normalize(d.drug_name);
               const fuzzyArr = d.fuzzy ? String(d.fuzzy).split(',').map(normalize) : [];
               return normSys === normRaw || fuzzyArr.includes(normRaw);
            });
            if (!matched) {
              matched = ctx.appDb.drugs.find(d => {
                 const normSys = normalize(d.drug_name);
                 const fuzzyArr = d.fuzzy ? String(d.fuzzy).split(',').map(normalize) : [];
                 return normSys.includes(normRaw) || normRaw.includes(normSys) || fuzzyArr.some(f => normRaw.includes(f));
              });
            }
            if (matched) mappedId = matched.drug_id;
            return { ...item, mappedDrugId: mappedId };
          });

          setImportData({ hospInfo, periodInfo, isDateValid, items: extracted });
          setShowImportModal(true);
          setIsProcessing(false);
        };

        if (file.name.endsWith('.csv')) {
          Papa.parse(file, { header: false, skipEmptyLines: true, complete: function(results) { processData(results.data); } });
        } else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
          const reader = new FileReader();
          reader.onload = (evt) => {
            const bstr = evt.target.result; const wb = XLSX.read(bstr, {type:'binary'});
            const wsname = wb.SheetNames[0]; const ws = wb.Sheets[wsname];
            const data = XLSX.utils.sheet_to_json(ws, {header:1});
            processData(data);
          };
          reader.readAsBinaryString(file);
        } else { ctx.showToast("รองรับเฉพาะไฟล์ .csv, .xls, .xlsx", "error"); setIsProcessing(false); e.target.value = null; }
      };

      const updateRow = (drugIdToUpdate, usageVal, requestMoreVal = null) => {
        const newItems = items.map(item => {
          if (item.drugId === drugIdToUpdate) {
            const usage = usageVal !== null ? (parseInt(usageVal) || 0) : item.usage;
            const requestMore = requestMoreVal !== null ? (parseInt(requestMoreVal) || 0) : item.requestMore;
            
            const row = { ...item, usage, requestMore };
            let currentBal = row.prevExcess - usage;
            let netNeed = row.targetVMI - currentBal;
            
            if (netNeed <= 0) netNeed = 0;
            
            // Apply logic: Total need = VMI calculated need + Manual Request More
            let totalNeedToDispense = netNeed + requestMore;

            if (totalNeedToDispense <= 0) {
               row.netNeed = 0; row.dispensePack = 0; row.dispenseQty = 0; row.newExcess = currentBal; 
            } else {
               row.netNeed = netNeed; 
               if (row.isUnpacked) {
                  row.dispensePack = Math.ceil(totalNeedToDispense / row.packSize); 
                  row.dispenseQty = Math.ceil(totalNeedToDispense);
               } else {
                  row.dispensePack = Math.ceil(totalNeedToDispense / row.packSize); 
                  row.dispenseQty = row.dispensePack * row.packSize; 
               }
               row.newExcess = currentBal + row.dispenseQty;
            }
            return row;
          }
          return item;
        });
        setItems(newItems);
      };

      const handleManualAdd = () => {
         if(!manualAddSearch) return;
         const drug = ctx.appDb.drugs.find(d => d.drug_id === manualAddSearch);
         if(!drug) return ctx.showToast('ไม่พบรหัสยานี้ในระบบ', 'error');
         if(items.find(i => i.drugId === drug.drug_id)) return ctx.showToast('มีรายการนี้ในใบเบิกอยู่แล้ว', 'error');

         const newItem = {
            drugId: drug.drug_id, name: drug.drug_name, unit: drug.unit_display_name,
            packSize: Number(drug.pack_size), isUnpacked: !!drug.unpacked, type: drug.type, price: drug.price,
            avgUsage: 0, prevExcess: 0, usage: 0, targetVMI: 0, netNeed: 0, dispensePack: 0, dispenseQty: 0, newExcess: 0,
            isSpecial: false, requestMore: 0
         };
         setItems([newItem, ...items].sort(sortDrugs)); setManualAddSearch(''); ctx.showToast(`เพิ่ม ${drug.drug_name} ลงในใบเบิกแล้ว`);
      };

      const handleSubmit = async () => {
        if(!excelFile && !ctx.editReqId) return ctx.showToast('กรุณาแนบไฟล์ รบ.301 (.xlsx) เพื่อใช้เป็นหลักฐานประกอบการเบิก', 'error');
        setIsSubmitting(true);
        try {
          const processSave = async (fileUrl) => {
             const skipped = importData.items.filter(i => i.mappedDrugId === '').map(i => ({ rawName: i.rawName, usage: i.usage }));
             
             let requiresApproval = false;

             const sanitizedItems = items.map(item => {
                const needsApprovalItem = item.requestMore > 0 && item.type !== '32';
                if (needsApprovalItem) requiresApproval = true;

                return {
                   drugId: item.drugId || "", name: item.name || "N/A", unit: item.unit || "",
                   packSize: item.packSize || 1, isUnpacked: !!item.isUnpacked, type: item.type || '1', price: item.price || 0,
                   avgUsage: item.avgUsage || 0, prevExcess: item.prevExcess || 0,
                   usage: item.usage || 0, vmiTarget: item.targetVMI || 0, netNeed: item.netNeed || 0,
                   dispensePack: item.dispensePack || 0, dispenseQty: item.dispenseQty || 0, newExcess: item.newExcess || 0,
                   isSpecial: false, requestMore: item.requestMore || 0
                };
             });

             const finalStatus = isAdmin ? 'Completed' : (requiresApproval ? 'Pending_Approval' : 'Pending');

             if (ctx.editReqId) {
                const payload = { items: sanitizedItems, skipped_items: skipped, updated_at: firebase.firestore.FieldValue.serverTimestamp(), status: finalStatus };
                if (fileUrl) payload.excel_url = fileUrl; 
                await db.collection('requisitions').doc(ctx.editReqId).update(payload);
                
                const batch = db.batch();
                importData.items.filter(i => i.mappedDrugId !== '').forEach(item => {
                   const drugRef = db.collection('master_drugs').doc(item.mappedDrugId);
                   const drugObj = ctx.appDb.drugs.find(d => d.drug_id === item.mappedDrugId);
                   if(drugObj) {
                      const existingFuzzy = drugObj.fuzzy ? drugObj.fuzzy.split(',').map(s=>s.trim().toLowerCase()) : [];
                      const rawLower = item.rawName.toLowerCase().replace(/[\s\-\.\(\)]/g, '');
                      if(!existingFuzzy.includes(rawLower)) {
                         const newFuzzy = drugObj.fuzzy ? `${drugObj.fuzzy},${item.rawName}` : item.rawName;
                         batch.update(drugRef, { fuzzy: newFuzzy });
                      }
                   }
                });
                await batch.commit();
                ctx.showToast(requiresApproval && !isAdmin ? 'ส่งข้อมูลสำเร็จ (รอแอดมินอนุมัติยอดเบิกเพิ่ม)' : 'อัปเดตใบเบิกสำเร็จ');
             } else {
                const newId = `REQ-${currentYear}-${String(currentMonth).padStart(2, '0')}-${Math.floor(Math.random()*1000).toString().padStart(3, '0')}`;
                const batch = db.batch();
                const reqRef = db.collection('requisitions').doc(newId);
                batch.set(reqRef, {
                  hospitalId: hospId, month: currentMonth, year: currentYear, status: finalStatus, is_printed: false,
                  excel_url: fileUrl || "", items: sanitizedItems, skipped_items: skipped, created_by_name: ctx.currentUser?.name || 'System', created_at: firebase.firestore.FieldValue.serverTimestamp() 
                });
                importData.items.filter(i => i.mappedDrugId !== '').forEach(item => {
                   const drugRef = db.collection('master_drugs').doc(item.mappedDrugId);
                   const drugObj = ctx.appDb.drugs.find(d => d.drug_id === item.mappedDrugId);
                   if(drugObj) {
                      const existingFuzzy = drugObj.fuzzy ? drugObj.fuzzy.split(',').map(s=>s.trim().toLowerCase()) : [];
                      const rawLower = item.rawName.toLowerCase().replace(/[\s\-\.\(\)]/g, '');
                      if(!existingFuzzy.includes(rawLower)) {
                         const newFuzzy = drugObj.fuzzy ? `${drugObj.fuzzy},${item.rawName}` : item.rawName;
                         batch.update(drugRef, { fuzzy: newFuzzy });
                      }
                   }
                });
                await batch.commit();
                ctx.showToast(requiresApproval && !isAdmin ? 'ส่งข้อมูลสำเร็จ (รอแอดมินอนุมัติยอดเบิกเพิ่ม)' : 'ส่งเรื่องเติมยาสำเร็จ');
             }
             await ctx.refreshData(); ctx.setEditReqId(null); ctx.setTargetUploadHosp(null); ctx.setCurrentView('dashboard');
          };

          if (excelFile) {
            const reader = new FileReader();
            reader.onload = async (event) => {
              const base64Str = event.target.result.split(',')[1];
              let fileUrl = "";
              if(GAS_DRIVE_URL.includes('/exec')) {
                const uploadRes = await fetch(GAS_DRIVE_URL, {
                  method: 'POST',
                  body: JSON.stringify({ filename: `Rxfill_${hospId}_${currentMonth}_${currentYear}.xlsx`, mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', base64: base64Str })
                });
                const uploadData = await uploadRes.json();
                if(uploadData.status === 'success') fileUrl = uploadData.url || "";
              }
              processSave(fileUrl);
            };
            reader.readAsDataURL(excelFile);
          } else { processSave(""); }
        } catch (e) { ctx.showToast('เกิดข้อผิดพลาด: ' + e.message, 'error'); setIsSubmitting(false); }
      };

      const filteredItems = items.filter(item => {
        const matchSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(item.drugId).includes(searchTerm.toLowerCase());
        const matchType = filterType === 'all' ? true : filterType === item.type;
        const matchUsage = showUsedOnly ? item.usage > 0 : true;
        return matchSearch && matchType && matchUsage;
      });

      if (isOutOfPeriod && !acknowledged && !ctx.editReqId) {
        return (
          <div className="bg-white rounded-3xl p-10 text-center shadow-sm max-w-2xl mx-auto mt-10 border border-amber-200 animate-fade-in">
            <i className="fa-solid fa-triangle-exclamation text-6xl text-amber-500 mb-6"></i>
            <h2 className="text-2xl font-bold text-slate-800 mb-3">แจ้งเตือน: นอกช่วงเวลาเบิกยา</h2>
            <p className="text-slate-500 mb-8 text-lg">ระบบแนะนำให้ทำเรื่องเติมยาเฉพาะ <span className="font-bold text-slate-700">วันที่ 25 ถึงวันสิ้นเดือน</span> เพื่อให้การคำนวณ VMI แม่นยำที่สุด</p>
            <div className="flex flex-col sm:flex-row justify-center gap-4">
              <button onClick={() => { ctx.setTargetUploadHosp(null); ctx.setCurrentView('dashboard'); }} className="bg-slate-100 text-slate-600 px-6 py-3 rounded-xl font-bold hover:bg-slate-200 transition">กลับหน้าหลัก</button>
              <button onClick={() => setAcknowledged(true)} className="bg-gradient-to-r from-amber-400 to-orange-500 text-white px-6 py-3 rounded-xl font-bold hover:scale-105 transition shadow-lg shadow-amber-200">รับทราบ และทำรายการต่อ</button>
            </div>
          </div>
        );
      }

      if (showReview) {
         return (
            <div className="bg-white rounded-2xl shadow-sm p-8 border border-slate-100 animate-fade-in relative max-w-5xl mx-auto">
               <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                  <div>
                     <h2 className="text-2xl font-bold text-slate-800"><i className="fa-solid fa-clipboard-check text-blue-500 mr-2"></i> ทบทวนยอดที่ระบบคำนวณให้</h2>
                     <p className="text-slate-500 mt-1">หากต้องการแก้ไขจำนวน หรือขอเบิกเพิ่ม ให้ระบุในช่อง "ขอเบิกเพิ่ม"</p>
                  </div>
                  <button onClick={() => setShowReview(false)} className="text-slate-500 hover:text-slate-800 bg-slate-100 px-4 py-2 rounded-xl font-bold"><i className="fa-solid fa-arrow-left mr-2"></i> ย้อนกลับไปแก้ไข</button>
               </div>

               <div className="mb-4 p-4 bg-amber-50 border border-amber-200 rounded-xl">
                  <p className="text-sm text-amber-800 font-bold"><i className="fa-solid fa-circle-info mr-2"></i> หมายเหตุ:</p>
                  <ul className="list-disc list-inside text-sm text-amber-700 ml-4 mt-2">
                     <li>การแก้ไขยอดเบิกในหมวด <b>"ยา"</b> จะต้องรอให้แอดมินอนุมัติก่อน จึงจะพิมพ์ใบเบิก PDF ได้</li>
                     <li>หมวด <b>"เวชภัณฑ์ทางการแพทย์"</b> สามารถแก้ไขได้โดยไม่ต้องรออนุมัติ</li>
                     <li>ระบบคำนวณยอดจัดให้เป็น <b>"แพ็ค"</b> หรือ <b>"หน่วยย่อย"</b> อัตโนมัติ ตามเงื่อนไขของยาแต่ละตัว</li>
                  </ul>
               </div>

               <div className="overflow-x-auto mb-8 border border-slate-200 rounded-xl max-h-[600px] overflow-y-auto">
                  <table className="w-full text-left border-collapse whitespace-nowrap text-sm">
                     <thead className="sticky top-0 z-10 shadow-sm bg-slate-100 text-slate-700 border-b border-slate-200">
                        <tr>
                           <th className="p-4 font-bold">รายการยา / เวชภัณฑ์</th>
                           <th className="p-4 text-center">Pack</th>
                           <th className="p-4 text-center">ยอดใช้<br/><span className="font-normal text-[10px]">(เดือนล่าสุด)</span></th>
                           <th className="p-4 text-center bg-blue-50">VMI คำนวณ<br/><span className="font-normal text-[10px]">(หน่วยย่อย)</span></th>
                           <th className="p-4 text-center bg-amber-50 border-x border-amber-200 text-amber-800">ขอเบิกเพิ่ม<br/><span className="font-normal text-[10px]">(กรอกหน่วยย่อย)</span></th>
                           <th className="p-4 text-center bg-emerald-50 text-emerald-800">สรุปจัดให้<br/><span className="font-normal text-[10px]">แพ็ค (ย่อย)</span></th>
                        </tr>
                     </thead>
                     <tbody>
                        {items.filter(i => i.usage > 0 || i.requestMore > 0 || i.dispenseQty > 0).map((item) => (
                           <tr key={item.drugId} className="border-b border-slate-200 hover:bg-slate-50 transition">
                              <td className="p-4">
                                 <div className="font-bold text-slate-800">{item.name}</div>
                                 <div className="text-[10px] text-slate-500 mt-1">[{item.drugId}] หมวด: {ctx.appDb.drugTypes?.[item.type] || DEFAULT_DRUG_TYPES[item.type]}</div>
                              </td>
                              <td className="p-4 text-center text-slate-500">{item.packSize} {item.unit}</td>
                              <td className="p-4 text-center text-slate-600">{formatQty(item.usage, item.packSize)}</td>
                              <td className="p-4 text-center font-bold text-blue-700 bg-blue-50/30">{formatQty(item.netNeed, item.packSize)}</td>
                              <td className="p-4 text-center bg-amber-50/50 border-x border-amber-100">
                                 <input type="number" min="0" className="w-24 border-b-2 border-amber-300 bg-transparent p-1 text-center font-bold text-amber-900 outline-none focus:bg-white focus:border-amber-500 transition" value={item.requestMore || ''} onChange={e => updateRow(item.drugId, null, e.target.value)} placeholder="+0" />
                              </td>
                              <td className="p-4 text-center font-extrabold text-emerald-700 bg-emerald-50/50 text-lg">
                                 {formatQty(item.dispenseQty, item.packSize)}
                              </td>
                           </tr>
                        ))}
                     </tbody>
                  </table>
               </div>

               <div className="flex justify-end">
                  <button onClick={handleSubmit} disabled={isSubmitting} className="bg-gradient-main text-white px-8 py-4 rounded-xl font-bold shadow-xl shadow-emerald-200 hover:scale-105 transition disabled:opacity-50 text-lg flex items-center">
                     {isSubmitting ? <i className="fa-solid fa-circle-notch fa-spin mr-2"></i> : <i className="fa-solid fa-paper-plane mr-2"></i>}
                     {isSubmitting ? 'กำลังบันทึก...' : 'ยืนยันและส่งใบเบิกเข้าสู่ระบบ'}
                  </button>
               </div>
            </div>
         );
      }

      return (
        <div className="bg-white rounded-2xl shadow-sm p-8 border border-slate-100 animate-fade-in relative">
          {isProcessing && <FullScreenSpinner />}
          <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
            <div>
              <h2 className="text-2xl font-bold text-slate-800">
                {ctx.editReqId ? `แก้ไขใบเบิกยารอบ ${currentMonth}/${currentYear}` : `ทำเรื่องเติมยารอบใหม่ (${currentMonth}/${currentYear})`}
              </h2>
              <p className="text-slate-500 mt-1">
                 {ctx.targetUploadHosp && <span className="text-indigo-600 font-bold mr-2">[โหมดแอดมิน: ทำรายการให้ {ctx.appDb.hospitals.find(h=>h.hospital_id===ctx.targetUploadHosp)?.hospital_name}]</span>}
                 อัปโหลดไฟล์ Excel รบ.301 เพื่อดึงยอดจ่ายอัตโนมัติ
              </p>
            </div>
            <button onClick={() => {ctx.setEditReqId(null); ctx.setTargetUploadHosp(null); ctx.setCurrentView('dashboard');}} className="text-slate-400 hover:text-slate-600 bg-slate-100 px-4 py-2 rounded-xl font-medium">ยกเลิก</button>
          </div>

          <div className="bg-indigo-50 p-6 rounded-2xl border border-indigo-200 mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
            <div>
              <h3 className="font-bold text-indigo-800 text-lg flex items-center"><i className="fa-solid fa-file-excel mr-2"></i> ดึงยอดใช้จากไฟล์ รบ.301 (Excel)</h3>
              <p className="text-sm text-indigo-600 mt-1">อัปโหลดไฟล์สรุปรวมรายเดือน ระบบจะดึงยอดจ่ายมาคีย์ลงตารางให้อัตโนมัติ (และแนบไฟล์ให้พร้อม)</p>
              {excelFile && <p className="text-sm font-bold text-emerald-600 mt-2"><i className="fa-solid fa-check"></i> พร้อมแนบ: {excelFile.name}</p>}
            </div>
            <label className="bg-white border-2 border-indigo-600 text-indigo-700 px-6 py-3 rounded-xl cursor-pointer hover:bg-indigo-100 transition flex items-center font-bold shrink-0 shadow-lg shadow-indigo-100">
              <i className="fa-solid fa-upload mr-2"></i> เลือกไฟล์ .xlsx / .csv
              <input type="file" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" className="hidden" onChange={handleJHCISUpload} />
            </label>
          </div>

          <div className="flex flex-col md:flex-row gap-4 mb-6 items-center">
            <div className="relative flex-grow w-full">
              <i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
              <input type="text" placeholder="ค้นหารายการ (ชื่อ หรือ รหัส)..." className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 transition font-medium" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
            </div>
            <div className="flex gap-2 shrink-0 bg-slate-100 p-1 rounded-xl overflow-x-auto w-full md:w-auto">
              <button onClick={()=>setFilterType('all')} className={`px-4 py-2 rounded-lg font-bold text-sm transition ${filterType==='all'?'bg-white shadow text-emerald-700':'text-slate-500 hover:bg-slate-200'}`}>ทั้งหมด</button>
              {Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES).map(k=>(
                 <button key={k} onClick={()=>setFilterType(k)} className={`px-4 py-2 rounded-lg font-bold text-sm transition ${filterType===k?'bg-white shadow text-emerald-700':'text-slate-500 hover:bg-slate-200'}`}>{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[k]}</button>
              ))}
            </div>
          </div>

          <div className="flex flex-col md:flex-row gap-4 mb-6 items-center bg-slate-50 p-4 rounded-xl border border-slate-200">
             <div className="font-bold text-slate-700"><i className="fa-solid fa-plus-circle text-blue-500 mr-2"></i> ค้นหาเพื่อเพิ่มรายการเบิก (กรณีไม่มีประวัติ 301)</div>
             <div className="flex flex-grow w-full md:w-auto gap-2">
               <input list="all-drugs" className="border border-slate-300 rounded-lg p-2 flex-grow outline-none focus:border-blue-500" placeholder="พิมพ์ชื่อหรือรหัส..." value={manualAddSearch} onChange={e=>setManualAddSearch(e.target.value)} />
               <datalist id="all-drugs">
                  {ctx.appDb.drugs.map(d => <option key={d.drug_id} value={d.drug_id}>{d.drug_name} [{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[d.type]}]</option>)}
               </datalist>
               <button onClick={handleManualAdd} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700">เพิ่ม</button>
             </div>
          </div>

          <div className="mb-2">
            <label className="flex items-center gap-2 cursor-pointer bg-amber-50 px-4 py-2 rounded-xl border border-amber-200 text-amber-800 font-bold w-fit">
              <input type="checkbox" className="w-5 h-5 accent-amber-500" checked={showUsedOnly} onChange={e=>setShowUsedOnly(e.target.checked)} /> แสดงเฉพาะรายการที่มียอดใช้ > 0
            </label>
          </div>

          <div className="overflow-x-auto mb-8 border border-slate-200 rounded-xl max-h-[500px] overflow-y-auto">
            <table className="w-full text-left border-collapse whitespace-nowrap">
              <thead className="sticky top-0 z-10 shadow-sm">
                <tr className="bg-slate-100 text-slate-700 text-sm border-b border-slate-200">
                  <th className="p-4 font-bold">รายการยา <span className="font-normal text-xs text-slate-400 ml-1">[รหัส]</span></th>
                  <th className="p-4 text-center">Pack</th>
                  <th className="p-4 text-center bg-blue-50/80 border-x border-blue-100">ยอดยกมา (Credit)<br/><span className="font-normal text-[10px]">แพ็ค (หน่วยย่อย)</span></th>
                  <th className="p-4 text-center bg-amber-100 text-amber-800 border-r border-amber-200">ยอดใช้ 1 เดือน<br/><span className="font-normal text-[10px]">(หน่วยย่อย)</span></th>
                  <th className="p-4 text-center bg-slate-50/80">ยอดควรมี (Target)<br/><span className="font-normal text-[10px]">Avg+(1.645*SD)</span></th>
                  <th className="p-4 text-center bg-emerald-50/80 border-l border-emerald-100 text-emerald-800">ยอดต้องเติม (Need)<br/><span className="font-normal text-[10px]">(หน่วยย่อย)</span></th>
                </tr>
              </thead>
              <tbody>
                {filteredItems.map((item) => {
                  return (
                    <tr key={item.drugId} className="border-b border-slate-200 hover:bg-slate-50 transition">
                      <td className="p-4">
                        <div className="font-bold text-slate-800">{item.name} <span className="text-xs font-normal text-slate-400 ml-1">[{item.drugId}]</span> {item.isUnpacked && <span className="ml-1 text-[10px] bg-purple-100 text-purple-700 px-1 rounded">แตกหน่วย</span>}</div>
                        <div className="text-xs text-slate-500 mt-1">หน่วย: <span className="font-semibold">{item.unit}</span> | หมวด: {(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[item.type]}</div>
                      </td>
                      <td className="p-4 text-center font-medium text-slate-500">{item.packSize}</td>
                      <td className="p-4 text-center text-blue-600 font-bold bg-blue-50/20 border-x border-blue-50">{formatQty(item.prevExcess, item.packSize)}</td>
                      <td className="p-4 bg-amber-50/30 border-r border-amber-100 relative text-center">
                        <input type="number" min="0" className="w-24 border-b-2 border-amber-300 bg-transparent p-1 text-center font-bold text-amber-900 outline-none focus:bg-white focus:border-amber-500 transition" value={item.usage || ''} onChange={e => updateRow(item.drugId, e.target.value, null)} />
                      </td>
                      <td className="p-4 text-center font-bold text-slate-600">{formatQty(item.targetVMI, item.packSize)}</td>
                      <td className="p-4 text-center font-extrabold text-emerald-600 bg-emerald-50/20 border-l border-emerald-50 text-lg">{formatQty(item.netNeed, item.packSize)}</td>
                    </tr>
                  )
                })}
                {filteredItems.length === 0 && (
                  <tr><td colSpan="6" className="p-8 text-center text-slate-400">ไม่พบรายการยาที่ค้นหา</td></tr>
                )}
              </tbody>
            </table>
          </div>

          <div className="flex justify-end">
            <button onClick={() => setShowReview(true)} disabled={items.filter(i => i.usage > 0).length === 0 && !ctx.editReqId} className="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold shadow-xl hover:bg-indigo-700 transition disabled:opacity-50 text-lg flex items-center">
               ตรวจสอบยอด และขอเบิกเพิ่ม <i className="fa-solid fa-arrow-right ml-2"></i>
            </button>
          </div>
        </div>
      );
    };

    const ViewReqView = ({ ctx }) => {
      const req = ctx.appDb.requisitions.find(r => r.id === ctx.currentReqId);
      const [isApproving, setIsApproving] = useState(false);
      const [editableItems, setEditableItems] = useState(req?.items || []);
      const [printMode, setPrintMode] = useState('req'); 
      
      useEffect(() => { if(req) setEditableItems(req.items); }, [req]);
      if(!req) return null;
      
      const isAdmin = ctx.currentUser.role === 'admin';
      const isPending = req.status === 'Pending' || req.status === 'Pending_Approval';
      const isApprovalRequired = req.status === 'Pending_Approval';
      const hosp = ctx.appDb.hospitals.find(h => h.hospital_id === req.hospitalId);
      const userInfo = ctx.appDb.usersList.find(u => u.name === req.created_by_name) || { position: 'เจ้าหน้าที่', role: '' };
      const hospNameClean = hosp?.hospital_name?.replace('รพ.สต.', '') || '';

      const { fiscalYear, term } = getFiscalInfo(req.month, req.year);

      const handleAdjust = (idx, val) => {
        const qty = parseInt(val) || 0; const newItems = [...editableItems];
        newItems[idx] = { ...newItems[idx], dispenseQty: qty, dispensePack: Math.ceil(qty / newItems[idx].packSize), newExcess: (newItems[idx].prevExcess - newItems[idx].usage) + qty, isAdjusted: true };
        setEditableItems(newItems);
      };

      const handleApprove = async () => {
        setIsApproving(true);
        try {
          const batch = db.batch(); batch.update(db.collection('requisitions').doc(req.id), { status: 'Completed', items: editableItems });
          editableItems.forEach(it => batch.set(db.collection('current_excess').doc(`${req.hospitalId}_${it.drugId}`), { hospital_id: req.hospitalId, drug_id: it.drugId, excess_balance: it.newExcess, last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }));
          
          if(req.skipped_items) {
             req.skipped_items.filter(s => s.mappedDrugId).forEach(s => {
                const d = ctx.appDb.drugs.find(x => x.drug_id === s.mappedDrugId);
                if(d) {
                   const existingFuzzy = d.fuzzy ? d.fuzzy.split(',').map(f=>f.trim().toLowerCase()) : [];
                   const rawLower = s.rawName.toLowerCase().replace(/[\s\-\.\(\)]/g, '');
                   if(!existingFuzzy.includes(rawLower)) {
                      batch.update(db.collection('master_drugs').doc(d.drug_id), { fuzzy: d.fuzzy ? `${d.fuzzy},${s.rawName}` : s.rawName });
                   }
                }
             });
          }

          await batch.commit(); ctx.showToast('อนุมัติแล้ว'); await ctx.refreshData(); ctx.setCurrentView('dashboard');
        } catch(e) { ctx.showToast(e.message, 'error'); } finally { setIsApproving(false); }
      };

      const handleRejectReq = async () => {
         setIsApproving(true);
         try {
            await db.collection('requisitions').doc(req.id).update({ status: 'Rejected' });
            ctx.showToast('ไม่อนุมัติใบเบิก');
            await ctx.refreshData();
            ctx.setCurrentView('dashboard');
         } catch(e) { ctx.showToast(e.message, 'error'); setIsApproving(false); }
      };

      const handleDeleteReq = async () => {
         setIsApproving(true);
         try {
            await db.collection('requisitions').doc(req.id).delete();
            ctx.showToast('ลบใบเบิกสำเร็จ');
            await ctx.refreshData();
            ctx.setCurrentView('dashboard');
         } catch(e) { ctx.showToast(e.message, 'error'); setIsApproving(false); }
      };

      const handleTriggerPrint = (mode) => {
         setPrintMode(mode);
         if(mode === 'req') db.collection('requisitions').doc(req.id).update({is_printed: true});
         setTimeout(() => window.print(), 100);
      };

      const groupedItems = {};
      const typeKeys = Object.keys(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES);
      typeKeys.forEach(k => groupedItems[k] = []);
      
      const itemsToDisplay = (isAdmin && isPending) ? editableItems : editableItems.filter(it => it.dispenseQty > 0 || it.requestMore > 0 || it.netNeed > 0 || (it.returnQty && it.returnQty > 0));

      itemsToDisplay.forEach(it => { if(groupedItems[it.type]) groupedItems[it.type].push(it); else groupedItems['1'].push(it); });
      
      let grandTotalItems = 0;
      let grandTotalPrice = 0;
      let globalItemIndex = 0;

      const returnItems = editableItems.filter(i => i.returnQty > 0);
      let returnTotal = 0;

      return (
        <div className="bg-white rounded-2xl shadow-sm p-4 lg:p-8 animate-fade-in border border-slate-100 print:p-0 print:border-none print:shadow-none relative">
          
          {!isAdmin && isApprovalRequired && printMode === 'req' && (
             <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-50 print:block">
                <div className="watermark-print bg-white/80 backdrop-blur-sm">
                   รอ Admin อนุมัติยาที่เบิกเพิ่มก่อนพิมพ์
                </div>
             </div>
          )}

          <div className="flex justify-between items-center mb-6 no-print pb-4 border-b">
            <button onClick={() => ctx.setCurrentView('dashboard')} className="text-slate-500 font-bold hover:text-slate-800"><i className="fa-solid fa-arrow-left mr-1"></i> กลับ</button>
            <div className="flex gap-2">

            ctx.setConfirmDialog({
                title: 'ยืนยันอัปโหลดประวัติ 7 เดือน',
                message: 'การอัปโหลดนี้จะแทนที่ข้อมูลประวัติการใช้ยาเดิมของ รพ.สต. ที่ระบุในไฟล์ทั้งหมด ยืนยันหรือไม่?',
                icon: 'fa-file-csv',
                confirmText: 'ยืนยันแทนที่',
                onConfirm: () => {
                    setIsSaving(true);
                    Papa.parse(file, {
                        header: true, skipEmptyLines: true,
                        complete: async (results) => {
                            try {
                                const rawData = results.data;
                                const grouped = {};
                                rawData.forEach(row => {
                                    const hospId = row.hospital_id;
                                    if(!hospId) return;
                                    if(!grouped[hospId]) grouped[hospId] = [];

                                    const m = [ Number(row.usage_m1)||0, Number(row.usage_m2)||0, Number(row.usage_m3)||0, Number(row.usage_m4)||0, Number(row.usage_m5)||0, Number(row.usage_m6)||0, Number(row.usage_m7)||0 ];
                                    const total = m.reduce((a,b)=>a+b, 0);
                                    const mean = total / 7;
                                    const variance = m.reduce((a,b) => a + Math.pow(b - mean, 2), 0) / 6;
                                    const sd = Math.sqrt(variance || 0);
                                    const adu = total / 210;

                                    const drug = ctx.appDb.drugs.find(d => d.drug_id === row.drug_id);
                                    grouped[hospId].push({
                                        hospital_id: hospId, drug_id: row.drug_id, 
                                        m1: m[0], m2: m[1], m3: m[2], m4: m[3], m5: m[4], m6: m[5], m7: m[6],
                                        total, adu: adu.toFixed(3), sd: sd.toFixed(3),
                                        drugName: drug ? drug.drug_name : 'N/A'
                                    });
                                });

                                const operations = [];
                                for (const hospId in grouped) {
                                    const existing = ctx.appDb.csvRequests.filter(r => r.hospital_id === hospId && r.status === 'Approved');
                                    existing.forEach(ex => {
                                        operations.push({ type: 'delete', ref: db.collection('csv_initial_requests').doc(ex.id) });
                                    });

                                    const newDocRef = db.collection('csv_initial_requests').doc();
                                    operations.push({
                                        type: 'set',
                                        ref: newDocRef,
                                        data: {
                                            hospital_id: hospId,
                                            items: grouped[hospId],
                                            status: 'Approved',
                                            created_at: firebase.firestore.FieldValue.serverTimestamp(),
                                            user_name: 'Admin Override'
                                        }
                                    });
                                }
                                await executeBatchChunks(operations);
                                ctx.showToast('อัปโหลดข้อมูลประวัติ 7 เดือนและแทนที่สำเร็จ');
                                ctx.refreshData();
                            } catch(err) {
                                ctx.showToast(err.message, 'error');
                            } finally {
                                setIsSaving(false);
                                e.target.value = null;
                            }
                        }
                    });
                }
            });
        };

        const handleExportInitialStockXLSX = () => {
            const hospName = ctx.appDb.hospitals.find(h => h.hospital_id === selHosp)?.hospital_name || selHosp;
            const typesSource = ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES;
            
            const wb = XLSX.utils.book_new();
            const wsData = [];
            wsData.push([`Initial Stock: รพ.สต. ${hospName.replace('รพ.สต.', '').trim()}`]);
            wsData.push([]);
            wsData.push(['ที่', 'ชื่อยา', 'หน่วย', 'Pack Size', 'M1', 'M2', 'M3', 'M4', 'M5', 'M6', 'M7', 'ADU', 'SD', 'Target Stock (45 วัน)', 'ราคา', 'มูลค่า', 'รหัส']);
            
            let globalIndex = 1;
            let grandTotalValue = 0;
            
            const grouped = {};
            Object.keys(typesSource).forEach(k => grouped[k] = []);
            
            ctx.appDb.drugs.forEach(d => {
                const csvData = activeCSV?.items?.find(it => it.drug_id === d.drug_id);
                if (csvData && csvData.adu > 0) {
                    const rawQty = (Number(csvData.adu) * 45) + (Number(csvData.sd) * zScore);
                    const ceilQty = Math.ceil(rawQty);
                    
                    let finalQty = ceilQty;
                    if (!d.unpacked) {
                        const packSize = Number(d.pack_size) || 1;
                        finalQty = Math.ceil(ceilQty / packSize) * packSize;
                    }
                    
                    if (finalQty > 0) {
                        const type = d.type || '1';
                        if (grouped[type]) grouped[type].push({ ...d, calcQty: finalQty, csvData });
                        else grouped['1'].push({ ...d, calcQty: finalQty, csvData });
                    }
                }
            });

            Object.keys(typesSource).forEach(typeKey => {
                const items = grouped[typeKey];
                if (!items || items.length === 0) return;
                
                wsData.push([`${typesSource[typeKey]}`, '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '']);
                
                let subTotalValue = 0;
                items.sort((a,b) => a.drug_id.localeCompare(b.drug_id)).forEach(item => {
                    const qty = item.calcQty;
                    const packSize = Number(item.pack_size) || 1;
                    const price = Number(item.price) || 0;
                    
                    let val = 0;
                    if (item.unpacked) {
                       val = (qty / packSize) * price;
                    } else {
                       val = (qty / packSize) * price;
                    }
                    
                    subTotalValue += val;
                    grandTotalValue += val;
                    
                    wsData.push([
                        globalIndex++,
                        item.drug_name,
                        item.unit_display_name,
                        packSize,
                        item.csvData.m1, item.csvData.m2, item.csvData.m3, item.csvData.m4, item.csvData.m5, item.csvData.m6, item.csvData.m7,
                        item.csvData.adu, item.csvData.sd,
                        qty,
                        price,
                        val,
                        item.drug_id
                    ]);
                });
                wsData.push(['', '', '', '', '', '', '', '', '', '', '', '', '', '', 'รวม', subTotalValue, '']);
            });
            
            wsData.push(['', '', '', '', '', '', '', '', '', '', '', '', '', '', 'รวมทั้งสิ้น', grandTotalValue, '']);
            
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, 'InitialStock');
            XLSX.writeFile(wb, `InitialStock_${selHosp}.xlsx`);
        };

        return (
          <div className="p-6">
            <div className="flex flex-col lg:flex-row gap-4 mb-6 items-center justify-between bg-slate-50 p-4 rounded-xl border border-slate-200">
              <div className="flex gap-4 w-full lg:w-auto">
                <select className="border-2 border-emerald-300 text-emerald-800 rounded-lg p-2 font-bold w-full md:w-64 outline-none" value={selHosp} onChange={e=>setSelHosp(e.target.value)}>
                  {ctx.appDb.hospitals.map(h=><option key={h.id} value={h.hospital_id}>{h.hospital_name}</option>)}
                </select>
                <label className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-bold shadow transition flex items-center whitespace-nowrap cursor-pointer">
                   <i className="fa-solid fa-upload mr-2"></i> อัปโหลด 7 ด. (แทนที่)
                   <input type="file" accept=".csv" className="hidden" onChange={handleAdminUploadCSV} />
                </label>
                <button onClick={handleExportInitialStockXLSX} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold shadow transition flex items-center whitespace-nowrap">
                   <i className="fa-solid fa-file-excel mr-2"></i> ส่งออก Initial Stock (XLSX)
                </button>
              </div>
              
              <div className="flex gap-3 items-center bg-white p-2 rounded-lg border border-slate-200 w-full lg:w-auto overflow-x-auto">
                 <div className="text-sm font-bold text-slate-600 whitespace-nowrap">ตัวแปรสูตร:</div>
                 <label className="text-xs text-slate-500 flex flex-col whitespace-nowrap">Z-Score
                   <input type="number" step="0.001" className="w-16 border rounded p-1 text-center font-bold text-slate-800" value={zScore} onChange={e=>setZScore(Number(e.target.value) || 0)} />
                 </label>
                 <label className="text-xs text-slate-500 flex flex-col whitespace-nowrap">Review Period
                   <input type="number" className="w-16 border rounded p-1 text-center font-bold text-slate-800" value={reviewPeriod} onChange={e=>setReviewPeriod(Number(e.target.value) || 1)} />
                 </label>
                 <label className="text-xs text-slate-500 flex flex-col whitespace-nowrap">Lead Time
                   <input type="number" className="w-16 border rounded p-1 text-center font-bold text-slate-800" value={leadTime} onChange={e=>setLeadTime(Number(e.target.value) || 1)} />
                 </label>
              </div>

              <div className="relative flex-grow max-w-sm w-full">
                <i className="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400"></i>
                <input type="text" placeholder="ค้นหาชื่อหรือรหัสยา..." className="w-full pl-10 pr-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-emerald-500" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
              </div>
            </div>

            <div className="overflow-x-auto border rounded-xl shadow-sm max-h-[600px] overflow-y-auto">
              <table className="w-full text-left text-sm border-collapse whitespace-nowrap">
                <thead className="bg-slate-100 border-b sticky top-0 z-10">
                  <tr>
                    <th className="p-3" rowSpan="2">รายการยา [รหัส]</th>
                    <th className="p-3 text-center bg-blue-50/80 border-x border-blue-200" colSpan="7">ประวัติยอดใช้รายเดือน (Initial CSV)</th>
                    <th className="p-3 text-center bg-indigo-50/80 border-r border-indigo-200" colSpan="2">คำนวณ (ADU/SD)</th>
                    <th className="p-3 text-center text-blue-800 bg-blue-100/80 font-bold border-r border-blue-200" rowSpan="2">Target Stock</th>
                    <th className="p-3 text-center text-amber-800 bg-amber-100/80 font-bold" rowSpan="2">ยอดยกมา<br/><span className="text-xs font-normal">(Credit)</span></th>
                    <th className="p-3 text-center bg-slate-100/80" rowSpan="2">สูตร</th>
                  </tr>
                  <tr className="bg-slate-50 text-[11px] text-slate-500 text-center border-b">
                    <th className="p-1 border-x border-blue-100">ต.ค. 68</th><th className="p-1 border-r border-blue-100">พ.ย. 68</th>
                    <th className="p-1 border-r border-blue-100">ธ.ค. 68</th><th className="p-1 border-r border-blue-100">ม.ค. 69</th>
                    <th className="p-1 border-r border-blue-100">ก.พ. 69</th><th className="p-1 border-r border-blue-100">มี.ค. 69</th>
                    <th className="p-1 border-r border-blue-200">เม.ย. 69</th>
                    <th className="p-1 bg-indigo-50/50 border-r border-indigo-100">Avg. Daily Use</th>
                    <th className="p-1 bg-indigo-50/50 border-r border-indigo-200">SD (เดือน)</th>
                  </tr>
                </thead>
                <tbody>
                  {stockList.sort(sortDrugs).map(d => (
                    <tr key={d.drug_id} className="border-b hover:bg-slate-50 transition">
                      <td className="p-3">
                        <div className="font-bold text-slate-800">{d.drug_name}</div>
                        <div className="text-xs text-slate-400">[{d.drug_id}] | Pack {d.pack_size} {d.unit_display_name}</div>
                      </td>
                      <td className="p-2 text-center text-slate-600 border-x border-slate-100">{d.csvData ? d.csvData.m1 : '-'}</td>
                      <td className="p-2 text-center text-slate-600 border-r border-slate-100">{d.csvData ? d.csvData.m2 : '-'}</td>
                      <td className="p-2 text-center text-slate-600 border-r border-slate-100">{d.csvData ? d.csvData.m3 : '-'}</td>
                      <td className="p-2 text-center text-slate-600 border-r border-slate-100">{d.csvData ? d.csvData.m4 : '-'}</td>
                      <td className="p-2 text-center text-slate-600 border-r border-slate-100">{d.csvData ? d.csvData.m5 : '-'}</td>
                      <td className="p-2 text-center text-slate-600 border-r border-slate-100">{d.csvData ? d.csvData.m6 : '-'}</td>
                      <td className="p-2 text-center text-slate-600 border-r border-blue-200">{d.csvData ? d.csvData.m7 : '-'}</td>
                      
                      <td className="p-2 text-center font-bold text-indigo-700 bg-indigo-50/30 border-r border-indigo-100">{d.csvData ? d.csvData.adu : '-'}</td>
                      <td className="p-2 text-center font-bold text-indigo-700 bg-indigo-50/30 border-r border-indigo-200">{d.csvData ? d.csvData.sd : '-'}</td>

                      <td className="p-3 text-center bg-blue-50 border-r border-blue-100">
                        <input type="number" className="w-20 text-center border-b-2 border-blue-400 bg-transparent font-extrabold text-blue-700 outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 rounded p-1" value={d.targetStock} onChange={e=>handleSave('config_par', `${selHosp}_${d.drug_id}`, {hospital_id: selHosp, drug_id: d.drug_id, par_qty: Number(e.target.value)})} />
                      </td>
                      <td className="p-3 text-center bg-amber-50">
                        <input type="number" className="w-20 text-center border-b-2 border-amber-400 bg-transparent font-extrabold text-amber-700 outline-none focus:bg-white focus:ring-2 focus:ring-amber-500 rounded p-1" value={d.currentBal} onChange={e=>handleSave('current_excess', `${selHosp}_${d.drug_id}`, {hospital_id: selHosp, drug_id: d.drug_id, excess_balance: Number(e.target.value), last_updated: firebase.firestore.FieldValue.serverTimestamp()})} />
                      </td>
                      <td className="p-3 text-center">
                        {d.csvData ? (
                           <button onClick={() => setShowFormula(d.csvData)} className="text-emerald-500 hover:text-emerald-700 bg-emerald-50 p-2 rounded-lg transition"><i className="fa-solid fa-calculator"></i></button>
                        ) : (
                           <span className="text-slate-300">-</span>
                        )}
                      </td>
                    </tr>
                  ))}
                  {stockList.length === 0 && <tr><td colSpan="13" className="p-8 text-center text-slate-400">ไม่พบรายการยาที่มีประวัติหรือยอดยกมา</td></tr>}
                </tbody>
              </table>
            </div>
            
            {showFormula && (
              <Modal title="ที่มาของสูตรการคำนวณ Initial Stock" isOpen={true} onClose={()=>setShowFormula(null)}>
                <div className="space-y-4 text-slate-700">
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                      <p className="text-xs text-slate-500 font-bold mb-1">ยอดรวมใช้ 7 เดือน (M1-M7)</p>
                      <p className="text-2xl font-black text-slate-700">{showFormula.total} <span className="text-sm font-medium">{showFormula.unit}</span></p>

                    <div className="bg-blue-50 p-4 rounded-xl border border-blue-200">
                      <p className="text-xs text-blue-600 font-bold mb-1">Avg Daily Usage (ADU)</p>

                      <p className="text-[10px] text-blue-400 mt-1">ΣM / 210 วัน</p>

                      <p className="text-2xl font-black text-amber-700">{showFormula.sd}</p>

                      <p className="text-xs text-purple-600 font-bold mb-1">Safety Stock (SS)</p>
                      <p className="text-2xl font-black text-purple-700">{showFormula.ss}</p>
                      <p className="text-[10px] text-purple-400 mt-1">{zScore} * ({showFormula.sd}/{reviewPeriod}) * √{leadTime}</p>

                    <p className="text-sm font-bold text-emerald-800 mb-2">Target Stock (45 วัน) = (ADU × 45) + SS</p>
                    <p className="text-4xl font-black text-emerald-600 mb-2">{showFormula.finalQty} <span className="text-lg font-bold">{showFormula.unit}</span></p>
                    <p className="text-sm text-emerald-700 font-medium bg-emerald-100 inline-block px-3 py-1 rounded-full">
                       คำนวณได้ {showFormula.ceilInitial} ➔ ปัดเศษ ({showFormula.finalPack} Pack × {showFormula.packSize})
                    </p>
                  </div>
                </div>
              </Modal>
            )}
          </div>
        );
      };

      const DrugManager = () => {
        const [searchTerm, setSearchTerm] = useState('');
        const handleCSVUpload = (e) => {
          const file = e.target.files[0];
          if(!file) return;
          Papa.parse(file, {
            header: true, skipEmptyLines: true,
            complete: async (results) => {
              const ops = results.data.map(row => {
                const isUnpacked = String(row.unpacked).toUpperCase() === 'TRUE';
                return {
                  type: 'set', ref: db.collection('master_drugs').doc(row.drug_id),
                  data: {
                    drug_id: row.drug_id, drug_name: row.drug_name, pack_size: Number(row.pack_size) || 1,
                    unit_id: row.unit_id, price: Number(row.price) || 0, type: String(row.type) || '1', unpacked: isUnpacked, fuzzy: row.fuzzy || ''
                  }
                };
              }).filter(op => op.data.drug_id);
              await executeBatchChunks(ops);
              ctx.refreshData(); ctx.showToast('อัปโหลดและอัปเดตข้อมูลยาผ่าน CSV สำเร็จ');
              e.target.value = null;
            }
          });
        };

        const filteredDrugs = ctx.appDb.drugs.filter(d => 
          (d.drug_name || '').toLowerCase().includes(searchTerm.toLowerCase()) || 
          (d.drug_id || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
          (d.fuzzy || '').toLowerCase().includes(searchTerm.toLowerCase())
        ).sort(sortDrugs);

        return (
          <div className="p-6">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-indigo-50 p-4 rounded-xl mb-6 gap-4 border border-indigo-100">
              <div>
                <h3 className="font-bold text-indigo-800">นำเข้า/อัปเดตยาด้วยไฟล์ CSV</h3>
                <p className="text-xs text-indigo-600 mt-1">คอลัมน์ที่ต้องการ: drug_id, drug_name, pack_size, unit_id, price, type, unpacked, fuzzy</p>
              </div>
              <label className="bg-indigo-600 text-white px-4 py-2 rounded-lg cursor-pointer font-bold hover:bg-indigo-700 shrink-0 shadow-lg">
                <i className="fa-solid fa-file-csv mr-2"></i>อัปโหลด CSV ยา <input type="file" accept=".csv" className="hidden" onChange={handleCSVUpload}/>
              </label>
            </div>
            
            <div className="flex justify-between items-center mb-4 gap-4">
               <div className="relative w-full max-w-sm">
                 <i className="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-slate-400"></i>
                 <input type="text" placeholder="ค้นหารายการยา..." className="w-full pl-10 pr-4 py-3 border rounded-xl outline-none focus:border-emerald-500" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
               </div>
               <button onClick={()=>setEditTarget({ col: 'master_drugs', data: {}, isNew: true })} className="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shrink-0 hover:scale-105 transition">
                 <i className="fa-solid fa-plus mr-1"></i> เพิ่มรายการยา
               </button>
            </div>

            <div className="overflow-x-auto border border-slate-200 rounded-xl shadow-sm max-h-[600px] overflow-y-auto">
              <table className="w-full text-left text-sm border-collapse whitespace-nowrap">
                <thead className="bg-slate-100 border-b sticky top-0 z-10">
                  <tr><th className="p-4">รหัส</th><th className="p-4">หมวด</th><th className="p-4">ชื่อยา</th><th className="p-4">ชื่อพ้อง (Fuzzy)</th><th className="p-4 text-center">Pack</th><th className="p-4 text-center">หน่วย</th><th className="p-4 text-center">แตกย่อย</th><th className="p-4 text-right">ราคา (฿)</th><th className="p-4 text-center">จัดการ</th></tr>
                </thead>
                <tbody>
                  {filteredDrugs.map(d=>(
                    <tr key={d.id} className="border-b hover:bg-slate-50 transition">
                      <td className="p-4 font-mono text-slate-500">{d.drug_id}</td>
                      <td className="p-4 font-bold text-slate-600">{(ctx.appDb.drugTypes || DEFAULT_DRUG_TYPES)[d.type] || DEFAULT_DRUG_TYPES['1']}</td>
                      <td className="p-4 font-bold text-slate-800">{d.drug_name}</td>

      const UnitManager = () => {
        const [searchTerm, setSearchTerm] = useState('');
        
        const handleCSVUploadAndClear = (e) => {
          const file = e.target.files[0];
          if(!file) return;
          
          ctx.setConfirmDialog({
            title: 'คำเตือน: ลบข้อมูลเดิมทั้งหมด?',
            message: 'คุณกำลังจะลบข้อมูลหน่วยนับเดิมทิ้งทั้งหมด แล้วนำเข้าข้อมูลใหม่จากไฟล์ CSV ยืนยันหรือไม่?',

            confirmText: 'ยืนยัน ลบและนำเข้า',

                   setIsSaving(true);

                     })).filter(op => op.data.unit_id);
                     
                     await executeBatchChunks([...deleteOps, ...setOps]);
                     ctx.refreshData(); ctx.showToast('ล้างข้อมูลเดิมและนำเข้า CSV หน่วยนับแล้ว');
                   } catch(err) {
                     ctx.showToast(err.message, 'error');

      const RawDBManager = () => {
         const collections = [
            { id: 'requisitions', name: 'ใบเบิก/เติมยา' },
            { id: 'current_excess', name: 'เครดิต (ยอดยกมา)' },
            { id: 'config_par', name: 'Target VMI (Par)' },
            { id: 'master_drugs', name: 'รายการยา/ราคา' },

            { id: 'stock_adjustments', name: 'คำขอปรับสต๊อก' }
         ];
         const [selCol, setSelCol] = useState(collections[0].id);
         const [data, setData] = useState([]);
         
         useEffect(() => {
            db.collection(selCol).limit(100).get().then(snap => {
               setData(snap.docs.map(d => ({ _docId: d.id, ...d.data() })));
            });
         }, [selCol]);

         const handleCellEdit = async (docId, field, val) => {
            try {
               let parsedVal = val;
               try { parsedVal = JSON.parse(val); } catch(e) {} 
               await db.collection(selCol).doc(docId).update({ [field]: parsedVal });
               ctx.showToast('อัปเดตช่องข้อมูลแล้ว');
               setData(prev => prev.map(d => d._docId === docId ? { ...d, [field]: parsedVal } : d));
            } catch(e) { ctx.showToast(e.message, 'error'); }
         };

         if(data.length === 0) return (
            <div className="p-6 text-center text-slate-500">
               <select value={selCol} onChange={e=>setSelCol(e.target.value)} className="mb-4 border p-2 rounded">
                  {collections.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
               </select><br/>ไม่มีข้อมูลในตารางนี้
            </div>
         );

         const keys = Object.keys(data[0]).filter(k => k !== '_docId');

         return (
            <div className="p-6">
               <div className="flex items-center gap-4 mb-4">
                  <span className="font-bold text-slate-700">เลือกตาราง:</span>
                  <select value={selCol} onChange={e=>setSelCol(e.target.value)} className="border border-slate-300 bg-slate-50 p-2 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-indigo-700">
                     {collections.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                  <span className="text-xs text-red-500 font-bold bg-red-50 p-2 rounded-lg"><i className="fa-solid fa-triangle-exclamation mr-1"></i> โหมดอันตราย (แก้ฐานข้อมูลโดยตรง) ช่อง Arrays/Objects จะแสดงเป็น JSON Format</span>
               </div>
               <div className="overflow-x-auto border border-slate-300 rounded-xl max-h-[600px] overflow-y-auto">
                  <table className="w-full text-left text-[12px] whitespace-nowrap bg-white">
                     <thead className="bg-slate-800 text-white sticky top-0 z-10">
                        <tr>
                           <th className="p-2 border border-slate-700">Doc ID</th>
                           {keys.map(k => <th key={k} className="p-2 border border-slate-700">{k}</th>)}
                        </tr>
                     </thead>
                     <tbody>
                        {data.map((row) => (
                           <tr key={row._docId} className="hover:bg-amber-50 group">
                              <td className="p-2 border border-slate-200 font-mono text-slate-500 bg-slate-50">{row._docId}</td>
                              {keys.map(k => {
                                 let displayVal = row[k];
                                 if(typeof displayVal === 'object' && displayVal !== null) {
                                    if(displayVal.seconds) displayVal = new Date(displayVal.seconds*1000).toISOString();
                                    else displayVal = JSON.stringify(displayVal);
                                 }
                                 return (
                                    <td key={k} className="p-0 border border-slate-200 relative">
                                       <textarea 
                                          defaultValue={displayVal} 
                                          onBlur={(e) => { if(e.target.value !== String(displayVal)) handleCellEdit(row._docId, k, e.target.value) }}
                                          className="w-full h-full min-h-[30px] p-2 bg-transparent outline-none focus:bg-amber-100 focus:ring-inset focus:ring-2 focus:ring-amber-500 resize-none overflow-hidden hover:bg-slate-50"
                                          rows="1"
                                       />
                                    </td>
                                 );
                              })}

                        ))}
                     </tbody>
                  </table>
               </div>
            </div>
         );
      };

      const ApproveStockManager = () => {
        const pendingAdjustments = ctx.appDb.stockAdjustments ? ctx.appDb.stockAdjustments.filter(a => a.status === 'Pending') : [];

        const handleApprove = async (adj) => {
          setIsSaving(true);
          try {
            const batch = db.batch();
            batch.update(db.collection('stock_adjustments').doc(adj.id), { status: 'Approved', approved_at: firebase.firestore.FieldValue.serverTimestamp() });
            const docId = `${adj.hospital_id}_${adj.drug_id}`;

              hospital_id: adj.hospital_id, drug_id: adj.drug_id, excess_balance: Number(adj.new_balance), last_updated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            await batch.commit();
            ctx.showToast('อนุมัติปรับสต๊อกเรียบร้อยแล้ว');
            await ctx.refreshData();

          setIsSaving(true);

            await db.collection('stock_adjustments').doc(adj.id).update({ status: 'Rejected', rejected_at: firebase.firestore.FieldValue.serverTimestamp() });

                    return (
                      <tr key={adj.id} className="border-b hover:bg-slate-50 transition">
                        <td className="p-4">
                           <div className="font-semibold text-slate-800">{hospName}</div>

                          <button onClick={()=>ctx.setConfirmDialog({title:'ยืนยันอนุมัติ', message:'คุณต้องการอนุมัติปรับสต๊อกนี้ใช่หรือไม่?', onConfirm: ()=>handleApprove(adj), icon:'fa-check', confirmText:'อนุมัติ'})} className="bg-emerald-500 text-white px-3 py-2 rounded-lg shadow hover:bg-emerald-600"><i className="fa-solid fa-check mr-1"></i> อนุมัติ</button>
                          <button onClick={()=>ctx.setConfirmDialog({title:'ปฏิเสธคำขอ', message:'คุณต้องการปฏิเสธการขอปรับสต๊อกนี้ใช่หรือไม่?', onConfirm: ()=>handleReject(adj), iconColor:'text-red-500', confirmBtnClass:'bg-red-500 hover:bg-red-600'})} className="bg-red-500 text-white px-3 py-2 rounded-lg shadow hover:bg-red-600"><i className="fa-solid fa-xmark mr-1"></i> ปฏิเสธ</button>
